<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0B0B12">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no.0">
<title>NeuroLearn вҖ” жҷәиғҪеӯёзҝ’е№іеҸ°</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer onerror="console.warn('[Supa] SDK load failed')"></script>
<style>
  :root {
    --bg-base: #0B0B12;
    --bg-surface: #11111A;
    --bg-card: #181824;
    --accent: #7B6FE0;
    --accent-dim: rgba(123,111,224,0.1);
    --accent-border: rgba(123,111,224,0.3);
    --gold: #C8963E;
    --gold-dim: rgba(200,150,62,0.1);
    --gold-border: rgba(200,150,62,0.28);
    --green: #4ADE80;
    --red: #F87171;
    --amber: #FBBF24;
    --text-1: #E2E2EE;
    --text-2: #8888A8;
    --text-3: #525270;
    --border: rgba(255,255,255,0.07);
    --border-h: rgba(255,255,255,0.14);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'DM Sans','Inter','Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg-base);
    color:var(--text-1);
    min-height:100vh;
    overflow-x:hidden;
  }
  /* Ambient background */
  body::before{
    content:'';position:fixed;inset:0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 20%, rgba(123,111,224,0.07) 0%,transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 80%, rgba(200,150,62,0.05) 0%,transparent 60%);
    pointer-events:none;z-index:0;
  }
  /* Subtle grid */
  body::after{
    content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
    background-size:44px 44px;
    pointer-events:none;z-index:0;
  }
  h1,h2,h3,h4{font-family:'Sora',sans-serif}
  .mono{font-family:'JetBrains Mono','Cascadia Code','Consolas',monospace}

  /* в”Җв”Җв”Җ Navbar в”Җв”Җв”Җ */
  #navbar{
    position:fixed;top:0;left:0;right:0;height:62px;
    background:rgba(11,11,18,0.88);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border-bottom:1px solid var(--border);
    z-index:200;display:flex;align-items:center;
    padding:0 1.75rem;justify-content:space-between;
  }
  .nav-logo{display:flex;align-items:center;gap:.65rem;cursor:pointer}
  .nav-logo-icon{
    width:32px;height:32px;border-radius:9px;
    background:linear-gradient(135deg,#7B6FE0,#5244C2);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 14px rgba(123,111,224,.35);
  }
  .nav-logo-text{font-family:'Sora','Inter','Segoe UI',system-ui,-apple-system,sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:-.02em}
  .nav-links{display:flex;align-items:center;gap:.25rem}
  .nav-link{
    background:transparent;border:none;color:var(--text-2);
    padding:.42rem .85rem;border-radius:8px;font-size:.83rem;
    font-family:'DM Sans','Inter','Segoe UI',system-ui,-apple-system,sans-serif;cursor:pointer;
    transition:all .2s ease;
  }
  .nav-link:hover{color:var(--text-1);background:rgba(255,255,255,.05)}
  .nav-link.active{color:var(--accent);background:var(--accent-dim)}

  /* в”Җв”Җв”Җ Page в”Җв”Җв”Җ */
  #page-content{min-height:100vh;padding-top:62px;position:relative;z-index:1}
  .page{animation:fadeUp .38s cubic-bezier(.4,0,.2,1)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  /* в”Җв”Җв”Җ Badge в”Җв”Җв”Җ */
  .badge{
    display:inline-flex;align-items:center;gap:.25rem;
    padding:.18rem .55rem;border-radius:999px;
    font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  }
  .badge-v{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
  .badge-g{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
  .badge-gr{background:rgba(74,222,128,.08);color:var(--green);border:1px solid rgba(74,222,128,.25)}
  .badge-r{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.25)}
  .badge-a{background:rgba(251,191,36,.08);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
  .badge-n{background:rgba(255,255,255,.05);color:var(--text-2);border:1px solid var(--border)}

  /* в”Җв”Җв”Җ Buttons в”Җв”Җв”Җ */
  .btn{
    display:inline-flex;align-items:center;gap:.4rem;
    border:none;border-radius:10px;cursor:pointer;
    font-family:'Sora','Inter','Segoe UI',system-ui,-apple-system,sans-serif;font-weight:600;
    font-size:.875rem;letter-spacing:.01em;transition:all .2s ease;
    padding:.7rem 1.5rem;
  }
  .btn-primary{
    background:linear-gradient(135deg,#7B6FE0,#5244C2);color:#fff;
    box-shadow:0 2px 12px rgba(123,111,224,.25);
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(123,111,224,.4)}
  .btn-primary:active{transform:translateY(0)}
  .btn-primary:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-ghost{
    background:transparent;color:var(--text-2);
    border:1px solid var(--border);font-family:'DM Sans','Inter','Segoe UI',system-ui,-apple-system,sans-serif;font-weight:500;
  }
  .btn-ghost:hover{border-color:var(--border-h);color:var(--text-1);background:rgba(255,255,255,.04)}

  /* в”Җв”Җв”Җ Glass Card в”Җв”Җв”Җ */
  .g-card{
    background:rgba(24,24,36,.65);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--border);border-radius:18px;
    transition:border-color .25s,box-shadow .25s,transform .3s cubic-bezier(.4,0,.2,1);
  }
  .g-card:hover{border-color:var(--border-h);box-shadow:0 16px 40px rgba(0,0,0,.28)}

  /* в”Җв”Җв”Җ Nav Cards (Home) в”Җв”Җв”Җ */
  .n-card{
    background:rgba(20,20,32,.55);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--border);border-radius:22px;padding:2.25rem;
    cursor:pointer;position:relative;overflow:hidden;
    transition:all .35s cubic-bezier(.4,0,.2,1);
  }
  .n-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--c,#7B6FE0),transparent);
    opacity:0;transition:opacity .3s;
  }
  .n-card:hover{border-color:var(--c-border,var(--accent-border));transform:translateY(-9px);box-shadow:0 28px 56px rgba(0,0,0,.45),0 0 32px var(--c-glow,rgba(123,111,224,.07))}
  .n-card:hover::before{opacity:1}

  /* в”Җв”Җв”Җ Progress bar в”Җв”Җв”Җ */
  .pb-bg{height:3px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden}
  .pb-fill{height:100%;background:linear-gradient(90deg,var(--accent),#9988F5);border-radius:999px;transition:width .5s ease}

  /* в”Җв”Җв”Җ Option Buttons в”Җв”Җв”Җ */
  .opt{
    width:100%;text-align:left;
    background:rgba(255,255,255,.025);border:1px solid var(--border);
    border-radius:12px;padding:.9rem 1.1rem;color:var(--text-1);
    cursor:pointer;transition:all .18s ease;
    font-family:'DM Sans','Inter','Segoe UI',system-ui,-apple-system,sans-serif;font-size:.92rem;
    display:flex;align-items:center;gap:.75rem;
  }
  .opt:hover:not(.locked){border-color:var(--accent-border);background:var(--accent-dim)}
  .opt.sel{border-color:var(--accent);background:var(--accent-dim)}
  .opt.correct{border-color:rgba(74,222,128,.55)!important;background:rgba(74,222,128,.07)!important;color:var(--green)}
  .opt.wrong{border-color:rgba(248,113,113,.55)!important;background:rgba(248,113,113,.07)!important;color:var(--red)}
  .opt.dim{opacity:.35}
  .opt.locked{cursor:default}

  /* в”Җв”Җв”Җ Bookmark в”Җв”Җв”Җ */
  .bk-btn{
    background:transparent;border:none;cursor:pointer;
    color:var(--text-3);padding:.3rem;border-radius:7px;
    transition:all .2s;display:flex;align-items:center;
  }
  .bk-btn:hover{color:var(--gold);background:var(--gold-dim)}
  .bk-btn.on{color:var(--gold)}

  /* в”Җв”Җв”Җ Drop Zone в”Җв”Җв”Җ */
  .drop-zone{
    border:2px dashed rgba(255,255,255,.12);border-radius:20px;
    padding:3rem 2rem;text-align:center;cursor:pointer;
    transition:all .25s ease;
  }
  .drop-zone:hover,.drop-zone.dv{
    border-color:var(--accent);background:var(--accent-dim);
  }

  /* в”Җв”Җв”Җ Stat Card в”Җв”Җв”Җ */
  .s-card{
    background:rgba(24,24,36,.7);backdrop-filter:blur(12px);
    border:1px solid var(--border);border-radius:16px;padding:1.4rem;
  }

  /* в”Җв”Җв”Җ Review card в”Җв”Җв”Җ */
  .rv-card{border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .rv-hdr{
    padding:1rem 1.2rem;cursor:pointer;
    display:flex;align-items:center;justify-content:space-between;
    transition:background .15s;
  }
  .rv-hdr:hover{background:rgba(255,255,255,.025)}
  .rv-body{display:none;padding:0 1.2rem 1.2rem;border-top:1px solid var(--border)}
  .rv-body.open{display:block}

  /* в”Җв”Җв”Җ History в”Җв”Җв”Җ */
  .h-row{
    display:grid;grid-template-columns:2.5fr 1.5fr 1fr 1fr 1fr;
    align-items:center;padding:.8rem 1.1rem;
    border-bottom:1px solid var(--border);transition:background .15s;
  }
  .h-row:hover{background:rgba(255,255,255,.02)}
  .h-row:last-child{border-bottom:none}

  /* в”Җв”Җв”Җ Result Item в”Җв”Җв”Җ */
  .r-item{
    border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem;
    transition:all .15s;
  }
  .r-item.ok{border-color:rgba(74,222,128,.18);background:rgba(74,222,128,.025)}
  .r-item.bad{border-color:rgba(248,113,113,.18);background:rgba(248,113,113,.025)}

  /* в”Җв”Җв”Җ Gradient text в”Җв”Җв”Җ */
  .grad-text{
    background:linear-gradient(135deg,#9B8FF0 0%,#C8963E 45%,#7B6FE0 100%);
    background-size:200% 200%;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    animation:gradShift 5s ease infinite;
  }
  @keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

  /* в”Җв”Җв”Җ Scrollbar в”Җв”Җв”Җ */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}

  .sep{height:1px;background:var(--border);margin:1.25rem 0}

  /* в”Җв”Җв”Җ Pulse dot в”Җв”Җв”Җ */
  .pulse-dot{
    width:7px;height:7px;border-radius:50%;background:var(--green);
    animation:pulse 2.2s ease infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

  /* в”Җв”Җв”Җ Chart canvas в”Җв”Җв”Җ */
  #scoreChart{max-height:200px}

  /* в”Җв”Җв”Җ Score ring в”Җв”Җв”Җ */
  .score-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}

  @media(max-width:640px){
    #navbar{height:52px;padding:0 .75rem;gap:.4rem}
    #page-content{padding-top:52px}
    .nav-logo-text{font-size:.82rem}
    .nav-logo-icon{width:26px;height:26px;border-radius:6px}
    .nav-link{padding:.32rem .38rem;font-size:.7rem}
    .nav-links{gap:0;flex-shrink:1}
    .page{animation:none}
    .g-card{border-radius:14px}
    .btn{min-height:44px}
  }
  @media(max-width:400px){
    .nav-link-text{display:none}
    .nav-link{padding:.32rem .45rem}
    #navbar{padding:0 .6rem;gap:.3rem}
  }
  @media(hover:hover){.btn:hover{opacity:.82}}
  @media(hover:none){.btn:active{opacity:.82}}
  #page-content{padding-bottom:env(safe-area-inset-bottom,0px)}
</style>
</head>
<body>

<!-- в•җв•җв•җв•җ NAVBAR в•җв•җв•җв•җ -->
<nav id="navbar">
  <div class="nav-logo" onclick="navigate('home')">
    <div class="nav-logo-icon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5M2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="nav-logo-text">NeuroLearn</span>
  </div>
  <div style="display:flex;align-items:center;gap:.5rem;">
    <div class="nav-links">
    <button class="nav-link" id="nl-home"   onclick="navigate('home')">йҰ–й Ғ</button>
    <button class="nav-link" id="nl-data"   onclick="navigate('datasets')">иіҮж–ҷйӣҶ</button>
    <button class="nav-link" id="nl-quiz"   onclick="navigate('quiz')">жЁЎж“¬иҖғ</button>
    <button class="nav-link" id="nl-dash"   onclick="navigate('dashboard')">е„ҖиЎЁжқҝ</button>
  </div>
    <div id="nav-user-area" style="display:flex;align-items:center;gap:.3rem;margin-left:.3rem;flex-shrink:0;">
      <button onclick="navigate('login')" class="btn btn-primary" style="font-size:.72rem;padding:.28rem .65rem;min-height:0;touch-action:manipulation;white-space:nowrap;">зҷ»е…Ҙ</button>
    </div>
  </div>
</nav>

<main id="page-content"></main>

<script>

const SUPA_URL = 'https://rmqlwzjlvpowqwgwiegg.supabase.co';
const SUPA_KEY = 'sb_publishable_A3vHSsoyjb_KMZDUbCNHdQ_hs0O87su';
let _supa = null;
let _currentUser = null;
let _cloudSyncTimer = null;
let _accessToken = null;  // cached JWT вҖ” no network needed for sync

const STORAGE_KEY_BASE = 'neurolearn_v2';
function getStorageKey() {
  return _currentUser ? STORAGE_KEY_BASE + '_' + _currentUser.id : STORAGE_KEY_BASE;
}

function resetState() {
  S.quizMode = 'menu'; S.currentQ = 0; S.answers = [];
  S.quizConfig = null; S.quizSetup = null; S.activeQs = [];
  S.browseSrc = null; S.importMsg = null; S.editingTagFid = null; S.chart = null;
  S.bookmarks = new Set(); S.wrongQs = new Set(); S.usedQIds = new Set();
  S.history = []; S.files = []; S.extraQs = []; S.nextFid = 4;
  S.dashTag = null; S.tagFilter = null; S.page = 'home';
}

async function syncToCloud() {
  if (!_supa || !_currentUser) return;

  const token = _accessToken;
  if (!token) throw new Error('и«ӢйҮҚж–°зҷ»е…ҘеҫҢеҶҚеҗҢжӯҘгҖӮ');

  const payload = JSON.stringify({
    user_id: _currentUser.id,
    data: {
      history:   S.history,
      bookmarks: [...S.bookmarks],
      wrongQs:   [...S.wrongQs],
      usedQIds:  [...S.usedQIds],
      files:     S.files.map(function(f){ var c={}; Object.assign(c,f); delete c._file; return c; }),
      extraQs:   S.extraQs,
      dashTag:   S.dashTag,
      tagFilter: S.tagFilter,
    },
    updated_at: new Date().toISOString(),
  });

  // XMLHttpRequest вҖ” has a native, guaranteed timeout property
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', SUPA_URL + '/rest/v1/user_progress?on_conflict=user_id');
    xhr.timeout = 10000; // 10 seconds hard timeout (native, always works)
    xhr.setRequestHeader('Content-Type',  'application/json');
    xhr.setRequestHeader('apikey',        SUPA_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + token);
    xhr.setRequestHeader('Prefer',        'resolution=merge-duplicates');

    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        console.log('[Supa] Synced вң“ HTTP', xhr.status);
        resolve();
      } else {
        var msg = 'HTTP ' + xhr.status;
        try { var j = JSON.parse(xhr.responseText); msg = j.message || j.hint || j.error || msg; } catch(_) {}
        reject(new Error('Supabase йҢҜиӘӨпјҡ' + msg));
      }
    };
    xhr.onerror   = function() { reject(new Error('з¶Іи·ҜйҢҜиӘӨпјҢи«ӢзўәиӘҚйҖЈз·ҡгҖӮ')); };
    xhr.ontimeout = function() { reject(new Error('йҖЈз·ҡйҖҫжҷӮпјҲ10з§’пјүпјҢSupabase з„ЎеӣһжҮүгҖӮ')); };
    xhr.send(payload);
  });
}

async function loadCloudProgress() {
  if (!_supa || !_currentUser) return;
  try {
    const { data, error } = await _supa.from('user_progress').select('data').eq('user_id', _currentUser.id).maybeSingle();
    if (error || !data) return;
    const d = data.data; if (!d) return;
    if (Array.isArray(d.history))   S.history   = d.history;
    if (Array.isArray(d.bookmarks)) S.bookmarks = new Set(d.bookmarks.map(String));
    if (Array.isArray(d.wrongQs))   S.wrongQs   = new Set(d.wrongQs.map(String));
    if (Array.isArray(d.usedQIds))  S.usedQIds  = new Set(d.usedQIds.map(String));
    if (Array.isArray(d.files))     S.files     = d.files;
    if (Array.isArray(d.extraQs))   S.extraQs   = d.extraQs;
    if (d.dashTag !== undefined)    S.dashTag   = d.dashTag;
    if (d.tagFilter !== undefined)  S.tagFilter = d.tagFilter;
    if (S.files.length > 0) S.nextFid = Math.max(...S.files.map(f => f.id + 1));
    saveToStorage();
    console.log('[Supa] Cloud progress loaded.');
  } catch(e) { console.warn('[Supa] loadCloudProgress error:', e); }
}

function scheduleSyncToCloud() {
  clearTimeout(_cloudSyncTimer);
  _cloudSyncTimer = setTimeout(() => syncToCloud().catch(e => console.warn('[Supa] background sync error:', e.message || e)), 2000);
}

function updateNavUser() {
  const el = document.getElementById('nav-user-area');
  if (!el) return;
  if (_currentUser) {
    const name = (_currentUser.email||'').split('@')[0];
    el.innerHTML =
      '<span style="font-size:.74rem;color:var(--text-2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + _currentUser.email + '">' + name + '</span>' +
      '<button onclick="signOut()" class="btn btn-ghost" style="font-size:.72rem;padding:.28rem .55rem;min-height:0;touch-action:manipulation;">зҷ»еҮә</button>';
  } else {
    el.innerHTML = '<button onclick="navigate(\'login\')" class="btn btn-primary" style="font-size:.72rem;padding:.28rem .65rem;min-height:0;touch-action:manipulation;white-space:nowrap;">зҷ»е…Ҙ</button>';
  }
}

function initSupabase() {
  if (typeof supabase === 'undefined') { updateNavUser(); return; }
  if (!SUPA_URL || SUPA_URL === 'YOUR_SUPABASE_URL') { updateNavUser(); return; }
  try {
    _supa = supabase.createClient(SUPA_URL, SUPA_KEY);
    _supa.auth.onAuthStateChange(async (event, session) => {
      const prev = _currentUser;
      _currentUser  = session?.user ?? null;
      _accessToken  = session?.access_token ?? null;  // cache for instant sync
      updateNavUser();
      if (event === 'SIGNED_IN' && !prev) {
        resetState(); loadFromStorage(); await loadCloudProgress(); render();
      }
      if (event === 'SIGNED_OUT') {
        resetState(); loadFromStorage(); render();
      }
    });
    const _hash = window.location.hash;
    if (_hash && (_hash.includes('access_token') || _hash.includes('error'))) {
      if (_hash.includes('otp_expired') || _hash.includes('access_denied')) {
        window.location.hash = '';
        S.page = 'login'; render();
        setTimeout(() => { const m=document.getElementById('auth-msg'); if(m){ m.style.color='#F87171'; m.textContent='й©—иӯүйҖЈзөҗе·ІйҒҺжңҹпјҢи«ӢйҮҚеҜ„й©—иӯүдҝЎгҖӮ'; } }, 100);
      } else if (_hash.includes('access_token')) {
        window.location.hash = '';

/* в”Җв”Җ Multi/single answer comparison helpers в”Җв”Җ */
function isCorrectAnswer(q, selected) {
  if (q.isMulti) {
    const s = Array.isArray(selected) ? [...selected].sort((a,b)=>a-b) : [];
    const a = [...q.answer].sort((a,b)=>a-b);
    return s.length === a.length && s.every((v,j) => v === a[j]);
  }
  return selected === q.answer;
}
function correctSet(q) {
  return q.isMulti ? new Set(q.answer) : new Set([q.answer]);
}
function correctAnswerLabel(q) {
  const ANS = ['A','B','C','D','E'];
  if (q.isMulti) return [...q.answer].sort((a,b)=>a-b).map(i => ANS[i]+'. '+q.options[i]).join('гҖҒ');
  return q.options[q.answer] || '';
}

function exportProgress() {
  const payload = {
    _version:1, _app:'NeuroLearn', _exported:new Date().toISOString(),
    bookmarks:[...S.bookmarks], wrongQs:[...S.wrongQs], usedQIds:[...S.usedQIds],
    history:S.history, files:S.files.map(function(f){var c={};Object.assign(c,f);delete c._file;return c;}),
    extraQs:S.extraQs, dashTag:S.dashTag, tagFilter:S.tagFilter,
  };
  var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='NeuroLearn_'+new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')+'.json';
  a.click(); URL.revokeObjectURL(a.href);
}

function importProgress(input) {
  var file=input.files[0]; if(!file) return;
  var msg=document.getElementById('backup-msg');
  function setMsg(t,ok){ if(!msg) return; msg.textContent=t; msg.style.color=ok?'#4ADE80':'#F87171'; }
  var reader=new FileReader();
  reader.onload=function(e){
    try {
      var d=JSON.parse(e.target.result);
      if(!d||d._app!=='NeuroLearn'){ setMsg('з„Ўж•ҲеӮҷд»ҪжӘ”жЎҲ',false); return; }
      if(d._version!==1){ setMsg('зүҲжң¬дёҚзӣёе®№',false); return; }
      if(Array.isArray(d.bookmarks)) S.bookmarks=new Set(d.bookmarks.map(String));
      if(Array.isArray(d.wrongQs))   S.wrongQs=new Set(d.wrongQs.map(String));
      if(Array.isArray(d.usedQIds))  S.usedQIds=new Set(d.usedQIds.map(String));
      if(Array.isArray(d.history))   S.history=d.history;
      if(Array.isArray(d.files))     S.files=d.files;
      if(Array.isArray(d.extraQs))   S.extraQs=d.extraQs;
      if(d.dashTag!==undefined)      S.dashTag=d.dashTag;
      if(d.tagFilter!==undefined)    S.tagFilter=d.tagFilter;
      saveToStorage(); scheduleSyncToCloud();
      var bk=S.bookmarks.size,wr=S.wrongQs.size,hi=S.history.length;
      setMsg('вң… еҢҜе…ҘжҲҗеҠҹпјҡ'+hi+' зӯҶзҙҖйҢ„гҖҒ'+bk+' жӣёзұӨгҖҒ'+wr+' йҢҜйЎҢ',true);
      setTimeout(function(){render();},1500);
    } catch(err){ setMsg('и§ЈжһҗеӨұж•—пјҡ'+err.message,false); }
    input.value='';
  };
  reader.readAsText(file);
}

/* в”Җв”Җ Targeted card refresh (no full-page re-render) в”Җв”Җ */
function refreshCard(fid) {
  const el = document.getElementById('fcard-'+fid);
  const f  = S.files.find(x=>x.id===fid);
  if (!el || !f) { if(S.page==='datasets') render(); return; }
  const tmp = document.createElement('div');
  tmp.innerHTML = fileCardHTML(f);
  el.replaceWith(tmp.firstElementChild);
  // Re-focus tag input if editing
  if (S.editingTagFid === fid) {
    const inp = document.getElementById('tagInp-'+fid);
    if (inp) inp.focus();
  }
}

function bindDataset() {
  const dz = document.getElementById('dropZone');
  if (!dz) return;
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dv'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dv'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dv');
    handleFileSelect(e.dataTransfer.files);
  });
}

function handleFileSelect(files) {
  Array.from(files).forEach(file => {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['pdf','docx','csv','xlsx'].includes(ext)) return;
    const size = file.size > 1048576
      ? (file.size/1048576).toFixed(1)+' MB'
      : Math.round(file.size/1024)+' KB';
    const today = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});
    const isImportable = ['csv','xlsx'].includes(ext);
    const fObj = {id:S.nextFid++, name:file.name, type:ext, size, status:'processing', date:today, tags:[], _file:file};
    S.files.push(fObj);
    // Auto-import CSV/XLSX immediately
    if (isImportable) {
      setTimeout(() => {
        fObj.status = 'ready';
        if (ext === 'xlsx') importXLSXQuestions(file, fObj);
        else importCSVQuestions(file, fObj);
      }, 800);
    }
  });
  // Insert new cards without full-page re-render
  if (S.page === 'datasets') {
    const listEl = document.querySelector('#page-content .page > div[style*="margin-top:2rem"]');
    if (listEl) {
      // List already exists вҖ” just append new cards
      S.files.filter(f=>!document.getElementById('fcard-'+f.id)).forEach(f => {
        const tmp = document.createElement('div');
        tmp.innerHTML = fileCardHTML(f);
        const newCard = tmp.firstElementChild;
        // Insert before empty-state div or append
        const emptyDiv = listEl.querySelector('div[style*="text-align:center"]');
        if (emptyDiv) emptyDiv.remove();
        listEl.appendChild(newCard);
      });
      // Update file count
      const countEl = listEl.querySelector('[style*="color:var(--accent)"]');
      if (countEl) countEl.textContent = S.files.length;
    } else {
      render(); // first file вҖ” need to build list
    }
  }
  // Non-importable: update badge after 2.2s without full re-render
  setTimeout(() => {
    S.files.forEach(f => {
      if (f.status === 'processing' && !['csv','xlsx'].includes(f.type)) {
        f.status = 'ready';
        refreshCard(f.id);
      }
    });
  }, 2200);
}

function removeFile(id) {
  // в”Җв”Җ Purge all questions imported from this file в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const removedQIds = new Set(S.extraQs.filter(q => q._fileId === id).map(q => q.id));
  S.extraQs = S.extraQs.filter(q => q._fileId !== id);

  // Clean up bookmarks and wrongQs that referenced removed questions
  removedQIds.forEach(qid => {
    S.bookmarks.delete(qid);
    S.wrongQs.delete(qid);
    S.usedQIds.delete(qid);
  });

  // Remove the file record
  S.files = S.files.filter(f => f.id !== id);
  if (S.editingTagFid === id) S.editingTagFid = null;

  // Fade out and remove card from DOM
  const cardEl = document.getElementById('fcard-'+id);
  if (cardEl) {
    cardEl.style.transition = 'opacity .18s, max-height .25s';
    cardEl.style.overflow   = 'hidden';
    cardEl.style.opacity    = '0';
    cardEl.style.maxHeight  = cardEl.offsetHeight + 'px';
    setTimeout(() => {
      cardEl.style.maxHeight  = '0';
      cardEl.style.marginBottom = '0';
      setTimeout(() => { cardEl.remove(); refreshFilterBar(); }, 240);
    }, 180);
  } else if (S.page === 'datasets') saveToStorage();
  render();
}

/* в”Җв”Җ Shared import helpers в”Җв”Җ */
function _mergeQuestions(parsed, fObj) {
  const existing = new Set(S.extraQs.map(q => q.text.slice(0,40)));
  const fileTags = fObj ? (fObj.tags && fObj.tags.length ? fObj.tags : []) : [];
  let added = 0;
  parsed.forEach(q => {
    if (!existing.has(q.text.slice(0,40))) {
      q.id = 10000 + S.extraQs.length;
      // Category comes from file's first tag, fallback to exam/category field
      q.category = fileTags[0] || q.category || 'еҢҜе…ҘйЎҢзӣ®';
      q._fileTags = [...fileTags];
      q._fileId   = fObj ? fObj.id : null;
      q._fileName = fObj ? fObj.name : null;  // дҫҶжәҗжӘ”еҗҚ
      S.extraQs.push(q);
      existing.add(q.text.slice(0,40));
      added++;
    }
  });
  if (fObj) { fObj.importing=false; fObj.imported=added; fObj.status='ready'; refreshCard(fObj.id); }
  const msg = added > 0 ? `вң… жҲҗеҠҹеҢҜе…Ҙ ${added} йЎҢпјҲдҫҶжәҗеҲҶйЎһпјҡ${fileTags.join('гҖҒ')||'жңӘжЁҷиЁҳ'}пјү` : `вҡ пёҸ жүҖжңүйЎҢзӣ®е·ІеӯҳеңЁпјҢз„Ўж–°еўһ`;
  showImportToast(msg, 5000);
  if (added > 0) { saveToStorage(); scheduleSyncToCloud(); }
}

function importCSVQuestions(file, fObj) {
  fObj = fObj || S.files.find(f => f.name === file.name);
  if (fObj) { fObj.importing=true; refreshCard(fObj.id); }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = parseQuestionCSV(e.target.result);
      if (!parsed.length) throw new Error('жүҫдёҚеҲ°жңүж•ҲйЎҢзӣ®пјҢи«ӢзўәиӘҚж¬„дҪҚж јејҸ');
      _mergeQuestions(parsed, fObj);
    } catch(err) {
      if (fObj) { fObj.importing=false; fObj.importErr=true; refreshCard(fObj.id); }
      showImportToast(`вқҢ и§ЈжһҗеӨұж•—пјҡ${err.message}`, 5000);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function importXLSXQuestions(file, fObj) {
  fObj = fObj || S.files.find(f => f.name === file.name);
  if (typeof XLSX === 'undefined') {
    if (fObj) { fObj.importing=false; fObj.importErr=true; refreshCard(fObj.id); }
    showImportToast('вқҢ йӣўз·ҡжЁЎејҸз„Ўжі•еҢҜе…Ҙ XLSXпјҢи«Ӣж”№з”Ё CSV ж јејҸ', 5000);
    return;
  }
  if (fObj) { fObj.importing=true; refreshCard(fObj.id); }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      if (typeof XLSX === 'undefined') throw new Error('XLSX еҮҪејҸеә«жңӘијүе…ҘпјҢи«ӢйҮҚж–°ж•ҙзҗҶй Ғйқў');
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if (!rows.length) throw new Error('и©Ұз®—иЎЁе…§е®№зӮәз©ә');
      // Normalize column names (lowercase)
      const norm = rows.map(r => {
        const out={};
        Object.keys(r).forEach(k => out[k.toLowerCase().trim()] = String(r[k]||'').trim());
        return out;
      });
      const parsed = parseQuestionRows(norm);
      if (!parsed.length) throw new Error('жүҫдёҚеҲ°жңүж•ҲйЎҢзӣ®пјҢи«ӢзўәиӘҚж¬„дҪҚж јејҸпјҲquestion/option_a/answerпјү');
      _mergeQuestions(parsed, fObj);
    } catch(err) {
      if (fObj) { fObj.importing=false; fObj.importErr=true; refreshCard(fObj.id); }
      showImportToast(`вқҢ XLSX и§ЈжһҗеӨұж•—пјҡ${err.message}`, 5000);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseQuestionCSV(text) {
  if (text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  const lines = text.split(/\r?\n/);
  if (lines.length<2) return [];
  const headers = parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase());
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const cols=parseCSVLine(lines[i]);
    const row={};
    headers.forEach((h,j)=>{ row[h]=cols[j]?.trim()||''; });
    rows.push(row);
  }
  return parseQuestionRows(rows);
}

/* Shared row parser: works for both CSV (object rows) and XLSX (sheet_to_json rows) */
function parseQuestionRows(rows) {
  const ANS={'A':0,'B':1,'C':2,'D':3,'E':4,'a':0,'b':1,'c':2,'d':3,'e':4,'0':0,'1':1,'2':2,'3':3,'4':4};
  const DIFF={'еҹәзӨҺ':'еҹәзӨҺ','дёӯзӯү':'дёӯзӯү','йҖІйҡҺ':'йҖІйҡҺ','easy':'еҹәзӨҺ','medium':'дёӯзӯү','hard':'йҖІйҡҺ'};
  const results=[];
  for(const r of rows){
    const q=(r.question||r.йЎҢзӣ®||'').trim();
    const oA=(r.option_a||r.йҒёй …a||r['йҒёй …_a']||'').trim();
    const oB=(r.option_b||r.йҒёй …b||r['йҒёй …_b']||'').trim();
    const oC=(r.option_c||r.йҒёй …c||r['йҒёй …_c']||'').trim();
    const oD=(r.option_d||r.йҒёй …d||r['йҒёй …_d']||'').trim();
    const oE=(r.option_e||r.йҒёй …e||r['йҒёй …_e']||'').trim();
    const ansRaw=(r.answer||r.зӯ”жЎҲ||'').trim().toUpperCase();
    // category: prefer 'exam' field (matches the xlsx template), then 'category'
    const cat=(r.exam||r.category||r.еҲҶйЎһ||'').trim()||'еҢҜе…ҘйЎҢзӣ®';
    const diff=DIFF[(r.difficulty||r.йӣЈеәҰ||'').trim()]||'дёӯзӯү';
    const expl=(r.explanation||r.и§Јжһҗ||r.иӘӘжҳҺ||'').trim()||'пјҲз„Ўи§Јжһҗпјү';
    const ansLetters = ansRaw.replace(/[,+\s]+/g,'').split('').filter(l => ANS[l]!==undefined);
    const isMulti = ansLetters.length > 1;
    const ansValue = isMulti ? ansLetters.map(l => ANS[l]).sort((a,b)=>a-b) : (ANS[ansRaw]??parseInt(ansRaw));
    if(!q||!oA) continue;
    if(!isMulti && (ansValue===undefined||isNaN(ansValue)||ansValue>4)) continue;
    const opts=[oA,oB,oC,oD].filter(Boolean);
    if(oE) opts.push(oE);
    while(opts.length<4) opts.push('вҖ”');
    const srcId = (r.id||r['йЎҢиҷҹ']||'').toString().trim();
    results.push({ id:0, text:q, options:opts.slice(0,5), answer:ansValue, isMulti:isMulti, explanation:expl, category:cat, difficulty:diff, _srcId:srcId||null });
  }
  return results;
}

function parseCSVLine(line) {
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'&&!inQ)inQ=true;
    else if(ch==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;}
    else if(ch===','&&!inQ){r.push(cur);cur='';}
    else cur+=ch;
  }
  r.push(cur);return r;
}

function qsSelectSubMode(submode) {

  const allQ  = [...QUESTIONS,...S.extraQs];
  const inCat = q => S.quizSetup.cats.has(q.category)||(q._fileTags&&q._fileTags.some(t=>S.quizSetup.cats.has(t)));

  if (submode === 'browse') {
    // е‘ҲзҸҫйЎҢзӣ® вҖ” enter browse mode
    S.activeQs  = S.quizSetup.mode === 'review'
      ? allQ.filter(q=>S.bookmarks.has(String(q.id))&&inCat(q))
      : allQ.filter(q=>S.wrongQs.has(String(q.id))&&inCat(q));

    S.quizSetup = null;

    render();
  } else if (submode === 'retake') {
    // йҮҚж–°жё¬й©— вҖ” just set submode; slider + launch button appear in qsRenderModeSections
    const pool = S.quizSetup.mode === 'review'
      ? allQ.filter(q => S.bookmarks.has(String(q.id)) && inCat(q))
      : allQ.filter(q => S.wrongQs.has(String(q.id)) && inCat(q));
    if (!pool.length) {
      showImportToast(S.quizSetup.mode === 'review' ? 'зӣ®еүҚз„ЎжЁҷиЁҳйЎҢзӣ®' : 'зӣ®еүҚз„ЎйҢҜиӘӨзҙҖйҢ„', 2500);
      return;
    }
    S.quizSetup.submode = 'retake';
    if (!S.quizSetup.count || S.quizSetup.count > pool.length) S.quizSetup.count = pool.length;
    qsUpdateModeSections();
  }
}

function openConfig(mode) {

function getAvailPool() {
  const setup = S.quizSetup;
  if (!setup) return [];
  const allQ = [...QUESTIONS, ...S.extraQs];
  const inCat = q => setup.cats.has(q.category) ||
    (q._fileTags && q._fileTags.some(t => setup.cats.has(t)));
  if (setup.mode === 'review') return allQ.filter(q => S.bookmarks.has(String(q.id)) && inCat(q));
  if (setup.mode === 'wrong')  return allQ.filter(q => S.wrongQs.has(String(q.id))   && inCat(q));
  return allQ.filter(q => inCat(q));
}
function toggleConfigCat(cat) {
  const cfg = S.quizConfig;
  if (cfg.cats.has(cat)) { if (cfg.cats.size <= 1) return; cfg.cats.delete(cat); }
  else cfg.cats.add(cat);
  const pool = getAvailPool();
  cfg.count = Math.max(1, Math.min(cfg.count, pool.length));
  render();
}
function setConfigCount(n) { S.quizConfig.count = n; render(); }
function launchQuiz() {
  const setup = S.quizSetup;
  const pool  = getAvailPool();
  if (!pool || !pool.length) return;
  const count = Math.min(setup.count || pool.length, pool.length);
  const mode  = setup.mode;

  // в”Җв”Җ No-repeat draw: prefer questions not yet drawn from this tag pool в”Җв”Җ
  // Only apply no-repeat for 'new' mode (review/wrong modes intentionally repeat)
  let drawn;
  if (mode === 'new') {
    const unused = pool.filter(q => !S.usedQIds.has(String(q.id)));
    const used   = pool.filter(q =>  S.usedQIds.has(String(q.id)));
    const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

    if (unused.length === 0) {
      // All questions used вҖ” auto-reset this pool and start fresh
      pool.forEach(q => S.usedQIds.delete(String(q.id)));
      drawn = shuffle(pool).slice(0, count);
      S._poolResetMsg = true; // show toast on result page
    } else if (unused.length >= count) {
      // Enough unused вҖ” draw only from unused
      drawn = shuffle(unused).slice(0, count);
    } else {
      // Not enough unused вҖ” take all unused, fill remainder from used
      const fill = shuffle(used).slice(0, count - unused.length);
      drawn = shuffle([...unused, ...fill]);
    }
    // DO NOT mark as used here вҖ” only mark after quiz is completed (in finishQuiz)
  } else {
    // review / wrong modes: shuffle normally, no no-repeat tracking
    drawn = [...pool].sort(() => Math.random() - 0.5).slice(0, count);
  }

  S.activeQs   = drawn;
  S.answers    = drawn.map((q) => ({selected: q.isMulti ? [] : null, confirmed:false}));
  S.currentQ   = 0;
  // Save config BEFORE clearing setup вҖ” finishQuiz needs mode to mark usedQIds
  const submode = setup.submode; // capture before clearing
  S.quizConfig = {
    mode:    mode,
    submode: submode,
    cats:    new Set(setup.cats),
    count:   count,
    name:    setup.name || '',
  };
  S.quizSetup = null;
  // retake submode вҶ’ always active quiz (one-by-one answering)
  // review without retake вҶ’ browse/review page (read-only)
  S.quizMode = (mode === 'review' && submode !== 'retake') ? 'review' : 'active';
  render();
}


/* Returns source annotation string for a question */
function questionSource(q) {
  const parts = [];
  if (q._fileName) parts.push(q._fileName.replace(/\.[^.]+$/, '')); // strip extension
  if (q._srcId)   parts.push('йЎҢ #' + q._srcId);
  return parts.length ? parts.join(' В· ') : null;
}

function unconfirmAns() {
  const ans = S.answers[S.currentQ];
  if (!ans) return;
  ans.confirmed = false;
  render();
}

function prevQuestion() {
  if (S.currentQ <= 0) return;
  const ans = S.answers[S.currentQ];
  if (ans) ans.confirmed = false;
  S.currentQ--;
  render();
}

function _syncQuestionTags(fid, tags) {
  S.extraQs.forEach(q => {
    if (q._fileId !== fid) return;
    q._fileTags = [...tags];
    if (tags.length > 0) q.category = tags[0];
  });
}


function selectOpt(i) {
  const ans = S.answers[S.currentQ];
  const q   = S.activeQs[S.currentQ];
  if (ans.confirmed) return;
  if (q.isMulti) {
    const sel = ans.selected;
    const pos = sel.indexOf(i);
    if (pos >= 0) sel.splice(pos, 1); else sel.push(i);
    document.querySelectorAll('.opt').forEach((el, idx) => { el.classList.toggle('sel', sel.includes(idx)); });
    const confirmBtn = document.getElementById('confirm-btn');
    if (confirmBtn) { if (sel.length > 0) confirmBtn.removeAttribute('disabled'); else confirmBtn.setAttribute('disabled',''); }
  } else {
    if (ans.selected === i) return;
    ans.selected = i;
    document.querySelectorAll('.opt').forEach((el, idx) => { el.classList.toggle('sel', idx === i); });
    const confirmBtn = document.getElementById('confirm-btn');
    if (confirmBtn) confirmBtn.removeAttribute('disabled');
  }
}

function confirmAns() {
  const ans = S.answers[S.currentQ];
  const q = S.activeQs[S.currentQ];
  if (q.isMulti ? ans.selected.length === 0 : ans.selected === null) return;
  ans.confirmed = true;
  // DOM-only update for option states вҖ” no full render flash
  const cSet = correctSet(q);
  const sSet = q.isMulti ? new Set(ans.selected) : new Set([ans.selected]);
  document.querySelectorAll('.opt').forEach((el, idx) => {
    el.classList.add('locked'); el.onclick = null;
    if (cSet.has(idx)) el.classList.add('correct');
    else if (sSet.has(idx) && !cSet.has(idx)) el.classList.add('wrong');
    else el.style.opacity = '0.35';
  });
  // Show explanation
  const explPanel = document.getElementById('expl-panel');
  if (explPanel) explPanel.style.display = 'block';
  // Swap action button
  const actionDiv = document.getElementById('action-btn');
  if (actionDiv) {
    const isLast = S.currentQ === S.activeQs.length - 1;
    actionDiv.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">${isLast ? 'е®ҢжҲҗжё¬й©— вҶ’' : 'дёӢдёҖйЎҢ вҶ’'}</button>`;
  }
}

function toggleBk(id) {
  id = String(id); // normalize: ensure String comparison
  const isOn = !S.bookmarks.has(id);
  isOn ? S.bookmarks.add(id) : S.bookmarks.delete(id);

  // Persist to localStorage + trigger cloud sync (debounced 600ms)
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(saveToStorage, 600);

  // DOM-only update вҖ” no render, no flash
  const btn = document.getElementById('bk-btn');
  if (!btn) return;
  btn.classList.toggle('on', isOn);
  btn.title = isOn ? 'еҸ–ж¶ҲжЁҷиЁҳ' : 'жЁҷиЁҳжӯӨйЎҢ';
  const svg = btn.querySelector('svg');
  if (svg) svg.setAttribute('fill', isOn ? 'currentColor' : 'none');
}

function nextQuestion() {
  // Auto-confirm current answer before moving
  const ans = S.answers[S.currentQ];
  const q0  = S.activeQs[S.currentQ];
  const hasSelection = q0 && q0.isMulti
    ? Array.isArray(ans.selected) && ans.selected.length > 0
    : ans && ans.selected !== null;
  if (hasSelection && !ans.confirmed) { ans.confirmed = true; }

  if (S.currentQ === S.activeQs.length - 1) {
    finishQuiz();
  } else {
    S.currentQ++;
    render();
  }
}

function finishQuiz() {
  const score = S.activeQs.filter((q,i) => isCorrectAnswer(q, S.answers[i].selected)).length;
  // Track wrong answers
  S.activeQs.forEach((q,i) => {
    const isCorrect = isCorrectAnswer(q, S.answers[i].selected);
    if (!isCorrect) S.wrongQs.add(String(q.id));
    else S.wrongQs.delete(String(q.id));
  });
  // Per-category breakdown
  const catMap = {};
  S.activeQs.forEach((q,i) => {
    const c = q.category || 'е…¶д»–';
    if (!catMap[c]) catMap[c] = {correct:0,total:0};
    catMap[c].total++;
    if (S.answers[i].selected === q.answer) catMap[c].correct++;
  });
  const quizName = (S.quizSetup && S.quizSetup.name && S.quizSetup.name.trim())
    || `з¬¬ ${S.history.length+1} еӣһеҗҲ`;
  // Collect wrong + bookmarked IDs from this quiz only
  const _wrongIds = S.activeQs
    .filter((q,i) => !isCorrectAnswer(q, S.answers[i].selected))
    .map(q => String(q.id));
  const _bkIds = S.activeQs
    .filter(q => S.bookmarks.has(String(q.id)))
    .map(q => String(q.id));

  S.history.push({
    id: S.history.length + 1,
    name: quizName,
    date: new Date().toLocaleDateString('zh-TW'),
    total: S.activeQs.length,
    correct: score,
    bk: _bkIds.length,
    wrong: _wrongIds.length,
    catStats: catMap,
    dur: 'вҖ”',
    wrongIds: _wrongIds,
    bkIds:    _bkIds,
  });

  // Mark questions as used (only for 'new' mode)
  if (S.quizConfig && S.quizConfig.mode === 'new') {
    S.activeQs.forEach(q => S.usedQIds.add(String(q.id)));
  }

  // Persist + sync to cloud
  saveToStorage();
  S.quizMode = 'result';
  render();
}

/* в”Җв”Җ Result в”Җв”Җ */

function goBackFromBrowse() {

function removeBrowseItem(idx, mode) {
  if (idx < 0 || idx >= S.activeQs.length) return;
  const q = S.activeQs[idx];
  if (mode === 'review') {
    S.bookmarks.delete(String(q.id));
    S.activeQs.splice(idx, 1);
    saveToStorage();
    render();
  } else if (mode === 'wrong') {
    S.wrongQs.delete(String(q.id));
    S.activeQs.splice(idx, 1);
    saveToStorage();
    render();
  }
}

function downloadHistoryCSV(histId, type) {
  const entry = S.history.find(h => h.id === histId);
  if (!entry) return;
  const ids  = type === 'wrong' ? (entry.wrongIds || []) : (entry.bkIds || []);
  if (!ids.length) { alert('йҖҷж¬Ўжё¬й©—жІ’жңү' + (type==='wrong'?'йҢҜиӘӨ':'жЁҷиЁҳ') + 'зҡ„йЎҢзӣ®гҖӮ'); return; }
  const allQ = [...(typeof QUESTIONS !== 'undefined' ? QUESTIONS : []), ...S.extraQs];
  const pool = ids.map(id => allQ.find(q => String(q.id) === String(id))).filter(Boolean);
  if (!pool.length) { alert('жүҫдёҚеҲ°е°ҚжҮүйЎҢзӣ®гҖӮ'); return; }
  const ANS = ['A','B','C','D','E'];
  const header = ['id','exam','question','option_a','option_b','option_c','option_d','option_e','answer','explanation'];
  const rows = pool.map((q,i) => [
    i+1, q.category||'', q.text||'',
    q.options?.[0]||'', q.options?.[1]||'', q.options?.[2]||'',
    q.options?.[3]||'', q.options?.[4]||'',
    (q.isMulti ? [...q.answer].sort((a,b)=>a-b).map(i=>ANS[i]).join('') : ANS[q.answer])||'',
    q.explanation||''
  ]);
  const tags = [...new Set(pool.map(q => q.category||'').filter(Boolean))];
  const typeLabel = type === 'wrong' ? 'йҢҜиӘӨйЎҢзӣ®' : 'жЁҷиЁҳйЎҢзӣ®';
  const meta = ['# иҖғеҚ·пјҡ'+(entry.name||'жё¬й©— #'+entry.id),
                '# йЎһеһӢпјҡ'+typeLabel,
                '# иіҮж–ҷйӣҶжЁҷзұӨпјҡ'+(tags.join('гҖҒ')||'пјҲжңӘеҲҶйЎһпјү'),
                '# йЎҢж•ёпјҡ'+pool.length+' йЎҢ',
                '# еҢҜеҮәжҷӮй–“пјҡ'+new Date().toLocaleString('zh-TW'),'#'].join('\n');
  const esc = v => { const s=String(v).replace(/"/g,'""'); return (s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s+'"':s; };
  const csv = '\uFEFF' + meta + '\n' + [header,...rows].map(r=>r.map(esc).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (entry.name||'жё¬й©—')+'-'+typeLabel+'.csv';
  a.click(); URL.revokeObjectURL(a.href);
}



async function forceSyncToCloud() {
  function setMsg(text, color) {
    var el = document.getElementById('backup-msg');
    if (el) { el.textContent = text; el.style.color = color; }
  }

  if (!_supa || !_currentUser) {
    setMsg('вҡ пёҸ и«Ӣе…Ҳзҷ»е…ҘеёіиҷҹжүҚиғҪеҗҢжӯҘйӣІз«ҜгҖӮ', '#F87171');
    return;
  }
  if (!_accessToken) {
    setMsg('вҡ пёҸ Token е°ҡжңӘе°ұз·’пјҢи«ӢйҮҚж–°ж•ҙзҗҶй ҒйқўеҫҢеҶҚи©ҰгҖӮ', '#F87171');
    return;
  }

  setMsg('еҗҢжӯҘдёӯвҖҰ', 'var(--text-3)');

  try {
    await syncToCloud();
    var now      = new Date();
    var dateStr  = now.toLocaleDateString('zh-TW');
    var timeStr  = now.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
    setMsg('вң… еҗҢжӯҘйӣІз«ҜжҲҗеҠҹгҖҖ' + dateStr + ' ' + timeStr, '#4ADE80');
  } catch(e) {
    var reason = e.message || String(e);
    console.error('[Supa] forceSyncToCloud error:', reason);
    setMsg('вқҢ ' + reason, '#F87171');
  }
}

}

function dashStatsHTML() {
  const allQ = [...QUESTIONS, ...S.extraQs];
  const dt   = S.dashTag;

  const qInTag   = q => !dt || q.category === dt;
  const hInTag   = h => !dt || (h.catStats && h.catStats[dt]);
  const hCorrect = h => dt ? (h.catStats?.[dt]?.correct||0) : h.correct;
  const hTotal   = h => dt ? (h.catStats?.[dt]?.total  ||0) : h.total;
  const filtHist = S.history.filter(hInTag);

  const tot   = filtHist.length;
  const totC  = filtHist.reduce((s,h)=>s+hCorrect(h),0);
  const totQ  = filtHist.reduce((s,h)=>s+hTotal(h),0);
  const totW  = allQ.filter(q=>S.wrongQs.has(String(q.id))&&qInTag(q)).length;
  const totBk = allQ.filter(q=>S.bookmarks.has(String(q.id))&&qInTag(q)).length;
  const rate  = totQ>0 ? Math.round((totC/totQ)*100) : 0;
  const rateColor  = rate>=80?'#4ADE80':rate>=60?'#FBBF24':'#F87171';
  const emptyState = tot === 0;

  // Category bars
  const catMap = {};
  filtHist.forEach(h => {
    if (!h.catStats) return;
    const entries = dt ? [[dt,h.catStats[dt]]] : Object.entries(h.catStats);
    entries.forEach(([cat,st]) => {
      if (!st) return;
      if (!catMap[cat]) catMap[cat]={correct:0,total:0};
      catMap[cat].correct += st.correct;
      catMap[cat].total   += st.total;
    });
  });
  const catEntries = Object.entries(catMap).sort((a,b)=>b[1].total-a[1].total);
  const catBars = catEntries.length > 0
    ? catEntries.map(([cat,st]) => {
        const p  = Math.round((st.correct/st.total)*100);
        const bc = p>=80?'linear-gradient(90deg,#4ADE80,#22C55E)':p>=60?'linear-gradient(90deg,#FBBF24,#F59E0B)':'linear-gradient(90deg,#F87171,#EF4444)';
        const pc = p>=80?'#4ADE80':p>=60?'#FBBF24':'#F87171';
        return `<div style="margin-bottom:.95rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.38rem;">
            <span style="font-size:.84rem;color:var(--text-1);">${cat}</span>

          </div>
          <div class="pb-bg" style="height:5px;">
            <div style="height:100%;width:${p}%;background:${bc};border-radius:999px;transition:width .6s ease;"></div>
          </div>
        </div>`;
      }).join('')

  // History rows
  const histRows = filtHist.length > 0
    ? [...filtHist].reverse().map(h => {
        const c = hCorrect(h), t = hTotal(h);

/* setDashTag: DOM-only pill update + targeted stats refresh */
function setDashTag(tag) {
  S.dashTag = (S.dashTag === tag) ? null : tag;
  const dt  = S.dashTag;

  // 1. Update tag pill visual states (DOM only - no flash)
  document.querySelectorAll('[id^="dash-pill-"]').forEach(btn => {
    const isAll  = btn.id === 'dash-pill-__all__';
    const btnTag = btn.dataset.tag;
    const on     = isAll ? !dt : (dt === btnTag);
    if (isAll) {
      btn.style.background = on ? 'var(--accent)' : 'rgba(255,255,255,.05)';
      btn.style.color      = on ? '#fff' : 'var(--text-2)';
      btn.style.outline    = '1px solid ' + (on ? 'var(--accent)' : 'var(--border)');
    } else {
      const tc = tagColor(btnTag);
      btn.style.background = on ? tc.color : tc.bg;
      btn.style.color      = on ? '#111' : tc.color;
      btn.style.outline    = '1px solid ' + (on ? tc.color : tc.border);
      btn.style.fontWeight = on ? '700' : '500';
      // Toggle checkmark svg
      const existing = btn.querySelector('svg');
      if (on && !existing) {
        const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
        svg.setAttribute('width','11'); svg.setAttribute('height','11');
        svg.setAttribute('viewBox','0 0 24 24'); svg.setAttribute('fill','none');
        svg.setAttribute('stroke','currentColor'); svg.setAttribute('stroke-width','2.8');
        const poly = document.createElementNS('http://www.w3.org/2000/svg','polyline');
        poly.setAttribute('points','20 6 9 17 4 12');
        svg.appendChild(poly);
        btn.insertBefore(svg, btn.firstChild);
      } else if (!on && existing) {
        existing.remove();
      }
    }
  });

  // 2. Update subtitle
  const label = document.getElementById('dash-filter-label');
  if (label) label.textContent = dt ? `В· зҜ©йҒёдёӯпјҡ${dt}` : '';

  // 3. Replace stats section with smooth fade
  const statsEl = document.getElementById('dash-stats');
  if (statsEl) {
    statsEl.style.transition = 'opacity .12s';
    statsEl.style.opacity    = '0';
    setTimeout(() => {
      statsEl.innerHTML  = dashStatsHTML();
      statsEl.style.opacity = '1';
      // Re-init chart after DOM update
      setTimeout(initChart, 30);
    }, 120);
  }

  // Auto-save (debounced)
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(saveToStorage, 600);
}


function initChart() {
  const canvas = document.getElementById('scoreChart');
  if (!canvas) return;

  // Pure Canvas line chart вҖ” no CDN required
  const dt = S.dashTag;
  const filtHist = dt
    ? S.history.filter(h => h.catStats && h.catStats[dt])
    : S.history;
  if (!filtHist.length) return;

  const hC = h => dt ? (h.catStats?.[dt]?.correct || 0) : h.correct;
  const hT = h => dt ? (h.catStats?.[dt]?.total   || 1) : h.total;
  const data   = filtHist.map(h => { const t = hT(h); return t > 0 ? Math.round((hC(h)/t)*100) : 0; });
  const labels = filtHist.map(h => h.name ? h.name.slice(0,8) : '#'+h.id);

  const dpr  = window.devicePixelRatio || 1;
  const W    = canvas.parentElement.clientWidth || 320;
  const H    = 160;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const ctx  = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const PAD  = { top:18, right:12, bottom:36, left:34 };
  const cW   = W - PAD.left - PAD.right;
  const cH   = H - PAD.top  - PAD.bottom;
  const n    = data.length;

  // Grid lines & Y labels
  ctx.strokeStyle = 'rgba(255,255,255,.07)';
  ctx.fillStyle   = 'rgba(255,255,255,.3)';
  ctx.font        = '10px JetBrains Mono, monospace';
  ctx.textAlign   = 'right';
  [0,25,50,75,100].forEach(pct => {
    const y = PAD.top + cH * (1 - pct/100);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + cW, y); ctx.stroke();
    ctx.fillText(pct+'%', PAD.left - 4, y + 3.5);
  });

  if (n < 2) {
    // Single point
    const x = PAD.left + cW/2;
    const y = PAD.top + cH * (1 - data[0]/100);
    const col = data[0]>=80?'#4ADE80':data[0]>=60?'#FBBF24':'#F87171';
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.5)'; ctx.textAlign='center';
    ctx.fillText(data[0]+'%', x, y-10);
    return;
  }

  // X positions
  const xs = data.map((_,i) => PAD.left + i * cW/(n-1));
  const ys = data.map(v   => PAD.top  + cH * (1 - v/100));

  // Fill area
  const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top+cH);
  grad.addColorStop(0,   'rgba(123,111,224,.25)');
  grad.addColorStop(1,   'rgba(123,111,224,.01)');
  ctx.beginPath();
  ctx.moveTo(xs[0], ys[0]);
  for (let i=1; i<n; i++) {
    const cpx = (xs[i-1]+xs[i])/2;
    ctx.bezierCurveTo(cpx,ys[i-1], cpx,ys[i], xs[i],ys[i]);
  }
  ctx.lineTo(xs[n-1], PAD.top+cH);
  ctx.lineTo(xs[0],   PAD.top+cH);
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(xs[0], ys[0]);
  for (let i=1; i<n; i++) {
    const cpx = (xs[i-1]+xs[i])/2;
    ctx.bezierCurveTo(cpx,ys[i-1], cpx,ys[i], xs[i],ys[i]);
  }
  ctx.strokeStyle = 'rgba(123,111,224,.9)'; ctx.lineWidth = 2;
  ctx.stroke();

  // Points + tooltips
  data.forEach((v, i) => {
    const col = v>=80?'#4ADE80':v>=60?'#FBBF24':'#F87171';
    ctx.beginPath(); ctx.arc(xs[i], ys[i], 4, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.4)'; ctx.lineWidth = 1; ctx.stroke();
    // Value label above point (show for first, last, and peaks/valleys)
    const isEdge = i===0 || i===n-1;
    const isPeak = n>2 && (i===0||i===n-1||v!==data[i-1]&&v!==data[i+1]);
    if (isEdge || n<=5) {
      ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font='9px JetBrains Mono,monospace';
      ctx.textAlign='center';
      ctx.fillText(v+'%', xs[i], ys[i]-9);
    }
    // X label
    ctx.fillStyle='rgba(255,255,255,.35)'; ctx.font='9px sans-serif';
    ctx.textAlign='center';
    const lbl = labels[i].length>6 ? labels[i].slice(0,5)+'вҖҰ' : labels[i];
    ctx.fillText(lbl, xs[i], H - PAD.bottom + 14);
  });
}

/* в”Җв”Җ Download questions as CSV в”Җв”Җ */
function downloadQuestionsCSV(type, tagFilter) {
  const allQ  = [...QUESTIONS, ...S.extraQs];
  const tag   = tagFilter || S.dashTag || null;
  const inTag = q => !tag || q.category === tag;
  let pool, filename;
  if (type === 'wrong') {
    pool     = allQ.filter(q => S.wrongQs.has(String(q.id)) && inTag(q));
    filename = (tag ? tag+'_' : '') + 'йҢҜиӘӨйЎҢзӣ®.csv';
  } else {
    pool     = allQ.filter(q => S.bookmarks.has(String(q.id)) && inTag(q));
    filename = (tag ? tag+'_' : '') + 'жЁҷиЁҳйЎҢзӣ®.csv';
  }
  if (!pool.length) return;

  const ANS = ['A','B','C','D','E'];
  // Match the same format as downloadTemplate()
  const header = ['id','exam','question','option_a','option_b','option_c','option_d','option_e','answer','explanation'];
  const rows = pool.map((q,i) => [
    i+1,
    q.category||'',
    q.text||'',
    q.options?.[0]||'',
    q.options?.[1]||'',
    q.options?.[2]||'',
    q.options?.[3]||'',
    q.options?.[4]||'',
    (q.isMulti ? [...q.answer].sort((a,b)=>a-b).map(i=>['A','B','C','D','E'][i]).join('') : ['A','B','C','D','E'][q.answer])||'',
    q.explanation||'',
  ]);

  const escCSV = v => {
    const s = String(v).replace(/"/g,'""');
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? '"'+s+'"' : s;
  };
  const tagLabel = tag ? tag : 'е…ЁйғЁеҲҶйЎһ';
  const typeLabel = type === 'wrong' ? 'йҢҜиӘӨйЎҢзӣ®' : 'жЁҷиЁҳйЎҢзӣ®';
  const metaLines = [
    '# иіҮж–ҷйӣҶпјҡ' + tagLabel,
    '# йЎһеһӢпјҡ'   + typeLabel,
    '# йЎҢж•ёпјҡ'   + pool.length + ' йЎҢ',
    '# еҢҜеҮәжҷӮй–“пјҡ' + new Date().toLocaleString('zh-TW'),
    '#',
  ].join('\n');
  const csv = metaLines + '\n' + [header, ...rows]
    .map(r => r.map(escCSV).join(','))
    .join('\n');

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
   в•‘     PERSISTENT STORAGE (localStorage)      в•‘
   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ */
// STORAGE_KEY replaced by getStorageKey()

function saveToStorage() {
  try {
    const payload = {
      v:         2,
      files:     S.files.map(({ _file, ...f }) => f),  // strip un-serialisable File objects
      extraQs:   S.extraQs,
      bookmarks: [...S.bookmarks],
      wrongQs:   [...S.wrongQs],
      usedQIds:  [...S.usedQIds],
      history:   S.history,
      dashTag:   S.dashTag,
      tagFilter: S.tagFilter,
    };
    localStorage.setItem(getStorageKey(), JSON.stringify(payload));
    scheduleSyncToCloud();
  } catch(e) {
    console.warn('[NeuroLearn] save failed:', e);
  }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(getStorageKey());
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d || d.v !== 2) return false;

    if (Array.isArray(d.files)) {
      S.files    = d.files;
      // restore nextFid so new uploads get unique IDs
      S.nextFid  = d.files.length > 0 ? Math.max(...d.files.map(f => f.id + 1)) : 4;
    }
    if (Array.isArray(d.extraQs))   S.extraQs   = d.extraQs;
    if (Array.isArray(d.bookmarks)) S.bookmarks  = new Set(d.bookmarks.map(String));
    if (Array.isArray(d.wrongQs))   S.wrongQs    = new Set(d.wrongQs.map(String));
    if (Array.isArray(d.usedQIds))  S.usedQIds   = new Set(d.usedQIds.map(String));
    if (Array.isArray(d.history))   S.history    = d.history;
    if (d.dashTag   !== undefined)  S.dashTag    = d.dashTag;
    if (d.tagFilter !== undefined)  S.tagFilter  = d.tagFilter;
    return true;
  } catch(e) {
    console.warn('[NeuroLearn] load failed:', e);
    return false;
  }
}

function clearAllData() {
  if (!confirm('зўәе®ҡиҰҒжё…йҷӨжүҖжңүжң¬ж©ҹиіҮж–ҷпјҹ\nпјҲйЎҢеә«гҖҒжё¬й©—зҙҖйҢ„гҖҒжӣёзұӨгҖҒйҢҜиӘӨзҙҖйҢ„йғҪе°ҮеҲӘйҷӨпјү')) return;
  localStorage.removeItem(getStorageKey());
  location.reload();
}
