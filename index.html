<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B0B12">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer onerror="console.warn('[Supa] SDK load failed')"></script>
<title>NeuroLearn — 智能學習平台</title>
<!-- Chart.js replaced with inline renderer -->
<!-- SheetJS removed: XLSX import requires internet. Use CSV instead. -->
<style>
  :root {
    --bg-base: #0B0B12;
    --bg-surface: #11111A;
    --bg-card: #181824;
    --accent: #7B6FE0;
    --accent-dim: rgba(123,111,224,0.1);
    --accent-border: rgba(123,111,224,0.3);
    --gold: #C8963E;
    --gold-dim: rgba(200,150,62,0.1);
    --gold-border: rgba(200,150,62,0.28);
    --green: #4ADE80;
    --red: #F87171;
    --amber: #FBBF24;
    --text-1: #E2E2EE;
    --text-2: #8888A8;
    --text-3: #525270;
    --border: rgba(255,255,255,0.07);
    --border-h: rgba(255,255,255,0.14);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'DM Sans','Inter','Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg-base);
    color:var(--text-1);
    min-height:100vh;
    overflow-x:hidden;
  }
  /* Ambient background */
  body::before{
    content:'';position:fixed;inset:0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 20%, rgba(123,111,224,0.07) 0%,transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 80%, rgba(200,150,62,0.05) 0%,transparent 60%);
    pointer-events:none;z-index:0;
  }
  /* Subtle grid */
  body::after{
    content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
    background-size:44px 44px;
    pointer-events:none;z-index:0;
  }
  h1,h2,h3,h4{font-family:'Sora',sans-serif}
  .mono{font-family:'JetBrains Mono','Cascadia Code','Consolas',monospace}

  /* ─── Navbar ─── */
  #navbar{
    position:fixed;top:0;left:0;right:0;height:62px;
    background:rgba(11,11,18,0.88);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border-bottom:1px solid var(--border);
    z-index:200;display:flex;align-items:center;
    padding:0 1.75rem;justify-content:space-between;
    overflow:hidden;
  }
  .nav-logo{display:flex;align-items:center;gap:.65rem;cursor:pointer}
  .nav-logo-icon{
    width:32px;height:32px;border-radius:9px;
    background:linear-gradient(135deg,#7B6FE0,#5244C2);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 14px rgba(123,111,224,.35);
  }
  .nav-logo-text{font-family:'Sora','Inter','Segoe UI',system-ui,-apple-system,sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:-.02em}
  .nav-links{display:flex;align-items:center;gap:.25rem}
  .nav-link{
    background:transparent;border:none;color:var(--text-2);
    padding:.42rem .85rem;border-radius:8px;font-size:.83rem;
    font-family:'DM Sans','Inter','Segoe UI',system-ui,-apple-system,sans-serif;cursor:pointer;
    transition:all .2s ease;
  }
  .nav-link:hover{color:var(--text-1);background:rgba(255,255,255,.05)}
  .nav-link.active{color:var(--accent);background:var(--accent-dim)}

  /* ─── Page ─── */
  #page-content{min-height:100vh;padding-top:62px;position:relative;z-index:1}
  .page{animation:fadeUp .38s cubic-bezier(.4,0,.2,1)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  /* ─── Badge ─── */
  .badge{
    display:inline-flex;align-items:center;gap:.25rem;
    padding:.18rem .55rem;border-radius:999px;
    font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  }
  .badge-v{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
  .badge-g{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
  .badge-gr{background:rgba(74,222,128,.08);color:var(--green);border:1px solid rgba(74,222,128,.25)}
  .badge-r{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.25)}
  .badge-a{background:rgba(251,191,36,.08);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
  .badge-n{background:rgba(255,255,255,.05);color:var(--text-2);border:1px solid var(--border)}

  /* ─── Buttons ─── */
  .btn{
    display:inline-flex;align-items:center;gap:.4rem;
    border:none;border-radius:10px;cursor:pointer;
    font-family:'Sora','Inter','Segoe UI',system-ui,-apple-system,sans-serif;font-weight:600;
    font-size:.875rem;letter-spacing:.01em;transition:all .2s ease;
    padding:.7rem 1.5rem;
  }
  .btn-primary{
    background:linear-gradient(135deg,#7B6FE0,#5244C2);color:#fff;
    box-shadow:0 2px 12px rgba(123,111,224,.25);
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(123,111,224,.4)}
  .btn-primary:active{transform:translateY(0)}
  .btn-primary:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-ghost{
    background:transparent;color:var(--text-2);
    border:1px solid var(--border);font-family:'DM Sans','Inter','Segoe UI',system-ui,-apple-system,sans-serif;font-weight:500;
  }
  .btn-ghost:hover{border-color:var(--border-h);color:var(--text-1);background:rgba(255,255,255,.04)}

  /* ─── Glass Card ─── */
  .g-card{
    background:rgba(24,24,36,.65);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--border);border-radius:18px;
    transition:border-color .25s,box-shadow .25s,transform .3s cubic-bezier(.4,0,.2,1);
  }
  .g-card:hover{border-color:var(--border-h);box-shadow:0 16px 40px rgba(0,0,0,.28)}

  /* ─── Nav Cards (Home) ─── */
  .n-card{
    background:rgba(20,20,32,.55);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--border);border-radius:22px;padding:2.25rem;
    cursor:pointer;position:relative;overflow:hidden;
    transition:all .35s cubic-bezier(.4,0,.2,1);
  }
  .n-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--c,#7B6FE0),transparent);
    opacity:0;transition:opacity .3s;
  }
  .n-card:hover{border-color:var(--c-border,var(--accent-border));transform:translateY(-9px);box-shadow:0 28px 56px rgba(0,0,0,.45),0 0 32px var(--c-glow,rgba(123,111,224,.07))}
  .n-card:hover::before{opacity:1}

  /* ─── Progress bar ─── */
  .pb-bg{height:3px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden}
  .pb-fill{height:100%;background:linear-gradient(90deg,var(--accent),#9988F5);border-radius:999px;transition:width .5s ease}

  /* ─── Option Buttons ─── */
  .opt{
    width:100%;text-align:left;
    background:rgba(255,255,255,.025);border:1px solid var(--border);
    border-radius:12px;padding:.9rem 1.1rem;color:var(--text-1);
    cursor:pointer;transition:all .18s ease;
    font-family:'DM Sans','Inter','Segoe UI',system-ui,-apple-system,sans-serif;font-size:.92rem;
    display:flex;align-items:center;gap:.75rem;
  }
  .opt:hover:not(.locked){border-color:var(--accent-border);background:var(--accent-dim)}
  .opt.sel{border-color:var(--accent);background:var(--accent-dim)}
  .opt.correct{border-color:rgba(74,222,128,.55)!important;background:rgba(74,222,128,.07)!important;color:var(--green)}
  .opt.wrong{border-color:rgba(248,113,113,.55)!important;background:rgba(248,113,113,.07)!important;color:var(--red)}
  .opt.dim{opacity:.35}
  .opt.locked{cursor:default}

  /* ─── Bookmark ─── */
  .bk-btn{
    background:transparent;border:none;cursor:pointer;
    color:var(--text-3);padding:.3rem;border-radius:7px;
    transition:all .2s;display:flex;align-items:center;
  }
  .bk-btn:hover{color:var(--gold);background:var(--gold-dim)}
  .bk-btn.on{color:var(--gold)}

  /* ─── Drop Zone ─── */
  .drop-zone{
    border:2px dashed rgba(255,255,255,.12);border-radius:20px;
    padding:3rem 2rem;text-align:center;cursor:pointer;
    transition:all .25s ease;
  }
  .drop-zone:hover,.drop-zone.dv{
    border-color:var(--accent);background:var(--accent-dim);
  }

  /* ─── Stat Card ─── */
  .s-card{
    background:rgba(24,24,36,.7);backdrop-filter:blur(12px);
    border:1px solid var(--border);border-radius:16px;padding:1.4rem;
  }

  /* ─── Review card ─── */
  .rv-card{border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .rv-hdr{
    padding:1rem 1.2rem;cursor:pointer;
    display:flex;align-items:center;justify-content:space-between;
    transition:background .15s;
  }
  .rv-hdr:hover{background:rgba(255,255,255,.025)}
  .rv-body{display:none;padding:0 1.2rem 1.2rem;border-top:1px solid var(--border)}
  .rv-body.open{display:block}

  /* ─── History ─── */
  .h-row{
    display:grid;grid-template-columns:3fr 1fr 1fr 1.6fr;
    align-items:start;padding:.8rem 1rem;gap:.5rem;
    border-bottom:1px solid var(--border);transition:background .15s;
  }
  .h-row:hover{background:rgba(255,255,255,.02)}
  .h-row:last-child{border-bottom:none}

  /* ─── Result Item ─── */
  .r-item{
    border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem;
    transition:all .15s;
  }
  .r-item.ok{border-color:rgba(74,222,128,.18);background:rgba(74,222,128,.025)}
  .r-item.bad{border-color:rgba(248,113,113,.18);background:rgba(248,113,113,.025)}

  /* ─── Gradient text ─── */
  .grad-text{
    background:linear-gradient(135deg,#9B8FF0 0%,#C8963E 45%,#7B6FE0 100%);
    background-size:200% 200%;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    animation:gradShift 5s ease infinite;
  }
  @keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}

  .sep{height:1px;background:var(--border);margin:1.25rem 0}

  /* ─── Pulse dot ─── */
  .pulse-dot{
    width:7px;height:7px;border-radius:50%;background:var(--green);
    animation:pulse 2.2s ease infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

  /* ─── Chart canvas ─── */
  #scoreChart{max-height:200px}

  /* ─── Score ring ─── */
  .score-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}

  *{-webkit-tap-highlight-color:transparent}
  body{padding-bottom:env(safe-area-inset-bottom,0)}
  @media(hover:hover){
    .g-card:hover{border-color:var(--border-h);box-shadow:0 16px 40px rgba(0,0,0,.28)}
    .n-card:hover{border-color:var(--c-border,var(--accent-border));transform:translateY(-9px)}
    .n-card:hover::before{opacity:1}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(123,111,224,.4)}
    .btn-ghost:hover{border-color:var(--border-h);color:var(--text-1);background:rgba(255,255,255,.04)}
    .opt:hover:not(.locked){border-color:var(--accent-border);background:var(--accent-dim)}
    .rv-hdr:hover{background:rgba(255,255,255,.025)}
  }
  @media(hover:none){
    .btn-primary:active{opacity:.85;transform:scale(.98)}
    .opt:active:not(.locked){border-color:var(--accent-border);background:var(--accent-dim)}
    .nav-link:active{color:var(--accent);background:var(--accent-dim)}
  }
  @media(max-width:640px){
    #navbar{height:52px;padding:0 .75rem;gap:.4rem}
    #page-content{padding-top:52px}
    .nav-logo-text{font-size:.82rem}
    .nav-logo-icon{width:26px;height:26px;border-radius:6px}
    .nav-link{padding:.32rem .38rem;font-size:.7rem;letter-spacing:-.01em}
    .nav-links{gap:0;flex-shrink:1}
    .page{animation:none}
    .g-card{border-radius:14px}
    .n-card{border-radius:16px;padding:1.5rem}
    .s-card{padding:.9rem;border-radius:12px}
    .btn{min-height:44px}
    .bk-btn{padding:.5rem}
    .opt{padding:.85rem .9rem;font-size:.88rem}
    .rv-hdr{padding:.85rem 1rem}
    .rv-body{padding:0 1rem 1rem}
    .drop-zone{padding:1.5rem 1rem}
    ::-webkit-scrollbar{width:0}
    .h-row{grid-template-columns:2fr 1fr 1fr;padding:.7rem .9rem;gap:.4rem}
    .h-row>div:nth-child(4){display:none}
  }

  @media(max-width:400px){
    .nav-link-text{display:none}
    .nav-link{padding:.32rem .45rem}
    #navbar{padding:0 .6rem;gap:.3rem}
  }
  button{touch-action:manipulation}
</style>
</head>
<body>

<!-- ════ NAVBAR ════ -->
<nav id="navbar">
  <div class="nav-logo" onclick="navigate('home')">
    <div class="nav-logo-icon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5M2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="nav-logo-text">NeuroLearn</span>
  </div>
  <div style="display:flex;align-items:center;gap:.5rem;">
    <div class="nav-links">
      <button class="nav-link" id="nl-home"   onclick="navigate('home')">首頁</button>
      <button class="nav-link" id="nl-data"   onclick="navigate('datasets')">資料集</button>
      <button class="nav-link" id="nl-quiz"   onclick="navigate('quiz')">模擬考</button>
      <button class="nav-link" id="nl-dash"   onclick="navigate('dashboard')">儀表板</button>
    </div>
    <div id="nav-user-area" style="display:flex;align-items:center;gap:.3rem;margin-left:.3rem;flex-shrink:0;">
      <button onclick="navigate('login')" class="btn btn-primary" style="font-size:.72rem;padding:.28rem .65rem;min-height:0;touch-action:manipulation;white-space:nowrap;">登入</button>
    </div>
  </div>
</nav>

<main id="page-content"></main>

<script>

/* ╔══════════════════════════════════════════════════════╗
   ║  SUPABASE — 雲端同步 + 帳號管理                      ║
   ║  填入你的 Project URL 和 anon key                    ║
   ╚══════════════════════════════════════════════════════╝ */
const SUPA_URL = 'https://rmqlwzjlvpowqwgwiegg.supabase.co';
const SUPA_KEY = 'sb_publishable_A3vHSsoyjb_KMZDUbCNHdQ_hs0O87su';
let _supa = null;
let _currentUser = null;
let _cloudSyncTimer = null;

function initSupabase() {
  if (typeof supabase === 'undefined') {
    // SDK failed to load — still show login button
    console.warn('[Supa] SDK 未載入，雲端同步停用。請確認網路連線。');
    updateNavUser();
    return;
  }
  // Skip if still using placeholder values
  if (!SUPA_URL || SUPA_URL === 'YOUR_SUPABASE_URL' ||
      !SUPA_KEY || SUPA_KEY === 'YOUR_SUPABASE_ANON_KEY') {
    console.info('[Supa] 尚未設定 Supabase URL/Key，雲端同步已停用。');
    updateNavUser();
    return;
  }
  try {
    _supa = supabase.createClient(SUPA_URL, SUPA_KEY);
    _supa.auth.onAuthStateChange(async (event, session) => {
      const prev = _currentUser;
      _currentUser = session?.user ?? null;
      updateNavUser();
      if (event === 'SIGNED_IN' && !prev) {
        // Full state reset before loading new user's data
        resetState();
        // Load this user's localStorage first, then override with cloud
        loadFromStorage();
        await loadCloudProgress();
        render();
      }
      if (event === 'SIGNED_OUT') {
        // Full state reset
        resetState();
        // Load anonymous localStorage (key without user_id)
        loadFromStorage();
        render();
      }
    });
    // ── Handle email verification / password reset callback from URL hash ──
    const _hash = window.location.hash;
    if (_hash && (_hash.includes('access_token') || _hash.includes('error'))) {
      // Supabase redirected back with token or error in URL hash
      if (_hash.includes('error=access_denied') || _hash.includes('otp_expired')) {
        // Expired or invalid link — show friendly message on login page
        window.location.hash = '';
        S.page = 'login';
        render();
        setTimeout(() => {
          const msg = document.getElementById('auth-msg');
          if (msg) {
            msg.style.color = '#F87171';
            msg.textContent = '驗證連結已過期或無效，請重新寄送驗證信，或改用密碼直接登入。';
          }
        }, 100);
      } else if (_hash.includes('type=recovery')) {
        // Password reset flow
        window.location.hash = '';
        _supa.auth.getSession().then(({ data }) => {
          if (data?.session) {
            _currentUser = data.session.user;
            updateNavUser();
            S.page = 'login';
            render();
            setTimeout(() => {
              const msg = document.getElementById('auth-msg');
              if (msg) {
                msg.style.color = '#4ADE80';
                msg.textContent = '已驗證！請在下方設定新密碼後登入。';
              }
            }, 100);
          }
        });
      } else if (_hash.includes('access_token')) {
        // Email confirmation success — session already set by SDK
        window.location.hash = '';
        _supa.auth.getSession().then(({ data }) => {
          _currentUser = data?.session?.user ?? null;
          updateNavUser();
          if (_currentUser) {
            loadCloudProgress().then(() => {
              render();
              // Show welcome message
              setTimeout(() => {
                const msg = document.getElementById('auth-msg');
                if (msg) {
                  msg.style.color = '#4ADE80';
                  msg.textContent = '✅ Email 驗證成功！歡迎使用 NeuroLearn。';
                }
              }, 200);
            });
          }
        });
      }
    } else {
      // Normal page load — restore session
      _supa.auth.getSession().then(({ data }) => {
        _currentUser = data?.session?.user ?? null;
        updateNavUser();
        if (_currentUser) loadCloudProgress().then(() => render());
      });
    }
  } catch(e) { console.warn('[Supa] init failed:', e); }
}

function updateNavUser() {
  const el = document.getElementById('nav-user-area');
  if (!el) return;
  if (_currentUser) {
    const name = (_currentUser.email||'').split('@')[0];
    el.innerHTML =
      '<span style="font-size:.74rem;color:var(--text-2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + _currentUser.email + '">' + name + '</span>' +
      '<button onclick="signOut()" class="btn btn-ghost" style="font-size:.72rem;padding:.28rem .55rem;min-height:0;touch-action:manipulation;">登出</button>';
  } else {
    el.innerHTML =
      '<button onclick="navigate(\'login\')" class="btn btn-primary" style="font-size:.72rem;padding:.28rem .65rem;min-height:0;touch-action:manipulation;">登入</button>';
  }
}

// ── Auth helpers ──────────────────────────────────────────────────────────
async function authSignUp(email, pw) {
  if (!_supa) throw new Error('Supabase 未初始化，請填入 URL 和 Key。');
  const { error } = await _supa.auth.signUp({
    email, password: pw,
    options: { emailRedirectTo: 'https://z134340.github.io/neurolearn/' }
  });
  if (error) throw error;
}

async function authSignIn(email, pw) {
  if (!_supa) throw new Error('Supabase 未初始化，請填入 URL 和 Key。');
  const { data, error } = await _supa.auth.signInWithPassword({ email, password: pw });
  if (error) throw error;
  _currentUser = data.user;
}


function resetState() {
  // Clear all quiz state
  S.quizMode      = 'menu';
  S.currentQ      = 0;
  S.answers       = [];
  S.quizConfig    = null;
  S.quizSetup     = null;
  S.activeQs      = [];
  S.browseSrc     = null;
  S.importMsg     = null;
  S.editingTagFid = null;
  S.chart         = null;
  // Clear all user progress data
  S.bookmarks     = new Set();
  S.wrongQs       = new Set();
  S.usedQIds      = new Set();
  S.history       = [];
  S.files         = [];
  S.extraQs       = [];
  S.nextFid       = 4;
  // Clear filters
  S.dashTag       = null;
  S.tagFilter     = null;
  // Reset to home
  S.page          = 'home';
}


async function signOut() {
  if (!_supa) {
    // No Supabase — just reset local state
    resetState();
    _currentUser = null;
    updateNavUser();
    render();
    return;
  }
  // Reset state immediately (don't wait for SIGNED_OUT event)
  resetState();
  _currentUser = null;
  updateNavUser();
  await _supa.auth.signOut();
  // SIGNED_OUT event will also fire, but resetState is idempotent
  render();
}

async function sendPasswordReset(email) {
  if (!_supa) throw new Error('Supabase 未初始化。');
  const { error } = await _supa.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://z134340.github.io/neurolearn/',
  });
  if (error) throw error;
}

// ── Cloud sync ────────────────────────────────────────────────────────────
async function loadCloudProgress() {
  if (!_supa || !_currentUser) return;
  try {
    const { data, error } = await _supa
      .from('user_progress')
      .select('data')
      .eq('user_id', _currentUser.id)
      .maybeSingle();
    if (error || !data) return;
    const d = data.data;
    if (!d) return;
    // Merge cloud → local (cloud wins for all progress data)
    if (Array.isArray(d.history))   S.history   = d.history;
    if (Array.isArray(d.bookmarks)) S.bookmarks = new Set(d.bookmarks.map(String));
    if (Array.isArray(d.wrongQs))   S.wrongQs   = new Set(d.wrongQs.map(String));
    if (Array.isArray(d.usedQIds))  S.usedQIds  = new Set(d.usedQIds.map(String));
    if (Array.isArray(d.files))     S.files     = d.files;
    if (Array.isArray(d.extraQs))   S.extraQs   = d.extraQs;
    if (d.dashTag   !== undefined)  S.dashTag   = d.dashTag;
    if (d.tagFilter !== undefined)  S.tagFilter = d.tagFilter;
    // Sync nextFid so new uploads get unique IDs
    if (S.files.length > 0) S.nextFid = Math.max(...S.files.map(f => f.id + 1));
    // Also update localStorage
    saveToStorage();
    console.log('[Supa] Cloud progress loaded.');
  } catch(e) { console.warn('[Supa] loadCloudProgress error:', e); }
}

async function syncToCloud() {
  if (!_supa || !_currentUser) return;
  try {
    const payload = {
      user_id:    _currentUser.id,
      data: {
        history:   S.history,
        bookmarks: [...S.bookmarks],
        wrongQs:   [...S.wrongQs],
        usedQIds:  [...S.usedQIds],
        // Dataset files (metadata only — binary _file not serializable)
        files:     S.files.map(({ _file, ...f }) => f),
        extraQs:   S.extraQs,
        dashTag:   S.dashTag,
        tagFilter: S.tagFilter,
      },
      updated_at: new Date().toISOString(),
    };
    const { error } = await _supa
      .from('user_progress')
      .upsert(payload, { onConflict: 'user_id' });
    if (error) console.warn('[Supa] sync error:', error.message);
    else console.log('[Supa] Synced to cloud.');
  } catch(e) { console.warn('[Supa] syncToCloud error:', e); }
}

function scheduleSyncToCloud() {
  clearTimeout(_cloudSyncTimer);
  _cloudSyncTimer = setTimeout(() => syncToCloud().catch(e => console.warn('[Supa] sync error:', e)), 2000);
}

  ['home','data','quiz','dash'].forEach(id => {
    document.getElementById('nl-'+id)?.classList.remove('active');

  const map = {home:'home',datasets:'data',quiz:'quiz',dashboard:'dash'};

function render() {

  clearTimeout(_autoSaveTimer);

  const c = document.getElementById('page-content');

  switch(S.page) {

  if (!el || !f) { if(S.page==='datasets') render(); return; }

function bindDataset() {
  const dz = document.getElementById('dropZone');
  if (!dz) return;
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dv'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dv'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dv');
    handleFileSelect(e.dataTransfer.files);
  });
}

function handleFileSelect(files) {
  Array.from(files).forEach(file => {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['pdf','docx','csv','xlsx'].includes(ext)) return;
    const size = file.size > 1048576
      ? (file.size/1048576).toFixed(1)+' MB'
      : Math.round(file.size/1024)+' KB';
    const today = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});
    const isImportable = ['csv','xlsx'].includes(ext);
    const fObj = {id:S.nextFid++, name:file.name, type:ext, size, status:'processing', date:today, tags:[], _file:file};
    S.files.push(fObj);
    // Auto-import CSV/XLSX immediately
    if (isImportable) {
      setTimeout(() => {
        fObj.status = 'ready';
        if (ext === 'xlsx') importXLSXQuestions(file, fObj);
        else importCSVQuestions(file, fObj);
      }, 800);
    }
  });
  // Insert new cards without full-page re-render
  if (S.page === 'datasets') {
    const listEl = document.querySelector('#page-content .page > div[style*="margin-top:2rem"]');
    if (listEl) {
      // List already exists — just append new cards
      S.files.filter(f=>!document.getElementById('fcard-'+f.id)).forEach(f => {
        const tmp = document.createElement('div');
        tmp.innerHTML = fileCardHTML(f);
        const newCard = tmp.firstElementChild;
        // Insert before empty-state div or append
        const emptyDiv = listEl.querySelector('div[style*="text-align:center"]');
        if (emptyDiv) emptyDiv.remove();
        listEl.appendChild(newCard);
      });
      // Update file count
      const countEl = listEl.querySelector('[style*="color:var(--accent)"]');
      if (countEl) countEl.textContent = S.files.length;
    } else {
      render(); // first file — need to build list
    }
  }
  // Non-importable: update badge after 2.2s without full re-render
  setTimeout(() => {
    S.files.forEach(f => {
      if (f.status === 'processing' && !['csv','xlsx'].includes(f.type)) {
        f.status = 'ready';
        refreshCard(f.id);
      }
    });
  }, 2200);
}

function removeFile(id) {
  // ── Purge all questions imported from this file ──────────────────────
  const removedQIds = new Set(S.extraQs.filter(q => q._fileId === id).map(q => q.id));
  S.extraQs = S.extraQs.filter(q => q._fileId !== id);

  // Clean up bookmarks and wrongQs that referenced removed questions
  removedQIds.forEach(qid => {
    S.bookmarks.delete(qid);
    S.wrongQs.delete(qid);
    S.usedQIds.delete(qid);
  });

  // Remove the file record
  S.files = S.files.filter(f => f.id !== id);
  if (S.editingTagFid === id) S.editingTagFid = null;

  // Fade out and remove card from DOM
  const cardEl = document.getElementById('fcard-'+id);
  if (cardEl) {
    cardEl.style.transition = 'opacity .18s, max-height .25s';
    cardEl.style.overflow   = 'hidden';
    cardEl.style.opacity    = '0';
    cardEl.style.maxHeight  = cardEl.offsetHeight + 'px';
    setTimeout(() => {
      cardEl.style.maxHeight  = '0';
      cardEl.style.marginBottom = '0';
      setTimeout(() => { cardEl.remove(); refreshFilterBar(); }, 240);
    }, 180);
  } else if (S.page === 'datasets') scheduleSyncToCloud();
  render();
}

// TAG_PRESETS removed — quick tags are user-defined only
const TAG_PALETTE = [
  {bg:'rgba(123,111,224,.18)',color:'#A99FF3',border:'rgba(123,111,224,.38)'},
  {bg:'rgba(200,150,62,.18)', color:'#D4A85C',border:'rgba(200,150,62,.38)'},
  {bg:'rgba(74,222,128,.13)', color:'#4ADE80',border:'rgba(74,222,128,.32)'},
  {bg:'rgba(96,165,250,.13)', color:'#60A5FA',border:'rgba(96,165,250,.32)'},
  {bg:'rgba(248,113,113,.13)',color:'#F87171',border:'rgba(248,113,113,.32)'},
  {bg:'rgba(251,146,60,.13)', color:'#FB923C',border:'rgba(251,146,60,.32)'},
  {bg:'rgba(167,139,250,.13)',color:'#A78BFA',border:'rgba(167,139,250,.32)'},
  {bg:'rgba(34,211,238,.13)', color:'#22D3EE',border:'rgba(34,211,238,.32)'},
];
function tagColor(tag) {
  let h = 0; for (const c of tag) h = (h * 31 + c.charCodeAt(0)) & 0xFFFF;
  return TAG_PALETTE[h % TAG_PALETTE.length];
}
/* Sync _fileTags and category on all extraQs belonging to a file */
function _syncQuestionTags(fid, tags) {
  S.extraQs.forEach(q => {
    if (q._fileId !== fid) return;
    q._fileTags = [...tags];
    if (tags.length > 0) q.category = tags[0];
    // If all tags removed: fall back to '匯入題目'
    else q.category = q._origCategory || '匯入題目';
  });
}


function addTag(fid, tag) {
  tag = (tag || '').trim().slice(0, 10);
  if (!tag) return;
  const f = S.files.find(f => f.id === fid);
  if (!f || f.tags.includes(tag) || f.tags.length >= 5) return;
  f.tags.push(tag);

  _syncQuestionTags(fid, f.tags);
  refreshCard(fid);

function removeTag(fid, tag) {

function toggleTagEdit(fid) {

function setTagFilter(tag) {
  S.tagFilter = (S.tagFilter === tag) ? null : tag;

  document.querySelectorAll('.g-card[id^="fcard-"]').forEach(el => {

      el.style.background = active ? tc.color : tc.bg;
      el.style.color      = active ? '#111' : tc.color;
      el.style.borderColor = active ? tc.color : tc.border;

}

/* ── Shared import helpers ── */
function _mergeQuestions(parsed, fObj) {
  // Deduplicate only within the SAME file — same CSV re-uploaded after clear
  // should be treated as new questions with the new fObj's _fileId
  const thisFid = fObj ? fObj.id : null;
  const existing = new Set(
    S.extraQs
      .filter(q => q._fileId === thisFid)   // only deduplicate within same file
      .map(q => q.text.slice(0,40))
  );
  const fileTags = fObj ? (fObj.tags && fObj.tags.length ? fObj.tags : []) : [];
  let added = 0;
  parsed.forEach(q => {
    if (!existing.has(q.text.slice(0,40))) {
      q.id = 10000 + S.extraQs.length;
      q._origCategory = q.category || '匯入題目'; // preserve CSV exam value
      // Category: prefer file tag (applied later via _syncQuestionTags); fallback to CSV exam
      q.category = fileTags[0] || q.category || '匯入題目';
      q._fileTags = [...fileTags];
      q._fileId   = fObj ? fObj.id : null;
      S.extraQs.push(q);
      existing.add(q.text.slice(0,40));
      added++;
    }
  });
  if (fObj) { fObj.importing=false; fObj.imported=added; fObj.status='ready'; refreshCard(fObj.id); }
  const msg = added > 0 ? `✅ 成功匯入 ${added} 題（來源分類：${fileTags.join('、')||'未標記'}）` : `⚠️ 所有題目已存在，無新增`;
  showImportToast(msg, 5000);
  if (added > 0) {
    saveToStorage();         // persist to localStorage
    scheduleSyncToCloud();   // push to Supabase
  }
}

function importCSVQuestions(file, fObj) {
  fObj = fObj || S.files.find(f => f.name === file.name);
  if (fObj) { fObj.importing=true; refreshCard(fObj.id); }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = parseQuestionCSV(e.target.result);
      if (!parsed.length) throw new Error('找不到有效題目，請確認欄位格式');
      _mergeQuestions(parsed, fObj);
    } catch(err) {
      if (fObj) { fObj.importing=false; fObj.importErr=true; refreshCard(fObj.id); }
      showImportToast(`❌ 解析失敗：${err.message}`, 5000);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function importXLSXQuestions(file, fObj) {
  fObj = fObj || S.files.find(f => f.name === file.name);
  // XLSX library not included in offline version — guide user to CSV
  if (fObj) { fObj.importing=false; fObj.status='ready'; refreshCard(fObj.id); }
  showImportToast('⚠️ 離線版不支援 XLSX 匯入，請將檔案另存為 CSV 後重新上傳', 6000);
  return;
  if (fObj) { fObj.importing=true; refreshCard(fObj.id); }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      if (typeof XLSX === 'undefined') throw new Error('XLSX 函式庫未載入，請重新整理頁面');
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if (!rows.length) throw new Error('試算表內容為空');
      // Normalize column names (lowercase)
      const norm = rows.map(r => {
        const out={};
        Object.keys(r).forEach(k => out[k.toLowerCase().trim()] = String(r[k]||'').trim());
        return out;
      });
      const parsed = parseQuestionRows(norm);
      if (!parsed.length) throw new Error('找不到有效題目，請確認欄位格式（question/option_a/answer）');
      _mergeQuestions(parsed, fObj);
    } catch(err) {
      if (fObj) { fObj.importing=false; fObj.importErr=true; refreshCard(fObj.id); }
      showImportToast(`❌ XLSX 解析失敗：${err.message}`, 5000);
    }
  };
  reader.readAsArrayBuffer(file);
}

/* ── Targeted toast update (no full-page flash) ── */
function showImportToast(msg, durationMs) {
  S.importMsg = msg;
  const el = document.getElementById('import-toast');
  if (el) {
    const ok = msg && msg.startsWith('✅');
    el.style.display = '';
    el.style.background  = ok ? 'rgba(74,222,128,.07)' : 'rgba(248,113,113,.07)';
    el.style.border      = '1px solid ' + (ok ? 'rgba(74,222,128,.25)' : 'rgba(248,113,113,.25)');
    el.style.color       = ok ? '#4ADE80' : '#F87171';
    el.textContent       = msg;
    if (durationMs) setTimeout(() => {
      S.importMsg = null;
      if (el) el.style.display = 'none';
    }, durationMs);
  } else {
    // Fallback if not on datasets page
    if (S.page === 'datasets') render();
  }
}

    ['3','LLM應用','企業想讓 LLM 在不重新訓練的情況下存取最新內部知識庫，最適合的方法是？','提高 temperature 參數','使用 RAG（檢索增強生成）架構','增加 Max Tokens 限制','切換至更大的基礎模型','','B','B - 正確，RAG 將外部知識庫與生成模型結合，無需重新訓練。'],
  ];
  const csv = rows.map(r => r.map(v => v.includes(',') || v.includes('"') ? '"'+v.replace(/"/g,'""')+'"' : v).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '題目匯入範本.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function parseQuestionCSV(text) {
  if (text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  const lines = text.split(/\r?\n/);
  if (lines.length<2) return [];
  const headers = parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase());
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const cols=parseCSVLine(lines[i]);
    const row={};
    headers.forEach((h,j)=>{ row[h]=cols[j]?.trim()||''; });
    rows.push(row);
  }
  return parseQuestionRows(rows);
}

/* Shared row parser: works for both CSV (object rows) and XLSX (sheet_to_json rows) */
function parseQuestionRows(rows) {
  const ANS={'A':0,'B':1,'C':2,'D':3,'E':4,'a':0,'b':1,'c':2,'d':3,'e':4,'0':0,'1':1,'2':2,'3':3,'4':4};
  const DIFF={'基礎':'基礎','中等':'中等','進階':'進階','easy':'基礎','medium':'中等','hard':'進階'};
  const results=[];
  for(const r of rows){
    const q=(r.question||r.題目||'').trim();
    const oA=(r.option_a||r.選項a||r['選項_a']||'').trim();
    const oB=(r.option_b||r.選項b||r['選項_b']||'').trim();
    const oC=(r.option_c||r.選項c||r['選項_c']||'').trim();
    const oD=(r.option_d||r.選項d||r['選項_d']||'').trim();
    const oE=(r.option_e||r.選項e||r['選項_e']||'').trim();
    const ansRaw=(r.answer||r.答案||'').trim().toUpperCase();
    const cat=(r.exam||r.category||r.分類||'').trim()||'匯入題目';
    const diff=DIFF[(r.difficulty||r.難度||'').trim()]||'中等';
    const expl=(r.explanation||r.解析||r.說明||'').trim()||'（無解析）';

    // Detect multi-select: "AB", "A,B", "A+B", "A B" all mean multi-select
    const ansLetters = ansRaw.replace(/[,+\s]+/g,'').split('').filter(l => ANS[l]!==undefined);
    const isMulti = ansLetters.length > 1;
    const ansValue = isMulti
      ? ansLetters.map(l => ANS[l]).sort((a,b)=>a-b)   // array of indices, sorted
      : (ANS[ansRaw]??parseInt(ansRaw));                 // single index

    if(!q||!oA) continue;
    if(isMulti && ansLetters.length === 0) continue;
    if(!isMulti && (ansValue===undefined||isNaN(ansValue)||ansValue>4)) continue;

    const opts=[oA,oB,oC,oD].filter(Boolean);
    if(oE) opts.push(oE);
    while(opts.length<4) opts.push('—');
    results.push({
      id:0, text:q, options:opts.slice(0,5),
      answer:ansValue,          // number (single) or sorted number[] (multi)
      isMulti: isMulti,         // flag for UI
      explanation:expl, category:cat, difficulty:diff
    });
  }
  return results;
}

function parseCSVLine(line) {
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'&&!inQ)inQ=true;
    else if(ch==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;}
    else if(ch===','&&!inQ){r.push(cur);cur='';}
    else cur+=ch;
  }
  r.push(cur);return r;
}

function qsSelectSubMode(submode) {
  if (!S.quizSetup) return;
  if (submode === 'browse') {
    const allQ  = [...QUESTIONS,...S.extraQs];
    const inCat = q => S.quizSetup.cats.has(q.category)||(q._fileTags&&q._fileTags.some(t=>S.quizSetup.cats.has(t)));
    const useCF = S.quizSetup.cats.size > 0;
    S.activeQs  = S.quizSetup.mode==='review'
      ? (useCF?allQ.filter(q=>S.bookmarks.has(String(q.id))&&inCat(q)):allQ.filter(q=>S.bookmarks.has(String(q.id))))
      : (useCF?allQ.filter(q=>S.wrongQs.has(String(q.id))&&inCat(q)) :allQ.filter(q=>S.wrongQs.has(String(q.id))));
    S.browseSrc = {mode:S.quizSetup.mode, cats:new Set(S.quizSetup.cats)};

    if (S.quizSetup.cats.size <= 1) return;
    S.quizSetup.cats.delete(cat);
  } else {
    S.quizSetup.cats.add(cat);
  }
  render();
}
function selectAllMenuCats(all) {
  if (!S.quizSetup) initQuizSetup();
  // Categories = ONLY tags the user has manually applied to files in Datasets
  const allCats = [...new Set(S.files.flatMap(f => f.tags || []))].sort();
  S.quizSetup.cats = all ? new Set(allCats) : new Set();
  render();
}
function goToModeStep() {
  if (!S.quizSetup) initQuizSetup();
  S.quizSetup.step = 'mode';
  render();
}
function pickMode(mode) {
  S.quizSetup.mode = mode;
  if (mode === 'new') {
    // new quiz → go straight to count
    S.quizSetup.step = 'count';
    const allQ = [...QUESTIONS,...S.extraQs];
    const inCat = q => S.quizSetup.cats.has(q.category)||(q._fileTags&&q._fileTags.some(t=>S.quizSetup.cats.has(t)));
    const pool = allQ.filter(q=>inCat(q));
    S.quizSetup.count = Math.min(pool.length, 20);
  } else {
    // review / wrong → let user choose: browse or retake
    S.quizSetup.step = 'submode';
  }
  render();
}

/* ── Keep old openConfig/toggleConfigCat/setConfigCount for backward compat ── */
function openConfig(mode) {
  initQuizSetup();
  if (mode) S.quizSetup.mode = mode;
  render();
}

function getAvailPool() {
  const setup = S.quizSetup;
  if (!setup) return [];
  const allQ  = [...QUESTIONS, ...S.extraQs];
  const catsOk = setup.cats.size > 0;
  const inCat  = q => setup.cats.has(q.category) || (q._fileTags && q._fileTags.some(t => setup.cats.has(t)));
  // Review/wrong: if categories selected, filter by them; otherwise use all bookmarks/wrong
  // review/wrong retake: always use ALL bookmarks/wrong (no category filter)
  if (setup.mode === 'review') return allQ.filter(q => S.bookmarks.has(String(q.id)));
  if (setup.mode === 'wrong')  return allQ.filter(q => S.wrongQs.has(String(q.id)));
  return allQ.filter(q => inCat(q));
}
function toggleConfigCat(cat) {
  const cfg = S.quizConfig;
  if (cfg.cats.has(cat)) { if (cfg.cats.size <= 1) return; cfg.cats.delete(cat); }
  else cfg.cats.add(cat);
  const pool = getAvailPool();
  cfg.count = Math.max(1, Math.min(cfg.count, pool.length));
  render();
}
function setConfigCount(n) { S.quizConfig.count = n; render(); }
function launchQuiz() {
  const setup = S.quizSetup;
  const pool  = getAvailPool();
  if (!pool || !pool.length) return;
  const count = Math.min(setup.count || pool.length, pool.length);
  const mode  = setup.mode;

  // ── No-repeat draw: prefer questions not yet drawn from this tag pool ──
  // Only apply no-repeat for 'new' mode (review/wrong modes intentionally repeat)
  let drawn;
  if (mode === 'new') {
    const unused = pool.filter(q => !S.usedQIds.has(String(q.id)));
    const used   = pool.filter(q =>  S.usedQIds.has(String(q.id)));
    const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

    if (unused.length === 0) {
      // All questions used — auto-reset this pool and start fresh
      pool.forEach(q => S.usedQIds.delete(String(q.id)));
      drawn = shuffle(pool).slice(0, count);
      S._poolResetMsg = true; // show toast on result page
    } else if (unused.length >= count) {
      // Enough unused — draw only from unused
      drawn = shuffle(unused).slice(0, count);
    } else {
      // Not enough unused — take all unused, fill remainder from used
      const fill = shuffle(used).slice(0, count - unused.length);
      drawn = shuffle([...unused, ...fill]);
    }
    // NOTE: usedQIds is marked in finishQuiz() only after quiz completion
    // (not here) so abandoned quizzes don't consume questions
  } else {
    // review / wrong modes: shuffle normally, no no-repeat tracking
    drawn = [...pool].sort(() => Math.random() - 0.5).slice(0, count);
  }

  S.activeQs   = drawn;
  S.answers    = drawn.map((q) => ({selected: q.isMulti ? [] : null, confirmed:false}));
  S.currentQ   = 0;
  S.quizConfig = { mode, count: drawn.length, name: setup.name||'', cats: new Set(setup.cats) };
  S.quizSetup  = null;
  S.quizMode   = 'active';
  render();
}

function selectOpt(i) {
  const ans = S.answers[S.currentQ];
  const q   = S.activeQs[S.currentQ];
  if (ans.confirmed) return;

  if (q.isMulti) {
    // Multi-select: toggle
    const sel = ans.selected; // array
    const pos = sel.indexOf(i);
    if (pos >= 0) sel.splice(pos, 1);
    else sel.push(i);
    // Update UI
    document.querySelectorAll('.opt').forEach((el, idx) => {
      el.classList.toggle('sel', sel.includes(idx));
    });
    const confirmBtn = document.getElementById('confirm-btn');
    if (confirmBtn) {
      if (sel.length > 0) confirmBtn.removeAttribute('disabled');
      else confirmBtn.setAttribute('disabled','');
    }
  } else {
    // Single-select: replace
    if (ans.selected === i) return;
    ans.selected = i;
    document.querySelectorAll('.opt').forEach((el, idx) => {
      el.classList.toggle('sel', idx === i);
    });
    const confirmBtn = document.getElementById('confirm-btn');
    if (confirmBtn) confirmBtn.removeAttribute('disabled');
  }
}

function confirmAns() {
  const ans = S.answers[S.currentQ];
  const q   = S.activeQs[S.currentQ];

  // Guard: need at least one selection
  if (q.isMulti ? ans.selected.length === 0 : ans.selected === null) return;
  ans.confirmed = true;

  // Determine correct set
  const correctSet = q.isMulti
    ? new Set(q.answer)          // q.answer is sorted number[]
    : new Set([q.answer]);
  const selectedSet = q.isMulti
    ? new Set(ans.selected)
    : new Set([ans.selected]);

  document.querySelectorAll('.opt').forEach((el, idx) => {
    el.classList.add('locked');
    el.onclick = null;
    const isCorrect  = correctSet.has(idx);
    const isSelected = selectedSet.has(idx);
    if (isCorrect)                   el.classList.add('correct');
    else if (isSelected && !isCorrect) el.classList.add('wrong');
    else                             el.style.opacity = '0.35';
  });

  const explPanel = document.getElementById('expl-panel');
  if (explPanel) explPanel.style.display = 'block';

  const actionDiv = document.getElementById('action-btn');
  if (actionDiv) {
    const isLast = S.currentQ === S.activeQs.length - 1;
    actionDiv.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">${isLast ? '完成測驗 →' : '下一題 →'}</button>`;
  }
}

function toggleBk(id) {
  id = String(id); // normalize: QUESTIONS use numeric ids, onclick passes strings
  const isOn = !S.bookmarks.has(id);
  isOn ? S.bookmarks.add(id) : S.bookmarks.delete(id);

  // DOM-only update — no render, no flash; trigger save
  clearTimeout(_autoSaveTimer); _autoSaveTimer = setTimeout(saveToStorage, 600);
  const btn = document.getElementById('bk-btn');
  if (!btn) return;
  btn.classList.toggle('on', isOn);
  btn.title = isOn ? '取消標記' : '標記此題';
  const svg = btn.querySelector('svg');
  if (svg) svg.setAttribute('fill', isOn ? 'currentColor' : 'none');
}

function unconfirmAns() {
  if (S.currentQ < 0 || S.currentQ >= S.activeQs.length) return;
  S.answers[S.currentQ].confirmed = false;
  render();
}


function prevQuestion() {
  if (S.currentQ <= 0) return;
  S.currentQ--;
  // Unconfirm the previous question so the user can re-check and modify
  if (S.answers[S.currentQ]) {
    S.answers[S.currentQ].confirmed = false;
  }
  render();
}


function nextQuestion() {
  // Auto-confirm current answer before advancing (allows "下一題" to save)
  const ans = S.answers[S.currentQ];
  const q0  = S.activeQs[S.currentQ];
  const hasSelection = q0 && q0.isMulti
    ? Array.isArray(ans.selected) && ans.selected.length > 0
    : ans && ans.selected !== null;
  if (hasSelection && !ans.confirmed) {
    ans.confirmed = true;
  }
  if (S.currentQ === S.activeQs.length - 1) {
    finishQuiz();
  } else {
    S.currentQ++;
    render();
  }
}

function finishQuiz() {
  const score = S.activeQs.filter((q,i) => {
    const sel = S.answers[i].selected;
    if (q.isMulti) {
      // Multi: selected array must match answer array exactly (same elements)
      const s = Array.isArray(sel) ? [...sel].sort((a,b)=>a-b) : [];
      const a = [...q.answer].sort((a,b)=>a-b);
      return s.length === a.length && s.every((v,j) => v === a[j]);
    }
    return sel === q.answer;
  }).length;

  // ── Mark questions as used ONLY on completion (not on launch) ──
  // quizConfig.mode is set during launchQuiz
  if (S.quizConfig && S.quizConfig.mode === 'new') {
    S.activeQs.forEach(q => S.usedQIds.add(String(q.id)));
  }

  // Track wrong answers
  S.activeQs.forEach((q,i) => {
    const sel = S.answers[i].selected;
    let isCorrect;
    if (q.isMulti) {
      const s = Array.isArray(sel) ? [...sel].sort((a,b)=>a-b) : [];
      const a = [...q.answer].sort((a,b)=>a-b);
      isCorrect = s.length === a.length && s.every((v,j) => v === a[j]);
    } else {
      isCorrect = sel === q.answer;
    }
    if (!isCorrect) S.wrongQs.add(String(q.id));
    else S.wrongQs.delete(String(q.id));
  });
  // Per-category breakdown
  const catMap = {};
  S.activeQs.forEach((q,i) => {
    const c = q.category || '其他';
    if (!catMap[c]) catMap[c] = {correct:0,total:0};
    catMap[c].total++;
    if (S.answers[i].selected === q.answer) catMap[c].correct++;
  });
  const quizName = (S.quizSetup && S.quizSetup.name && S.quizSetup.name.trim())
    || `第 ${S.history.length+1} 回合`;
  // Collect wrong IDs from THIS quiz only
  const _wrongIds = S.activeQs
    .filter((q,i) => !isCorrectAnswer(q, S.answers[i].selected))
    .map(q => String(q.id));
  // Bookmarked questions from THIS quiz
  const _bkIds = S.activeQs
    .filter(q => S.bookmarks.has(String(q.id)))
    .map(q => String(q.id));

  S.history.push({
    id: S.history.length + 1,
    name: quizName,
    date: new Date().toLocaleDateString('zh-TW'),
    total: S.activeQs.length,
    correct: score,
    bk: _bkIds.length,
    wrong: _wrongIds.length,
    catStats: catMap,
    dur: '—',
    wrongIds: _wrongIds,   // IDs of wrong answers in this quiz
    bkIds:    _bkIds,      // IDs of bookmarked Qs from this quiz
  });
  S.quizMode = 'result';
  render();
}

/* ── Result ── */

/* ── Multi/single answer comparison helper ── */
function isCorrectAnswer(q, selected) {
  if (q.isMulti) {
    const s = Array.isArray(selected) ? [...selected].sort((a,b)=>a-b) : [];
    const a = [...q.answer].sort((a,b)=>a-b);
    return s.length === a.length && s.every((v,j) => v === a[j]);
  }
  return selected === q.answer;
}

/* Returns Set of correct option indices for a question */
function correctSet(q) {
  return q.isMulti ? new Set(q.answer) : new Set([q.answer]);
}

/* Display label for correct answer(s) */
function correctAnswerLabel(q) {
  const ANS = ['A','B','C','D','E'];
  if (q.isMulti) {
    return [...q.answer].sort((a,b)=>a-b).map(i => ANS[i]+'. '+q.options[i]).join('、');
  }
  return q.options[q.answer] || '';
}

function removeBrowseItem(idx, type) {
  const q = S.activeQs[idx];
  if (!q) return;
  if (type === 'review') S.bookmarks.delete(String(q.id));
  else S.wrongQs.delete(String(q.id));
  // Fade out the card then re-render
  const card = document.querySelectorAll('.rv-card')[idx];
  if (card) {
    card.style.transition = 'opacity .3s';
    card.style.opacity = '0';
    setTimeout(() => {
      S.activeQs.splice(idx, 1);
      render();

    S.activeQs.splice(idx, 1);
    render();
  }
}


function toggleRv(idx) {

function downloadHistoryCSV(histId, type) {
  const entry = S.history.find(h => h.id === histId);
  if (!entry) return;
  const ids  = type === 'wrong' ? (entry.wrongIds || []) : (entry.bkIds || []);
  if (!ids.length) { alert('這次測驗沒有' + (type==='wrong'?'錯誤':'標記') + '的題目。'); return; }
  const allQ = [...QUESTIONS, ...S.extraQs];
  const pool = ids.map(id => allQ.find(q => String(q.id) === String(id))).filter(Boolean);
  if (!pool.length) { alert('找不到對應題目（可能已從資料集移除）。'); return; }

  const ANS = ['A','B','C','D','E'];
  const header = ['id','exam','question','option_a','option_b','option_c','option_d','option_e','answer','explanation'];
  const rows = pool.map((q, i) => [
    i+1, q.category||'', q.text||'',
    q.options?.[0]||'', q.options?.[1]||'', q.options?.[2]||'',
    q.options?.[3]||'', q.options?.[4]||'',
    (q.isMulti ? [...q.answer].sort((a,b)=>a-b).map(i=>['A','B','C','D','E'][i]).join('') : ['A','B','C','D','E'][q.answer])||'', q.explanation||''
  ]);
  const esc = v => { const s=String(v).replace(/"/g,'""'); return (s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s+'"':s; };

  // 取得這批題目涉及的資料集標籤
  const tags = [...new Set(pool.map(q => q.category || q._fileTags?.[0] || '').filter(Boolean))];
  const typeLabel2 = type === 'wrong' ? '錯誤題目' : '標記題目';
  const metaLines2 = [
    '# 考卷：'     + (entry.name || '測驗 #' + entry.id),
    '# 類型：'     + typeLabel2,
    '# 資料集標籤：' + (tags.length ? tags.join('、') : '（未分類）'),
    '# 題數：'     + pool.length + ' 題',
    '# 匯出時間：'  + new Date().toLocaleString('zh-TW'),
    '#',
  ].join('\n');

  const csv = '\uFEFF' + metaLines2 + '\n' + [header,...rows].map(r=>r.map(esc).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const label = type === 'wrong' ? '錯誤題目' : '標記題目';
  a.download = entry.name + '_' + label + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

    navigate('home');

        msg.innerHTML =
          '登入失敗：帳號密碼錯誤，或 <b>Email 尚未驗證</b>。<br>' +

      } else if (errMsg.includes('email not confirmed')) {
        msg.innerHTML =
          'Email 尚未驗證，請至信箱點擊驗證連結後再登入。<br>' +
          '<span style="font-size:.78rem;color:var(--text-3);">未收到信？請點下方「重寄驗證信」。</span>';
      } else {

function exportProgress() {
  const payload = {
    _version:  1,
    _app:      'NeuroLearn',
    _exported: new Date().toISOString(),
    bookmarks: [...S.bookmarks],
    wrongQs:   [...S.wrongQs],
    usedQIds:  [...S.usedQIds],
    history:   S.history,
    files:     S.files.map(function(f){ var c={};Object.assign(c,f);delete c._file;return c; }),
    extraQs:   S.extraQs,
    dashTag:   S.dashTag,
    tagFilter: S.tagFilter,
  };
  var json = JSON.stringify(payload, null, 2);
  var blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  var date = new Date().toLocaleDateString('zh-TW').replace(/\//g, '-');
  a.href     = url;
  a.download = 'NeuroLearn_' + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importProgress(input) {
  var file = input.files[0];
  if (!file) return;
  var msg = document.getElementById('backup-msg');
  function setMsg(text, ok) {
    if (!msg) return;
    msg.textContent = text;
    msg.style.color = ok ? '#4ADE80' : '#F87171';
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var d = JSON.parse(e.target.result);
      if (!d || d._app !== 'NeuroLearn') {
        setMsg('無效的備份檔案，請選擇 NeuroLearn 匯出的 JSON。', false); return;
      }
      if (d._version !== 1) {
        setMsg('備份版本不相容，請使用最新版本重新匯出。', false); return;
      }
      if (Array.isArray(d.bookmarks)) S.bookmarks = new Set(d.bookmarks.map(String));
      if (Array.isArray(d.wrongQs))   S.wrongQs   = new Set(d.wrongQs.map(String));
      if (Array.isArray(d.usedQIds))  S.usedQIds  = new Set(d.usedQIds.map(String));
      if (Array.isArray(d.history))   S.history   = d.history;
      if (Array.isArray(d.files))     S.files     = d.files;
      if (Array.isArray(d.extraQs))   S.extraQs   = d.extraQs;
      if (d.dashTag   !== undefined)  S.dashTag   = d.dashTag;
      if (d.tagFilter !== undefined)  S.tagFilter = d.tagFilter;
      // Restore nextFid so new uploads get unique IDs after import
      if (S.files.length > 0) S.nextFid = Math.max.apply(null, S.files.map(function(f){ return f.id + 1; }));
      saveToStorage();
      scheduleSyncToCloud();
      var bk = S.bookmarks.size, wr = S.wrongQs.size, hi = S.history.length;
      var ds = S.files.length, eq = S.extraQs.length;
      setMsg('✅ 匯入成功：' + hi + ' 筆測驗紀錄、' + bk + ' 個書籤、' + wr + ' 個錯誤題目、' + ds + ' 個資料集（' + eq + ' 題）', true);
      setTimeout(function(){ render(); }, 1500);
    } catch(err) {
      setMsg('檔案解析失敗：' + err.message, false);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function dashStatsHTML() {
  const allQ = [...QUESTIONS, ...S.extraQs];
  const dt   = S.dashTag;

  const qInTag   = q => !dt || q.category === dt;
  const hInTag   = h => !dt || (h.catStats && h.catStats[dt]);
  const hCorrect = h => dt ? (h.catStats?.[dt]?.correct||0) : h.correct;
  const hTotal   = h => dt ? (h.catStats?.[dt]?.total  ||0) : h.total;
  const filtHist = S.history.filter(hInTag);

  const tot   = filtHist.length;
  const totC  = filtHist.reduce((s,h)=>s+hCorrect(h),0);
  const totQ  = filtHist.reduce((s,h)=>s+hTotal(h),0);
  const totW  = allQ.filter(q=>S.wrongQs.has(String(q.id))&&qInTag(q)).length;
  const totBk = allQ.filter(q=>S.bookmarks.has(String(q.id))&&qInTag(q)).length;
  const rate  = totQ>0 ? Math.round((totC/totQ)*100) : 0;
  const rateColor  = rate>=80?'#4ADE80':rate>=60?'#FBBF24':'#F87171';
  const emptyState = tot === 0;

  // Category bars
  const catMap = {};
  filtHist.forEach(h => {
    if (!h.catStats) return;
    const entries = dt ? [[dt,h.catStats[dt]]] : Object.entries(h.catStats);
    entries.forEach(([cat,st]) => {
      if (!st) return;
      if (!catMap[cat]) catMap[cat]={correct:0,total:0};
      catMap[cat].correct += st.correct;
      catMap[cat].total   += st.total;
    });
  });
  const catEntries = Object.entries(catMap).sort((a,b)=>b[1].total-a[1].total);
  const catBars = catEntries.length > 0
    ? catEntries.map(([cat,st]) => {
        const p  = Math.round((st.correct/st.total)*100);
        const bc = p>=80?'linear-gradient(90deg,#4ADE80,#22C55E)':p>=60?'linear-gradient(90deg,#FBBF24,#F59E0B)':'linear-gradient(90deg,#F87171,#EF4444)';
        const pc = p>=80?'#4ADE80':p>=60?'#FBBF24':'#F87171';
        return `<div style="margin-bottom:.95rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.38rem;">
            <span style="font-size:.84rem;color:var(--text-1);">${cat}</span>
            <span class="mono" style="font-size:.75rem;color:var(--text-2);">${st.correct}/${st.total} <span style="color:${pc}">(${p}%)</span></span>
          </div>
          <div class="pb-bg" style="height:5px;">
            <div style="height:100%;width:${p}%;background:${bc};border-radius:999px;transition:width .6s ease;"></div>
          </div>
        </div>`;
      }).join('')
    : `<p style="font-size:.83rem;color:var(--text-3);text-align:center;padding:1.5rem 0;">${dt?`「${dt}」尚無測驗紀錄`:'完成測驗後將顯示各分類答對率'}</p>`;

  // History rows
  const histRows = filtHist.length > 0
    ? [...filtHist].reverse().map(h => {
        const c = hCorrect(h), t = hTotal(h);
        const r = t>0 ? Math.round((c/t)*100) : 0;
        const rc = r>=80?'#4ADE80':r>=60?'#FBBF24':'#F87171';
        const dlBtns = `<div style="display:flex;gap:.3rem;flex-wrap:wrap;justify-content:flex-end;">

              style="font-size:.67rem;padding:.2rem .45rem;border-radius:5px;cursor:pointer;touch-action:manipulation;
                     background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#F87171;white-space:nowrap;">

              style="font-size:.67rem;padding:.2rem .45rem;border-radius:5px;cursor:pointer;touch-action:manipulation;
                     background:rgba(200,150,62,.1);border:1px solid rgba(200,150,62,.25);color:#C8963E;white-space:nowrap;">
              ⬇ 標記 ${h.bk}</button>` : ''}
          </div>`;
        return `<div class="h-row" style="grid-template-columns:3fr 1fr 1fr 1.6fr;gap:.5rem;align-items:start;padding:.85rem 1.1rem;">
          <div>
            <div style="font-size:.86rem;font-weight:500;margin-bottom:.2rem;">${h.name||('測驗 #'+h.id)}</div>
            <div style="font-size:.74rem;color:var(--text-3);">${h.date}</div>

          <div style="display:flex;flex-direction:column;gap:.3rem;align-items:flex-start;">${dlBtns}</div>

    <p style="font-size:.72rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.75rem;">進度備份 / 還原</p>
    <p style="font-size:.8rem;color:var(--text-3);margin-bottom:1rem;line-height:1.6;">將書籤、錯誤紀錄、測驗歷史完整備份成 JSON 檔，可在任何裝置匯入還原。</p>
    <div style="display:flex;flex-direction:column;gap:.5rem;">
      <button onclick="exportProgress()" class="btn btn-ghost"
        style="width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;touch-action:manipulation;padding:.65rem 1rem;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="flex-shrink:0;">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>匯出進度備份</span>
      </button>
      <label style="width:100%;">
        <input type="file" accept=".json" style="display:none;" onchange="importProgress(this)">
        <span class="btn btn-ghost" style="width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;cursor:pointer;touch-action:manipulation;padding:.65rem 1rem;box-sizing:border-box;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="flex-shrink:0;">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>匯入進度備份</span>
        </span>
      </label>
    </div>
    <div id="backup-msg" style="margin-top:.65rem;font-size:.78rem;min-height:1.2em;"></div>
  </div>
  `;
}

/* setDashTag: DOM-only pill update + targeted stats refresh */
function setDashTag(tag) {
  S.dashTag = (S.dashTag === tag) ? null : tag;
  const dt  = S.dashTag;

  // 1. Update tag pill visual states (DOM only - no flash)
  document.querySelectorAll('[id^="dash-pill-"]').forEach(btn => {
    const isAll  = btn.id === 'dash-pill-__all__';
    const btnTag = btn.dataset.tag;
    const on     = isAll ? !dt : (dt === btnTag);
    if (isAll) {
      btn.style.background = on ? 'var(--accent)' : 'rgba(255,255,255,.05)';
      btn.style.color      = on ? '#fff' : 'var(--text-2)';
      btn.style.outline    = '1px solid ' + (on ? 'var(--accent)' : 'var(--border)');
    } else {
      const tc = tagColor(btnTag);
      btn.style.background = on ? tc.color : tc.bg;
      btn.style.color      = on ? '#111' : tc.color;
      btn.style.outline    = '1px solid ' + (on ? tc.color : tc.border);
      btn.style.fontWeight = on ? '700' : '500';
      // Toggle checkmark svg
      const existing = btn.querySelector('svg');
      if (on && !existing) {
        const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
        svg.setAttribute('width','11'); svg.setAttribute('height','11');
        svg.setAttribute('viewBox','0 0 24 24'); svg.setAttribute('fill','none');
        svg.setAttribute('stroke','currentColor'); svg.setAttribute('stroke-width','2.8');
        const poly = document.createElementNS('http://www.w3.org/2000/svg','polyline');
        poly.setAttribute('points','20 6 9 17 4 12');
        svg.appendChild(poly);
        btn.insertBefore(svg, btn.firstChild);
      } else if (!on && existing) {
        existing.remove();
      }
    }
  });

  // 2. Update subtitle
  const label = document.getElementById('dash-filter-label');
  if (label) label.textContent = dt ? `· 篩選中：${dt}` : '';

  // 3. Replace stats section with smooth fade
  const statsEl = document.getElementById('dash-stats');
  if (statsEl) {
    statsEl.style.transition = 'opacity .12s';
    statsEl.style.opacity    = '0';
    setTimeout(() => {
      statsEl.innerHTML  = dashStatsHTML();
      statsEl.style.opacity = '1';
      // Re-init chart after DOM update
      setTimeout(initChart, 30);
    }, 120);
  }

  // Auto-save (debounced)
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(saveToStorage, 600);
}


function initChart() {
  const canvas = document.getElementById('scoreChart');
  if (!canvas) return;
  if (S.chart) { S.chart = null; }

  const dt = S.dashTag;
  const filtHist = dt ? S.history.filter(h=>h.catStats&&h.catStats[dt]) : S.history;
  if (!filtHist.length) return;

  const hC = h => dt ? (h.catStats?.[dt]?.correct||0) : h.correct;
  const hT = h => dt ? (h.catStats?.[dt]?.total||1)  : h.total;
  const labels = filtHist.map(h => h.name ? h.name.slice(0,8) : '#'+h.id);
  const vals   = filtHist.map(h => { const t=hT(h); return t>0?Math.round((hC(h)/t)*100):0; });

  // Canvas setup
  const dpr = window.devicePixelRatio || 1;
  const W0  = canvas.parentElement.clientWidth || 280;
  const H0  = 180;
  canvas.width  = W0 * dpr;
  canvas.height = H0 * dpr;
  canvas.style.width  = W0 + 'px';
  canvas.style.height = H0 + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = W0, H = H0;

  const PAD = { top:16, right:16, bottom:36, left:40 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top  - PAD.bottom;

  const xPos = i => PAD.left + (vals.length > 1 ? (i/(vals.length-1))*cW : cW/2);
  const yPos = v => PAD.top  + cH - (v/100)*cH;

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,.07)';
  ctx.lineWidth   = 1;
  [0,25,50,75,100].forEach(v => {
    const y = yPos(v);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W-PAD.right, y); ctx.stroke();
    ctx.fillStyle   = 'rgba(255,255,255,.35)';
    ctx.font        = `10px "Courier New", monospace`;
    ctx.textAlign   = 'right';
    ctx.fillText(v+'%', PAD.left - 6, y + 3);
  });

  // Fill area
  if (vals.length > 1) {
    ctx.beginPath();
    ctx.moveTo(xPos(0), yPos(vals[0]));
    vals.forEach((v,i) => i>0 && ctx.lineTo(xPos(i), yPos(v)));
    ctx.lineTo(xPos(vals.length-1), H-PAD.bottom);
    ctx.lineTo(xPos(0), H-PAD.bottom);
    ctx.closePath();
    ctx.fillStyle = 'rgba(123,111,224,.08)';
    ctx.fill();
  }

  // Line
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(123,111,224,.85)';
  ctx.lineWidth   = 2;
  ctx.lineJoin    = 'round';
  vals.forEach((v,i) => i===0 ? ctx.moveTo(xPos(i),yPos(v)) : ctx.lineTo(xPos(i),yPos(v)));
  ctx.stroke();

  // Dots + x labels
  vals.forEach((v,i) => {
    const x = xPos(i), y = yPos(v);
    const col = v>=80?'#4ADE80':v>=60?'#FBBF24':'#F87171';
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.fill();
    ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 1.5; ctx.stroke();
    // value label above dot
    ctx.fillStyle = col;
    ctx.font = `bold 9px "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(v+'%', x, y - 7);
    // x label
    if (labels.length <= 8 || i % Math.ceil(labels.length/6) === 0) {
      ctx.fillStyle = 'rgba(255,255,255,.4)';
      ctx.font = '9px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(labels[i], x, H - PAD.bottom + 14);
    }
  });

  S.chart = true; // mark as rendered
}


/* ── Download questions as CSV ── */
function downloadQuestionsCSV(type, tagFilter) {
  const allQ  = [...QUESTIONS, ...S.extraQs];
  const tag   = tagFilter || S.dashTag || null;
  const inTag = q => !tag || q.category === tag;
  let pool, filename;
  if (type === 'wrong') {
    pool     = allQ.filter(q => S.wrongQs.has(String(q.id)) && inTag(q));
    filename = (tag ? tag+'_' : '') + '錯誤題目.csv';
  } else {
    pool     = allQ.filter(q => S.bookmarks.has(String(q.id)) && inTag(q));
    filename = (tag ? tag+'_' : '') + '標記題目.csv';
  }
  if (!pool.length) return;

  const ANS = ['A','B','C','D','E'];
  // Match the same format as downloadTemplate()
  const header = ['id','exam','question','option_a','option_b','option_c','option_d','option_e','answer','explanation'];
  const rows = pool.map((q,i) => [
    i+1,
    q.category||'',
    q.text||'',
    q.options?.[0]||'',
    q.options?.[1]||'',
    q.options?.[2]||'',
    q.options?.[3]||'',
    q.options?.[4]||'',
    (q.isMulti ? [...q.answer].sort((a,b)=>a-b).map(i=>['A','B','C','D','E'][i]).join('') : ['A','B','C','D','E'][q.answer])||'',
    q.explanation||'',
  ]);

  const escCSV = v => {
    const s = String(v).replace(/"/g,'""');
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? '"'+s+'"' : s;
  };

  // 在 CSV 最前面加上資料集標籤名稱說明行
  const tagLabel = tag ? tag : '全部分類';
  const typeLabel = type === 'wrong' ? '錯誤題目' : '標記題目';
  const metaLines = [
    '# 資料集：' + tagLabel,
    '# 類型：'   + typeLabel,
    '# 題數：'   + pool.length + ' 題',
    '# 匯出時間：' + new Date().toLocaleString('zh-TW'),
    '#',
  ].join('\n');

  const csv = metaLines + '\n' + [header, ...rows]
    .map(r => r.map(escCSV).join(','))
    .join('\n');

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ╔══════════════════════════════════╗
   ║     PERSISTENT STORAGE (localStorage)      ║
   ╚══════════════════════════════════╝ */
const STORAGE_KEY_BASE = 'neurolearn_v2';
// Per-user storage key: each account gets isolated localStorage
function getStorageKey() {
  return _currentUser ? STORAGE_KEY_BASE + '_' + _currentUser.id : STORAGE_KEY_BASE;
}

function saveToStorage() {
  try {
    const payload = {
      v:         2,
      files:     S.files.map(({ _file, ...f }) => f),  // strip un-serialisable File objects
      extraQs:   S.extraQs,
      bookmarks: [...S.bookmarks],
      wrongQs:   [...S.wrongQs],
      usedQIds:  [...S.usedQIds],
      history:   S.history,
      dashTag:   S.dashTag,
      tagFilter: S.tagFilter,
    };
    localStorage.setItem(getStorageKey(), JSON.stringify(payload));
    scheduleSyncToCloud(); // debounced cloud sync
  } catch(e) {
    console.warn('[NeuroLearn] save failed:', e);
  }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(getStorageKey());
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d || d.v !== 2) return false;

    if (Array.isArray(d.files)) {
      S.files    = d.files;
      // restore nextFid so new uploads get unique IDs
      S.nextFid  = d.files.length > 0 ? Math.max(...d.files.map(f => f.id + 1)) : 4;
    }
    if (Array.isArray(d.extraQs)) {
      // Drop any extraQs whose _fileId no longer has a matching file (orphans from race condition)
      const validFids = new Set((d.files || []).map(f => f.id));
      S.extraQs = d.extraQs.filter(q => !q._fileId || validFids.has(q._fileId));
    }
    if (Array.isArray(d.bookmarks)) S.bookmarks  = new Set(d.bookmarks.map(String));
    if (Array.isArray(d.wrongQs))   S.wrongQs    = new Set(d.wrongQs.map(String));
    if (Array.isArray(d.usedQIds))  S.usedQIds   = new Set(d.usedQIds.map(String));
    if (Array.isArray(d.history))   S.history    = d.history;
    if (d.dashTag   !== undefined)  S.dashTag    = d.dashTag;
    if (d.tagFilter !== undefined)  S.tagFilter  = d.tagFilter;
    return true;
  } catch(e) {
    console.warn('[NeuroLearn] load failed:', e);
    return false;
  }
}

function clearAllData() {
  if (!confirm('確定要清除所有本機資料？\n（題庫、測驗紀錄、書籤、錯誤紀錄都將刪除）')) return;
  // Cancel any pending auto-save FIRST — prevents stale data from being
  // written back to localStorage after we remove it (race condition fix)
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = null;
  localStorage.removeItem(getStorageKey());
  // Reset in-memory state so nothing lingers if reload is slow
  S.files = []; S.extraQs = []; S.history = [];
  S.bookmarks = new Set(); S.wrongQs = new Set(); S.usedQIds = new Set();
  location.reload();
}

/* Auto-save: debounced 600ms after every render() */
let _autoSaveTimer = null;

/* ╔══════════════════════════════════╗
   ║             BOOT                 ║
   ╚══════════════════════════════════╝ */
// Restore persisted state from localStorage
loadFromStorage();
render();
// Wait for deferred Supabase SDK to load before initializing
if (typeof supabase !== 'undefined') {
  initSupabase();
} else {
  window.addEventListener('load', function() {
    initSupabase();
  });
}

</script>
