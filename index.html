function retakeQuiz() {
  if (!S.quizConfig) return;
  S.quizSetup = {
    cats:    S.quizConfig.cats || new Set(),
    mode:    S.quizConfig.mode,
    submode: null,
    count:   S.quizConfig.count,
    name:    S.quizConfig.name,
  };
  launchQuiz();
}

function unconfirmAns() {
  const ans = S.answers[S.currentQ];
  if (!ans) return;
  ans.confirmed = false;
  render();
}

function prevQuestion() {
  if (S.currentQ <= 0) return;
  S.currentQ--;
  // Unconfirm the question we navigated TO — keep existing selections
  const destAns = S.answers[S.currentQ];
  if (destAns) destAns.confirmed = false;
  // Multi-select: keep ans.selected array intact so user sees their previous picks
  render();
}

function _syncQuestionTags(fid, tags) {
  S.extraQs.forEach(q => {
    if (q._fileId !== fid) return;
    q._fileTags = [...tags];
    if (tags.length > 0) q.category = tags[0];
  });
}


function selectOpt(i) {
  const ans = S.answers[S.currentQ];
  const q   = S.activeQs[S.currentQ];
  if (ans.confirmed) return;
  if (q.isMulti) {
    const sel = ans.selected;
    const pos = sel.indexOf(i);
    if (pos >= 0) sel.splice(pos, 1); else sel.push(i);
    // Update .opt selected class AND the checkbox badge text for each option
    document.querySelectorAll('.opt').forEach((el, idx) => {
      const isSelected = sel.includes(idx);
      el.classList.toggle('sel', isSelected);
      // Update the checkbox badge SVG/span inside the button
      const badge = el.querySelector('span[data-cb]');
      if (badge) {
        badge.textContent = isSelected ? '✓' : '';
        badge.style.borderColor = isSelected ? 'var(--accent)' : 'rgba(255,255,255,.25)';
        badge.style.background  = isSelected ? 'rgba(123,111,224,.2)' : 'transparent';
      }
    });
    const confirmBtn = document.getElementById('confirm-btn');
    if (confirmBtn) { if (sel.length > 0) confirmBtn.removeAttribute('disabled'); else confirmBtn.setAttribute('disabled',''); }
  } else {
    if (ans.selected === i) return;
    ans.selected = i;
    document.querySelectorAll('.opt').forEach((el, idx) => { el.classList.toggle('sel', idx === i); });
    const confirmBtn = document.getElementById('confirm-btn');
    if (confirmBtn) confirmBtn.removeAttribute('disabled');
  }
}

function confirmAns() {
  const ans = S.answers[S.currentQ];
  const q = S.activeQs[S.currentQ];
  if (q.isMulti ? ans.selected.length === 0 : ans.selected === null) return;
  ans.confirmed = true;
  // DOM-only update for option states — no full render flash
  const cSet = correctSet(q);
  const sSet = q.isMulti ? new Set(ans.selected) : new Set([ans.selected]);
  document.querySelectorAll('.opt').forEach((el, idx) => {
    el.classList.add('locked'); el.onclick = null;
    if (cSet.has(idx)) el.classList.add('correct');
    else if (sSet.has(idx) && !cSet.has(idx)) el.classList.add('wrong');
    else el.style.opacity = '0.35';
  });
  // Show explanation
  const explPanel = document.getElementById('expl-panel');
  if (explPanel) explPanel.style.display = 'block';
  // Swap action button
  const actionDiv = document.getElementById('action-btn');
  if (actionDiv) {
    const isLast = S.currentQ === S.activeQs.length - 1;
    actionDiv.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">${isLast ? '完成測驗 →' : '下一題 →'}</button>`;
  }
}

function toggleBk(id) {
  id = String(id); // normalize: ensure String comparison
  const isOn = !S.bookmarks.has(id);
  isOn ? S.bookmarks.add(id) : S.bookmarks.delete(id);

  // Persist to localStorage + trigger cloud sync (debounced 600ms)
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(saveToStorage, 600);

  // DOM-only update — no render, no flash
  const btn = document.getElementById('bk-btn');
  if (!btn) return;
  btn.classList.toggle('on', isOn);
  btn.title = isOn ? '取消標記' : '標記此題';
  const svg = btn.querySelector('svg');
  if (svg) svg.setAttribute('fill', isOn ? 'currentColor' : 'none');
}

function nextQuestion() {
  // Auto-confirm current answer before moving
  const ans = S.answers[S.currentQ];
  const q0  = S.activeQs[S.currentQ];
  const hasSelection = q0 && q0.isMulti
    ? Array.isArray(ans.selected) && ans.selected.length > 0
    : ans && ans.selected !== null;
  if (hasSelection && !ans.confirmed) { ans.confirmed = true; }

  if (S.currentQ === S.activeQs.length - 1) {
    finishQuiz();
  } else {
    S.currentQ++;
    render();
  }
}

function finishQuiz() {
  const score = S.activeQs.filter((q,i) => isCorrectAnswer(q, S.answers[i].selected)).length;
  // Track wrong answers
  // Update wrongQs based on this quiz result (works for all modes)
  // Correct answers → remove from wrongQs (learned!)
  // Incorrect answers → add to wrongQs (still needs practice)
  S.activeQs.forEach((q,i) => {
    const isCorrect = isCorrectAnswer(q, S.answers[i].selected);
    if (!isCorrect) S.wrongQs.add(String(q.id));
    else S.wrongQs.delete(String(q.id));
  });
  // Per-category breakdown
  const catMap = {};
  S.activeQs.forEach((q,i) => {
    const c = q.category || '其他';
    if (!catMap[c]) catMap[c] = {correct:0,total:0};
    catMap[c].total++;
    if (isCorrectAnswer(q, S.answers[i].selected)) catMap[c].correct++;
  });
  const quizName = (S.quizSetup && S.quizSetup.name && S.quizSetup.name.trim())
    || `第 ${S.history.length+1} 回合`;
  // Collect wrong + bookmarked IDs from this quiz only
  const _wrongIds = S.activeQs
    .filter((q,i) => !isCorrectAnswer(q, S.answers[i].selected))
    .map(q => String(q.id));
  const _bkIds = S.activeQs
    .filter(q => S.bookmarks.has(String(q.id)))
    .map(q => String(q.id));

  // All modes push a history entry — retakes get a label prefix
  const isRetakeMode = S.quizConfig && (S.quizConfig.mode === 'review' || S.quizConfig.mode === 'wrong');
  const modePrefix = isRetakeMode
    ? (S.quizConfig.mode === 'review' ? '標記：' : '錯誤：')
    : '';
  S.history.push({
    id:       S.history.length + 1,
    name:     modePrefix + quizName,
    date:     new Date().toLocaleDateString('zh-TW'),
    total:    S.activeQs.length,
    correct:  score,
    bk:       _bkIds.length,
    wrong:    _wrongIds.length,
    catStats: catMap,
    dur:      '—',
    wrongIds: _wrongIds,
    bkIds:    _bkIds,
  });

  // Mark questions as used (only for 'new' mode)
  if (S.quizConfig && S.quizConfig.mode === 'new') {
    S.activeQs.forEach(q => S.usedQIds.add(String(q.id)));
  }

  // Block cloud sync from overwriting the result we're about to show
  _blockCloudRender = true;
  setTimeout(() => { _blockCloudRender = false; }, 5000); // release after 5s

  // Persist + sync to cloud
  saveToStorage();
  const _newSession = S.history[S.history.length - 1];
  syncQuizSession(_newSession).catch(e => console.warn('[Supa] session sync:', e));
  S.quizMode = 'result';
  render();
}

  const q = S.activeQs[idx];
  if (mode === 'review') {
    S.bookmarks.delete(String(q.id));
    S.activeQs.splice(idx, 1);
    saveToStorage();
    render();
  } else if (mode === 'wrong') {
    S.wrongQs.delete(String(q.id));
    S.activeQs.splice(idx, 1);
    saveToStorage();
    render();
  }
}




async function forceSyncToCloud() {
  function setMsg(text, color) {
    var el = document.getElementById('backup-msg');
    if (el) { el.textContent = text; el.style.color = color; }
  }

  if (!_supa || !_currentUser || !_accessToken) {
    setMsg('⚠️ 請先登入帳號才能同步雲端。', '#F87171');
    return;
  }

  setMsg('同步中…', 'var(--text-3)');

  try {
    await syncAllToCloud();
    _lastSyncTime = new Date();
    var dateStr = _lastSyncTime.toLocaleDateString('zh-TW');
    var timeStr = _lastSyncTime.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
    setMsg('✅ 同步雲端成功　' + dateStr + ' ' + timeStr, '#4ADE80');
    // Update the sync banner in-place without full re-render
    var banner = document.getElementById('sync-banner');
    if (banner) {
      banner.style.background  = 'rgba(74,222,128,.05)';
      banner.style.borderColor = 'rgba(74,222,128,.2)';
      banner.innerHTML =
        '<div style="display:flex;align-items:center;gap:.45rem;color:#4ADE80;">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>' +
          '<span>已同步雲端</span>' +
        '</div>' +
        '<span style="color:var(--text-3);">' + dateStr + ' ' + timeStr + '</span>';
    }
  } catch(e) {
    var reason = e.message || String(e);
    console.error('[Supa] forceSyncToCloud error:', reason);
    setMsg('❌ ' + reason, '#F87171');
  }
}

/* setDashTag: DOM-only pill update + targeted stats refresh */
function setDashTag(tag) {
  S.dashTag = (S.dashTag === tag) ? null : tag;
  const dt  = S.dashTag;

  // 1. Update tag pill visual states (DOM only - no flash)
  document.querySelectorAll('[id^="dash-pill-"]').forEach(btn => {
    const isAll  = btn.id === 'dash-pill-__all__';
    const btnTag = btn.dataset.tag;
    const on     = isAll ? !dt : (dt === btnTag);
    if (isAll) {
      btn.style.background = on ? 'var(--accent)' : 'rgba(255,255,255,.05)';
      btn.style.color      = on ? '#fff' : 'var(--text-2)';
      btn.style.outline    = '1px solid ' + (on ? 'var(--accent)' : 'var(--border)');
    } else {
      const tc = tagColor(btnTag);
      btn.style.background = on ? tc.color : tc.bg;
      btn.style.color      = on ? '#111' : tc.color;
      btn.style.outline    = '1px solid ' + (on ? tc.color : tc.border);
      btn.style.fontWeight = on ? '700' : '500';
      // Toggle checkmark svg
      const existing = btn.querySelector('svg');
      if (on && !existing) {
        const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
        svg.setAttribute('width','11'); svg.setAttribute('height','11');
        svg.setAttribute('viewBox','0 0 24 24'); svg.setAttribute('fill','none');
        svg.setAttribute('stroke','currentColor'); svg.setAttribute('stroke-width','2.8');
        const poly = document.createElementNS('http://www.w3.org/2000/svg','polyline');
        poly.setAttribute('points','20 6 9 17 4 12');
        svg.appendChild(poly);
        btn.insertBefore(svg, btn.firstChild);
      } else if (!on && existing) {
        existing.remove();
      }
    }
  });

  // 2. Update subtitle
  const label = document.getElementById('dash-filter-label');
  if (label) label.textContent = dt ? `· 篩選中：${dt}` : '';

  // 3. Replace stats section with smooth fade
  const statsEl = document.getElementById('dash-stats');
  if (statsEl) {
    statsEl.style.transition = 'opacity .12s';
    statsEl.style.opacity    = '0';
    setTimeout(() => {
      statsEl.innerHTML  = dashStatsHTML();
      statsEl.style.opacity = '1';
      // Re-init chart after DOM update
      setTimeout(initChart, 30);
    }, 120);
  }

  // Auto-save (debounced)
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(saveToStorage, 600);
}


function initChart() {
  const canvas = document.getElementById('scoreChart');
  if (!canvas) return;

  const dt = S.dashTag;
  const filtHist = dt ? S.history.filter(h => h.catStats && h.catStats[dt]) : S.history;
  if (!filtHist.length) return;

  const hC = h => dt ? (h.catStats?.[dt]?.correct || 0) : h.correct;
  const hT = h => dt ? (h.catStats?.[dt]?.total   || 1) : h.total;
  const data   = filtHist.map(h => { const t = hT(h); return t > 0 ? Math.round((hC(h)/t)*100) : 0; });
  // Label: strip mode prefix (📖/🎯), use round number
  const labels = filtHist.map((h, i) => {
    const raw = h.name || ('#' + h.id);
    // Extract just the round number e.g. "第 3 回合" → "#3"
    const m = raw.match(/第\s*(\d+)\s*回/);
    return m ? '#' + m[1] : String(i + 1);
  });

  const dpr = window.devicePixelRatio || 1;
  const container = canvas.parentElement;
  const W = Math.max(200, container.clientWidth || container.offsetWidth || 320);
  const H = Math.min(180, Math.round(W * 0.40));
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width    = '100%';
  canvas.style.height   = H + 'px';
  canvas.style.maxWidth = '100%';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const PAD = { top: 20, right: 14, bottom: 32, left: 36 };
  const cW  = W - PAD.left - PAD.right;
  const cH  = H - PAD.top  - PAD.bottom;
  const n   = data.length;

  // Grid lines + Y labels
  ctx.strokeStyle = 'rgba(255,255,255,.07)';
  ctx.fillStyle   = 'rgba(255,255,255,.28)';
  ctx.font        = `${Math.max(8, Math.round(10 * Math.min(1, W/300)))}px monospace`;
  ctx.textAlign   = 'right';
  [0, 25, 50, 75, 100].forEach(pct => {
    const y = PAD.top + cH * (1 - pct / 100);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + cW, y); ctx.stroke();
    ctx.fillText(pct + '%', PAD.left - 5, y + 3.5);
  });

  if (n < 2) {
    const x = PAD.left + cW / 2;
    const y = PAD.top + cH * (1 - data[0] / 100);
    const col = data[0] >= 80 ? '#4ADE80' : data[0] >= 60 ? '#FBBF24' : '#F87171';
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = col; ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.6)'; ctx.textAlign = 'center';
    ctx.fillText(data[0] + '%', x, y - 10);
    return;
  }

  const xs = data.map((_, i) => PAD.left + i * cW / (n - 1));
  const ys = data.map(v => PAD.top + cH * (1 - v / 100));

  // Fill area
  const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + cH);
  grad.addColorStop(0, 'rgba(123,111,224,.22)');
  grad.addColorStop(1, 'rgba(123,111,224,.01)');
  ctx.beginPath();
  ctx.moveTo(xs[0], ys[0]);
  for (let i = 1; i < n; i++) {
    const cpx = (xs[i - 1] + xs[i]) / 2;
    ctx.bezierCurveTo(cpx, ys[i - 1], cpx, ys[i], xs[i], ys[i]);
  }
  ctx.lineTo(xs[n - 1], PAD.top + cH);
  ctx.lineTo(xs[0], PAD.top + cH);
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(xs[0], ys[0]);
  for (let i = 1; i < n; i++) {
    const cpx = (xs[i - 1] + xs[i]) / 2;
    ctx.bezierCurveTo(cpx, ys[i - 1], cpx, ys[i], xs[i], ys[i]);
  }
  ctx.strokeStyle = 'rgba(123,111,224,.85)'; ctx.lineWidth = 1.5 * dpr / dpr;
  ctx.stroke();

  // Points + labels
  const fontSize = Math.max(8, Math.round(9 * Math.min(1, W / 280)));
  data.forEach((v, i) => {
    const col = v >= 80 ? '#4ADE80' : v >= 60 ? '#FBBF24' : '#F87171';
    // Dot
    ctx.beginPath(); ctx.arc(xs[i], ys[i], 3.5, 0, Math.PI * 2);
    ctx.fillStyle = col; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.35)'; ctx.lineWidth = 0.8; ctx.stroke();

    // Value label above dot — only show on sparse charts or edges
    if (n <= 8 || i === 0 || i === n - 1) {
      ctx.fillStyle = 'rgba(255,255,255,.75)';
      ctx.font = fontSize + 'px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(v + '%', xs[i], ys[i] - 7);
    }

    // X label (round number) — stagger if crowded to avoid overlap
    const lbl = labels[i];
    const spacing = n > 1 ? cW / (n - 1) : cW;
    if (spacing >= 20 || i === 0 || i === n - 1 || i % Math.ceil(n / 8) === 0) {
      ctx.fillStyle = 'rgba(255,255,255,.38)';
      ctx.font = fontSize + 'px sans-serif';
      ctx.textAlign = 'center';
      // Clamp label x so first/last don't clip edges
      const lx = Math.min(Math.max(xs[i], PAD.left + 8), PAD.left + cW - 8);
      ctx.fillText(lbl, lx, H - PAD.bottom + 14);
    }
  });
}

// STORAGE_KEY replaced by getStorageKey()

function saveToStorage() {
  try {
    const payload = {
      v:         2,
      files:     S.files.map(({ _file, ...f }) => f),  // strip un-serialisable File objects
      extraQs:   S.extraQs,
      bookmarks: [...S.bookmarks],
      wrongQs:   [...S.wrongQs],
      usedQIds:  [...S.usedQIds],
      history:   S.history,
      dashTag:   S.dashTag,
      tagFilter: S.tagFilter,
      materials: S.materials,
      annotations: S.annotations,
      currentMat: S.currentMat,
      readProgress: S.readProgress,
    };
    localStorage.setItem(getStorageKey(), JSON.stringify(payload));
    scheduleSyncToCloud();
  } catch(e) {
    console.warn('[NeuroLearn] save failed:', e);
  }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(getStorageKey());
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d || d.v !== 2) return false;

    if (Array.isArray(d.files)) {
      S.files    = d.files;
      // restore nextFid so new uploads get unique IDs
      S.nextFid  = d.files.length > 0 ? Math.max(...d.files.map(f => f.id + 1)) : 4;
    }
    if (Array.isArray(d.extraQs))   S.extraQs   = d.extraQs;
    if (Array.isArray(d.bookmarks)) S.bookmarks  = new Set(d.bookmarks.map(String));
    if (Array.isArray(d.wrongQs))   S.wrongQs    = new Set(d.wrongQs.map(String));
    if (Array.isArray(d.usedQIds))  S.usedQIds   = new Set(d.usedQIds.map(String));
    if (Array.isArray(d.history))   S.history    = d.history;
    if (d.dashTag   !== undefined)  S.dashTag    = d.dashTag;
    if (d.tagFilter !== undefined)  S.tagFilter  = d.tagFilter;
    if (Array.isArray(d.materials))   S.materials   = d.materials;
    if (Array.isArray(d.annotations)) S.annotations = d.annotations;
    if (d.currentMat !== undefined)   S.currentMat  = d.currentMat;
    if (d.readProgress)              S.readProgress = d.readProgress;
    return true;
  } catch(e) {
    console.warn('[NeuroLearn] load failed:', e);
    return false;
  }
}

  if (!confirm('確定要清除所有本機資料？\n（題庫、測驗紀錄、書籤、錯誤紀錄都將刪除）')) return;

}

function parseMD(raw){const lines=raw.split('\n'),sections=[];let buf=[],curH='',curL=0,si=0;const toc=[];function flush(){if(!buf.length)return;const md=buf.join('\n').trim();if(!md){buf=[];return;}sections.push({id:'s'+si,heading:curH,level:curL,md,html:marked.parse(md)});si++;buf=[];}for(const line of lines){const hm=line.match(/^(#{1,3})\s+(.+)/);if(hm){flush();curH=hm[2].replace(/\*\*/g,'');curL=hm[1].length;toc.push({heading:curH,level:curL,secId:'s'+si});buf.push(line);}else{buf.push(line);}}flush();return{sections,toc};}

function handleMDFiles(files){[...files].forEach(f=>{if(!f.name.endsWith('.md'))return;const reader=new FileReader();reader.onload=e=>{const raw=e.target.result;const{sections,toc}=parseMD(raw);const existing=S.materials.find(m=>m.title===f.name.replace('.md',''));if(existing){existing.sections=sections;existing.toc=toc;existing.raw=raw;}else{S.materials.push({id:'m'+Date.now()+Math.random().toString(36).slice(2,5),title:f.name.replace('.md',''),sections,toc,raw,uploadedAt:new Date().toISOString(),matTags:[]});}saveToStorage();render();};reader.readAsText(f);});}

}

function readerHTML(){const mat=S.materials.find(m=>m.id===S.currentMat);if(!mat)return`<div class="page" style="max-width:680px;margin:0 auto;padding:3rem 1.5rem;text-align:center;"><div style="margin-bottom:.8rem;"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg></div><h3 style="font-family:'Sora',sans-serif;font-size:1rem;margin-bottom:.4rem;">請先選擇教材</h3><p style="color:var(--text-3);font-size:.85rem;">到教材庫上傳或選擇一份教材</p><button class="btn btn-primary" style="margin-top:1rem;" onclick="navigate('library')">前往教材庫</button></div>`;const lastSec=S.readProgress?.[mat.id];const resumeBar=lastSec?`<div class="g-card" id="resume-bar" style="padding:.7rem 1rem;margin-bottom:.8rem;display:flex;align-items:center;gap:.6rem;background:var(--accent-dim);border-color:var(--accent-border);cursor:default;" onmouseenter="this.style.transform='none'"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span style="font-size:.78rem;color:var(--accent);flex:1;">上次讀到：<b>${mat.sections.find(s=>s.id===lastSec)?.heading||lastSec}</b></span><button class="btn btn-primary" style="font-size:.68rem;padding:.25rem .6rem;min-height:0;" onclick="document.getElementById('${lastSec}')?.scrollIntoView({behavior:'smooth',block:'start'});document.getElementById('resume-bar')?.remove();">繼續閱讀</button><button class="btn btn-ghost" style="font-size:.68rem;padding:.25rem .5rem;min-height:0;" onclick="document.getElementById('resume-bar')?.remove();">從頭開始</button></div>`:'';const tocH=mat.toc.map(t=>`<a class="toc-item toc-h${t.level}" onclick="document.getElementById('${t.secId}')?.scrollIntoView({behavior:'smooth',block:'start'})">${t.heading}</a>`).join('');const secsH=mat.sections.map(sec=>{const ann=S.annotations.find(a=>a.matId===mat.id&&a.secId===sec.id);const tcls=ann?' tagged tagged-'+STAGS.find(t=>t.id===ann.tag)?.cls.replace('stag-',''):'';const ti=ann?STAGS.find(t=>t.id===ann.tag):null;return`<div class="md-sec${tcls}" id="${sec.id}" data-sec="${sec.id}"><div class="stag-bar">${ann?`<span class="stag ${ti.cls}" style="font-size:.62rem">${ti.label}</span><button class="btn btn-ghost" onclick="removeSTag('${mat.id}','${sec.id}')" style="font-size:.6rem;padding:1px 5px;min-height:0;color:var(--red);">✕</button>`:`<button class="btn btn-ghost" onclick="openSTagModal('${mat.id}','${sec.id}')" style="font-size:.62rem;padding:2px 7px;min-height:0;background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent);"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 21-7-4-7 4V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg> 標記</button>`}</div>${sec.html}</div>`;}).join('');setTimeout(()=>{const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){if(!S.readProgress)S.readProgress={};S.readProgress[mat.id]=e.target.dataset.sec;clearTimeout(window._rpSave);window._rpSave=setTimeout(saveToStorage,2000);}});},{rootMargin:'-40% 0px -55% 0px'});document.querySelectorAll('.md-sec[data-sec]').forEach(el=>obs.observe(el));},500);return`<div class="page"><div class="study-reader"><div class="study-sidebar" id="studySidebar"><div style="font-size:.68rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;padding:0 4px;">${mat.title}</div>${tocH}<div style="margin-top:.8rem;padding-top:.6rem;border-top:1px solid var(--border);"><button class="btn btn-ghost" style="width:100%;font-size:.7rem;min-height:0;padding:.4rem;" onclick="navigate('library')">← 返回教材庫</button></div></div><div class="study-content">${resumeBar}${secsH}</div></div></div>`;}

let _stagMatId='',_stagSecId='',_stagSel='';
function openSTagModal(matId,secId){_stagMatId=matId;_stagSecId=secId;_stagSel='';const existing=S.annotations.find(a=>a.matId===matId&&a.secId===secId);document.getElementById('stagModalMemo').value=existing?.memo||'';document.getElementById('stagModalTags').innerHTML=STAGS.map(t=>`<div class="stag ${t.cls}${existing?.tag===t.id?' active':''}" onclick="selectSTag(this,'${t.id}')">${t.label}</div>`).join('');if(existing)_stagSel=existing.tag;document.getElementById('stagModal').classList.add('show');}
function closeStagModal(){document.getElementById('stagModal').classList.remove('show');}
function selectSTag(el,id){document.querySelectorAll('#stagModalTags .stag').forEach(t=>t.classList.remove('active'));el.classList.add('active');_stagSel=id;}
function saveSTag(){if(!_stagSel){alert('請選擇一個標籤');return;}const memo=document.getElementById('stagModalMemo').value.trim();const mat=S.materials.find(m=>m.id===_stagMatId);const sec=mat?.sections.find(s=>s.id===_stagSecId);const ann={id:'a'+Date.now(),matId:_stagMatId,secId:_stagSecId,tag:_stagSel,memo,matTitle:mat?.title||'',sectionHeading:sec?.heading||'',html:sec?.html||'',createdAt:new Date().toISOString()};const idx=S.annotations.findIndex(a=>a.matId===_stagMatId&&a.secId===_stagSecId);if(idx>=0)S.annotations[idx]={...S.annotations[idx],...ann,id:S.annotations[idx].id};else S.annotations.push(ann);saveToStorage();closeStagModal();_stagSel='';render();}
function removeSTag(matId,secId){S.annotations=S.annotations.filter(a=>!(a.matId===matId&&a.secId===secId));saveToStorage();render();}

let _noteFilter='all',_noteTopicFilter='all';
function notesHTML(){const totalN=S.annotations.length;const filterTags=STAGS.map(t=>{const c=S.annotations.filter(a=>a.tag===t.id).length;return c?`<div class="stag ${t.cls}${_noteFilter===t.id?' active':''}" onclick="_noteFilter='${t.id}';render()">${t.label} (${c})</div>`:'';}).join('');const allTopics=[...new Set(S.materials.flatMap(m=>m.matTags||[]))];const topicChips=allTopics.length?allTopics.map(t=>{const tc=tagColor(t);const active=_noteTopicFilter===t;const matsIn=S.materials.filter(m=>(m.matTags||[]).includes(t)).map(m=>m.id);const cnt=S.annotations.filter(a=>matsIn.includes(a.matId)).length;return cnt?`<div style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:7px;font-size:.66rem;font-weight:600;cursor:pointer;border:1px solid ${active?tc.color:tc.border};background:${active?tc.color:tc.bg};color:${active?'#111':tc.color};" onclick="_noteTopicFilter=${active?"'all'":"'"+t+"'"};render()">${t} (${cnt})</div>`:'';}).join(''):'';const topicMatIds=_noteTopicFilter!=='all'?new Set(S.materials.filter(m=>(m.matTags||[]).includes(_noteTopicFilter)).map(m=>m.id)):null;let notes=S.annotations.filter(a=>{if(_noteFilter!=='all'&&a.tag!==_noteFilter)return false;if(topicMatIds&&!topicMatIds.has(a.matId))return false;return true;});let groupedHTML='';if(!notes.length){groupedHTML='<div style="text-align:center;padding:2rem;color:var(--text-3);font-size:.85rem;">尚無筆記</div>';}else{const grouped={};notes.forEach(n=>{if(!grouped[n.tag])grouped[n.tag]=[];grouped[n.tag].push(n);});for(const tagId of Object.keys(grouped)){const ti=STAGS.find(t=>t.id===tagId);if(!ti)continue;groupedHTML+=`<div style="display:flex;align-items:center;gap:.5rem;margin:1rem 0 .4rem;"><span class="stag ${ti.cls}">${ti.label}</span><span style="font-size:.72rem;color:var(--text-3);">${grouped[tagId].length} 則</span></div>`;grouped[tagId].forEach(n=>{groupedHTML+=`<div class="note-card"><div style="display:flex;align-items:center;gap:.5rem;padding:.7rem .9rem;cursor:pointer;" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'"><span style="font-size:.84rem;font-weight:600;flex:1;">${n.sectionHeading||'(無標題)'}</span><span style="font-size:.66rem;color:var(--text-3);">${n.matTitle}</span></div><div style="display:none;padding:0 .9rem .7rem;font-size:.82rem;color:var(--text-2);line-height:1.6;">${n.html||''}${n.memo?`<div style="margin-top:.5rem;padding:.4rem .6rem;background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:8px;font-size:.76rem;color:var(--gold);"><b>備註：</b>${n.memo}</div>`:''}<div style="display:flex;gap:.3rem;margin-top:.5rem;"><button class="btn btn-ghost" style="font-size:.68rem;padding:.25rem .5rem;min-height:0;" onclick="S.currentMat='${n.matId}';navigate('reader');setTimeout(()=>document.getElementById('${n.secId}')?.scrollIntoView({behavior:'smooth'}),300)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> 原文</button><button class="btn btn-ghost" style="font-size:.68rem;padding:.25rem .5rem;min-height:0;" onclick="openSTagModal('${n.matId}','${n.secId}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg> 編輯</button><button class="btn btn-ghost" style="font-size:.68rem;padding:.25rem .5rem;min-height:0;color:var(--red);" onclick="removeSTag('${n.matId}','${n.secId}');render()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div></div></div>`;});}}return`<div class="page" style="max-width:680px;margin:0 auto;padding:clamp(1.5rem,5vw,2.5rem) clamp(1rem,4vw,1.5rem);"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;"><h2 style="font-size:1.15rem;font-weight:800;">筆記中心</h2><span class="badge badge-v">${totalN} 則</span></div>${allTopics.length?`<div style="display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.6rem;align-items:center;padding:.5rem .7rem;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;"><span style="font-size:.66rem;color:var(--text-3);font-weight:700;margin-right:.2rem;">主題分類：</span><div style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:7px;font-size:.66rem;font-weight:600;cursor:pointer;border:1px solid ${_noteTopicFilter==='all'?'var(--accent-border)':'var(--border)'};background:${_noteTopicFilter==='all'?'var(--accent-dim)':'transparent'};color:${_noteTopicFilter==='all'?'var(--accent)':'var(--text-3)'};" onclick="_noteTopicFilter='all';render()">全部</div>${topicChips}</div>`:''}<div style="display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.8rem;"><div class="stag stag-purple${_noteFilter==='all'?' active':''}" onclick="_noteFilter='all';render()">全部 (${totalN})</div>${filterTags}</div>${groupedHTML}</div>`;}

function backupHTML(){return`<div class="page" style="max-width:580px;margin:0 auto;padding:clamp(2rem,5vw,3rem) clamp(1rem,4vw,1.5rem);"><div class="badge badge-v" style="margin-bottom:.7rem;font-size:.6rem;">雲端同步</div><h2 style="font-size:1.55rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.4rem;font-family:'Sora',sans-serif;">雲端資料管理</h2><p style="font-size:.84rem;color:var(--text-3);margin-bottom:1.8rem;line-height:1.65;">所有學習資料（書籤、錯誤紀錄、測驗歷史、教材、筆記）均自動儲存於 Supabase 雲端，跨裝置即時同步。</p><div class="g-card" style="padding:1.5rem;cursor:default;" onmouseenter="this.style.transform='none'"><div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0118.8-4.3M22 12.5a10 10 0 01-18.8 4.3"/></svg><span style="font-size:.82rem;font-weight:700;color:var(--accent);">Supabase 雲端同步</span></div><p style="font-size:.82rem;color:var(--text-2);margin-bottom:1.2rem;line-height:1.6;">資料每次操作後自動同步。若需要強制立即同步，請點擊下方按鈕。</p><div style="display:flex;flex-direction:column;gap:.6rem;"><button onclick="forceSyncToCloud()" class="btn btn-ghost" style="width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem 1rem;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0118.8-4.3M22 12.5a10 10 0 01-18.8 4.3"/></svg><span>立即同步到雲端</span></button><button onclick="clearAllData()" class="btn btn-ghost" style="width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem 1rem;color:var(--red);border-color:rgba(248,113,113,.25);"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg><span>清除所有本機資料</span></button></div><div id="backup-msg" style="margin-top:.75rem;font-size:.8rem;min-height:1.2em;"></div></div></div>`;}

function studyStatsHTML(){const allTopics=[...new Set(S.materials.flatMap(m=>m.matTags||[]))];const totalMats=S.materials.length;const totalAnns=S.annotations.length;const tagStats=STAGS.map(t=>({...t,count:S.annotations.filter(a=>a.tag===t.id).length}));const topicStats=allTopics.map(topic=>{const mats=S.materials.filter(m=>(m.matTags||[]).includes(topic));const matIds=new Set(mats.map(m=>m.id));const anns=S.annotations.filter(a=>matIds.has(a.matId));return{topic,matCount:mats.length,annCount:anns.length,tags:STAGS.map(t=>({...t,count:anns.filter(a=>a.tag===t.id).length}))};});const untaggedMats=S.materials.filter(m=>!(m.matTags||[]).length);return`<div class="page" style="max-width:680px;margin:0 auto;padding:clamp(1.5rem,5vw,2.5rem) clamp(1rem,4vw,1.5rem);"><h2 style="font-size:1.15rem;font-weight:800;margin-bottom:1rem;font-family:'Sora',sans-serif;">教材統計總覽</h2><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.5rem;margin-bottom:1.5rem;"><div class="s-card"><div style="font-size:.65rem;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;">教材總數</div><div style="font-size:1.6rem;font-weight:800;color:var(--accent);margin-top:.2rem;">${totalMats}</div></div><div class="s-card"><div style="font-size:.65rem;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;">筆記總數</div><div style="font-size:1.6rem;font-weight:800;color:var(--gold);margin-top:.2rem;">${totalAnns}</div></div><div class="s-card"><div style="font-size:.65rem;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;">分類數</div><div style="font-size:1.6rem;font-weight:800;color:var(--green);margin-top:.2rem;">${allTopics.length}</div></div></div>${tagStats.some(t=>t.count>0)?`<div class="g-card" style="padding:1rem;margin-bottom:1rem;cursor:default;" onmouseenter="this.style.transform='none'"><div style="font-size:.7rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem;">筆記標籤分佈</div><div style="display:flex;flex-wrap:wrap;gap:.4rem;">${tagStats.map(t=>t.count?`<span class="stag ${t.cls}">${t.label} ${t.count}</span>`:'').join('')}</div></div>`:''} ${topicStats.map(ts=>`<div class="g-card" style="padding:1rem;margin-bottom:.6rem;cursor:default;" onmouseenter="this.style.transform='none'"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;"><span style="font-size:.88rem;font-weight:700;">${ts.topic}</span><span style="font-size:.7rem;color:var(--text-3);">${ts.matCount} 教材 · ${ts.annCount} 筆記</span></div>${ts.tags.some(t=>t.count>0)?`<div style="display:flex;flex-wrap:wrap;gap:.3rem;">${ts.tags.map(t=>t.count?`<span class="stag ${t.cls}" style="font-size:.6rem">${t.label} ${t.count}</span>`:'').join('')}</div>`:'<span style="font-size:.76rem;color:var(--text-3);">尚無筆記</span>'}</div>`).join('')}${untaggedMats.length?`<div class="g-card" style="padding:1rem;cursor:default;" onmouseenter="this.style.transform='none'"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;"><span style="font-size:.88rem;font-weight:700;color:var(--text-3);">未分類</span><span style="font-size:.7rem;color:var(--text-3);">${untaggedMats.length} 教材</span></div></div>`:''}</div>`;}

async function syncStudyToCloud(){if(!_supa||!_currentUser)return;const uid=_currentUser.id;try{for(const m of S.materials){await _supa.from('study_materials').upsert({id:m.id,user_id:uid,title:m.title,raw:m.raw,sections:m.sections,toc:m.toc,mat_tags:m.matTags||[],uploaded_at:m.uploadedAt},{onConflict:'user_id,id'});}const{data:cm}=await _supa.from('study_materials').select('id').eq('user_id',uid);if(cm){const ids=new Set(S.materials.map(m=>m.id));for(const r of cm){if(!ids.has(r.id))await _supa.from('study_materials').delete().eq('user_id',uid).eq('id',r.id);}}for(const a of S.annotations){await _supa.from('study_annotations').upsert({id:a.id,user_id:uid,mat_id:a.matId,sec_id:a.secId,tag:a.tag,memo:a.memo||'',mat_title:a.matTitle||'',section_heading:a.sectionHeading||'',html:a.html||'',created_at:a.createdAt},{onConflict:'user_id,mat_id,sec_id'});}const{data:ca}=await _supa.from('study_annotations').select('id,mat_id,sec_id').eq('user_id',uid);if(ca){const keys=new Set(S.annotations.map(a=>a.matId+'|'+a.secId));for(const r of ca){if(!keys.has(r.mat_id+'|'+r.sec_id))await _supa.from('study_annotations').delete().eq('user_id',uid).eq('id',r.id);}}}catch(e){console.warn('[Supa] study sync:',e);}}
async function loadStudyFromCloud(){if(!_supa||!_currentUser)return;const uid=_currentUser.id;try{const{data:mats}=await _supa.from('study_materials').select('*').eq('user_id',uid).order('uploaded_at');if(mats&&mats.length){S.materials=mats.map(m=>({id:m.id,title:m.title,raw:m.raw,sections:m.sections,toc:m.toc,matTags:m.mat_tags||[],uploadedAt:m.uploaded_at}));}const{data:anns}=await _supa.from('study_annotations').select('*').eq('user_id',uid).order('created_at');if(anns&&anns.length){S.annotations=anns.map(a=>({id:a.id,matId:a.mat_id,secId:a.sec_id,tag:a.tag,memo:a.memo,matTitle:a.mat_title,sectionHeading:a.section_heading,html:a.html,createdAt:a.created_at}));}}catch(e){console.warn('[Supa] study load:',e);}}

/* ╔══════════════════════════════════╗
   ║             BOOT                 ║
   ╚══════════════════════════════════╝ */
// Restore persisted state from localStorage
loadFromStorage();
// Cloud-first: render immediately with local data as visual fallback,
// then cloud data overwrites automatically via loadCloudProgress → render()
render();
if (typeof supabase !== 'undefined') {
  initSupabase(); // will call loadCloudProgress() → render() when ready
} else {
  window.addEventListener('load', function() { initSupabase(); });
}
</script>
</body>
