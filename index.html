  {id:202,category:'資料處理',difficulty:'中等',text:`一家公司将模型部署到生产环境中。4 个月后，模型推理质量下降。公司希望在模型推理质量下降时收到通知。公司还希望确保这个问题不会再次发生。哪种解决方案能满足这些要求？(A company deployed a model to production. After 4 months, the model inference quality degraded. The company wants to receive a notification if the model inference quality degrades. The company also wants to ensure that the problem does not happen again. Which solutio`,options:[`重新训练模型。使用 Amazon SageMaker Clarify 监控模型漂移 (Retrain the model. Monitor model drift by using Amazon SageMaker Clarify)`,`重新训练模型。使用 Amazon SageMaker Model Monitor 监控模型漂移 (Retrain the model. Monitor model drift by using Amazon SageMaker Model Monitor)`,`构建新模型。使用 Amazon SageMaker Feature Store 监控模型漂移 (Build a new model. Monitor model drift by using Amazon SageMaker Feature Store)`,`构建新模型。使用 Amazon SageMaker JumpStart 监控模型漂移 (Build a new model. Monitor model drift by using Amazon SageMaker JumpStart)`],answer:1,explanation:`使用 Amazon SageMaker Model Monitor 重新训练模型是最佳选择，因为： - Model Monitor 专门设计用于监控生产环境中的模型性能 - 可以自动检测数据和模型质量的漂移 - 提供实时监控和警报功能 - 支持自动基线比较 - 可以与 Amazon CloudWatch 集成发送通知 - 重新训练现有模型比构建新模型更有效其他选项不适合： - SageMaker Clarify 主要用于解释模型决策和检测偏差，不是专门的模型监控工具 - Feature Store 是用于特征管理的服务，不适合模型监控 - JumpStart 提供预训练模型和解决方案，不是监控工具`},
  {id:203,category:'模型評估',difficulty:'中等',text:`一家公司需要使用高度可扩展的 AWS 服务来监控其 ML 系统的性能。哪个 AWS 服务满足这些要求？ (A company needs to monitor the performance of its ML systems by using a highly scalable AWS service. Which AWS service meets these requirements?)`,options:[`Amazon CloudWatch (Amazon CloudWatch)`,`AWS CloudTrail (AWS CloudTrail)`,`AWS Trusted Advisor (AWS Trusted Advisor)`,`AWS Config (AWS Config)`],answer:0,explanation:`Amazon CloudWatch 是最佳选择，因为： - 它是专门设计用于监控 AWS 资源和应用程序性能的服务 - 提供实时监控和警报功能 - 可以收集和跟踪指标、日志和事件 - 高度可扩展，可以处理大规模 ML 系统 - 支持自定义指标和仪表板 - 可以设置自动化响应和警报其他选项不适合： - AWS CloudTrail 主要用于记录 API 调用和账户活动，不适合性能监控 - AWS Trusted Advisor 主要提供最佳实践建议，不是性能监控工具 - AWS Config 主要用于资源配置和合规性评估，不适合性能监控`},
  {id:204,category:'模型評估',difficulty:'中等',text:`哪个 AWS 服务提供基础模型(FMs)来帮助用户构建和扩展生成式 AI 应用程序？(Which AWS service makes foundation models (FMs) available to help users build and scale generative AI applications?)`,options:[`Amazon Q Developer (Amazon Q Developer)`,`Amazon Bedrock (Amazon Bedrock)`,`Amazon Kendra (Amazon Kendra)`,`Amazon Comprehend (Amazon Comprehend)`],answer:1,explanation:`Amazon Bedrock 是最佳选择，因为： - 它是一个完全托管的服务，专门提供基础模型(FMs) - 提供来自多个 AI 公司的高性能基础模型 - 通过单一 API 提供对多个基础模型的访问 - 支持模型定制和私有部署 - 简化了生成式 AI 应用程序的开发和扩展过程 其他选项不适合： - Amazon Q Developer 是一个 AI 助手工具，不提供基础模型服务 - Amazon Kendra 是一个智能搜索服务，专注于企业搜索 - Amazon Comprehend 是一个自然语言处理服务，不提供基础模型功能`},
  {id:205,category:'模型評估',difficulty:'中等',text:`一家电子商务公司正在使用生成式 AI 聊天机器人来回应客户询问。公司想要衡量聊天机器人对公司运营的财务影响。公司应该使用哪个指标？(An ecommerce company is using a generative AI chatbot to respond to customer inquiries. The company wants to measure the financial effect of the chatbot on the company's operations. Which metric should the company use?)`,options:[`处理的客户询问数量 (Number of customer inquiries handled)`,`AI 模型训练成本 (Cost of training AI models)`,`每次客户对话的成本 (Cost for each customer conversation)`,`平均处理时间(AHT) (Average handled time (AHT))`],answer:2,explanation:`每次客户对话的成本是最佳选择，因为： - 直接反映了聊天机器人的财务效益 - 可以与人工客服的成本进行直接比较 - 包含了运营成本和效率的综合指标 - 有助于计算投资回报率(ROI) - 能够帮助公司优化资源分配其他选项不够全面： - 处理的客户询问数量只显示使用量，不反映财务影响 - AI 模型训练成本只是一次性投资，不能反映持续运营的财务效果 - 平均处理时间虽然重要，但不直接反映财务影响`},
  {id:206,category:'ML基礎',difficulty:'中等',text:`一家公司想要根据客户的人口统计信息和购买模式为客户分组。公司应该使用哪种算法来满足这个要求？(A company wants to find groups for its customers based on the customers' demographics and buying patterns. Which algorithm should the company use to meet this requirement?)`,options:[`K-最近邻(k-NN) (K-nearest neighbors (k-NN))`,`K-均值聚类 (K-means)`,`决策树 (Decision tree)`,`支持向量机 (Support vector machine)`],answer:1,explanation:`K-means（K-均值聚类）是最佳选择，因为： - 它是一种无监督学习算法，专门用于数据聚类 - 可以自动将具有相似特征的客户分组 - 特别适合基于多个特征（如人口统计和购买行为）进行客户分群 - 能够发现数据中的自然分组 - 广泛应用于客户细分和市场分析其他选项不适合： - K-最近邻(k-NN)主要用于分类和回归，不是专门的聚类算法 - 决策树是一种监督学习算法，主要用于分类和预测 - 支持向量机主要用于分类和回归分析，不适合聚类任务`},
  {id:207,category:'模型評估',difficulty:'中等',text:`公司的员工在客户致电客服中心时向客户提供产品描述和推荐。这些推荐是基于客户所在的位置。公司想要使用基础模型(FMs)来自动化这个过程。哪个 AWS 服务满足这些要求？(A company's employees provide product descriptions and recommendations to customers when customers call the customer service center. These recommendations are based on where the customers are located. The company wants to use foundation models (FMs) to automate this`,options:[`Amazon Macie (Amazon Macie)`,`Amazon Transcribe (Amazon Transcribe)`,`Amazon Bedrock (Amazon Bedrock)`,`Amazon Textract (Amazon Textract)`],answer:2,explanation:`Amazon Bedrock 是最佳选择，因为： - 它是一个完全托管的服务，提供多个领先的基础模型 - 可以处理复杂的自然语言任务，如产品推荐 - 支持上下文感知的响应，可以考虑客户位置等因素 - 可以轻松集成到现有的客户服务系统中 - 能够生成个性化的产品描述和推荐其他选项不适合： - Amazon Macie 是数据安全和隐私服务，用于发现敏感数据 - Amazon Transcribe 仅用于语音转文字，不能生成推荐 - Amazon Textract 专门用于从文档中提取文本和数据，不适合生成推荐`},
  {id:208,category:'ML基礎',difficulty:'中等',text:`> 问题： > > 一家公司想要将客户服务电子邮件消息上传到 Amazon S3 > 以开发业务分析应用程序。这些消息有时包含敏感数据。公司希望在每次发现敏感信息时收到警报。哪种解决方案以最少的开发工作量完全自动化敏感信息检测过程？(A > company wants to upload customer service email messages to Amazon S3 > to develop a business analysis application. The messages sometimes > contain sensitive data. The company wants to receive an alert every > time sensitive info`,options:[`配置 Amazon Macie 来检测上传到 Amazon S3 的文档中的敏感信息 (Configure Amazon Macie to detect sensitive information in the documents that are uploaded to Amazon S3)`,`使用 Amazon SageMaker 端点部署大型语言模型(LLM)来编辑敏感数据 (Use Amazon SageMaker endpoints to deploy a large language model (LLM) to redact sensitive data)`,`开发多个正则表达式模式来检测敏感数据。在 Amazon SageMaker 笔记本上公开正则表达式模式 (Develop multiple regex patterns to detect sensitive data. Expose the regex patterns on an Amazon SageMaker notebook)`,`要求客户避免在其电子邮件消息中共享敏感信息(Ask the customers to avoid sharing sensitive information in their email messages)`],answer:0,explanation:`Amazon Macie 是最佳选择，因为： - 它是一个完全托管的数据安全和隐私服务 - 自动发现和保护敏感数据 - 使用机器学习和模式匹配来识别敏感数据 - 可以自动扫描 S3 存储桶中的内容 - 可以直接与其他 AWS 服务集成来发送警报 - 需要最少的开发工作量，因为它是现成的服务其他选项不适合： - 使用 SageMaker 部署 LLM 需要更多的开发工作和维护 - 开发自定义正则表达式模式需要大量开发工作，且可能不够全面 - 要求客户不分享敏感信息不是一个可靠或专业的解决方案`},
  {id:209,category:'模型評估',difficulty:'中等',text:`> 一家全球金融公司开发了一个 ML > 应用程序来分析股市数据并提供股市趋势。该公司希望持续监控应用程序开发阶段，并确保遵循公司政策和行业法规。哪些 > AWS 服务将帮助公司评估合规性要求？（选择两个）(A global financial > company has developed an ML application to analyze stock market data > and provide stock market trends. The company wants to continuously > monitor the application development phases and to ensure that company > policies and `,options:[`AWS Audit Manager (AWS Audit Manager)`,`AWS Config (AWS Config)`,`Amazon Inspector (Amazon Inspector)`,`Amazon CloudWatch (Amazon CloudWatch)`],answer:1,explanation:`Amazon Comprehend 是最佳选择，因为： - 它是一个预训练的服务，不需要用户提供标记数据 - 专门用于自然语言处理和文本分析 - 内置了毒性检测功能，可以识别有害语言 - 可以检测多种类型的有害内容，包括辱骂、仇恨言论、威胁等 - 可以直接集成到现有应用程序中 其他选项不适合： - Amazon Rekognition 主要用于图像和视频分析，不适合文本分析 - Amazon SageMaker 内置算法需要标记数据来训练模型，不符合要求 - Amazon Polly 是文本转语音服务，不适合用于内容审核`},
];

const MOCK_FILES = [];

const MOCK_HISTORY = [];

/* ╔══════════════════════════════════╗
   ║             STATE                ║
   ╚══════════════════════════════════╝ */
const S = {
  page:      'home',
  quizMode:       'menu',   // menu | active | result | review
  currentQ:       0,
  answers:        [],       // [{selected:null|number, confirmed:bool}]
  bookmarks:      new Set(),
  quizConfig:     null,     // {mode:'new'|'review'|'wrong', cats:Set, count:number}
  quizSetup:      null,     // {step:'cats'|'mode'|'count', cats:Set, mode:null, count:0}
  activeQs:       [],       // questions for current session
  extraQs:        [],       // questions imported from CSV/XLSX uploads
  wrongQs:        new Set(), // question IDs answered incorrectly
  usedQIds:       new Set(), // question IDs already drawn (per-tag no-repeat)
  importMsg:      null,     // transient import status message
  dashTag:        null,     // selected tag filter in dashboard
  history:   JSON.parse(JSON.stringify(MOCK_HISTORY)),
  files:     JSON.parse(JSON.stringify(MOCK_FILES)),
  nextFid:        4,
  editingTagFid:  null,
  tagFilter:      null,
  chart:          null,
};

/* ╔══════════════════════════════════╗
   ║          NAVIGATION              ║
   ╚══════════════════════════════════╝ */
function navigate(page) {
  S.page = page;
  if (page === 'quiz') { S.quizMode = 'menu'; S.quizConfig = null; S.quizSetup = null; }
  render();
}

function setActiveNav(page) {
  ['home','data','quiz','dash'].forEach(id => {
    document.getElementById('nl-'+id)?.classList.remove('active');
  });
  const map = {home:'home',datasets:'data',quiz:'quiz',dashboard:'dash'};
  document.getElementById('nl-'+(map[page]||'home'))?.classList.add('active');
}

/* ╔══════════════════════════════════╗
   ║           MASTER RENDER          ║
   ╚══════════════════════════════════╝ */
function render() {
  const c = document.getElementById('page-content');
  setActiveNav(S.page);
  switch(S.page) {
    case 'home':      c.innerHTML = homeHTML();       break;
    case 'datasets':  c.innerHTML = datasetsHTML();   setTimeout(bindDataset, 0); break;
    case 'quiz':      c.innerHTML = quizHTML();       break;
    case 'dashboard': c.innerHTML = dashHTML();       setTimeout(initChart, 80); break;
  }
}

/* ╔══════════════════════════════════╗
   ║           HOME PAGE              ║
   ╚══════════════════════════════════╝ */
function homeHTML() {
  return `

};

/* ── Single file card HTML (extracted for targeted refresh) ── */
function fileCardHTML(f) {
  const t    = FT[f.type] || {emoji:'📎',color:'var(--text-2)',bg:'rgba(255,255,255,.05)',border:'var(--border)'};
  const isImportable = ['csv','xlsx'].includes(f.type);
  const isAIPending  = ['pdf','docx'].includes(f.type);

  const badge = f.status === 'ready'
    ? `<span class="badge badge-gr">✓ 就緒</span>`
    : `<span class="badge badge-a">⏳ 處理中</span>`;

  const tagChips = (f.tags||[]).map(tag => {
    const tc = tagColor(tag);
    return `<span style="display:inline-flex;align-items:center;gap:.22rem;background:${tc.bg};color:${tc.color};border:1px solid ${tc.border};border-radius:20px;padding:.1rem .48rem .1rem .52rem;font-size:.68rem;font-weight:600;letter-spacing:.01em;">
      ${tag}
      <span data-fid="${f.id}" data-tag="${tag.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();removeTag(+this.dataset.fid,this.dataset.tag)" style="cursor:pointer;opacity:.6;font-size:.75rem;line-height:1;margin-left:.05rem;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.6'">×</span>
    </span>`;
  }).join('');

  const addBtn = (f.tags||[]).length < 5 ? `
    <button onclick="event.stopPropagation();toggleTagEdit(${f.id})"
      style="background:transparent;border:1px dashed ${S.editingTagFid===f.id?'var(--accent)':'var(--border)'};color:${S.editingTagFid===f.id?'var(--accent)':'var(--text-3)'};border-radius:20px;padding:.1rem .42rem;font-size:.67rem;cursor:pointer;display:inline-flex;align-items:center;gap:.2rem;transition:all .15s;"
      onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
      onmouseout="this.style.borderColor='${S.editingTagFid===f.id?'var(--accent)':'var(--border)'}';this.style.color='${S.editingTagFid===f.id?'var(--accent)':'var(--text-3)'}'">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      貼標
    </button>` : '';

  const allUsedTags = [...new Set(S.files.flatMap(x => x.tags||[]))];
  const unusedPresets = allUsedTags.filter(p => !(f.tags||[]).includes(p));

  const editPanel = S.editingTagFid === f.id ? `
    <div style="margin-top:.65rem;padding:.75rem .85rem;background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:10px;">
      <div style="display:flex;gap:.45rem;margin-bottom:.55rem;">
        <input id="tagInp-${f.id}" type="text" placeholder="輸入標籤名稱（最多10字）…" maxlength="10"
          style="flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:.3rem .6rem;font-size:.78rem;color:var(--text-1);outline:none;font-family:inherit;transition:border-color .15s;"
          onkeydown="if(event.key==='Enter'){addTag(${f.id},this.value)}"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
        <button onclick="addTag(${f.id},document.getElementById('tagInp-${f.id}').value)"
          style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:.3rem .75rem;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;">確認</button>
        <button onclick="toggleTagEdit(${f.id})"
          style="background:transparent;border:1px solid var(--border);color:var(--text-3);border-radius:8px;padding:.3rem .55rem;font-size:.78rem;cursor:pointer;">取消</button>
      </div>
      ${unusedPresets.length > 0 ? `
      <div style="display:flex;flex-wrap:wrap;gap:.3rem;align-items:center;">
        <span style="font-size:.66rem;color:var(--text-3);margin-right:.15rem;">已用標籤：</span>
        ${unusedPresets.map(p => {
          const tc = tagColor(p);
          return `<span onclick="addTag(${f.id},'${p}')"
            style="background:${tc.bg};color:${tc.color};border:1px solid ${tc.border};border-radius:20px;padding:.1rem .5rem;font-size:.68rem;font-weight:600;cursor:pointer;transition:opacity .15s;"
            onmouseover="this.style.opacity='.7'" onmouseout="this.style.opacity='1'">${p}</span>`;
        }).join('')}
      </div>` : `<span style="font-size:.7rem;color:var(--text-3);">輸入新標籤後按確認即可新增</span>`}
    </div>` : '';

  const actionArea = f.importing
    ? `<span style="font-size:.72rem;color:var(--accent);">⏳ 解析中…</span>`
    : f.imported > 0
      ? `<span style="font-size:.72rem;color:#4ADE80;font-weight:600;">✓ ${f.imported} 題</span>`
      : isImportable && f.status === 'ready'
        ? `<span style="font-size:.7rem;color:var(--text-3);font-style:italic;">等待匯入…</span>`
        : isAIPending && f.status === 'ready'
          ? `<span style="background:rgba(123,111,224,.12);color:var(--accent);border:1px solid var(--accent-border);border-radius:6px;padding:.15rem .5rem;font-size:.68rem;font-weight:600;">AI 待串接</span>`
          : '';

  return `
  <div class="g-card" id="fcard-${f.id}" style="padding:1rem 1.2rem;margin-bottom:.65rem;cursor:default;" onmouseenter="this.style.transform='none'" onmouseleave="this.style.transform='none'">
    <div style="display:flex;align-items:center;gap:1rem;">
      <div style="width:38px;height:38px;border-radius:10px;background:${t.bg};border:1px solid ${t.border};display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;">${t.emoji}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${f.name}</div>
        <div style="display:flex;gap:.6rem;margin-top:.2rem;">
          <span style="font-size:.72rem;color:var(--text-3)">${f.size}</span>
          <span style="color:var(--text-3)">·</span>
          <span style="font-size:.72rem;color:var(--text-3)">${f.date}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:.55rem;flex-shrink:0;">
        ${badge}
        ${actionArea}
        <button onclick="removeFile(${f.id})" style="background:transparent;border:none;color:var(--text-3);cursor:pointer;display:flex;align-items:center;padding:.2rem;border-radius:6px;transition:color .15s" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-3)'" title="移除">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:.32rem;margin-top:.6rem;align-items:center;min-height:1.5rem;">
      ${tagChips}
      ${addBtn}
    </div>
    ${editPanel}
  </div>`;
}

/* ── Targeted card refresh (no full-page re-render) ── */
function refreshCard(fid) {
  const el = document.getElementById('fcard-'+fid);
  const f  = S.files.find(x=>x.id===fid);
  if (!el || !f) { if(S.page==='datasets') render(); return; }
  const tmp = document.createElement('div');
  tmp.innerHTML = fileCardHTML(f);
  el.replaceWith(tmp.firstElementChild);
  // Re-focus tag input if editing
  if (S.editingTagFid === fid) {
    const inp = document.getElementById('tagInp-'+fid);
    if (inp) inp.focus();
  }
}

/* Also refresh filter bar (tags may have changed) */

  const fb = document.getElementById('tag-filter-bar');

  const allTags = [...new Set(S.files.flatMap(f=>f.tags||[]))];

    ${allTags.map(tag=>{const tc=tagColor(tag);const active=S.tagFilter===tag;return `<span data-tag="${tag.replace(/"/g,'&quot;')}" onclick="setTagFilter(this.dataset.tag)" style="background:${active?tc.color:tc.bg};color:${active?'#111':tc.color};border:1px solid ${active?tc.color:tc.border};border-radius:20px;padding:.13rem .58rem;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .15s;">${tag}</span>`;}).join('')}`;
}

function bindDataset() {
  const dz = document.getElementById('dropZone');
  if (!dz) return;
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dv'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dv'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dv');
    handleFileSelect(e.dataTransfer.files);
  });
}

function handleFileSelect(files) {
  Array.from(files).forEach(file => {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['pdf','docx','csv','xlsx'].includes(ext)) return;
    const size = file.size > 1048576
      ? (file.size/1048576).toFixed(1)+' MB'
      : Math.round(file.size/1024)+' KB';
    const today = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});
    const isImportable = ['csv','xlsx'].includes(ext);
    const fObj = {id:S.nextFid++, name:file.name, type:ext, size, status:'processing', date:today, tags:[], _file:file};
    S.files.push(fObj);
    // Auto-import CSV/XLSX immediately
    if (isImportable) {
      setTimeout(() => {
        fObj.status = 'ready';
        if (ext === 'xlsx') importXLSXQuestions(file, fObj);
        else importCSVQuestions(file, fObj);
      }, 800);
    }
  });
  // Insert new cards without full-page re-render
  if (S.page === 'datasets') {
    const listEl = document.querySelector('#page-content .page > div[style*="margin-top:2rem"]');
    if (listEl) {
      // List already exists — just append new cards
      S.files.filter(f=>!document.getElementById('fcard-'+f.id)).forEach(f => {
        const tmp = document.createElement('div');
        tmp.innerHTML = fileCardHTML(f);
        const newCard = tmp.firstElementChild;
        // Insert before empty-state div or append
        const emptyDiv = listEl.querySelector('div[style*="text-align:center"]');
        if (emptyDiv) emptyDiv.remove();
        listEl.appendChild(newCard);
      });
      // Update file count
      const countEl = listEl.querySelector('[style*="color:var(--accent)"]');
      if (countEl) countEl.textContent = S.files.length;
    } else {
      render(); // first file — need to build list
    }
  }
  // Non-importable: update badge after 2.2s without full re-render
  setTimeout(() => {
    S.files.forEach(f => {
      if (f.status === 'processing' && !['csv','xlsx'].includes(f.type)) {
        f.status = 'ready';
        refreshCard(f.id);
      }
    });
  }, 2200);
}

function removeFile(id) {
  S.files = S.files.filter(f => f.id !== id);
  if (S.editingTagFid === id) S.editingTagFid = null;
  // Remove card from DOM without full re-render
  const cardEl = document.getElementById('fcard-'+id);
  if (cardEl) {
    cardEl.style.transition = 'opacity .18s, max-height .22s';
    cardEl.style.opacity = '0';
    cardEl.style.maxHeight = cardEl.offsetHeight + 'px';
    setTimeout(() => {
      cardEl.style.maxHeight = '0';
      cardEl.style.marginBottom = '0';
      setTimeout(() => { cardEl.remove(); refreshFilterBar(); }, 220);
    }, 180);
  } else if (S.page === 'datasets') render();
}

function triggerCSVImport(fid) {

const TAG_PALETTE = [
  {bg:'rgba(123,111,224,.18)',color:'#A99FF3',border:'rgba(123,111,224,.38)'},
  {bg:'rgba(200,150,62,.18)', color:'#D4A85C',border:'rgba(200,150,62,.38)'},

  {bg:'rgba(248,113,113,.13)',color:'#F87171',border:'rgba(248,113,113,.32)'},
  {bg:'rgba(251,146,60,.13)', color:'#FB923C',border:'rgba(251,146,60,.32)'},

  {bg:'rgba(34,211,238,.13)', color:'#22D3EE',border:'rgba(34,211,238,.32)'},

function tagColor(tag) {
  let h = 0; for (const c of tag) h = (h * 31 + c.charCodeAt(0)) & 0xFFFF;
  return TAG_PALETTE[h % TAG_PALETTE.length];
}
function addTag(fid, tag) {
  tag = (tag || '').trim().slice(0, 10);
  if (!tag) return;
  const f = S.files.find(f => f.id === fid);
  if (!f || f.tags.includes(tag) || f.tags.length >= 5) return;
  f.tags.push(tag);
  S.editingTagFid = null;
  refreshCard(fid);
  refreshFilterBar();
}
function removeTag(fid, tag) {
  const f = S.files.find(f => f.id === fid);
  if (!f) return;
  f.tags = f.tags.filter(t => t !== tag);
  refreshCard(fid);

}
function toggleTagEdit(fid) {
  const prev = S.editingTagFid;

function setTagFilter(tag) {
  S.tagFilter = (S.tagFilter === tag) ? null : tag;
  // Show/hide file cards based on filter — no full re-render
  document.querySelectorAll('.g-card[id^="fcard-"]').forEach(el => {

    const active = (t === '__all__' ? !S.tagFilter : S.tagFilter === t);

function _mergeQuestions(parsed, fObj) {
  const existing = new Set(S.extraQs.map(q => q.text.slice(0,40)));
  const fileTags = fObj ? (fObj.tags && fObj.tags.length ? fObj.tags : []) : [];
  let added = 0;
  parsed.forEach(q => {
    if (!existing.has(q.text.slice(0,40))) {
      q.id = 10000 + S.extraQs.length;
      // Category comes from file's first tag, fallback to exam/category field
      q.category = fileTags[0] || q.category || '匯入題目';
      q._fileTags = [...fileTags];
      q._fileId   = fObj ? fObj.id : null;
      S.extraQs.push(q);
      existing.add(q.text.slice(0,40));
      added++;
    }
  });
  if (fObj) { fObj.importing=false; fObj.imported=added; fObj.status='ready'; refreshCard(fObj.id); }
  const msg = added > 0 ? `✅ 成功匯入 ${added} 題（來源分類：${fileTags.join('、')||'未標記'}）` : `⚠️ 所有題目已存在，無新增`;
  showImportToast(msg, 5000);
}

function importCSVQuestions(file, fObj) {
  fObj = fObj || S.files.find(f => f.name === file.name);
  if (fObj) { fObj.importing=true; refreshCard(fObj.id); }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = parseQuestionCSV(e.target.result);
      if (!parsed.length) throw new Error('找不到有效題目，請確認欄位格式');
      _mergeQuestions(parsed, fObj);
    } catch(err) {
      if (fObj) { fObj.importing=false; fObj.importErr=true; refreshCard(fObj.id); }
      showImportToast(`❌ 解析失敗：${err.message}`, 5000);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function importXLSXQuestions(file, fObj) {
  fObj = fObj || S.files.find(f => f.name === file.name);
  if (fObj) { fObj.importing=true; refreshCard(fObj.id); }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      if (typeof XLSX === 'undefined') throw new Error('XLSX 函式庫未載入，請重新整理頁面');
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if (!rows.length) throw new Error('試算表內容為空');
      // Normalize column names (lowercase)
      const norm = rows.map(r => {
        const out={};
        Object.keys(r).forEach(k => out[k.toLowerCase().trim()] = String(r[k]||'').trim());
        return out;
      });
      const parsed = parseQuestionRows(norm);
      if (!parsed.length) throw new Error('找不到有效題目，請確認欄位格式（question/option_a/answer）');
      _mergeQuestions(parsed, fObj);
    } catch(err) {
      if (fObj) { fObj.importing=false; fObj.importErr=true; refreshCard(fObj.id); }
      showImportToast(`❌ XLSX 解析失敗：${err.message}`, 5000);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseQuestionCSV(text) {
  if (text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  const lines = text.split(/\r?\n/);
  if (lines.length<2) return [];
  const headers = parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase());
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const cols=parseCSVLine(lines[i]);
    const row={};
    headers.forEach((h,j)=>{ row[h]=cols[j]?.trim()||''; });
    rows.push(row);
  }
  return parseQuestionRows(rows);
}

/* Shared row parser: works for both CSV (object rows) and XLSX (sheet_to_json rows) */
function parseQuestionRows(rows) {
  const ANS={'A':0,'B':1,'C':2,'D':3,'E':4,'a':0,'b':1,'c':2,'d':3,'e':4,'0':0,'1':1,'2':2,'3':3,'4':4};
  const DIFF={'基礎':'基礎','中等':'中等','進階':'進階','easy':'基礎','medium':'中等','hard':'進階'};
  const results=[];
  for(const r of rows){
    const q=(r.question||r.題目||'').trim();
    const oA=(r.option_a||r.選項a||r['選項_a']||'').trim();
    const oB=(r.option_b||r.選項b||r['選項_b']||'').trim();
    const oC=(r.option_c||r.選項c||r['選項_c']||'').trim();
    const oD=(r.option_d||r.選項d||r['選項_d']||'').trim();
    const oE=(r.option_e||r.選項e||r['選項_e']||'').trim();
    const ansRaw=(r.answer||r.答案||'').trim().toUpperCase();
    // category: prefer 'exam' field (matches the xlsx template), then 'category'
    const cat=(r.exam||r.category||r.分類||'').trim()||'匯入題目';
    const diff=DIFF[(r.difficulty||r.難度||'').trim()]||'中等';
    const expl=(r.explanation||r.解析||r.說明||'').trim()||'（無解析）';
    const ansIdx=ANS[ansRaw]??parseInt(ansRaw);
    if(!q||!oA||ansIdx===undefined||isNaN(ansIdx)||ansIdx>4) continue;
    // Build options (filter out empty ones beyond A)
    const opts=[oA,oB,oC,oD].filter(Boolean);
    if(oE) opts.push(oE);
    while(opts.length<4) opts.push('—');
    results.push({ id:0, text:q, options:opts.slice(0,5), answer:ansIdx, explanation:expl, category:cat, difficulty:diff });
  }
  return results;
}

function parseCSVLine(line) {
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'&&!inQ)inQ=true;
    else if(ch==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;}
    else if(ch===','&&!inQ){r.push(cur);cur='';}
    else cur+=ch;
  }
  r.push(cur);return r;
}

/* ── Setup navigation helpers ── */
function initQuizSetup() {
  S.quizSetup = { step:'cats', cats: new Set(), mode: null, count: 20, name: '' };
}
function toggleMenuCat(cat) {
  if (!S.quizSetup) initQuizSetup();
  if (S.quizSetup.cats.has(cat)) {
    if (S.quizSetup.cats.size <= 1) return;
    S.quizSetup.cats.delete(cat);
  } else {
    S.quizSetup.cats.add(cat);
  }
  render();
}
function selectAllMenuCats(all) {
  if (!S.quizSetup) initQuizSetup();
  // Categories = ONLY tags the user has manually applied to files in Datasets
  const allCats = [...new Set(S.files.flatMap(f => f.tags || []))].sort();
  S.quizSetup.cats = all ? new Set(allCats) : new Set();
  render();
}
function goToModeStep() {
  if (!S.quizSetup) initQuizSetup();
  S.quizSetup.step = 'mode';
  render();
}
function pickMode(mode) {
  S.quizSetup.mode = mode;
  S.quizSetup.step = 'count';
  const allQ = [...QUESTIONS,...S.extraQs];
  const inCat = q => S.quizSetup.cats.has(q.category) || (q._fileTags && q._fileTags.some(t=>S.quizSetup.cats.has(t)));
  let pool;
  if (mode==='review') pool = allQ.filter(q=>S.bookmarks.has(q.id)&&inCat(q));
  else if (mode==='wrong') pool = allQ.filter(q=>S.wrongQs.has(q.id)&&inCat(q));
  else pool = allQ.filter(q=>inCat(q));
  S.quizSetup.count = Math.min(pool.length, 20);
  render();
}

/* ── Keep old openConfig/toggleConfigCat/setConfigCount for backward compat ── */
function openConfig(mode) {
  initQuizSetup();
  S.quizSetup.mode = mode;
  S.quizSetup.step = 'cats';
  render();
}

function getAvailPool() {
  const setup = S.quizSetup;
  if (!setup) return [];
  const allQ = [...QUESTIONS, ...S.extraQs];
  const inCat = q => setup.cats.has(q.category) ||
    (q._fileTags && q._fileTags.some(t => setup.cats.has(t)));
  if (setup.mode === 'review') return allQ.filter(q => S.bookmarks.has(q.id) && inCat(q));
  if (setup.mode === 'wrong')  return allQ.filter(q => S.wrongQs.has(q.id)   && inCat(q));
  return allQ.filter(q => inCat(q));
}
function toggleConfigCat(cat) {
  const cfg = S.quizConfig;
  if (cfg.cats.has(cat)) { if (cfg.cats.size <= 1) return; cfg.cats.delete(cat); }
  else cfg.cats.add(cat);
  const pool = getAvailPool();
  cfg.count = Math.max(1, Math.min(cfg.count, pool.length));
  render();
}
function setConfigCount(n) { S.quizConfig.count = n; render(); }
function launchQuiz() {
  const setup = S.quizSetup;
  const pool  = getAvailPool();
  if (!pool || !pool.length) return;
  const count = Math.min(setup.count || pool.length, pool.length);
  const mode  = setup.mode;

  // ── No-repeat draw: prefer questions not yet drawn from this tag pool ──
  // Only apply no-repeat for 'new' mode (review/wrong modes intentionally repeat)
  let drawn;
  if (mode === 'new') {
    const unused = pool.filter(q => !S.usedQIds.has(q.id));
    const used   = pool.filter(q =>  S.usedQIds.has(q.id));
    const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

    if (unused.length === 0) {
      // All questions used — auto-reset this pool and start fresh
      pool.forEach(q => S.usedQIds.delete(q.id));
      drawn = shuffle(pool).slice(0, count);
      S._poolResetMsg = true; // show toast on result page
    } else if (unused.length >= count) {
      // Enough unused — draw only from unused
      drawn = shuffle(unused).slice(0, count);
    } else {
      // Not enough unused — take all unused, fill remainder from used
      const fill = shuffle(used).slice(0, count - unused.length);
      drawn = shuffle([...unused, ...fill]);
    }
    // Mark newly drawn as used
    drawn.forEach(q => S.usedQIds.add(q.id));
  } else {
    // review / wrong modes: shuffle normally, no no-repeat tracking
    drawn = [...pool].sort(() => Math.random() - 0.5).slice(0, count);
  }

  S.activeQs   = drawn;
  S.answers    = drawn.map(() => ({selected:null, confirmed:false}));
  S.currentQ   = 0;
  S.quizSetup  = null;
  S.quizConfig = null;
  S.quizMode   = mode === 'review' ? 'review' : 'active';
  render();
}

function quizActiveHTML() {
  const q   = S.activeQs[S.currentQ];
  const ans = S.answers[S.currentQ];
  const bk  = S.bookmarks.has(q.id);
  const isLast = S.currentQ === S.activeQs.length - 1;
  const pct = (S.currentQ / S.activeQs.length) * 100;
  const LT  = ['A','B','C','D'];

  const diffMap = {
    '基礎':  {cls:'badge-gr', color:'#4ADE80'},
    '中等':  {cls:'badge-a',  color:'#FBBF24'},
    '進階':  {cls:'badge-r',  color:'#F87171'},
  };
  const diff = diffMap[q.difficulty] || {cls:'badge-n', color:'var(--text-2)'};

  const optHTML = q.options.map((opt, i) => {
    let cls = 'opt';
    let style = '';
    let handler = `selectOpt(${i})`;
    if (ans.confirmed) {
      cls += ' locked';
      handler = '';
      if (i === q.answer)                            cls += ' correct';
      else if (i === ans.selected && i !== q.answer) cls += ' wrong';
      else                                           style = 'opacity:.35;';
    } else if (ans.selected === i) {
      cls += ' sel';
    }
    return `
    <button class="${cls}" style="${style}" onclick="${handler}">
      <span style="width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.07);display:inline-flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;font-family:'Sora','Inter','Segoe UI',system-ui,-apple-system,sans-serif;">${LT[i]}</span>
      <span style="line-height:1.55">${opt}</span>
    </button>`;
  }).join('');

  // Explanation panel: always rendered but hidden if not confirmed, revealed via DOM
  const explHTML = `
  <div id="expl-panel" style="margin-top:1.25rem;padding:1rem 1.1rem;border-radius:12px;background:rgba(123,111,224,.07);border:1px solid var(--accent-border);display:${ans.confirmed?'block':'none'};">
    <p style="font-size:.7rem;font-weight:700;color:var(--accent);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.5rem;">💡 詳細解析</p>
    <p style="font-size:.87rem;line-height:1.72;color:var(--text-2);">${q.explanation}</p>
  </div>`;

  const actionBtn = ans.confirmed
    ? `<button class="btn btn-primary" onclick="nextQuestion()">${isLast ? '完成測驗 →' : '下一題 →'}</button>`
    : `<button id="confirm-btn" class="btn btn-primary" onclick="confirmAns()" ${ans.selected===null?'disabled':''}>確認答案</button>`;

  return `
  <div class="page" style="max-width:660px;margin:0 auto;padding:2.5rem 1.5rem;">

    <!-- Progress -->
    <div style="margin-bottom:1.85rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem;">
        <button class="btn btn-ghost" onclick="navigate('quiz')" style="padding:.38rem .8rem;font-size:.78rem;">← 返回</button>
        <span class="mono" style="font-size:.82rem;color:var(--text-2);">
          <span style="color:var(--text-1);font-weight:600;">${S.currentQ+1}</span> / ${S.activeQs.length}
        </span>
        <span style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:.2rem .5rem;font-size:.73rem;color:var(--text-2);">${q.category}</span>
      </div>
      <div class="pb-bg"><div class="pb-fill" style="width:${pct}%"></div></div>
    </div>

    <!-- Question Card -->
    <div style="background:rgba(20,20,32,.75);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:20px;padding:1.85rem;margin-bottom:1.1rem;">

      <!-- Header -->
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;margin-bottom:1.4rem;">
        <div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;">
          <span class="badge badge-n">Q.${S.currentQ+1}</span>
          <span class="badge ${diff.cls}">${q.difficulty}</span>
        </div>
        <button class="bk-btn ${bk?'on':''}" onclick="toggleBk(${q.id})" title="${bk?'取消標記':'標記此題'}">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="${bk?'currentColor':'none'}" stroke="currentColor" stroke-width="2">
            <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
          </svg>
        </button>
      </div>

      <p style="font-size:1rem;line-height:1.78;font-weight:400;margin-bottom:1.4rem;">${q.text}</p>

      </div>

      ${explHTML}
    </div>

    <div id="action-btn" style="display:flex;justify-content:flex-end;">${actionBtn}</div>
  </div>`;
}

function selectOpt(i) {
  if (S.answers[S.currentQ].confirmed) return;
  if (S.answers[S.currentQ].selected === i) return; // already selected
  S.answers[S.currentQ].selected = i;
  // Direct DOM update — no full render, no flash
  document.querySelectorAll('.opt').forEach((el, idx) => {
    el.classList.toggle('sel', idx === i);
  });
  const confirmBtn = document.getElementById('confirm-btn');
  if (confirmBtn) confirmBtn.removeAttribute('disabled');
}

function confirmAns() {
  const ans = S.answers[S.currentQ];
  if (ans.selected === null) return;
  ans.confirmed = true;
  const q = S.activeQs[S.currentQ];
  // DOM-only update for option states — no full render flash
  document.querySelectorAll('.opt').forEach((el, idx) => {
    el.classList.add('locked');
    el.onclick = null;
    if (idx === q.answer)                         el.classList.add('correct');
    else if (idx === ans.selected && idx !== q.answer) el.classList.add('wrong');
    else                                           el.style.opacity = '0.35';
  });
  // Show explanation
  const explPanel = document.getElementById('expl-panel');
  if (explPanel) explPanel.style.display = 'block';
  // Swap action button
  const actionDiv = document.getElementById('action-btn');
  if (actionDiv) {
    const isLast = S.currentQ === S.activeQs.length - 1;
    actionDiv.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">${isLast ? '完成測驗 →' : '下一題 →'}</button>`;
  }
}

function toggleBk(id) {
  if (S.bookmarks.has(id)) S.bookmarks.delete(id);
  else                     S.bookmarks.add(id);
  // Re-render quiz page so bk state reflects correctly
  if (S.page === 'quiz') render();
}

function nextQuestion() {
  if (S.currentQ === S.activeQs.length - 1) {
    finishQuiz();
  } else {
    S.currentQ++;
    render();
  }
}

function finishQuiz() {
  const score = S.activeQs.filter((q,i) => S.answers[i].selected === q.answer).length;
  // Track wrong answers
  S.activeQs.forEach((q,i) => {
    if (S.answers[i].selected !== q.answer) S.wrongQs.add(q.id);
    else S.wrongQs.delete(q.id);
  });
  // Per-category breakdown
  const catMap = {};
  S.activeQs.forEach((q,i) => {
    const c = q.category || '其他';
    if (!catMap[c]) catMap[c] = {correct:0,total:0};
    catMap[c].total++;
    if (S.answers[i].selected === q.answer) catMap[c].correct++;
  });
  const quizName = (S.quizSetup && S.quizSetup.name && S.quizSetup.name.trim())
    || `第 ${S.history.length+1} 回合`;
  S.history.push({
    id: S.history.length + 1,
    name: quizName,
    date: new Date().toLocaleDateString('zh-TW'),
    total: S.activeQs.length,
    correct: score,
    bk: S.bookmarks.size,
    wrong: S.activeQs.length - score,
    catStats: catMap,
    dur: '—',
  });
  S.quizMode = 'result';
  render();
}

   ║         DASHBOARD PAGE           ║
   ╚══════════════════════════════════╝ */
function setDashTag(tag) {
  S.dashTag = (S.dashTag === tag) ? null : tag;
  render();
}

function dashHTML() {
  const allQ = [...QUESTIONS, ...S.extraQs];
  const dt   = S.dashTag; // active filter tag (null = all)

  // ── File tag list (selectable) ──────────────────────────────────────
  const fileTagStats = [];
  S.files.forEach(f => {
    (f.tags||[]).forEach(tag => {
      let e = fileTagStats.find(x=>x.tag===tag);
      if (!e) { e={tag, qCount:0}; fileTagStats.push(e); }
      e.qCount += f.imported||0;
    });
  });

  // ── Filter helpers ──────────────────────────────────────────────────
  const qInTag  = q  => !dt || q.category === dt;
  const hInTag  = h  => !dt || (h.catStats && h.catStats[dt]);
  const hCorrect = h => dt ? (h.catStats?.[dt]?.correct||0)  : h.correct;
  const hTotal   = h => dt ? (h.catStats?.[dt]?.total  ||0)  : h.total;

  const filtHist = S.history.filter(hInTag);

  // ── Aggregate stats ─────────────────────────────────────────────────
  const tot   = filtHist.length;
  const totC  = filtHist.reduce((s,h)=>s+hCorrect(h),0);
  const totQ  = filtHist.reduce((s,h)=>s+hTotal(h),0);
  const totW  = allQ.filter(q=>S.wrongQs.has(q.id)&&qInTag(q)).length;
  const totBk = allQ.filter(q=>S.bookmarks.has(q.id)&&qInTag(q)).length;
  const rate  = totQ>0 ? Math.round((totC/totQ)*100) : 0;
  const rateColor = rate>=80?'#4ADE80':rate>=60?'#FBBF24':'#F87171';
  const emptyState = tot === 0;

  // ── Tag pills (clickable) ───────────────────────────────────────────
  const tagStatCards = fileTagStats.length > 0
    ? [`<button onclick="setDashTag(null)"
        style="display:inline-flex;align-items:center;gap:.4rem;padding:.45rem .85rem;border-radius:10px;cursor:pointer;border:none;transition:all .18s;
          background:${!dt?'var(--accent)':'rgba(255,255,255,.05)'};
          color:${!dt?'#fff':'var(--text-2)'};
          outline:1px solid ${!dt?'var(--accent)':'var(--border)'};font-size:.8rem;font-weight:600;">
        全部
      </button>`,
      ...fileTagStats.map(s => {
        const tc  = tagColor(s.tag);
        const on  = dt === s.tag;
        return `<button data-tag="${s.tag.replace(/"/g,'&quot;')}" onclick="setDashTag(this.dataset.tag)"
          style="display:inline-flex;align-items:center;gap:.5rem;padding:.45rem .9rem;border-radius:10px;cursor:pointer;border:none;transition:all .18s;
            background:${on?tc.color:tc.bg};color:${on?'#111':tc.color};
            outline:1px solid ${on?tc.color:tc.border};font-size:.8rem;font-weight:${on?700:500};">
          ${on?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><polyline points="20 6 9 17 4 12"/></svg>':''}
          ${s.tag}
          <span style="font-family:'JetBrains Mono',monospace;font-size:.7rem;opacity:.75;">${s.qCount}題</span>
        </button>`;
      })
    ].join('')
    : `<p style="font-size:.84rem;color:var(--text-3);">尚未匯入題目，請至「資料集」上傳並貼標。</p>`;

  // ── Per-category bars ───────────────────────────────────────────────
  const catMap = {};
  filtHist.forEach(h => {
    if (!h.catStats) return;
    const entries = dt ? [[dt, h.catStats[dt]]] : Object.entries(h.catStats);
    entries.forEach(([cat,st]) => {
      if (!st) return;
      if (!catMap[cat]) catMap[cat]={correct:0,total:0};
      catMap[cat].correct += st.correct;
      catMap[cat].total   += st.total;
    });
  });
  const catEntries = Object.entries(catMap).sort((a,b)=>b[1].total-a[1].total);

  const catBars = catEntries.length > 0

        const p  = Math.round((st.correct/st.total)*100);

          </div>

            <div style="height:100%;width:${p}%;background:${bc};border-radius:999px;transition:width .7s ease;"></div>
          </div>

  // ── History rows ─────────────────────────────────────────────────────
  const histRows = filtHist.length > 0
    ? [...filtHist].reverse().map(h => {
        const c  = hCorrect(h), t = hTotal(h);
        const r  = t>0 ? Math.round((c/t)*100) : 0;

      }).join('')
    : `<div style="padding:2rem;text-align:center;color:var(--text-3);font-size:.85rem;">${dt?`「${dt}」尚無測驗紀錄。`:'尚無測驗紀錄，完成第一次測驗後將顯示於此。'}</div>`;

  return `

    <div style="margin-bottom:2rem;">
      <div class="badge badge-gr" style="margin-bottom:.7rem">學習儀表板</div>
      <h2 style="font-size:1.8rem;font-weight:700;letter-spacing:-.035em;">學習成效總覽</h2>
    </div>

    <!-- Selectable tag filter -->
    <div style="margin-bottom:1.75rem;padding:1.2rem 1.4rem;border-radius:14px;background:rgba(20,20,32,.6);border:1px solid var(--border);">
      <p style="font-size:.7rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.85rem;">
        資料集來源標籤
        ${dt?`<span style="font-size:.68rem;font-weight:400;color:var(--accent);margin-left:.6rem;">· 篩選中：${dt}</span>`:''}
      </p>
      <div style="display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;">${tagStatCards}</div>
    </div>

    <!-- Stat Cards -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.9rem;margin-bottom:1.8rem;">
      <div class="s-card">
        <p style="font-size:.68rem;color:var(--text-3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem;">測驗次數</p>
        <div class="mono" style="font-size:2.3rem;font-weight:500;color:var(--accent);line-height:1.1;">${tot||'—'}</div>
        <p style="font-size:.72rem;color:var(--text-3);margin-top:.2rem;">${tot>0?'次':'尚無紀錄'}</p>
      </div>
      <div class="s-card">
        <p style="font-size:.68rem;color:var(--text-3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem;">答對率</p>
        <div class="mono" style="font-size:2.3rem;font-weight:500;color:${emptyState?'var(--text-3)':rateColor};line-height:1.1;">${emptyState?'—':rate+'%'}</div>
        <p style="font-size:.72rem;color:var(--text-3);margin-top:.2rem;">${emptyState?'尚無紀錄':totC+'/'+totQ+' 題'}</p>
      </div>
      <div class="s-card" style="position:relative;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;">
          <p style="font-size:.68rem;color:var(--text-3);letter-spacing:.08em;text-transform:uppercase;">累計錯誤題</p>
          ${totW>0?`<button onclick="downloadQuestionsCSV('wrong','${(dt||'').replace(/'/g,"\\\\'")}');" title="下載錯誤題目 CSV"
            style="background:transparent;border:none;cursor:pointer;color:var(--text-3);padding:.15rem;border-radius:5px;display:flex;transition:color .15s;"

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">

          ${totBk>0?`<button onclick="downloadQuestionsCSV('bookmarked','${(dt||'').replace(/'/g,"\\\\'")}');" title="下載標記題目 CSV"
            style="background:transparent;border:none;cursor:pointer;color:var(--text-3);padding:.15rem;border-radius:5px;display:flex;transition:color .15s;"
            onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-3)'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>`:''}
        </div>
        <div class="mono" style="font-size:2.3rem;font-weight:500;color:${totBk>0?'var(--gold)':'var(--text-3)'};line-height:1.1;">${totBk||'—'}</div>
        <p style="font-size:.72rem;color:var(--text-3);margin-top:.2rem;">待複習</p>
      </div>
    </div>

    <!-- Charts row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.5rem;">
      <div class="s-card">
        <p style="font-size:.7rem;font-weight:700;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.1rem;">
          測驗分數趨勢${dt?` · ${dt}`:''}
        </p>
        ${emptyState
          ? `<div style="height:160px;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:.82rem;">完成測驗後顯示趨勢圖</div>`
          : `<canvas id="scoreChart"></canvas>`}
      </div>
      <div class="s-card">
        <p style="font-size:.7rem;font-weight:700;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.1rem;">
          各分類答對率${dt?` · ${dt}`:''}
        </p>
        ${catBars}
      </div>
    </div>

    <!-- History Table -->
    <div style="background:rgba(20,20,32,.7);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:16px;overflow:hidden;">
      <div style="padding:1.1rem 1.1rem .9rem;border-bottom:1px solid var(--border);">
        <p style="font-size:.7rem;font-weight:700;color:var(--text-3);letter-spacing:.08em;text-transform:uppercase;">
          測驗歷史紀錄${dt?` · ${dt}`:''}
        </p>
      </div>
      ${filtHist.length>0?`<div class="h-row" style="background:rgba(255,255,255,.015);">
        <div style="font-size:.68rem;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase">考卷名稱</div>
        <div style="font-size:.68rem;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase">日期</div>
        <div style="font-size:.68rem;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase">答題</div>
        <div style="font-size:.68rem;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase">答對率</div>
        <div style="font-size:.68rem;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase">標記</div>
      </div>`:''}
      ${histRows}
    </div>
  </div>`;
}

function initChart() {
  const canvas = document.getElementById('scoreChart');
  if (!canvas) return;
  if (S.chart) { S.chart.destroy(); S.chart = null; }
  const _filtForChart = S.dashTag ? S.history.filter(h=>h.catStats&&h.catStats[S.dashTag]) : S.history;
  if (!_filtForChart.length) return;

  const dt = S.dashTag;
  const filtHist = dt ? S.history.filter(h => h.catStats && h.catStats[dt]) : S.history;
  const hC = h => dt ? (h.catStats?.[dt]?.correct||0) : h.correct;
  const hT = h => dt ? (h.catStats?.[dt]?.total||1)  : h.total;
  const labels = filtHist.map(h => h.name ? h.name.slice(0,10) : `#${h.id}`);
  const data   = filtHist.map(h => { const t=hT(h); return t>0?Math.round((hC(h)/t)*100):0; });

  S.chart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '答對率',
        data,
        borderColor: 'rgba(123,111,224,.85)',
        backgroundColor: 'rgba(123,111,224,.08)',
        pointBackgroundColor: data.map(v=>v>=80?'#4ADE80':v>=60?'#FBBF24':'#F87171'),
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.35,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx=>` ${ctx.parsed.y}%`, title: ctx=>ctx[0].label } }
      },
      scales: {
        y: { min:0, max:100,
          ticks:{ color:'rgba(255,255,255,.35)', font:{family:'JetBrains Mono',size:11}, callback:v=>v+'%'},
          border:{color:'rgba(255,255,255,.07)'} },
        x: { ticks:{ color:'rgba(255,255,255,.35)', font:{family:'JetBrains Mono',size:11} },
          border:{color:'rgba(255,255,255,.07)'} }
      }
    }
  });
}

/* ── Download questions as CSV ── */
function downloadQuestionsCSV(type, tagFilter) {
  const allQ  = [...QUESTIONS, ...S.extraQs];
  const tag   = tagFilter || S.dashTag || null;
  const inTag = q => !tag || q.category === tag;
  let pool, filename;
  if (type === 'wrong') {
    pool     = allQ.filter(q => S.wrongQs.has(q.id) && inTag(q));
    filename = (tag ? tag+'_' : '') + '錯誤題目.csv';
  } else {
    pool     = allQ.filter(q => S.bookmarks.has(q.id) && inTag(q));
    filename = (tag ? tag+'_' : '') + '標記題目.csv';
  }
  if (!pool.length) return;

  const ANS = ['A','B','C','D','E'];
  // Match the same format as downloadTemplate()
  const header = ['id','exam','question','option_a','option_b','option_c','option_d','option_e','answer','explanation'];
  const rows = pool.map((q,i) => [
    i+1,
    q.category||'',
    q.text||'',
    q.options?.[0]||'',
    q.options?.[1]||'',
    q.options?.[2]||'',
    q.options?.[3]||'',
    q.options?.[4]||'',
    ANS[q.answer]||'',
    q.explanation||'',
  ]);

  const escCSV = v => {
    const s = String(v).replace(/"/g,'""');
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? '"'+s+'"' : s;
  };
  const csv = [header, ...rows]
    .map(r => r.map(escCSV).join(','))
    .join('\n');

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
