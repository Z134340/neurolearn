<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroLearn — 智能學習平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg-base: #0B0B12;
    --bg-surface: #11111A;
    --bg-card: #181824;
    --accent: #7B6FE0;
    --accent-dim: rgba(123,111,224,0.1);
    --accent-border: rgba(123,111,224,0.3);
    --gold: #C8963E;
    --gold-dim: rgba(200,150,62,0.1);
    --gold-border: rgba(200,150,62,0.28);
    --green: #4ADE80;
    --red: #F87171;
    --amber: #FBBF24;
    --text-1: #E2E2EE;
    --text-2: #8888A8;
    --text-3: #525270;
    --border: rgba(255,255,255,0.07);
    --border-h: rgba(255,255,255,0.14);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'DM Sans','Inter','Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg-base);
    color:var(--text-1);
    min-height:100vh;
    overflow-x:hidden;
  }
  /* Ambient background */
  body::before{
    content:'';position:fixed;inset:0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 20%, rgba(123,111,224,0.07) 0%,transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 80%, rgba(200,150,62,0.05) 0%,transparent 60%);
    pointer-events:none;z-index:0;
  }
  /* Subtle grid */
  body::after{
    content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
    background-size:44px 44px;
    pointer-events:none;z-index:0;
  }
  h1,h2,h3,h4{font-family:'Sora',sans-serif}
  .mono{font-family:'JetBrains Mono','Cascadia Code','Consolas',monospace}

  /* ─── Navbar ─── */
  #navbar{
    position:fixed;top:0;left:0;right:0;height:62px;
    background:rgba(11,11,18,0.88);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border-bottom:1px solid var(--border);
    z-index:200;display:flex;align-items:center;
    padding:0 1.75rem;justify-content:space-between;
  }
  .nav-logo{display:flex;align-items:center;gap:.65rem;cursor:pointer}
  .nav-logo-icon{
    width:32px;height:32px;border-radius:9px;
    background:linear-gradient(135deg,#7B6FE0,#5244C2);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 14px rgba(123,111,224,.35);
  }
  .nav-logo-text{font-family:'Sora','Inter','Segoe UI',system-ui,-apple-system,sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:-.02em}
  .nav-links{display:flex;align-items:center;gap:.25rem}
  .nav-link{
    background:transparent;border:none;color:var(--text-2);
    padding:.42rem .85rem;border-radius:8px;font-size:.83rem;
    font-family:'DM Sans','Inter','Segoe UI',system-ui,-apple-system,sans-serif;cursor:pointer;
    transition:all .2s ease;
  }
  .nav-link:hover{color:var(--text-1);background:rgba(255,255,255,.05)}
  .nav-link.active{color:var(--accent);background:var(--accent-dim)}

  /* ─── Page ─── */
  #page-content{min-height:100vh;padding-top:62px;position:relative;z-index:1}
  .page{animation:fadeUp .38s cubic-bezier(.4,0,.2,1)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  /* ─── Badge ─── */
  .badge{
    display:inline-flex;align-items:center;gap:.25rem;
    padding:.18rem .55rem;border-radius:999px;
    font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  }
  .badge-v{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
  .badge-g{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
  .badge-gr{background:rgba(74,222,128,.08);color:var(--green);border:1px solid rgba(74,222,128,.25)}
  .badge-r{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.25)}
  .badge-a{background:rgba(251,191,36,.08);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
  .badge-n{background:rgba(255,255,255,.05);color:var(--text-2);border:1px solid var(--border)}

  /* ─── Buttons ─── */
  .btn{
    display:inline-flex;align-items:center;gap:.4rem;
    border:none;border-radius:10px;cursor:pointer;
    font-family:'Sora','Inter','Segoe UI',system-ui,-apple-system,sans-serif;font-weight:600;
    font-size:.875rem;letter-spacing:.01em;transition:all .2s ease;
    padding:.7rem 1.5rem;
  }
  .btn-primary{
    background:linear-gradient(135deg,#7B6FE0,#5244C2);color:#fff;
    box-shadow:0 2px 12px rgba(123,111,224,.25);
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(123,111,224,.4)}
  .btn-primary:active{transform:translateY(0)}
  .btn-primary:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-ghost{
    background:transparent;color:var(--text-2);
    border:1px solid var(--border);font-family:'DM Sans','Inter','Segoe UI',system-ui,-apple-system,sans-serif;font-weight:500;
  }
  .btn-ghost:hover{border-color:var(--border-h);color:var(--text-1);background:rgba(255,255,255,.04)}

  /* ─── Glass Card ─── */
  .g-card{
    background:rgba(24,24,36,.65);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--border);border-radius:18px;
    transition:border-color .25s,box-shadow .25s,transform .3s cubic-bezier(.4,0,.2,1);
  }
  .g-card:hover{border-color:var(--border-h);box-shadow:0 16px 40px rgba(0,0,0,.28)}

  /* ─── Nav Cards (Home) ─── */
  .n-card{
    background:rgba(20,20,32,.55);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--border);border-radius:22px;padding:2.25rem;
    cursor:pointer;position:relative;overflow:hidden;
    transition:all .35s cubic-bezier(.4,0,.2,1);
  }
  .n-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--c,#7B6FE0),transparent);
    opacity:0;transition:opacity .3s;
  }
  .n-card:hover{border-color:var(--c-border,var(--accent-border));transform:translateY(-9px);box-shadow:0 28px 56px rgba(0,0,0,.45),0 0 32px var(--c-glow,rgba(123,111,224,.07))}
  .n-card:hover::before{opacity:1}

  /* ─── Progress bar ─── */
  .pb-bg{height:3px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden}
  .pb-fill{height:100%;background:linear-gradient(90deg,var(--accent),#9988F5);border-radius:999px;transition:width .5s ease}

  /* ─── Option Buttons ─── */
  .opt{
    width:100%;text-align:left;
    background:rgba(255,255,255,.025);border:1px solid var(--border);
    border-radius:12px;padding:.9rem 1.1rem;color:var(--text-1);
    cursor:pointer;transition:all .18s ease;
    font-family:'DM Sans','Inter','Segoe UI',system-ui,-apple-system,sans-serif;font-size:.92rem;
    display:flex;align-items:center;gap:.75rem;
  }
  .opt:hover:not(.locked){border-color:var(--accent-border);background:var(--accent-dim)}
  .opt.sel{border-color:var(--accent);background:var(--accent-dim)}
  .opt.correct{border-color:rgba(74,222,128,.55)!important;background:rgba(74,222,128,.07)!important;color:var(--green)}
  .opt.wrong{border-color:rgba(248,113,113,.55)!important;background:rgba(248,113,113,.07)!important;color:var(--red)}
  .opt.dim{opacity:.35}
  .opt.locked{cursor:default}

  /* ─── Bookmark ─── */
  .bk-btn{
    background:transparent;border:none;cursor:pointer;
    color:var(--text-3);padding:.3rem;border-radius:7px;
    transition:all .2s;display:flex;align-items:center;
  }
  .bk-btn:hover{color:var(--gold);background:var(--gold-dim)}
  .bk-btn.on{color:var(--gold)}

  /* ─── Drop Zone ─── */
  .drop-zone{
    border:2px dashed rgba(255,255,255,.12);border-radius:20px;
    padding:3rem 2rem;text-align:center;cursor:pointer;
    transition:all .25s ease;
  }
  .drop-zone:hover,.drop-zone.dv{
    border-color:var(--accent);background:var(--accent-dim);
  }

  /* ─── Stat Card ─── */
  .s-card{
    background:rgba(24,24,36,.7);backdrop-filter:blur(12px);
    border:1px solid var(--border);border-radius:16px;padding:1.4rem;
  }

  /* ─── Review card ─── */
  .rv-card{border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .rv-hdr{
    padding:1rem 1.2rem;cursor:pointer;
    display:flex;align-items:center;justify-content:space-between;
    transition:background .15s;
  }
  .rv-hdr:hover{background:rgba(255,255,255,.025)}
  .rv-body{display:none;padding:0 1.2rem 1.2rem;border-top:1px solid var(--border)}
  .rv-body.open{display:block}

  /* ─── History ─── */
  .h-row{
    display:grid;grid-template-columns:2.5fr 1.5fr 1fr 1fr 1fr;
    align-items:center;padding:.8rem 1.1rem;
    border-bottom:1px solid var(--border);transition:background .15s;
  }
  .h-row:hover{background:rgba(255,255,255,.02)}
  .h-row:last-child{border-bottom:none}

  /* ─── Result Item ─── */
  .r-item{
    border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem;
    transition:all .15s;
  }
  .r-item.ok{border-color:rgba(74,222,128,.18);background:rgba(74,222,128,.025)}
  .r-item.bad{border-color:rgba(248,113,113,.18);background:rgba(248,113,113,.025)}

  /* ─── Gradient text ─── */
  .grad-text{
    background:linear-gradient(135deg,#9B8FF0 0%,#C8963E 45%,#7B6FE0 100%);
    background-size:200% 200%;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    animation:gradShift 5s ease infinite;
  }
  @keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}

  .sep{height:1px;background:var(--border);margin:1.25rem 0}

  /* ─── Pulse dot ─── */
  .pulse-dot{
    width:7px;height:7px;border-radius:50%;background:var(--green);
    animation:pulse 2.2s ease infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

  /* ─── Chart canvas ─── */
  #scoreChart{max-height:200px}

  /* ─── Score ring ─── */
  .score-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<!-- ════ NAVBAR ════ -->
<nav id="navbar">
  <div class="nav-logo" onclick="navigate('home')">
    <div class="nav-logo-icon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5M2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="nav-logo-text">NeuroLearn</span>
  </div>
  <div class="nav-links">
    <button class="nav-link" id="nl-home"   onclick="navigate('home')">首頁</button>
    <button class="nav-link" id="nl-data"   onclick="navigate('datasets')">資料集</button>
    <button class="nav-link" id="nl-quiz"   onclick="navigate('quiz')">模擬考</button>
    <button class="nav-link" id="nl-dash"   onclick="navigate('dashboard')">儀表板</button>
  </div>
</nav>

<main id="page-content"></main>

<script>
/* ╔══════════════════════════════════╗
   ║          MOCK DATA               ║
   ╚══════════════════════════════════╝ */
const QUESTIONS = [
  {id:0,category:'AI治理',difficulty:'中等',text:`A company makes forecasts each quarter to decide how to optimize operations to meet expected demand. The company uses ML models to make these forecasts. An AI practitioner is writing a report about the trained ML models to provide transparency and explainability to company stakeholders. What should the AI practitioner include in the report to meet `,options:[`Code for model training（模型训练代码）`,`Partial dependence plots (PDPs)（部分依赖图）`,`Sample data for training（训练样本数据）`,`Model convergence tables（模型收敛表）`],answer:1,explanation:`A - 错误，训练代码对非技术利益相关者来说难以理解 B - 正确，部分依赖图可以直观展示特征如何影响预测结果，有助于模型解释 C - 错误，样本数据不能解释模型的决策过程 D - 错误，收敛表主要反映训练过程，不能解释模型的预测逻辑`},
  {id:1,category:'LLM應用',difficulty:'中等',text:`A law firm wants to build an AI application by using large language models (LLMs). The application will read legal documents and extract key points from the documents. Which solution meets these requirements? （一家律师事务所想要使用大型语言模型（LLMs）构建一个 AI 应用程序。该应用程序将读取法律文件并从文件中提取关键点。哪种解决方案满足这些要求？）`,options:[`Build an automatic named entity recognition system（构建自动命名实体识别系统）`,`Create a recommendation engine（创建推荐引擎）`,`Develop a summarization chatbot（开发摘要聊天机器人）`,`Develop a multi-language translation system（开发多语言翻译系统）`],answer:2,explanation:`A - 错误，命名实体识别只能识别特定实体，不能提取文档的关键点 B - 错误，推荐引擎用于推荐内容，不适合提取文档关键点 C - 正确，摘要聊天机器人可以阅读文档并提取关键信息点，最符合需求 D - 错误，翻译系统用于语言转换，不适合提取文档关键点`},
  {id:2,category:'資料處理',difficulty:'中等',text:`A company wants to classify human genes into 20 categories based on gene characteristics. The company needs an ML algorithm to document how the inner mechanism of the model affects the output. Which ML algorithm meets these requirements? （一家公司想要根据基因特征将人类基因分类为 20 个类别。该公司需要一个 ML 算法来记录模型的内部机制如何影响输出。哪种 ML 算法满足这些要求？）`,options:[`Decision trees（决策树）`,`Linear regression（线性回归）`,`Logistic regression（逻辑回归）`,`Neural networks（神经网络）`],answer:0,explanation:`A - 正确，决策树具有高度可解释性，可以清晰展示决策过程和特征重要性 B - 错误，线性回归用于预测连续值，不适合多类别分类任务 C - 错误，逻辑回归虽然可解释但主要用于二分类，不适合 20 类分类 D - 错误，神经网络是黑盒模型，内部机制难以解释和记录`},
  {id:3,category:'ML基礎',difficulty:'中等',text:`A company has built an image classification model to predict plant diseases from photos of plant leaves. The company wants to evaluate how many images the model classified correctly. Which evaluation metric should the company use to measure the model's performance? （一家公司构建了一个图像分类模型，用于从植物叶子照片预测植物疾病。该公司想要评估模型正确分类了多少图像。公司应该使用哪种评估指标来衡量模型的性能？）`,options:[`R-squared score（R 平方分数）`,`Accuracy（准确率）`,`Root mean squared error (RMSE)（均方根误差）`,`Learning rate（学习率）`],answer:1,explanation:`A - 错误，R 平方分数主要用于回归问题，不适合分类任务 B - 正确，准确率直接反映分类正确的比例，最适合评估分类模型的性能 C - 错误，RMSE 用于回归问题，不适合分类任务 D - 错误，学习率是训练参数，不是评估指标`},
  {id:4,category:'LLM應用',difficulty:'中等',text:`A company is using a pre-trained large language model (LLM) to build a chatbot for product recommendations. The company needs the LLM outputs to be short and written in a specific language. Which solution will align the LLM response quality with the company's expectations? （一家公司正在使用预训练的大型语言模型（LLM）构建产品推荐聊天机器人。公司需要 LLM 输出简短并使用特定语言。哪种解决方案能使 LLM 响应质量符合`,options:[`Adjust the prompt（调整提示词）`,`Choose an LLM of a different size（选择不同大小的 LLM）`,`Increase the temperature（增加温度参数）`,`Increase the Top K value（增加 Top K 值）`],answer:0,explanation:`A - 正确，通过调整提示词可以控制输出的长度和语言，最直接有效的方法 B - 错误，更改模型大小不能直接控制输出格式和语言 C - 错误，增加温度会增加输出的随机性，不能保证输出格式 D - 错误，调整 Top K 值影响 token 选择，不能直接控制输出长度和语言`},
  {id:5,category:'模型評估',difficulty:'中等',text:`A company uses Amazon SageMaker for its ML pipeline in a production environment. The company has large input data sizes up to 1 GB and processing times up to 1 hour. The company needs near real-time latency. Which SageMaker inference option meets these requirements? （一家公司在生产环境中使用 Amazon SageMaker 进行 ML 流程。该公司的输入数据大小高达 1 GB，处理时间长达 1 小时。公司需要接近实时的延迟。哪`,options:[`Real-time inference（实时推理）`,`Serverless inference（无服务器推理）`,`Asynchronous inference（异步推理）`,`Batch transform（批量转换）`],answer:2,explanation:`A - 错误，实时推理最大支持 6MB 负载，处理时间限制为 60 秒 B - 错误，无服务器推理最大支持 4MB 负载，处理时间限制为 60 秒 C - 正确，异步推理支持高达 1GB 的负载和最长 1 小时的处理时间，适合近实时要求 D - 错误，批量转换适用于离线批处理，不满足近实时要求`},
  {id:6,category:'ML基礎',difficulty:'中等',text:`A company is using domain-specific models. The company wants to avoid creating new models from the beginning. The company instead wants to adapt pre-trained models to create models for new, related tasks. Which ML strategy meets these requirements? （一家公司正在使用领域特定模型。该公司想要避免从头开始创建新模型。相反，该公司想要适应预训练模型来为新的相关任务创建模型。哪种 ML 策略满足这些要求？）`,options:[`Increase the number of epochs（增加训练轮数）`,`Use transfer learning（使用迁移学习）`,`Decrease the number of epochs（减少训练轮数）`,`Use unsupervised learning（使用无监督学习）`],answer:1,explanation:`A - 错误，增加训练轮数不能解决从预训练模型适应新任务的需求 B - 正确，迁移学习正是为了重用预训练模型并适应新任务而设计的 C - 错误，减少训练轮数不能帮助模型适应新任务 D - 错误，无监督学习是一种学习方法，不直接解决模型重用的问题`},
  {id:7,category:'模型評估',difficulty:'中等',text:`A company is building a solution to generate images for protective eyewear. The solution must have high accuracy and must minimize the risk of incorrect annotations. Which solution will meet these requirements? （一家公司正在构建一个生成防护眼镜图像的解决方案。该解决方案必须具有高准确性，并且必须最大限度地降低错误标注的风险。哪种解决方案能满足这些要求？）`,options:[`Human-in-the-loop validation by using Amazon SageMaker Ground Truth Plus（使用 Amazon SageMaker Ground Truth Plus 进行人工验证）`,`Data augmentation by using an Amazon Bedrock knowledge base（使用 Amazon Bedrock知识库进行数据增强）`,`Image recognition by using Amazon Rekognition（使用 Amazon Rekognition 进行图像识别）`,`Data summarization by using Amazon QuickSight Q（使用 Amazon QuickSight Q 进行数据汇总）`],answer:0,explanation:`A - 正确，人工验证能确保标注的高准确性，并最大程度减少错误标注的风险 B - 错误，数据增强不能保证标注的准确性 C - 错误，Rekognition 是用于图像识别，不适合生成和标注任务 D - 错误，QuickSight Q 是用于数据可视化和分析的工具，不适合图像处理任务`},
  {id:8,category:'模型評估',difficulty:'中等',text:`A company wants to create a chatbot by using a foundation model (FM) on Amazon Bedrock. The FM needs to access encrypted data that is stored in an Amazon S3 bucket. The data is encrypted with Amazon S3 managed keys (SSE-S3). The FM encounters a failure when attempting to access the S3 bucket data. Which solution will meet these requirements? （一家公司想`,options:[`确保 Amazon Bedrock 承担的角色有权限使用正确的加密密钥解密数据 (Ensure that the role that Amazon Bedrock assumes has permission to decrypt data with the correct encryption key)`,`将 S3 存储桶的访问权限设置为允许公共访问以启用互联网访问 (Set the access permissions for the S3 buckets to allow public access to enable access over the internet)`,`使用提示工程技术告诉模型在 Amazon S3 中查找信息 (Use prompt engineering techniques to tell the model to look for information in Amazon S3)`,`确保 S3 数据不包含敏感信息 (Ensure that the S3 data does not contain sensitive information)`],answer:0,explanation:`A - 正确，Bedrock 需要适当的 IAM 权限来访问和解密 S3 中的数据 B - 错误，允许公共访问会带来安全风险，且不解决权限问题 C - 错误，提示工程不能解决权限访问问题 D - 错误，数据是否敏感与访问权限问题无关`},
  {id:9,category:'LLM應用',difficulty:'中等',text:`A company wants to use language models to create an application for inference on edge devices. The inference must have the lowest latency possible. Which solution will meet these requirements? （一家公司想要使用语言模型在边缘设备上创建一个用于推理的应用程序。推理必须具有尽可能低的延迟。哪种解决方案能满足这些要求？）`,options:[`在边缘设备上部署优化的小型语言模型（SLMs）`,`在边缘设备上部署优化的大型语言模型（LLMs）`,`整合集中式小型语言模型（SLM）API，用于与边缘设备进行异步通信`,`整合集中式大型语言模型（LLM）API，用于与边缘设备进行异步通信`],answer:0,explanation:`A - 在边缘设备上部署优化的 SLMs 是最佳选择，因为： - SLMs 体积小，适合边缘设备的资源限制 - 本地部署消除了网络延迟 - 优化后的模型可以提供快速推理 - 不依赖网络连接`},
  {id:10,category:'資料處理',difficulty:'中等',text:`A company wants to build an ML model by using Amazon SageMaker. The company needs to share and manage variables for model development across multiple teams. Which SageMaker feature meets these requirements? （一家公司想要使用 Amazon SageMaker 构建 ML 模型。公司需要在多个团队之间共享和管理模型开发的变量。哪个 SageMaker 功能满足这些要求？）`,options:[`Amazon SageMaker Feature Store（Amazon SageMaker 特征存储）`,`Amazon SageMaker Data Wrangler（Amazon SageMaker 数据整理器）`,`Amazon SageMaker Clarify（Amazon SageMaker 说明器）`,`Amazon SageMaker Model Cards（Amazon SageMaker 模型卡）`],answer:0,explanation:`A - Amazon SageMaker Feature Store 专门设计用于存储、共享和管理 ML 特征，支持多团队协作 B - Data Wrangler 主要用于数据准备和转换，不是特征管理工具 C - SageMaker Clarify 用于模型可解释性和偏差检测 D - Model Cards 用于记录模型文档和元数据`},
  {id:11,category:'LLM應用',difficulty:'中等',text:`A company wants to use generative AI to increase developer productivity and software development. The company wants to use Amazon Q Developer. What can Amazon Q Developer do to help the company meet these requirements? （一家公司想要使用生成式 AI 来提高开发人员生产力和软件开发。该公司想要使用 Amazon Q Developer。Amazon Q Developer 可以如何帮助公司满足这些要求？）`,options:[`创建软件代码片段、引用跟踪和开源许可证跟踪 (Create software snippets,`,`无需配置或管理服务器即可运行应用程序 (Run an application without`,`启用编码的语音命令并提供自然语言搜索 (Enable voice commands for`,`使用 ML 模型将音频文件转换为文本文档 (Convert audio files to text`],answer:0,explanation:``},
  {id:12,category:'模型評估',difficulty:'中等',text:`A financial institution is using Amazon Bedrock to develop an AI application. The application is hosted in a VPC. To meet regulatory compliance standards, the VPC is not allowed access to any internet traffic. Which AWS service or feature will meet these requirements? （一家金融机构正在使用 Amazon Bedrock 开发 AI 应用程序。该应用程序托管在 VPC 中。为了满足监管合规标准，VPC 不允许访问任何互联网流量。`,options:[`AWS PrivateLink`,`Amazon Macie`,`Amazon CloudFront`,`Internet gateway（互联网网关）`],answer:0,explanation:`A - AWS PrivateLink 可以在不使用公共互联网的情况下，通过私有连接访问 AWS 服务，包括 Amazon Bedrock B - Amazon Macie 是一个数据安全和隐私服务，不解决网络连接问题 C - Amazon CloudFront 是内容分发网络服务，需要互联网访问 D - Internet gateway 提供互联网访问，与要求相反`},
  {id:13,category:'ML基礎',difficulty:'中等',text:`A company wants to develop an educational game where users answer questions such as the following: \"A jar contains six red, four green, and three yellow marbles. What is the probability of choosing a green marble from the jar?\" Which solution meets these requirements with the LEAST operational overhead? （一家公司想要开发一个教育游戏，用户需要回答类似这样的问题：\"一个罐子里有六个红色、`,options:[`使用监督学习创建回归模型来预测概率 (Use supervised learning to create`,`使用强化学习训练模型返回概率 (Use reinforcement learning to train a`,`使用简单规则和计算的代码来计算概率 (Use code that will calculate`,`使用无监督学习创建模型来估计概率密度 (Use unsupervised learning to`],answer:2,explanation:`A - 使用监督学习过于复杂，需要大量训练数据和计算资源 B - 强化学习不适合简单的概率计算，且需要复杂的训练过程 C - 使用简单的数学计算（如分子/分母）就能解决这类概率问题，运营开销最小 D - 无监督学习过于复杂，不适合简单的概率计算`},
  {id:14,category:'模型評估',difficulty:'中等',text:`Which metric measures the runtime efficiency of operating AI models? （哪个指标衡量 AI 模型运行时的效率？）`,options:[`客户满意度评分 (Customer satisfaction score, CSAT)`,`每个训练周期的时间 (Training time for each epoch)`,`平均响应时间 (Average response time)`,`训练实例数量 (Number of training instances)`],answer:2,explanation:`A - CSAT 衡量的是用户满意度，不是模型运行效率 B - 每个训练周期的时间是训练效率的指标，不是运行时效率 C - 平均响应时间直接反映了模型在实际运行时的效率表现 D - 训练实例数量与训练规模相关，不衡量运行效率`},
  {id:15,category:'ML基礎',difficulty:'中等',text:`A company has petabytes of unlabeled customer data to use for an advertisement campaign. The company wants to classify its customers into tiers to advertise and promote the company's products. Which methodology should the company use to meet these requirements? （一家公司有数 PB 的未标记客户数据用于广告活动。公司想要将客户分类为不同层级以进行广告宣传和产品推广。公司应该使用哪种方法来满足这些要求？）`,options:[`监督学习 (Supervised learning)`,`无监督学习 (Unsupervised learning)`,`强化学习 (Reinforcement learning)`,`基于人类反馈的强化学习 (Reinforcement learning from human feedback,`],answer:1,explanation:`A - 监督学习需要标记数据，而题目明确说明数据是未标记的 B - 无监督学习最适合处理未标记数据的分类任务，可以基于数据特征自动发现客户群体 C - 强化学习主要用于决策和控制问题，不适合客户分类 D - RLHF 主要用于优化模型输出以符合人类偏好，不适合客户分类任务 这个场景最适合使用无监督学习，特别是聚类算法（如 K-means），可以根据客户的行为特征、购买历史等自然地将客户分组到不同层级。`},
  {id:16,category:'LLM應用',difficulty:'中等',text:`An AI practitioner wants to use a foundation model (FM) to design a search application. The search application must handle queries that have text and images. Which type of FM should the AI practitioner use to power the search application? （一位 AI 从业者想要使用基础模型（FM）设计一个搜索应用。该搜索应用必须能处理包含文本和图像的查询。AI 从业者应该使用哪种类型的 FM 来支持该搜索应用？）`,options:[`多模态嵌入模型 (Multi-modal embedding model)`,`文本嵌入模型 (Text embedding model)`,`多模态生成模型 (Multi-modal generation model)`,`图像生成模型 (Image generation model)`],answer:0,explanation:`A - 多模态嵌入模型专门设计用于处理文本和图像的混合查询，最适合此需求 B - 文本嵌入模型只能处理文本数据，无法处理图像 C - 多模态生成模型主要用于生成内容，而不是搜索 D - 图像生成模型专注于生成图像，不适合搜索应用`},
  {id:17,category:'模型評估',difficulty:'中等',text:`A company uses a foundation model (FM) from Amazon Bedrock for an AI search tool. The company wants to fine-tune the model to be more accurate by using the company's data. Which strategy will successfully fine-tune the model? （一家公司使用 Amazon Bedrock 的基础模型（FM）作为 AI 搜索工具。公司想要使用公司的数据对模型进行微调以提高准确性。哪种策略可以成功地微调模型？）`,options:[`提供带有提示字段和完成字段的标记数据 (Provide labeled data with the`,`通过创建包含多行 CSV 格式的.txt 文件来准备训练数据集 (Prepare the`,`为 Amazon Bedrock 购买预置吞吐量 (Purchase Provisioned Throughput for`,`使用期刊和教科书训练模型 (Train the model on journals and`],answer:0,explanation:`A - 提供带有明确标记的提示-完成对数据是微调模型的正确方式 B - 数据格式不正确，Amazon Bedrock 要求特定的 JSON Lines 格式 C - 预置吞吐量是用于部署模型，与微调过程无关 D - 使用通用文本资料训练不能针对特定任务进行优化`},
  {id:18,category:'AI安全',difficulty:'中等',text:`A company wants to use AI to protect its application from threats. The AI solution needs to check if an IP address is from a suspicious source. Which solution meets these requirements? （一家公司想要使用 AI 来保护其应用程序免受威胁。AI 解决方案需要检查 IP 地址是否来自可疑来源。哪种解决方案满足这些要求？）`,options:[`构建语音识别系统 (Build a speech recognition system)`,`创建自然语言处理（NLP）命名实体识别系统 (Create a natural language`,`开发异常检测系统 (Develop an anomaly detection system)`,`创建欺诈预测系统 (Create a fraud forecasting system)`],answer:2,explanation:`A - 语音识别与 IP 地址安全检测无关 B - NLP 命名实体识别主要用于文本分析，不适用于 IP 地址检测 C - 异常检测系统最适合识别异常的 IP 访问模式和可疑的网络行为 D - 欺诈预测系统更适用于交易行为分析，而不是 IP 地址安全检测`},
  {id:19,category:'資料處理',difficulty:'中等',text:`Which feature of Amazon OpenSearch Service gives companies the ability to build vector database applications? （Amazon OpenSearch Service 的哪个功能使公司能够构建向量数据库应用程序？）`,options:[`与 Amazon S3 对象存储的集成 (Integration with Amazon S3 for object`,`支持地理空间索引和查询 (Support for geospatial indexing and queries)`,`可扩展的索引管理和最近邻搜索能力 (Scalable index management and`,`执行流数据实时分析的能力 (Ability to perform real-time analysis on`],answer:2,explanation:``},
  {id:20,category:'ML基礎',difficulty:'中等',text:`Which option is a use case for generative AI models? （哪个选项是生成式 AI 模型的使用场景？）`,options:[`使用入侵检测系统改善网络安全 (Improving network security by using`,`根据文本描述创建用于数字营销的逼真图像 (Creating photorealistic`,`使用优化索引提高数据库性能 (Enhancing database performance by using`,`分析金融数据以预测股市趋势 (Analyzing financial data to forecast`],answer:1,explanation:`A - 入侵检测是传统 AI 的应用场景，不是生成式 AI 的典型用例 B - 文本到图像生成是生成式 AI 的典型应用场景，如 DALL-E、Stable Diffusion 等 C - 数据库优化是传统数据库技术，不涉及生成式 AI D - 股市预测是预测性分析的应用，属于传统机器学习范畴`},
  {id:21,category:'模型評估',difficulty:'中等',text:`A company wants to build a generative AI application by using Amazon Bedrock and needs to choose a foundation model (FM). The company wants to know how much information can fit into one prompt. Which consideration will inform the company's decision? （一家公司想要使用 Amazon Bedrock 构建生成式 AI 应用程序，并需要选择一个基础模型（FM）。公司想知道一个提示中可以容纳多少信息。哪个考虑因素将影响公司的决定？）`,options:[`温度参数 (Temperature)`,`上下文窗口 (Context window)`,`批量大小 (Batch size)`,`模型大小 (Model size)`],answer:1,explanation:`A - Temperature 参数控制输出的随机性，与提示容量无关 B - Context window（上下文窗口）直接决定了模型能处理的输入 token 数量，即提示的最大容量 C - Batch size 只影响模型处理多个请求的方式，不影响单个提示的容量 D - Model size 虽然与能力相关，但不直接决定单个提示可容纳的信息量`},
  {id:22,category:'LLM應用',difficulty:'中等',text:`A company wants to make a chatbot to help customers. The chatbot will help solve technical problems without human intervention. The company chose a foundation model (FM) for the chatbot. The chatbot needs to produce responses that adhere to company tone. Which solution meets these requirements? （一家公司想要制作一个聊天机器人来帮助客户。该聊天机器人将在没有人工干预的情况下帮助解决技术问题。公司为聊天`,options:[`设置 FM 可以产生的 token 数量的低限制 (Set a low limit on the number`,`使用批量推理来处理详细响应 (Use batch inferencing to process detailed`,`优化提示直到 FM 产生所需的响应 (Refine the prompt until the FM`,`为 temperature 参数定义更高的数值 (Define a higher number for the`],answer:2,explanation:`A - 限制 token 数量会限制回答的完整性，不能确保语气的一致性 B - 批量推理不适用于需要实时交互的聊天机器人场景 C - 通过优化提示可以指导模型使用特定的语气和风格，最适合实现要求 D - 提高 temperature 会增加随机性，可能导致不一致的语气`},
  {id:23,category:'模型評估',difficulty:'中等',text:`A company wants to use a large language model (LLM) on Amazon Bedrock for sentiment analysis. The company wants to classify the sentiment of text passages as positive or negative. Which prompt engineering strategy meets these requirements? （一家公司想要在 Amazon Bedrock 上使用大语言模型（LLM）进行情感分析。公司想要将文本段落的情感分类为正面或负面。哪种提示工程策略满足这些要求？）`,options:[`在提示中提供带有相应正面或负面标签的文本段落示例，然后是要分类的新文本段落`,`在提示中提供关于情感分析和 LLM 工作原理的详细解释 (Provide a detailed`,`提供要分类的新文本段落，不附加任何额外上下文或示例 (Provide the new`,`提供新文本段落，并附带一些不相关任务的示例，如文本摘要或问答 (Provide`],answer:0,explanation:`A - 少样本提示（few-shot prompting）通过提供带标签的例子，能帮助 LLM 更准确地理解任务要求 B - 解释工作原理对模型性能没有实质帮助，反而会占用 token 空间 C - 零样本提示（zero-shot）效果通常不如少样本提示 D - 提供不相关任务的示例会混淆模型，降低性能`},
  {id:24,category:'模型評估',difficulty:'中等',text:`A security company is using Amazon Bedrock to run foundation models (FMs). The company wants to ensure that only authorized users invoke the models. The company needs to identify any unauthorized access attempts to set appropriate AWS Identity and Access Management (IAM) policies and roles for future iterations of the FMs. Which AWS service should `,options:[`AWS Audit Manager（AWS 审计管理器）`,`AWS CloudTrail（AWS 云跟踪）`,`Amazon Fraud Detector（Amazon 欺诈检测器）`,`AWS Trusted Advisor（AWS 可信顾问）`],answer:1,explanation:`A - Audit Manager 主要用于合规性审计，不是实时监控访问尝试的最佳工具 B - CloudTrail 专门用于记录和监控 AWS API 调用，可以跟踪所有对 Bedrock 的访问尝试 C - Fraud Detector 主要用于检测欺诈行为，不适用于 API 访问监控 D - Trusted Advisor 提供最佳实践建议，不能监控具体的访问尝试`},
  {id:25,category:'ML基礎',difficulty:'中等',text:`A company has developed an ML model for image classification. The company wants to deploy the model to production so that a web application can use the model. The company needs to implement a solution to host the model and serve predictions without managing any of the underlying infrastructure. Which solution will meet these requirements? （一家公司开发了一`,options:[`使用 Amazon SageMaker Serverless Inference 部署模型 (Use Amazon`,`使用 Amazon CloudFront 部署模型 (Use Amazon CloudFront to deploy the`,`使用 Amazon API Gateway 托管模型并提供预测 (Use Amazon API Gateway to`,`使用 AWS Batch 托管模型并提供预测 (Use AWS Batch to host the model`],answer:0,explanation:`A - SageMaker Serverless Inference 提供完全托管的无服务器模型部署，自动扩展且无需管理基础设施 B - CloudFront 是内容分发服务，不能托管和执行 ML 模型 C - API Gateway 只能管理 API，不能直接托管 ML 模型 D - AWS Batch 主要用于批处理任务，不适合实时预测服务`},
  {id:26,category:'模型評估',difficulty:'中等',text:`An AI company periodically evaluates its systems and processes with the help of independent software vendors (ISVs). The company needs to receive email message notifications when an ISV's compliance reports become available. Which AWS service can the company use to meet this requirement? （一家 AI 公司在独立软件供应商（ISV）的帮助下定期评估其系统和流程。公司需要在 ISV 的合规报告可用时接收电子邮件`,options:[`AWS Audit Manager（AWS 审计管理器）`,`AWS Artifact（AWS 工件）`,`AWS Trusted Advisor（AWS 可信顾问）`,`AWS Data Exchange（AWS 数据交换）`],answer:1,explanation:`A - Audit Manager 主要用于持续审计 AWS 环境，不专门处理 ISV 合规报告 B - AWS Artifact 专门提供合规报告访问和通知功能，包括 ISV 的合规报告通知 C - Trusted Advisor 提供 AWS 最佳实践建议，不处理 ISV 合规报告 D - Data Exchange 用于数据集共享，不是合规报告管理工具`},
  {id:27,category:'LLM應用',difficulty:'中等',text:`A company wants to use a large language model (LLM) to develop a conversational agent. The company needs to prevent the LLM from being manipulated with common prompt engineering techniques to perform undesirable actions or expose sensitive information. Which action will reduce these risks? （一家公司想要使用大语言模型开发对话代理。公司需要防止 LLM 被常见的提示工程技术操纵，执行不良行为或泄露敏感信息。`,options:[`创建一个提示模板，教导 LLM 检测攻击模式 (Create a prompt template`,`增加对 LLM 调用请求的 temperature 参数 (Increase the temperature`,`避免使用未在 Amazon SageMaker 中列出的 LLM (Avoid using LLMs that are`,`减少 LLM 调用的输入令牌数量 (Decrease the number of input tokens on`],answer:0,explanation:`A - 创建防御性提示模板是最有效的安全措施，可以帮助 LLM 识别和防范潜在的攻击模式 B - 增加 temperature 只会增加输出的随机性，不能提高安全性 C - 模型的来源平台不是关键的安全考虑因素 D - 减少输入令牌数量不能有效防止安全攻击，反而可能影响功能完整性`},
  {id:28,category:'模型評估',difficulty:'中等',text:`A company is using the Generative AI Security Scoping Matrix to assess security responsibilities for its solutions. The company has identified four different solution scopes based on the matrix. Which solution scope gives the company the MOST ownership of security responsibilities? （一家公司正在使用生成式 AI 安全范围矩阵来评估其解决方案的安全责任。该公司基于矩阵确定了四个不同的解决方案范围。哪个解决方案范围给`,options:[`使用具有嵌入式生成式 AI 功能的第三方企业应用程序`,`使用现有的第三方生成式 AI 基础模型（FM）构建应用程序`,`使用特定于业务的数据对现有第三方生成式 AI`,`使用客户拥有的特定数据从头开始构建和训练生成式 AI 模型`],answer:3,explanation:`A - 使用第三方应用程序时，大部分安全责任由供应商承担 B - 使用现成的 FM 时，模型相关的安全责任主要由提供商负责 C - 微调现有模型时，部分安全责任由公司承担，但基础模型的安全仍由提供商负责 D - 从头构建模型时，公司需要承担所有安全责任，包括数据安全、模型安全和部署安全`},
  {id:29,category:'資料處理',difficulty:'中等',text:`An AI practitioner has a database of animal photos. The AI practitioner wants to automatically identify and categorize the animals in the photos without manual human effort. Which strategy meets these requirements? （一位 AI 从业者拥有一个动物照片数据库。该 AI 从业者希望在不需要人工手动操作的情况下自动识别和分类照片中的动物。哪种策略满足这些要求？）`,options:[`对象检测 (Object detection)`,`异常检测 (Anomaly detection)`,`命名实体识别 (Named entity recognition)`,`图像修复 (Inpainting)`],answer:0,explanation:`A - 对象检测专门用于识别和分类图像中的物体，最适合自动识别照片中的动物 B - 异常检测用于识别异常模式，不适合动物分类任务 C - 命名实体识别用于文本处理，不适用于图像识别 D - 图像修复用于修复损坏的图像部分，不适合分类任务`},
  {id:30,category:'模型評估',difficulty:'中等',text:`A company wants to create an application by using Amazon Bedrock. The company has a limited budget and prefers flexibility without long-term commitment. Which Amazon Bedrock pricing model meets these requirements? （一家公司想要使用 Amazon Bedrock 创建应用程序。该公司预算有限，倾向于灵活性而不需要长期承诺。哪种 Amazon Bedrock 定价模型满足这些要求？）`,options:[`按需付费 (On-Demand)`,`模型定制 (Model customization)`,`预置吞吐量 (Provisioned Throughput)`,`竞价实例 (Spot Instance)`],answer:0,explanation:``},
  {id:31,category:'模型評估',difficulty:'中等',text:`Which AWS service or feature can help an AI development team quickly deploy and consume a foundation model (FM) within the team's VPC （哪个 AWS 服务或功能可以帮助 AI 开发团队在其 VPC 内快速部署和使用基础模型（FM）？）`,options:[`Amazon Personalize（Amazon 个性化服务）`,`Amazon SageMaker JumpStart（Amazon SageMaker 快速启动）`,`PartyRock, an Amazon Bedrock Playground（Amazon Bedrock 游乐场）`,`Amazon SageMaker endpoints（Amazon SageMaker 端点）`],answer:1,explanation:`A - Personalize 是一个推荐系统服务，不是用于部署基础模型的服务 B - SageMaker JumpStart 专门提供预训练模型的一键式部署，支持 VPC 内安全部署 C - PartyRock 是一个实验性质的 playground，不适合在 VPC 中进行生产部署 D - SageMaker endpoints 只是部署的最终端点，不提供完整的快速部署解决方案`},
  {id:32,category:'模型評估',difficulty:'中等',text:`How can companies use large language models (LLMs) securely on Amazon Bedrock? （公司如何在 Amazon Bedrock 上安全地使用大语言模型（LLMs）？）`,options:[`设计清晰具体的提示，使用最小权限访问配置 AWS Identity and Access`,`启用 AWS Audit Manager 进行自动模型评估作业`,`启用 Amazon Bedrock 自动模型评估作业`,`使用 Amazon CloudWatch Logs 使模型可解释并监控偏差`],answer:0,explanation:`A - 结合了安全最佳实践：精确的提示工程和最小权限原则的 IAM 配置 B - Audit Manager 主要用于合规审计，不是 LLM 安全使用的主要方法 C - 自动模型评估不足以确保 LLM 的安全使用 D - CloudWatch Logs 用于监控，但不能直接确保 LLM 的安全使用`},
  {id:33,category:'LLM應用',difficulty:'中等',text:`A company has terabytes of data in a database that the company can use for business analysis. The company wants to build an AI-based application that can build a SQL query from input text that employees provide. The employees have minimal experience with technology. Which solution meets these requirements? （一家公司在数据库中有数 TB 的数据可用于业务分析。该公司想要构建一个基于 AI `,options:[`生成式预训练转换器（GPT）(Generative pre-trained transformers)`,`残差神经网络 (Residual neural network)`,`支持向量机 (Support vector machine)`,`WaveNet`],answer:0,explanation:`A - GPT 模型擅长自然语言处理和文本生成，最适合将自然语言转换为 SQL 查询 B - 残差神经网络主要用于图像处理，不适合此类文本转换任务 C - 支持向量机是基础的分类模型，不适合复杂的文本生成任务 D - WaveNet 专门用于音频处理，不适合文本到 SQL 的转换`},
  {id:34,category:'模型評估',difficulty:'中等',text:`A company built a deep learning model for object detection and deployed the model to production. Which AI process occurs when the model analyzes a new image to identify objects? （一家公司构建了一个用于对象检测的深度学习模型并将其部署到生产环境中。当模型分析新图像以识别对象时，发生了哪个 AI 过程？）`,options:[`训练 (Training)`,`推理 (Inference)`,`模型部署 (Model deployment)`,`偏差修正 (Bias correction)`],answer:1,explanation:`A - 训练是模型学习的过程，在部署前完成 B - 推理是模型对新数据进行预测的过程，正是分析新图像时发生的过程 C - 模型部署是将模型投入使用的过程，在分析图像之前已完成 D - 偏差修正是训练阶段的任务，不是处理新数据时的过程`},
  {id:35,category:'LLM應用',difficulty:'中等',text:`An AI practitioner is building a model to generate images of humans in various professions. The AI practitioner discovered that the input data is biased and that specific attributes affect the image generation and create bias in the model. Which technique will solve the problem? （一位 AI 从业者正在构建一个模型，用于生成各种职业的人物图像。该从业者发现输入数据存在偏差，特定属性影响图像生成并在模型中产生偏差。哪种`,options:[`对不平衡类别进行数据增强 (Data augmentation for imbalanced classes)`,`对类别分布进行模型监控 (Model monitoring for class distribution)`,`检索增强生成（RAG）(Retrieval Augmented Generation)`,`图像水印检测 (Watermark detection for images)`],answer:0,explanation:`A - 数据增强可以帮助平衡不同类别的数据，减少模型偏差 B - 监控类别分布只能发现问题，不能解决数据偏差 C - RAG 主要用于文本生成，不适用于解决图像生成中的偏差问题 D - 水印检测与解决模型偏差无关`},
  {id:36,category:'模型評估',difficulty:'中等',text:`A company is implementing the Amazon Titan foundation model (FM) by using Amazon Bedrock. The company needs to supplement the model by using relevant data from the company's private data sources. Which solution will meet this requirement? （一家公司正在使用 Amazon Bedrock 实施 Amazon Titan 基础模型（FM）。该公司需要使用来自公司私有数据源的相关数据来补充该模型。哪种解决方案能满足此要求？）`,options:[`使用不同的基础模型 (Use a different FM)`,`选择较低的温度值 (Choose a lower temperature value)`,`创建 Amazon Bedrock 知识库 (Create an Amazon Bedrock knowledge base)`,`启用模型调用日志记录 (Enable model invocation logging)`],answer:2,explanation:`A - 更换模型不能解决需要集成私有数据的问题 B - 调整温度参数只影响输出的随机性，不能集成私有数据 C - Bedrock 知识库专门用于将私有数据源与基础模型集成，最符合要求 D - 启用日志记录是监控功能，不能帮助模型使用私有数据`},
  {id:37,category:'模型評估',difficulty:'中等',text:`A medical company is customizing a foundation model (FM) for diagnostic purposes. The company needs the model to be transparent and explainable to meet regulatory requirements. Which solution will meet these requirements? （一家医疗公司正在为诊断目的定制基础模型（FM）。该公司需要模型具有透明性和可解释性以满足监管要求。哪种解决方案能满足这些要求？）`,options:[`使用 Amazon Inspector 配置安全性和合规性 (Configure the security and compliance by using Amazon Inspector)`,`使用 Amazon SageMaker Clarify 生成简单的指标、报告和示例 (Generate simple metrics, reports, and examples by using Amazon SageMaker Clarify)`,`使用 Amazon Macie 加密和保护训练数据 (Encrypt and secure training data by using Amazon Macie)`,`收集更多数据，使用 Amazon Rekognition 添加自定义标签 (Gather more data. Use Amazon Rekognition to add custom labels to the data)`],answer:1,explanation:`A - Inspector 主要用于安全评估，不提供模型解释性功能 B - SageMaker Clarify 专门提供模型解释性和透明度功能，最符合要求 C - Macie 专注于数据安全和隐私保护，不提供模型解释性 D - Rekognition 是图像识别服务，不能提供模型解释性功能`},
  {id:38,category:'模型評估',difficulty:'中等',text:`A company wants to deploy a conversational chatbot to answer customer questions. The chatbot is based on a fine-tuned Amazon SageMaker JumpStart model. The application must comply with multiple regulatory frameworks. Which capabilities can the company show compliance for? (Choose two.) （一家公司想要部署一个基于经过微调的 Amazon SageMaker JumpStart 模型的对话聊天机器人来回答客户问题`,options:[`自动扩展推理端点 (Auto scaling inference endpoints)`,`威胁检测 (Threat detection)`,`数据保护 (Data protection)`,`成本优化 (Cost optimization)`],answer:1,explanation:`A - 自动扩展是性能特性，不是合规性要求 B - 威胁检测是重要的安全合规要求，可以展示合规性 C - 数据保护是关键的合规要求，特别是处理客户数据时 D - 成本优化是运营效率指标，不是合规性要求 E - 微服务架构是技术选择，不是合规性要求`},
  {id:39,category:'模型評估',difficulty:'中等',text:`A company is training a foundation model (FM). The company wants to increase the accuracy of the model up to a specific acceptance level. Which solution will meet these requirements? （一家公司正在训练基础模型（FM）。该公司希望将模型的准确性提高到特定的可接受水平。哪种解决方案能满足这些要求？）`,options:[`减少批量大小 (Decrease the batch size)`,`增加训练轮数 (Increase the epochs)`,`减少训练轮数 (Decrease the epochs)`,`增加温度参数 (Increase the temperature parameter)`],answer:1,explanation:`A - 减少批量大小可能会影响训练稳定性，不一定能提高准确性 B - 增加训练轮数可以让模型有更多机会学习数据模式，提高准确性 C - 减少训练轮数会降低模型学习机会，不能提高准确性 D - 温度参数主要影响输出的随机性，与提高模型准确性无直接关系`},
  {id:40,category:'模型評估',difficulty:'中等',text:`A company is building a large language model (LLM) question answering chatbot. The company wants to decrease the number of actions call center employees need to take to respond to customer questions. Which business objective should the company use to evaluate the effect of the LLM chatbot? （一家公司正在构建基于大语言模型的问答聊天机器人。该公司希望减少呼叫中心员工回应客户问题所需的操作次数。公司应该使用哪`,options:[`网站参与率 (Website engagement rate)`,`平均通话时长 (Average call duration)`,`企业社会责任 (Corporate social responsibility)`,`监管合规性 (Regulatory compliance)`],answer:1,explanation:`A - 网站参与率与减少呼叫中心员工操作次数的目标无直接关联 B - 平均通话时长直接反映了员工处理客户问题的效率，是最合适的评估指标 C - 企业社会责任与评估聊天机器人效率无关 D - 监管合规性不能衡量聊天机器人对提高效率的影响`},
  {id:41,category:'資料處理',difficulty:'中等',text:`Which functionality does Amazon SageMaker Clarify provide? （Amazon SageMaker Clarify 提供哪些功能？）`,options:[`集成检索增强生成（RAG）工作流 (Integrates a Retrieval Augmented Generation workflow)`,`监控生产环境中 ML 模型的质量 (Monitors the quality of ML models in production)`,`记录 ML 模型的关键细节 (Documents critical details about ML models)`,`在数据准备期间识别潜在偏差 (Identifies potential bias during data preparation)`],answer:3,explanation:`A - RAG 工作流不是 SageMaker Clarify 的主要功能 B - 虽然 Clarify 可以监控模型，但这不是其主要特点 C - 文档记录不是 Clarify 的核心功能 D - Clarify 的主要功能之一就是在数据准备阶段识别和检测潜在的偏差，这是其核心特性`},
  {id:42,category:'資料處理',difficulty:'中等',text:`A company is developing a new model to predict the prices of specific items. The model performed well on the training dataset. When the company deployed the model to production, the model's performance decreased significantly. What should the company do to mitigate this problem? （一家公司正在开发一个预测特定商品价格的新模型。该模型在训练数据集上表现良好，但部署到生产环境后性能显著下降。公司应该采取什么措施来缓解这个`,options:[`减少训练中使用的数据量 (Reduce the volume of data that is used in training)`,`向模型添加超参数 (Add hyperparameters to the model)`,`增加训练中使用的数据量 (Increase the volume of data that is used in training)`,`增加模型训练时间 (Increase the model training time)`],answer:2,explanation:`A - 减少训练数据会加剧过拟合问题，使模型泛化能力更差 B - 仅添加超参数不能解决模型泛化性能差的根本问题 C - 增加训练数据量可以提高模型的泛化能力，帮助模型更好地适应生产环境 D - 单纯增加训练时间不能解决模型在实际环境中表现差的问题`},
  {id:43,category:'模型評估',difficulty:'中等',text:`> 一家电子商务公司想要建立一个解决方案，根据客户的书面产品评论来确定客户情感。哪些 > AWS 服务满足这些要求？（选择两项）（An ecommerce company wants to > build a solution to determine customer sentiments based on written > customer reviews of products.Which AWS services meet these > requirements? （Choose two.） A.Amazon Lex B.Amazon Comprehend > C.Amazon Polly D.Amazon Bedrock E.Amazon Rekognition）`,options:[`Amazon Lex（构建对话机器人的服务）`,`Amazon Comprehend（自然语言处理服务）`,`Amazon Polly（文本转语音服务）`,`Amazon Bedrock（生成式 AI 服务）`],answer:1,explanation:`A - Lex 是用于构建聊天机器人的服务，不适合进行情感分析 B - Comprehend 专门提供文本情感分析功能，是最适合的选择之一 C - Polly 是将文本转换为语音的服务，与情感分析无关 D - Bedrock 提供强大的语言模型，可以执行高级情感分析任务 E - Rekognition 专注于图像和视频分析，不适用于文本评论分析`},
  {id:44,category:'模型評估',difficulty:'中等',text:`一家公司想要使用 Amazon Bedrock 的大语言模型（LLMs）为公司的产品手册开发聊天界面。这些手册以 PDF 文件形式存储。哪种解决方案最具成本效益地满足这些要求？`,options:[`在提示提交到 Amazon Bedrock 时，使用提示工程将一个 PDF 文件作为上下文添加到用户提示中 (Use prompt engineering to add one PDF file as context to the user prompt)`,`在提示提交到 Amazon Bedrock 时，使用提示工程将所有 PDF 文件作为上下文添加到用户提示中 (Use prompt engineering to add all the PDF files as context)`,`使用所有 PDF 文档通过 Amazon Bedrock 微调模型，使用微调后的模型处理用户提示 (Use all the PDF documents to fine-tune a model)`,`将 PDF 文档上传到 Amazon Bedrock 知识库，在用户提交提示时使用知识库提供上下文 (Upload PDF documents to an Amazon Bedrock knowledge base)`],answer:3,explanation:`A - 单个 PDF 作为上下文限制了回答范围，无法覆盖所有手册内容 B - 将所有 PDF 作为提示上下文会显著增加 token 使用量，成本高昂 C - 模型微调过程复杂且费用高昂，对于简单的文档查询来说是过度使用 D - 使用知识库是最具成本效益的解决方案，能高效管理和检索文档内容，无需每次都消耗大量 token`},
  {id:45,category:'模型評估',difficulty:'中等',text:`> 一家社交媒体公司想要使用大语言模型（LLM）进行内容审核。该公司想要评估 > LLM > 输出是否存在对特定群体或个人的偏见和潜在歧视。公司应该使用哪个数据源来评估 > LLM 输出，以实现最少的管理工作量？（A social media company wants to > use a large language model （LLM） for content moderation. The company > wants to evaluate the LLM outputs for bias and potential > discrimination against specific groups or individuals. Which data > source shou`,options:[`用户生成的内容 (User-generated content)`,`审核日志 (Moderation logs)`,`内容审核指南 (Content moderation guidelines)`,`基准数据集 (Benchmark datasets)`],answer:3,explanation:`A - 用户生成内容需要大量人工筛选和标注，管理工作量大 B - 审核日志需要额外的处理和整理，增加管理负担 C - 内容审核指南是规则而非评估数据，不适合直接用于评估 D - 基准数据集已经经过预处理和标准化，可以直接使用，管理工作量最小`},
  {id:46,category:'LLM應用',difficulty:'中等',text:`一家公司想要使用预训练的生成式 AI 模型来为其营销活动生成内容。公司需要确保生成的内容符合公司的品牌声音和信息要求。哪种解决方案满足这些要求？ (A company wants to use a pre-trained generative AI model to generate content for its marketing campaigns. The company needs to ensure that the generated content aligns with the company's brand voice and messaging requirements. Which solution meets these requirements?)`,options:[`优化模型架构和超参数以提高模型的整体性能 (Optimize the model's architecture and hyperparameters)`,`通过添加更多层来增加模型的复杂性 (Increase model complexity by adding more layers)`,`创建提供清晰指示和上下文的有效提示来引导模型生成 (Create effective prompts with clear instructions and context)`,`选择大型、多样化的数据集来预训练新的生成模型 (Select large, diverse dataset to pre-train new model)`],answer:2,explanation:`A - 优化架构和超参数主要影响性能，不能确保内容符合品牌要求 B - 增加复杂性不能保证输出符合品牌声音 C - 精心设计的提示是确保生成内容符合特定品牌要求的最有效方法 D - 预训练新模型成本高且不必要，使用提示更有效`},
  {id:47,category:'模型評估',difficulty:'中等',text:`一家贷款公司正在构建基于生成式 AI 的解决方案，根据特定业务标准为新申请人提供折扣。该公司希望负责任地构建和使用 AI 模型，以最大限度地减少可能对某些客户产生负面影响的偏见。公司应该采取哪些行动来满足这些要求？（选择两项） (A loan company is building a generative AI-based solution to offer new applicants discounts based on specific business criteria. The company wants to build and use an AI model responsibly to minimize bias that could negatively affect s`,options:[`检测数据中的不平衡或差异 (Detect imbalances or disparities in the data)`,`确保模型频繁运行 (Ensure that the model runs frequently)`,`评估模型的行为，以便公司能够向利益相关者提供透明度 (Evaluate the model's behavior for transparency)`,`使用 ROUGE 技术确保模型 100%准确 (Use ROUGE technique to ensure 100% accuracy)`],answer:0,explanation:`A - 检测数据中的偏见和不平衡是减少模型偏见的关键步骤 B - 运行频率与减少偏见无关 C - 模型行为评估和透明度对于负责任的 AI 使用至关重要 D - ROUGE 主要用于文本摘要评估，且 100%准确率是不现实的 E - 推理时间与减少偏见无关`},
  {id:48,category:'模型評估',difficulty:'中等',text:`一家公司正在使用 Amazon Bedrock 基础模型来总结内部用例的文档。该公司训练了一个自定义模型来提高总结质量。公司必须采取哪个行动才能通过 Amazon Bedrock 使用该自定义模型？ (A company is using an Amazon Bedrock base model to summarize documents for an internal use case. The company trained a custom model to improve the summarization quality. Which action must the company take to use the custom model through Amazon Bedro`,options:[`为自定义模型购买预置吞吐量 (Purchase Provisioned Throughput for the custom model)`,`在 Amazon SageMaker 端点部署自定义模型以进行实时推理 (Deploy the custom model in an Amazon SageMaker endpoint)`,`在 Amazon SageMaker Model Registry 中注册模型 (Register the model with the Amazon SageMaker Model Registry)`,`在 Amazon Bedrock 中授予对自定义模型的访问权限 (Grant access to the custom model in Amazon Bedrock)`],answer:0,explanation:`A - 在使用自定义模型之前，必须为其购买预置吞吐量，这是使用 Bedrock 自定义模型的必要步骤 B - 不需要 SageMaker 端点，因为模型将通过 Bedrock 运行 C - 模型注册不是使用 Bedrock 自定义模型的必要条件 D - 访问权限管理不是使用自定义模型的首要步骤`},
  {id:49,category:'模型評估',difficulty:'中等',text:`公司需要从 Amazon Bedrock 中选择一个内部使用的模型，必须识别一个能以员工偏好风格生成响应的模型。公司应该如何满足这些要求？ (A company needs to choose a model from Amazon Bedrock to use internally. The company must identify a model that generates responses in a style that the company's employees prefer. What should the company do to meet these requirements?)`,options:[`使用内置提示数据集评估模型 (Evaluate the models by using built-in prompt datasets)`,`使用人工团队和自定义提示数据集评估模型 (Evaluate the models by using a human workforce and custom prompt datasets)`,`使用公共模型排行榜来识别模型 (Use public model leaderboards to identify the model)`,`使用 Amazon CloudWatch 中的模型 InvocationLatency 运行时指标 (Use the model InvocationLatency runtime metrics in Amazon CloudWatch)`],answer:1,explanation:`A - 内置数据集无法反映公司特定需求和风格偏好 B - 人工评估配合自定义数据集最能确保输出符合员工偏好，是最佳选择 C - 公共排行榜不能反映特定公司的独特需求 D - 性能指标与输出质量和风格无关，不适合此需求`},
  {id:50,category:'LLM應用',difficulty:'中等',text:`一名大学生正在从生成式 AI 复制内容来写论文。这种情况代表了负责任的生成式 AI 的哪种挑战？ (A student at a university is copying content from generative AI to write essays. Which challenge of responsible generative AI does this scenario represent?)`,options:[`有害性 (Toxicity)`,`幻觉 (Hallucinations)`,`抄袭 (Plagiarism)`,`隐私 (Privacy)`],answer:2,explanation:`A - 有害性指 AI 生成的有害或不当内容，不适用于此场景 B - 幻觉指 AI 生成虚假或不准确的信息，不是这个场景的主要问题 C - 这明显是抄袭行为，学生直接复制 AI 生成的内容而不是独立思考和创作 D - 隐私涉及个人数据保护，与此场景无关`},
  {id:51,category:'模型評估',difficulty:'中等',text:`一家公司需要仅基于公司私有数据构建自己的大型语言模型（LLM）。该公司关注训练过程对环境的影响。哪种 Amazon EC2 实例类型在训练 LLM 时对环境的影响最小？ (A company needs to build its own large language model (LLM) based on only the company's private data. The company is concerned about the environmental effect of the training process. Which Amazon EC2 instance type has the LEAST environmental effect when training L`,options:[`Amazon EC2 C 系列`,`Amazon EC2 G 系列`,`Amazon EC2 P 系列`,`Amazon EC2 Trn 系列`],answer:3,explanation:`A - C 系列是计算优化型实例，不是专门为 AI 训练设计 B - G 系列使用 GPU，能耗相对较高 C - P 系列是 GPU 实例，虽然适合 AI 训练但能耗较高 D - Trn 系列使用 AWS Trainium 芯片，专门设计用于高效训练 LLM，提供最佳的性能/瓦特比，能耗最低`},
  {id:52,category:'模型評估',difficulty:'中等',text:`一家公司想要为儿童构建一个基于经典故事生成新故事的互动应用程序。该公司想要使用 Amazon Bedrock，并需要确保结果和主题适合儿童。哪种 AWS 服务或功能将满足这些要求？ (A company wants to build an interactive application for children that generates new stories based on classic stories. The company wants to use Amazon Bedrock and needs to ensure that the results and topics are appropriate for children. Which AWS service or f`,options:[`Amazon Rekognition`,`Amazon Bedrock playgrounds`,`Amazon Bedrock 的护栏 (Guardrails for Amazon Bedrock)`,`Amazon Bedrock 的代理 (Agents for Amazon Bedrock)`],answer:2,explanation:`A - Rekognition 是图像和视频分析服务，不适合内容生成控制 B - Bedrock playgrounds 是用于测试和实验的环境，不能确保内容适合性 C - Guardrails 专门用于控制模型输出，可以设置规则确保内容适合儿童 D - Agents 用于执行特定任务，不专门用于内容控制和过滤`},
  {id:53,category:'LLM應用',difficulty:'中等',text:`一家公司正在构建一个需要基于现有数据生成合成数据的应用程序。公司可以使用哪种类型的模型来满足这个要求？ (A company is building an application that needs to generate synthetic data that is based on existing data. Which type of model can the company use to meet this requirement?)`,options:[`生成对抗网络 (Generative adversarial network, GAN)`,`XGBoost`,`残差神经网络 (Residual neural network)`,`WaveNet`],answer:0,explanation:`A - GAN 专门设计用于生成与真实数据相似的合成数据，最适合此需求 B - XGBoost 是一个用于分类和回归的提升算法，不适合生成合成数据 C - 残差神经网络主要用于深度学习分类任务，不适合数据生成 D - WaveNet 主要用于音频生成，范围过于特定，不适合一般性的数据生成`},
  {id:54,category:'ML基礎',difficulty:'中等',text:`一家数字设备公司想要预测客户对内存硬件的需求。该公司没有编码经验或机器学习算法知识，需要开发一个数据驱动的预测模型。公司需要对内部数据和外部数据进行分析。哪种解决方案能满足这些要 求？ (A digital devices company wants to predict customer demand for memory hardware. The company does not have coding experience or knowledge of ML algorithms and needs to develop a data-driven predictive model. The company needs to perform analysis on internal`,options:[`将数据存储在 Amazon S3 中。使用 Amazon SageMaker 内置算法创建 ML 模型和需求预测，这些算法使用来自 Amazon S3 的数据`,`将数据导入 Amazon SageMaker Data Wrangler。使用 SageMaker 内置算法创建 ML 模型和需求预测`,`将数据导入 Amazon SageMaker Data Wrangler。使用 Amazon Personalize Trending-Now 配方构建 ML 模型和需求预测`,`将数据导入 Amazon SageMaker Canvas。通过从 SageMaker Canvas 中选择数据值来构建 ML 模型和需求预测`],answer:3,explanation:`A - 需要编码经验和 ML 知识，不符合公司要求 B - Data Wrangler 主要用于数据准备，仍需要编码经验 C - Personalize 主要用于个性化推荐，不适合需求预测 D - SageMaker Canvas 提供无代码界面，最适合没有技术背景的用户进行预测分析`},
  {id:55,category:'ML基礎',difficulty:'中等',text:`一家公司安装了安全摄像头。该公司使用 ML 模型评估安全摄像头录像以发现潜在的盗窃行为。公司发现该模型过度标记特定族裔群体的成员。哪种类型的偏见影响了模型输出？ (A company has installed a security camera. The company uses an ML model to evaluate the security camera footage for potential thefts. The company has discovered that the model disproportionately flags people who are members of a specific ethnic group. Which type of bi`,options:[`测量偏差 (Measurement bias)`,`采样偏差 (Sampling bias)`,`观察者偏差 (Observer bias)`,`确认偏差 (Confirmation bias)`],answer:1,explanation:`A - 测量偏差是指测量方法或工具的系统性错误，不是这种情况 B - 采样偏差最符合此情况，表示训练数据中某些群体的代表性不均衡 C - 观察者偏差是指观察者的主观影响，不适用于此机器学习场景 D - 确认偏差是指倾向于寻找支持预期的证据，不适用于此情况`},
  {id:56,category:'ML基礎',difficulty:'中等',text:`一家公司正在构建客服聊天机器人。该公司希望聊天机器人通过学习过去的互动和在线资源来改进其响应。哪种 AI 学习策略提供了这种自我改进能力？ (A company is building a customer service chatbot. The company wants the chatbot to improve its responses by learning from past interactions and online resources. Which AI learning strategy provides this self-improvement capability?)`,options:[`使用手动整理的好响应和坏响应数据集进行监督学习 (Supervised learning with a manually`,`使用正面客户反馈作为奖励的强化学习 (Reinforcement learning with rewards for positive customer feedback)`,`使用无监督学习来查找相似客户询问的集群 (Unsupervised learning to find clusters of similar customer inquiries)`,`使用持续更新的 FAQ 数据库进行监督学习 (Supervised learning with a continuously updated FAQ database)`],answer:1,explanation:`A - 手动整理数据集是静态的，不能实现自我改进 B - 强化学习通过客户反馈作为奖励信号，能够持续学习和改进响应 C - 无监督学习只能分组相似问题，不能改进响应质量 D - 更新 FAQ 数据库是被动的，不能自动从交互中学习改进`},
  {id:57,category:'模型評估',difficulty:'中等',text:`一位 AI 从业者构建了一个深度学习模型来对图像中的材料类型进行分类。该 AI 从业者现在想要衡量模型性能。哪个指标将帮助 AI 从业者评估模型的性能？ (An AI practitioner has built a deep learning model to classify the types of materials in images. The AI practitioner now wants to measure the model performance. Which metric will help the AI practitioner evaluate the performance of the model?)`,options:[`混淆矩阵 (Confusion matrix)`,`相关矩阵 (Correlation matrix)`,`R2 分数 (R2 score)`,`均方误差 (Mean squared error, MSE)`],answer:0,explanation:`A - 混淆矩阵最适合评估分类模型，可以显示每个类别的正确和错误预测 B - 相关矩阵用于显示变量之间的关系，不适合评估分类性能 C - R2 分数主要用于回归问题，不适合分类任务 D - MSE 用于回归问题，不适合评估分类模型的性能`},
  {id:58,category:'LLM應用',difficulty:'中等',text:`一家公司构建了一个可以用图像回应自然语言问题的聊天机器人。公司希望确保聊天机器人不会返回不 当或不需要的图像。哪种解决方案能满足这些要求？ (A company has built a chatbot that can respond to natural language questions with images. The company wants to ensure that the chatbot does not return inappropriate or unwanted images. Which solution will meet these requirements?)`,options:[`实现内容审核 API (Implement moderation APIs)`,`使用通用公共数据集重新训练模型 (Retrain the model with a general public dataset)`,`执行模型验证 (Perform model validation)`,`自动化用户反馈集成 (Automate user feedback integration)`],answer:0,explanation:`A - 内容审核 API 可以实时检测和过滤不当图像，最直接有效地解决这个问题 B - 重新训练模型不能保证完全避免不当内容的生成 C - 模型验证不能实时防止不当图像的生成`},
  {id:59,category:'模型評估',difficulty:'中等',text:`一位 AI 从业者正在使用 Amazon Bedrock 基础模型来总结客服部门的会话聊天记录。该 AI 从业者想要存储调用日志以监控模型输入和输出数据。AI 从业者应该使用哪种策略？ (An AI practitioner is using an Amazon Bedrock base model to summarize session chats from the customer service department. The AI practitioner wants to store invocation logs to monitor model input and output data. Which strategy should the AI practitioner u`,options:[`配置 AWS CloudTrail 作为模型的日志目标 (Configure AWS CloudTrail as the logs destination for the model)`,`在 Amazon Bedrock 中启用调用日志记录 (Enable invocation logging in Amazon Bedrock)`,`配置 AWS Audit Manager 作为模型的日志目标 (Configure AWS Audit Manager as the logs destination for the model)`,`在 Amazon EventBridge 中配置模型调用日志记录 (Configure model invocation logging in Amazon EventBridge)`],answer:1,explanation:`A - CloudTrail 主要用于跟踪 API 调用和账户活动，不适合详细的模型输入输出监控 B - Bedrock 的调用日志记录是专门为监控模型输入输出而设计的，最适合此需求 C - Audit Manager 主要用于合规性评估和审计，不适合模型调用数据的收集 D - EventBridge 是事件路由服务，不适合存储和分析模型调用数据`},
  {id:60,category:'資料處理',difficulty:'中等',text:`一家公司正在构建 ML 模型来分析存档数据。公司必须对多个 GB 大小的大型数据集执行推理。公司不需要立即访问模型预测结果。哪种 Amazon SageMaker 推理选项将满足这些要求？ (A company is building an ML model to analyze archived data. The company must perform inference on large datasets that are multiple GBs in size. The company does not need to access the model predictions immediately. Which Amazon SageMaker inference option`,options:[`批量转换 (Batch transform)`,`实时推理 (Real-time inference)`,`无服务器推理 (Serverless inference)`,`异步推理 (Asynchronous inference)`],answer:0,explanation:`A - 批量转换最适合处理大型数据集的离线推理，且不需要即时响应 B - 实时推理用于需要即时响应的场景，不适合大批量数据处理 C - 无服务器推理适用于变化的工作负载，但不是最佳的大数据处理方案 D - 异步推理虽然可以处理长时间运行的请求，但主要用于单个大型请求而不是批量数据`},
  {id:61,category:'模型評估',difficulty:'中等',text:`哪个术语描述了 AI 和自然语言处理(NLP)模型用来改善对文本信息理解的现实世界对象和概念的数值表示？ (Which term describes the numerical representations of real-world objects and concepts that AI and natural language processing (NLP) models use to improve understanding of textual information?)`,options:[`嵌入向量 (Embeddings)`,`令牌 (Tokens)`,`模型 (Models)`,`二进制文件 (Binaries)`],answer:0,explanation:`A - 嵌入向量是将文本、图像等转换为密集的数值向量表示，用于捕获语义信息 B - 令牌是文本的基本单位，但不是数值表示本身 C - 模型是处理这些表示的系统，而不是表示本身 D - 二进制文件是计算机程序的执行格式，与语义表示无关`},
  {id:62,category:'模型評估',difficulty:'中等',text:`一家研究公司使用 Amazon Bedrock 的基础模型(FM)实现了一个聊天机器人。该聊天机器人从大量研究论文数据库中搜索问题的答案。经过多次提示工程尝试后，公司发现由于研究论文中的复杂科学术语，FM 表现不佳。公司如何改善聊天机器人的性能？ (A research company implemented a chatbot by using a foundation model (FM) from Amazon Bedrock. The chatbot searches for answers to questions from a large database of research papers. After multiple prompt engineering attempts`,options:[`使用少样本提示来定义 FM 如何回答问题 (Use few-shot prompting to define how the FM can answer the questions)`,`使用领域适应微调来使 FM 适应复杂的科学术语 (Use domain adaptation fine-tuning to adapt the FM to complex scientific terms)`,`更改 FM 推理参数 (Change the FM inference parameters)`,`清理研究论文数据以删除复杂的科学术语 (Clean the research paper data to remove complex scientific terms)`],answer:1,explanation:`A - 少样本提示虽然有帮助，但不足以处理大量复杂的科学术语 B - 领域适应微调是最适合的方法，可以帮助模型更好地理解和处理特定领域的专业术语 C - 仅更改推理参数不能解决模型对专业术语理解不足的根本问题 D - 删除科学术语会损失重要信息，不是合适的解决方案`},
  {id:63,category:'模型評估',difficulty:'中等',text:`一家公司想要在 Amazon Bedrock 上使用大语言模型(LLM)进行情感分析。公司需要 LLM 对相同的输入提示产生更一致的响应。公司应该对推理参数进行哪些调整来满足这些要求？ (A company wants to use a large language model (LLM) on Amazon Bedrock for sentiment analysis. The company needs the LLM to produce more consistent responses to the same input prompt. Which adjustment to an inference parameter should the company make to mee`,options:[`降低 temperature 值 (Decrease the temperature value)`,`提高 temperature 值 (Increase the temperature value)`,`减少输出令牌的长度 (Decrease the length of output tokens)`,`增加最大生成长度 (Increase the maximum generation length)`],answer:0,explanation:`A - 降低 temperature 值会减少模型输出的随机性，使响应更加确定和一致 B - 提高 temperature 值会增加随机性和创造性，使响应更加多样化，不符合要求 C - 调整输出令牌长度不会影响模型响应的一致性 D - 调整最大生成长度不会影响模型响应的一致性`},
  {id:64,category:'模型評估',difficulty:'中等',text:`一家公司想要使用 Amazon Bedrock 和上传到 Amazon S3 的客户数据开发大语言模型(LLM)应用程序。公司的安全策略规定每个团队只能访问该团队自己客户的数据。哪种解决方案能满足这些要求？ (A company wants to develop a large language model (LLM) application by using Amazon Bedrock and customer data that is uploaded to Amazon S3. The company's security policy states that each team can access data for only the team's own customers. W`,options:[`为每个团队创建 Amazon Bedrock 自定义服务角色，只能访问该团队的客户数据`,`创建具有 Amazon S3 访问权限的自定义服务角色，要求团队在每个 Amazon Bedrock 请求中指定客户名称`,`在 Amazon S3 中编辑个人数据，更新 S3 存储桶策略以允许团队访问客户数据`,`创建一个具有完全 Amazon S3 访问权限的 Amazon Bedrock 角色，为每个团队创建只能访问各自客户文件夹的 IAM 角色`],answer:0,explanation:`A - 为每个团队创建独立的服务角色是最安全和最符合最小权限原则的方案 B - 在请求中指定客户名称不能保证数据访问的安全性，存在潜在风险 C - 编辑个人数据和更新存储桶策略不能有效控制团队间的数据访问 D - 使用单一角色具有完全访问权限违反最小权限原则，存在安全风险`},
  {id:65,category:'模型評估',difficulty:'中等',text:`一家医疗公司在 Amazon Bedrock 上部署了疾病检测模型。为了遵守隐私政策，公司希望防止模型在其响应中包含患者个人信息。公司还希望在发生政策违规时收到通知。哪种解决方案满足这些要求？ (A medical company deployed a disease detection model on Amazon Bedrock. To comply with privacy policies, the company wants to prevent the model from including personal patient information in its responses. The company also wants to receive notification`,options:[`使用 Amazon Macie 扫描模型输出的敏感数据并设置潜在违规警报`,`配置 AWS CloudTrail 监控模型响应并为检测到的个人信息创建警报`,`使用 Amazon Bedrock 的 Guardrails 过滤内容，设置 Amazon CloudWatch 警报以通知策略违规`,`实施 Amazon SageMaker Model Monitor 以检测数据漂移并在模型质量下降时接收警报`],answer:2,explanation:`A - Macie 主要用于发现和保护 S3 中的敏感数据，不适用于实时模型响应过滤 B - CloudTrail 主要用于 AWS API 调用的审计，不适合内容过滤和实时监控 C - Bedrock Guardrails 专门设计用于过滤和保护模型输出，结合 CloudWatch 提供违规通知，最适合此场景 D - Model Monitor 主要用于监控模型性能和数据质量，不适用于内容过滤和隐私保护`},
  {id:66,category:'模型評估',difficulty:'中等',text:`一家公司手动审查所有提交的 PDF 格式简历。随着公司发展，预计简历数量将超过公司的审查能力。公司需要一个自动化系统将 PDF 简历转换为纯文本格式以进行额外处理。哪种 AWS 服务满足这个要求？ (A company manually reviews all submitted resumes in PDF format. As the company grows, the company expects the volume of resumes to exceed the company's review capacity. The company needs an automated system to convert the PDF resumes into plain text `,options:[`Amazon Textract`,`Amazon Personalize`,`Amazon Lex`,`Amazon Transcribe`],answer:0,explanation:`A - Amazon Textract 专门用于从 PDF 等文档中提取文本和数据，最适合此场景 B - Amazon Personalize 是个性化推荐服务，不适用于文档文本提取 C - Amazon Lex 是用于构建对话界面的服务，不适用于文档处理 D - Amazon Transcribe 是语音转文字服务，不适用于 PDF 文档处理`},
  {id:67,category:'LLM應用',difficulty:'中等',text:`一个教育提供商正在构建一个问答应用程序，使用生成式 AI 模型来解释复杂概念。该提供商希望根据提问者自动改变模型响应的风格。提供商将向模型提供提问用户的年龄范围。哪种解决方案以最少的实施工作量满足这些要求？ (An education provider is building a question and answer application that uses a generative AI model to explain complex concepts. The education provider wants to automatically change the style of the model response depending on who is asking the `,options:[`使用代表应用程序将支持的各个年龄范围的额外训练数据来微调模型 (Fine tune the model by using additional training data that is representative of the various age ranges that the application will support)`,`在提示上下文中添加角色描述，指示模型响应应针对的年龄范围 (Add a role description to the prompt context that instructs the model of the age range that the response should target)`,`使用思维链推理来推断适合该用户的正确风格和复杂度 (Use chain-of-thought reasoning to deduce the correct style and complexity for a response suitable for that user)`,`根据用户年龄总结响应文本，使年轻用户收到更短的响应 (Summarize the response text depending on the age of the user so that younger users receive shorter responses)`],answer:1,explanation:`A - 需要收集大量训练数据，并且需要大量计算资源进行模型微调，实施工作量大 B - 只需在提示中添加简单的角色描述即可，是最简单和最直接的方法，实施工作量最小 C - 需要设计和实现复杂的推理逻辑，增加了实施难度 D - 需要额外开发文本摘要功能和年龄相关的处理逻辑，增加了实施复杂度`},
  {id:68,category:'ML基礎',difficulty:'中等',text:`哪种策略可以评估用于图像分类任务的基础模型(FM)的准确性？ (Which strategy evaluates the accuracy of a foundation model (FM) that is used in image classification tasks)`,options:[`主题建模 (Topic modeling)`,`聚类模型 (Clustering models)`,`预测性机器学习模型 (Prescriptive ML models)`,`基于 BERT 的模型 (BERT-based models)`],answer:3,explanation:`A - 主题建模专注于文本数据中的主题发现，不适用于图像分类任务评估 B - 聚类模型是无监督学习方法，不能有效评估分类准确性 C - 预测性模型主要用于预测分析，不适合评估图像分类性能 D - BERT 作为强大的基础模型架构，可以有效评估图像分类任务的准确性，是目前广泛使用的评估方法`},
  {id:69,category:'LLM應用',difficulty:'中等',text:`一家公司想要显示过去 12 个月各零售地点最畅销产品的总销售额。公司应该使用哪种 AWS 解决方案来自动生成图表？`,options:[`Amazon EC2 中的 Amazon Q`,`Amazon Q Developer`,`Amazon QuickSight 中的 Amazon Q`,`AWS Chatbot 中的 Amazon Q`],answer:2,explanation:`A - EC2 是计算服务，不适合数据可视化和图表生成 B - Q Developer 主要用于代码开发支持，不适合数据可视化 C - QuickSight 中的 Amazon Q 专门设计用于数据可视化和商业智能分析，最适合此场景 D - AWS Chatbot 主要用于团队通知和协作，不适合图表生成`},
  {id:70,category:'模型評估',difficulty:'中等',text:`一家公司正在构建聊天机器人以改善用户体验。该公司使用来自 Amazon Bedrock 的大语言模型(LLM)进行意图检测。公司想要使用少样本学习来提高意图检测的准确性。公司需要哪些额外数据来满足这些要求？ (A company is building a chatbot to improve user experience. The company is using a large language model (LLM) from Amazon Bedrock for intent detection. The company wants to use few-shot learning to improve intent detection accuracy. Which additi`,options:[`聊天机器人响应和正确用户意图的配对 (Pairs of chatbot responses and correct user intents)`,`用户消息和正确聊天机器人响应的配对 (Pairs of user messages and correct chatbot responses)`,`用户消息和正确用户意图的配对 (Pairs of user messages and correct user intents)`,`用户意图和正确聊天机器人响应的配对 (Pairs of user intents and correct chatbot responses)`],answer:2,explanation:`A - 机器人响应与意图检测无关 B - 这些配对适用于响应生成，而不是意图检测 C - 正确，意图检测需要用户输入消息和对应的正确意图配对 D - 这些配对适用于响应生成，而不是意图检测`},
  {id:71,category:'模型評估',difficulty:'中等',text:`一家公司正在对托管在 Amazon Bedrock 上的基础模型使用少样本提示(few-shot prompting)。该模型目前在提示中使用 10 个示例。模型每天调用一次，表现良好。公司想要降低月度成本。哪种解决方案能满足这些要求？ (A company is using few-shot prompting on a base model that is hosted on Amazon Bedrock. The model currently uses 10 examples in the prompt. The model is invoked once daily and is performing well. The company wants to lower the mon`,options:[`使用微调来定制模型 (Customize the model by using fine-tuning)`,`减少提示中的令牌数量 (Decrease the number of tokens in the prompt)`,`增加提示中的令牌数量 (Increase the number of tokens in the prompt)`,`使用预置吞吐量 (Use Provisioned Throughput)`],answer:1,explanation:`A - 微调可能会产生额外的训练成本，不适合仅每日调用一次的场景 B - 正确，减少提示中的令牌数量（示例数量）可以直接降低成本，因为 Bedrock 按令牌收费 C - 增加令牌数量会增加成本 D - 预置吞吐量适用于高频率调用场景，对于每日一次调用来说不合适且可能增加成本`},
  {id:72,category:'LLM應用',difficulty:'中等',text:`一位 AI 从业者正在使用大语言模型(LLM)为营销活动创建内容。生成的内容听起来合理且真实，但实际上是不正确的。LLM 出现了什么问题？ (An AI practitioner is using a large language model (LLM) to create content for marketing campaigns. The generated content sounds plausible and factual but is incorrect. Which problem is the LLM having?)`,options:[`数据泄漏 (Data leakage)`,`幻觉 (Hallucination)`,`过拟合 (Overfitting)`,`欠拟合 (Underfitting)`],answer:1,explanation:`A - 数据泄漏是指训练数据不当使用的问题，不是这种情况 B - 正确，\"幻觉\"是 LLM 生成看似合理但实际上不正确内容的现象 C - 过拟合是模型过度学习训练数据的问题，不是这种情况 D - 欠拟合是模型学习不足的问题，不是这种情况 \"幻觉\"(Hallucination)是 LLM 的一个常见问题，指模型生成的内容： - 听起来很有说服力 - 格式和语法正确 - 看似基于事实 - 但实际上包含虚假或不准确的信息 这是当前 LLM 技术的一个主要挑战，需要通过各种方法（如事实核查、提示工程等）来缓解。`},
  {id:73,category:'模型評估',difficulty:'中等',text:`一位 AI 从业者使用包含机密数据的训练数据集在 Amazon Bedrock 上训练了一个自定义模型。该 AI从业者想要确保自定义模型不会基于机密数据生成推理响应。AI 从业者应该如何防止基于机密数据的响应？ (An AI practitioner trained a custom model on Amazon Bedrock by using a training dataset that contains confidential data. The AI practitioner wants to ensure that the custom model does not generate inference responses based on confidential data`,options:[`删除自定义模型。从训练数据集中移除机密数据。重新训练自定义模型。`,`使用动态数据屏蔽来屏蔽推理响应中的机密数据。`,`使用 Amazon SageMaker 加密推理响应中的机密数据。`,`使用 AWS Key Management Service (AWS KMS)加密自定义模型中的机密数据。`],answer:0,explanation:`A - 这是唯一能确保完全移除机密数据影响的方法： 1. 删除现有模型 2. 清理训练数据 3. 重新训练模型 B - 仅屏蔽输出无法防止模型使用已学习的机密数据 C - 加密输出不能防止模型使用已学习的机密数据 D - 加密模型不能防止其使用已学习的机密数据 一旦机密数据被用于训练，它就会嵌入到模型的参数中。要完全移除其影响，必须重新训练没有这些数据的新模型。`},
  {id:74,category:'模型評估',difficulty:'中等',text:`一家公司使用生成式 AI 构建了一个解决方案。该解决方案使用大语言模型(LLMs)将培训手册从英语翻译成其他语言。公司想要通过检查手册生成的文本来评估解决方案的准确性。哪种模型评估策略满足这些要求？ (A company has built a solution by using generative AI. The solution uses large language models (LLMs) to translate training manuals from English into other languages. The company wants to evaluate the accuracy of the solution by examining the text g`,options:[`双语评估替补(BLEU) (Bilingual Evaluation Understudy)`,`均方根误差(RMSE) (Root mean squared error)`,`面向召回的摘要评估(ROUGE) (Recall-Oriented Understudy for Gisting Evaluation)`,`F1 分数 (F1 score)`],answer:0,explanation:`A - BLEU 专门设计用于评估机器翻译质量，最适合此用例 B - RMSE 主要用于回归问题，不适合文本翻译评估 C - ROUGE 主要用于文本摘要评估，不是最适合翻译评估 D - F1 分数通常用于分类问题，不是最适合翻译评估`},
  {id:75,category:'模型評估',difficulty:'中等',text:`一家大型零售商每天收到数千个关于产品的客户支持查询。客户支持查询需要快速处理和回复。该公司想要实施 Amazon Bedrock 代理。使用 Amazon Bedrock 代理可以帮助这个零售商的关键优势是什么？ (A large retailer receives thousands of customer support inquiries about products every day. The customer support inquiries need to be processed and responded to quickly. The company wants to implement Agents for Amazon Bedrock. What are the k`,options:[`生成自定义基础模型(FMs)以预测客户需求 (Generation of custom foundation models (FMs) to predict customer needs)`,`自动化重复任务和编排复杂工作流程 (Automation of repetitive tasks and orchestration of complex workflows)`,`自动调用多个基础模型(FMs)并整合结果 (Automatically calling multiple foundation models (FMs) and consolidating the results)`,`基于预定义标准和指标选择基础模型(FM) (Selecting the foundation model (FM) based on predefined criteria and metrics)`],answer:1,explanation:`A - Bedrock 代理不生成自定义基础模型，而是使用现有模型 B - 正确，Bedrock 代理的主要优势是自动化处理重复性客户查询和管理复杂工作流 C - 虽然代理可以使用多个模型，但这不是其主要优势 D - 模型选择不是 Bedrock 代理的主要功能`},
  {id:76,category:'資料處理',difficulty:'中等',text:`在微调基础模型(FM)时，持续预训练的好处是什么？ (Which option is a benefit of ongoing pre-training when fine-tuning a foundation model (FM)?)`,options:[`帮助降低模型的复杂性 (Helps decrease the model's complexity)`,`随时间改善模型性能 (Improves model performance over time)`,`减少训练时间要求 (Decreases the training time requirement)`,`优化模型推理时间 (Optimizes model inference time)`],answer:1,explanation:`A - 持续预训练实际上可能增加而不是降低模型复杂性 B - 正确，通过持续接触更多相关数据，模型可以不断提升性能和理解能力 C - 持续预训练实际上会增加而不是减少总体训练时间 D - 持续预训练主要影响模型性能，而不是推理时间`},
  {id:77,category:'LLM應用',difficulty:'中等',text:`在生成式 AI 模型的上下文中，什么是令牌（tokens）？ (What are tokens in the context of generative AI models?)`,options:[`令牌是生成式 AI 模型操作的基本输入和输出单位，表示词语、子词或其他语言单位 (Tokens are the basic units of input and output that a generative AI model operates on, representing words, subwords, or other linguistic units)`,`令牌是生成式 AI 模型中使用的词语或概念的数学表示 (Tokens are the mathematical representations of words or concepts used in generative AI models)`,`令牌是生成式 AI 模型的预训练权重，用于特定任务的微调 (Tokens are the pre-trained weights of a generative AI model that are fine-tuned for specific tasks)`,`令牌是给予生成式 AI 模型以生成输出的特定提示或指令 (Tokens are the specific prompts or instructions given to a generative AI model to generate output)`],answer:0,explanation:`A - 正确，令牌是模型处理的最基本单位，可以是完整词语、词语片段或字符 B - 不正确，这更像是词嵌入(embeddings)的描述 C - 不正确，这是描述模型参数而不是令牌 D - 不正确，这是描述提示(prompts)而不是令牌`},
  {id:78,category:'模型評估',difficulty:'中等',text:`一家公司想要评估使用大语言模型(LLM)生成推理相关的成本。该公司想要使用 Amazon Bedrock 来构建生成式 AI 应用。哪个因素将驱动推理成本？ (A company wants to assess the costs that are associated with using a large language model (LLM) to generate inferences. The company wants to use Amazon Bedrock to build generative AI applications. Which factor will drive the inference costs?)`,options:[`消耗的令牌数量 (Number of tokens consumed)`,`温度值 (Temperature value)`,`用于训练 LLM 的数据量 (Amount of data used to train the LLM)`,`总训练时间 (Total training time)`],answer:0,explanation:`A - 令牌消耗量是 Bedrock 推理成本的主要驱动因素，包括输入和输出的令牌数 B - 温度值只影响输出的随机性，不影响成本 C - 训练数据量是模型训练的因素，不影响推理成本 D - 训练时间是模型训练的因素，不影响推理成本`},
  {id:79,category:'模型評估',difficulty:'中等',text:`一家公司正在使用 Amazon SageMaker Studio 笔记本来构建和训练 ML 模型。公司将数据存储在 Amazon S3 存储桶中。公司需要管理从 Amazon S3 到 SageMaker Studio 笔记本的数据流。哪种解决方案能满足这个要求？ (A company is using Amazon SageMaker Studio notebooks to build and train ML models. The company stores the data in an Amazon S3 bucket. The company needs to manage the flow of data from Amazon S3 to SageMaker Studio n`,options:[`使用 Amazon Inspector 监控 SageMaker Studio (Use Amazon Inspector to monitor SageMaker Studio)`,`使用 Amazon Macie 监控 SageMaker Studio (Use Amazon Macie to monitor SageMaker Studio)`,`配置 SageMaker 使用带有 S3 端点的 VPC (Configure SageMaker to use a VPC with an S3 endpoint)`,`配置 SageMaker 使用 S3 Glacier Deep Archive (Configure SageMaker to use S3 Glacier Deep Archive)`],answer:2,explanation:`A - Inspector 用于安全评估，不管理数据流 B - Macie 用于数据安全和隐私，不管理数据流 C - VPC 端点提供了安全且高效的数据流管理方式，是最佳解决方案 D - Glacier Deep Archive 是长期存储服务，不适合管理活跃的数据流`},
  {id:80,category:'模型評估',difficulty:'中等',text:`一家公司使用 Amazon Bedrock 定制了一个基础模型(FM)来回答客户关于产品的查询。该公司想要验证模型对新类型查询的响应。公司需要上传一个新的数据集供 Amazon Bedrock 用于验证。哪个 AWS服务满足这些要求？ (A company has a foundation model (FM) that was customized by using Amazon Bedrock to answer customer queries about products. The company wants to validate the model's responses to new types of queries. The company needs to upload a`,options:[`Amazon S3`,`Amazon Elastic Block Store (Amazon EBS)`,`Amazon Elastic File System (Amazon EFS)`,`AWS Snowcone`],answer:0,explanation:`A - Amazon S3 是最佳选择，它与 Bedrock 直接集成，支持数据验证工作流 B - EBS 是块存储服务，主要用于 EC2 实例，不适合 Bedrock 数据验证 C - EFS 是文件系统服务，不是 Bedrock 数据验证的推荐存储选项 D - Snowcone 是边缘计算和数据传输设备，不适合此用例`},
  {id:81,category:'LLM應用',difficulty:'中等',text:`哪种提示攻击直接暴露了大语言模型(LLM)的配置行为？ (Which prompting attack directly exposes the configured behavior of a large language model (LLM)?)`,options:[`提示角色切换 (Prompted persona switches)`,`利用友好性和信任 (Exploiting friendliness and trust)`,`忽略提示模板 (Ignoring the prompt template)`,`提取提示模板 (Extracting the prompt template)`],answer:3,explanation:`A - 角色切换是一种攻击方式，但不直接暴露模型的配置行为 B - 利用模型的友好特性是一种攻击方法，但不涉及配置行为的暴露 C - 忽略提示模板是绕过限制的方法，但不是直接暴露配置 D - 提取提示模板直接暴露了模型的基础配置和行为规则，是最直接的攻击方式`},
  {id:82,category:'模型評估',difficulty:'中等',text:`一家公司想要使用 Amazon Bedrock。该公司需要审查在使用 Amazon Bedrock 时公司负责哪些安全方面。公司将负责哪个安全方面？ (A company wants to use Amazon Bedrock. The company needs to review which security aspects the company is responsible for when using Amazon Bedrock. Which security aspect will the company be responsible for?)`,options:[`修补和更新 Amazon Bedrock 的版本 (Patching and updating the versions of Amazon Bedrock)`,`保护托管 Amazon Bedrock 的基础设施 (Protecting the infrastructure that hosts Amazon Bedrock)`,`保护公司数据的传输和存储安全 (Securing the company's data in transit and at rest)`,`在公司网络内配置 Amazon Bedrock (Provisioning Amazon Bedrock within the company network)`],answer:2,explanation:`A - 这是 AWS 的责任，属于\"云的安全\"范畴 B - 这是 AWS 的责任，属于基础设施层面的安全 C - 这是客户的责任，根据 AWS 共享责任模型，客户负责其数据的安全 D - 这是 AWS 的责任，服务配置由 AWS 管理`},
  {id:83,category:'模型評估',difficulty:'中等',text:`一家社交媒体公司想要使用大语言模型(LLM)来总结消息。该公司已经选择了几个在 Amazon SageMaker JumpStart 上可用的 LLM。公司想要比较这些模型生成输出的毒性。哪种策略能以最少的运营开销来评估这些 LLM？ (A social media company wants to use a large language model (LLM) to summarize messages. The company has chosen a few LLMs that are available on Amazon SageMaker JumpStart. The company wants to compare the generated output toxicity `,options:[`众包评估 (Crowd-sourced evaluation)`,`自动模型评估 (Automatic model evaluation)`,`人工评估模型 (Model evaluation with human workers)`,`基于人类反馈的强化学习(RLHF) (Reinforcement learning from human feedback)`],answer:1,explanation:`A - 众包评估需要管理大量评估者，运营开销大 B - 自动模型评估使用预定义的指标和工具，运营开销最小，可以快速、一致地评估毒性 C - 人工评估需要专门的评估人员，运营开销较大 D - RLHF 是训练方法而非评估策略，需要大量人力和时间投入`},
  {id:84,category:'LLM應用',difficulty:'中等',text:`一家公司正在测试基础模型(FM)的安全性。在测试过程中，该公司想要绕过安全特性并生成有害内容。 这是哪种安全技术的例子？ (A company is testing the security of a foundation model (FM). During testing, the company wants to get around the safety features and make harmful content. Which security technique is this an example of?)`,options:[`模糊测试训练数据以找到漏洞 (Fuzzing training data to find vulnerabilities)`,`拒绝服务攻击(DoS) (Denial of service)`,`授权的渗透测试 (Penetration testing with authorization)`,`越狱测试 (Jailbreak)`],answer:3,explanation:`A - 模糊测试主要针对输入数据处理的漏洞，不是专门用于绕过安全特性 B - DoS 是通过耗尽资源使服务不可用的攻击方式，与绕过安全特性无关 C - 渗透测试虽然也测试安全性，但范围更广泛，不特指绕过 AI 模型的安全限制 D - Jailbreak 专门指尝试绕过 AI 模型的安全限制，使其生成受限内容，最符合题目描述`},
  {id:85,category:'資料處理',difficulty:'中等',text:`一家公司需要使用 Amazon SageMaker 进行模型训练和推理。该公司必须遵守监管要求，在没有互联网访问的隔离环境中运行 SageMaker 作业。哪种解决方案能满足这些要求？ (A company needs to use Amazon SageMaker for model training and inference. The company must comply with regulatory requirements to run SageMaker jobs in an isolated environment without internet access. Which solution will meet these requirements?)`,options:[`使用 SageMaker Experiments 运行 SageMaker 训练和推理 (Run SageMaker training and inference by using SageMaker Experiments)`,`使用网络隔离运行 SageMaker 训练和推理 (Run SageMaker training and inference by using network isolation)`,`使用加密功能对 SageMaker 地理空间功能的数据进行静态加密 (Encrypt the data at rest by using encryption for SageMaker geospatial capabilities)`,`为 SageMaker 作业关联适当的 AWS Identity and Access Management (IAM)角色 (Associate appropriate AWS Identity and Access Management (IAM) roles with the SageMaker jobs)`],answer:1,explanation:`A - SageMaker Experiments 用于实验跟踪和管理，不解决网络隔离需求 B - 网络隔离是满足在无互联网环境下运行 SageMaker 的最佳解决方案，因为它： - 可以在私有 VPC 中运行训练和推理作业 - 通过 VPC 端点提供必要的 AWS 服务访问 - 完全隔离外部网络访问 - 符合监管要求的安全标准 > C - 数据加密虽然重要，但不解决网络隔离需求 D - IAM 角色管理访问权限，但不提供网络级别的隔离`},
  {id:86,category:'LLM應用',difficulty:'中等',text:`一家软件公司为客户构建工具。该公司想要使用 AI 来提高软件开发生产力。哪种解决方案能满足这些要求？ (A software company builds tools for customers. The company wants to use AI to increase software development productivity. Which solution will meet these requirements?)`,options:[`使用二元分类模型生成代码审查 (Use a binary classification model to generate code reviews)`,`在公司的开发工具中安装代码推荐软件 (Install code recommendation software in the company's developer tools)`,`安装代码预测工具来预测潜在的代码问题 (Install a code forecasting tool to predict potential code issues)`,`使用自然语言处理(NLP)工具生成代码 (Use a natural language processing (NLP) tool to generate code)`],answer:3,explanation:`A - 二元分类模型功能过于简单，不适合复杂的代码审查需求 B - 代码推荐虽有帮助，但范围较为局限 C - 预测代码问题主要关注质量控制，不直接提升开发效率 D - NLP 工具生成代码是最全面的解决方案，可以： - 通过自然语言快速生成代码 - 处理各种编程语言和任务 - 提供代码解释和文档生成 - 显著提高开发效率和生产力`},
  {id:87,category:'資料處理',difficulty:'中等',text:`一家零售店想要使用 Amazon SageMaker DeepAR 预测算法来预测未来几周特定产品的需求。哪种类型的数据可以满足这个要求？ (A retail store wants to predict the demand for a specific product for the next few weeks by using the Amazon SageMaker DeepAR forecasting algorithm. Which type of data will meet this requirement?)`,options:[`文本数据 (Text data)`,`图像数据 (Image data)`,`时间序列数据 (Time series data)`,`二进制数据 (Binary data)`],answer:2,explanation:`A - 文本数据不适用于需求预测分析 B - 图像数据与需求预测无关 C - DeepAR 专门设计用于处理时间序列数据，完全符合需求预测的要求 D - 二进制数据不适合进行需求预测分析`},
  {id:88,category:'ML基礎',difficulty:'中等',text:`一家大型零售银行想要开发一个机器学习系统，帮助风险管理团队决定不同人群的贷款分配。银行必须做什么来开发一个无偏见的机器学习模型？ (A large retail bank wants to develop an ML system to help the risk management team decide on loan allocations for different demographics. What must the bank do to develop an unbiased ML model?)`,options:[`减少训练数据集的大小 (Reduce the size of the training dataset)`,`确保 ML 模型预测与历史结果一致 (Ensure that the ML model predictions are consistent with historical results)`,`为每个人群创建不同的 ML 模型 (Create a different ML model for each demographic group)`,`测量训练数据集的类别不平衡，相应地调整训练过程 (Measure class imbalance on the training dataset. Adapt the training process accordingly)`],answer:3,explanation:`A - 减少数据集大小会降低模型性能，不能解决偏见问题 B - 与历史结果保持一致可能会延续历史偏见 C - 为不同群体创建单独模型可能加剧歧视和偏见 D - 通过识别和处理数据集中的类别不平衡，可以帮助开发更公平的模型`},
  {id:89,category:'LLM應用',difficulty:'中等',text:`哪种提示技术可以防止提示注入攻击？ (Which prompting technique can protect against prompt injection attacks?)`,options:[`对抗性提示 (Adversarial prompting)`,`零样本提示 (Zero-shot prompting)`,`从少到多提示 (Least-to-most prompting)`,`思维链提示 (Chain-of-thought prompting)`],answer:0,explanation:`A - 对抗性提示通过设计特殊的防御机制来抵御提示注入攻击，是专门的安全防护技术 B - 零样本提示是在没有示例的情况下使用模型，与安全防护无关 C - 从少到多提示是一种解决复杂问题的方法，不涉及安全防护 D - 思维链提示用于提高推理能力，与防止注入攻击无关`},
  {id:90,category:'模型評估',difficulty:'中等',text:`一家公司已经对大语言模型(LLM)进行了微调，用于回答服务台的问题。公司想要确定微调是否提高了模型的准确性。公司应该使用哪个指标进行评估？ (A company has fine-tuned a large language model (LLM) to answer questions for a help desk. The company wants to determine if the fine-tuning has enhanced the model's accuracy. Which metric should the company use for the evaluation?)`,options:[`精确率 (Precision)`,`首个词元生成时间 (Time to first token)`,`F1 分数 (F1 score)`,`词错误率 (Word error rate)`],answer:2,explanation:`A - 精确率仅衡量正确预测的比例，不能完整评估模型性能 B - 首个词元生成时间是衡量响应速度的指标，与准确性无关 C - F1 分数结合精确率和召回率，是评估问答系统最全面的指标 D - 词错误率主要用于评估语音识别系统，不适合问答系统评估`},
  {id:91,category:'模型評估',difficulty:'中等',text:`一家公司正在使用带有 Amazon Bedrock 和 Stable Diffusion 的检索增强生成(RAG)基于文本描述生成产品图像。生成的结果经常是随机的且缺乏具体细节。公司想要提高生成图像的特异性。哪种解决方案满足这些要求？`,options:[`增加生成步骤数量 (Increase the number of generation steps)`,`使用 MASK_IMAGE_BLACK 遮罩源选项 (Use the MASK_IMAGE_BLACK mask source option)`,`增加无分类器指导(CFG)比例 (Increase the classifier-free guidance scale)`,`增加提示强度 (Increase the prompt strength)`],answer:2,explanation:`A - 增加步骤数量主要影响图像质量和细节，不会显著提高特异性 B - MASK_IMAGE_BLACK 用于图像修复，与提高特异性无关 C - 增加 CFG 比例可以让模型更严格地遵循文本提示，提高生成图像的特异性 D - \"提示强度\"不是 Stable Diffusion 的标准参数`},
  {id:92,category:'LLM應用',difficulty:'中等',text:`A company wants to implement a large language model (LLM) based chatbot to provide customer service agents with real-time contextual responses to customers' inquiries. The company will use the company's policies as the knowledge base. Which solution will meet these requirements MOST cost-effectively?`,options:[`在公司政策数据上重新训练 LLM (Retrain the LLM on the company policy data)`,`在公司政策数据上微调 LLM (Fine-tune the LLM on the company policy data)`,`实施检索增强生成(RAG)以获得上下文响应 (Implement Retrieval Augmented Generation for in- context responses)`,`在公司政策数据上使用预训练和数据增强 (Use pre-training and data augmentation on the company policy data)`],answer:2,explanation:`A - 重新训练 LLM 需要大量计算资源和数据，成本高昂且不必要 B - 微调虽然比重训练便宜，但仍需要显著的计算资源和专业知识 C - RAG 最具成本效益，无需训练，直接利用现有 LLM 和知识库即可实现目标 D - 预训练和数据增强过程复杂，需要大量资源，不是最具成本效益的选择`},
  {id:93,category:'雲端服務',difficulty:'中等',text:`一家公司想要使用 AWS Glue 创建新的解决方案。该公司在 AWS Glue 方面的编程经验很少。哪个 AWS 服务可以帮助公司使用 AWS Glue？ (A company wants to create a new solution by using AWS Glue. The company has minimal programming experience with AWS Glue. Which AWS service can help the company use AWS Glue?)`,options:[`Amazon Q Developer`,`AWS Config`,`Amazon Personalize`,`Amazon Comprehend`],answer:0,explanation:`A - 正确，Amazon Q Developer 是一个 AI 助手，可以帮助开发者使用 AWS 服务，包括 AWS Glue，特别适合编程经验有限的用户 B - AWS Config 是配置管理服务，不提供开发支持 C - Amazon Personalize 是个性化推荐服务，与 Glue 开发无关 D - Amazon Comprehend 是自然语言处理服务，不提供 Glue 开发支持`},
  {id:94,category:'AI治理',difficulty:'中等',text:`一家公司正在开发一个移动 ML 应用，使用手机摄像头来诊断和治疗昆虫叮咬。该公司想要使用来自不同性别、种族和全球各地地理位置的昆虫叮咬照片的多样化数据集来训练图像分类模型。在这种情况 下，公司展示了负责任 AI 的哪个原则？ (A company is developing a mobile ML app that uses a phone's camera to diagnose and treat insect bites…..)`,options:[`公平性 (Fairness)`,`可解释性 (Explainability)`,`治理 (Governance)`,`透明性 (Transparency)`],answer:0,explanation:`A - 正确，使用多样化的训练数据集体现了公平性原则，确保模型对不同群体都能公平准确地工作 B - 可解释性关注模型决策过程的解释，而不是数据多样性 C - 治理关注模型管理和控制流程，不直接关联数据多样性 D - 透明性关注模型决策的公开性，不是数据多样性 这个案例通过确保训练数据包含不同人群的样本，展示了 AI 公平性原则的实践，避免模型在某些群体上表现不佳的偏见问题。`},
