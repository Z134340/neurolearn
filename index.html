  {id:95,category:'AI治理',difficulty:'中等',text:`一家公司正在开发一个用于贷款审批的 ML 模型。公司必须实施解决方案来检测模型中的偏差。公司还必须能够解释模型的预测。哪种解决方案能满足这些要求？ (A company is developing an ML model to make loan approvals. The company must implement a solution to detect bias in the model. The company must also be able to explain the model's predictions. Which solution will meet these requirements?)`,options:[`Amazon SageMaker Clarify`,`Amazon SageMaker Data Wrangler`,`Amazon SageMaker Model Cards`,`AWS AI Service Cards`],answer:0,explanation:`A - 正确，SageMaker Clarify 专门用于检测模型偏差并提供模型解释能力 B - Data Wrangler 主要用于数据准备和转换，不提供偏差检测 C - Model Cards 用于记录模型信息，不提供偏差检测和解释功能 D - AI Service Cards 提供 AWS AI 服务的文档，不是偏差检测工具`},
  {id:96,category:'模型評估',difficulty:'中等',text:`一家公司使用 Amazon Bedrock 开发了一个生成式文本摘要模型。该公司将使用 Amazon Bedrock 自动模型评估功能。公司应该使用哪个指标来评估模型的准确性？ (A company has developed a generative text summarization model by using Amazon Bedrock. The company will use Amazon Bedrock automatic model evaluation capabilities. Which metric should the company use to evaluate the accuracy of the model?)`,options:[`ROC 曲线下面积(AUC)分数 (Area Under the ROC Curve score)`,`F1 分数 (F1 score)`,`BERT 分数 (BERTScore)`,`真实世界知识(RWK)分数 (Real world knowledge score)`],answer:2,explanation:`A - AUC 主要用于二分类问题，不适合文本摘要评估 B - F1 分数主要用于分类问题，不适合评估文本摘要质量 C - 正确，BERTScore 专门用于评估文本摘要的准确性，是 Bedrock 中文本摘要任务的标准指标 D - RWK 分数用于评估一般文本生成任务，不是专门针对摘要`},
  {id:97,category:'ML基礎',difficulty:'中等',text:`一位 AI 从业者想要基于花瓣长度、花瓣宽度、萼片长度和萼片宽度来预测花的分类。哪种算法满足这 些要求？ (An AI practitioner wants to predict the classification of flowers based on petal length, petal width, sepal length, and sepal width. Which algorithm meets these requirements?)`,options:[`K 最近邻 (K-nearest neighbors, k-NN)`,`K 均值 (K-mean)`,`自回归综合移动平均模型 (Autoregressive Integrated Moving Average, ARIMA)`,`线性回归 (Linear regression)`],answer:0,explanation:`A - 正确，k-NN 是一种有效的分类算法，适合基于特征值进行多类别分类 B - K-means 是一种聚类算法，不适合监督分类任务 C - ARIMA 用于时间序列预测，不适合分类问题 D - 线性回归用于预测连续值，不适合分类任务`},
  {id:98,category:'模型評估',difficulty:'中等',text:`一家公司在 Amazon Bedrock 中使用自定义模型进行生成式 AI 应用。该公司想要使用公司管理的加密密钥来加密模型定制作业创建的模型构件。哪个 AWS 服务满足这些要求？ (A company is using custom models in Amazon Bedrock for a generative AI application. The company wants to use a company managed encryption key to encrypt the model artifacts that the model customization jobs create. Which AWS service meets these requirements?`,options:[`AWS 密钥管理服务 (AWS Key Management Service)`,`Amazon Inspector`,`Amazon Macie`,`AWS Secrets Manager`],answer:0,explanation:`A - 正确，AWS KMS 专门用于创建和管理加密密钥，支持 Bedrock 模型加密 B - Inspector 是漏洞评估服务，不提供加密功能 C - Macie 是数据安全和隐私服务，不提供加密密钥管理 D - Secrets Manager 用于管理密钥，但不适合模型加密需求`},
  {id:99,category:'LLM應用',difficulty:'中等',text:`一家公司想要使用大语言模型(LLMs)从自然语言代码注释生成代码。哪个 LLM 功能满足这些要求？ (A company wants to use large language models (LLMs) to produce code from natural language code comments. Which LLM feature meets these requirements?)`,options:[`文本摘要 (Text summarization)`,`文本生成 (Text generation)`,`文本补全 (Text completion)`,`文本分类 (Text classification)`],answer:1,explanation:`A - 文本摘要是将长文本压缩为简短摘要，不适合代码生成 B - 正确，文本生成能够从自然语言描述创建完整的代码 C - 文本补全主要用于补充已有代码，而不是从头生成代码 D - 文本分类用于对文本进行分类，不能生成代码`},
  {id:100,category:'模型評估',difficulty:'中等',text:`一家公司正在推出一款帮助用户学习外语的移动应用。该应用通过调用大语言模型(LLM)使文本更连贯。公司收集了多样化的文本数据集，并用更易读版本的示例补充了数据集。公司希望 LLM 输出与提供的示例相似。公司应该使用哪个指标来评估 LLM 是否满足这些要求？ (A company is introducing a mobile app that helps users learn foreign languages…..)`,options:[`损失函数值 (Value of the loss function)`,`语义鲁棒性 (Semantic robustness)`,`面向摘要的召回率评估(ROUGE)分数 (Recall-Oriented Understudy for Gisting Evaluation score)`,`文本生成延迟 (Latency of the text generation)`],answer:2,explanation:`A - 损失函数值是训练指标，不直接衡量输出与参考文本的相似度 B - 语义鲁棒性衡量模型对干扰的抵抗力，不适合评估文本相似度 C - 正确，ROUGE 专门用于评估生成文本与参考文本的相似度 D - 延迟是性能指标，与文本质量无关`},
  {id:101,category:'LLM應用',difficulty:'中等',text:`一家公司发现其基础模型(FM)生成的图像与提示无关。该公司想要修改提示技术以减少无关图像。哪种解决方案满足这些要求？ (A company notices that its foundation model (FM) generates images that are unrelated to the prompts. The company wants to modify the prompt techniques to decrease unrelated images. Which solution meets these requirements?)`,options:[`使用零样本提示 (Use zero-shot prompts)`,`使用负面提示 (Use negative prompts)`,`使用正面提示 (Use positive prompts)`,`使用模糊提示 (Use ambiguous prompts)`],answer:1,explanation:`A - 零样本提示不能有效控制不想要的图像元素 B - 正确，负面提示可以明确指定不想要出现的元素，提高生成图像的相关性 C - 仅使用正面提示不足以排除不相关的元素 D - 模糊提示会增加生成不相关图像的可能性`},
  {id:102,category:'LLM應用',difficulty:'中等',text:`一家公司想要使用大语言模型(LLM)为公司产品生成简洁的、特征明确的描述。哪种提示工程技术满足这些要求？ (A company wants to use a large language model (LLM) to generate concise, feature-specific descriptions for the company's products. Which prompt engineering technique meets these requirements?)`,options:[`创建一个涵盖所有产品的提示，编辑响应使其更具体、简洁并适合每个产品 (Create one prompt that covers all products. Edit the responses to make the responses more specific, concise, and tailored to each product)`,`为每个产品类别创建突出关键特征的提示，包括每个提示响应的期望输出格式和长度 (Create prompts for each product category that highlight the key features. Include the desired output format and length for each prompt response)`,`在每个提示中包含多样化的产品特征，以生成创意和独特的描述 (Include a diverse range of product features in each prompt to generate creative and unique descriptions)`,`提供详细的特定产品提示，以确保精确和定制的描述 (Provide detailed, product-specific prompts to ensure precise and customized descriptions)`],answer:1,explanation:`A - 单一通用提示难以满足所有产品的特定需求 B - 正确，按类别创建结构化提示，并指定输出格式，最适合生成一致性的产品描述 C - 过于多样化的特征可能导致描述不够聚焦和具体 D - 过于详细的提示可能导致冗长和不够简洁的描述`},
  {id:103,category:'資料處理',difficulty:'中等',text:`一家公司正在开发一个预测客户流失的 ML 模型。该模型在训练数据集上表现良好，但无法准确预测新数据的流失情况。哪种解决方案可以解决这个问题？ (A company is developing an ML model to predict customer churn. The model performs well on the training dataset but does not accurately predict churn for new data. Which solution will resolve this issue?)`,options:[`降低正则化参数以增加模型复杂度 (Decrease the regularization parameter to increase model complexity)`,`增加正则化参数以降低模型复杂度 (Increase the regularization parameter to decrease model complexity)`,`向输入数据添加更多特征 (Add more features to the input data)`,`训练更多的轮次 (Train the model for more epochs)`],answer:1,explanation:`A - 降低正则化会加重过拟合问题，使情况更糟 B - 正确，增加正则化可以减少过拟合，提高模型泛化能力 C - 添加更多特征可能会加重过拟合问题 D - 增加训练轮次可能会加重过拟合问题`},
  {id:104,category:'LLM應用',difficulty:'中等',text:`一家公司正在实施智能代理，为客户提供对话式搜索体验。该公司需要一个数据库服务，支持将生成式 AI 模型的嵌入向量存储和查询在数据库中。哪个 AWS 服务能满足这些要求？ (A company is implementing intelligent agents to provide conversational search experiences for its customers. The company needs a database service that will support storage and queries of embeddings from a generative AI model as vectors in the database. Which AWS s`,options:[`Amazon Athena`,`Amazon Aurora PostgreSQL`,`Amazon Redshift`,`Amazon EMR`],answer:1,explanation:`A - Athena 是查询服务，不支持向量存储和查询 B - 正确，Aurora PostgreSQL 通过 pgvector 扩展支持向量存储和相似性搜索 C - Redshift 是数据仓库服务，不适合向量存储和查询 D - EMR 是大数据处理服务，不适合向量数据库用途`},
  {id:105,category:'模型評估',difficulty:'中等',text:`一家金融机构正在使用基础模型(FM)构建 AI 解决方案来做出贷款审批决策。出于安全和审计目的，公司需要 AI 解决方案的决策是可解释的。哪个因素与 AI 解决方案决策的可解释性相关？ (A financial institution is building an AI solution to make loan approval decisions by using a foundation model (FM). For security and audit purposes, the company needs the AI solution's decisions to be explainable. Which factor relates to the explainabilit`,options:[`模型复杂度 (Model complexity)`,`训练时间 (Training time)`,`超参数数量 (Number of hyperparameters)`,`部署时间 (Deployment time)`],answer:0,explanation:`A - 正确，模型复杂度直接影响其可解释性，越复杂的模型通常越难解释决策过程 B - 训练时间是性能指标，与模型可解释性无关 C - 超参数数量是模型调优相关参数，不直接影响决策的可解释性 D - 部署时间是技术指标，与模型可解释性无关`},
  {id:106,category:'LLM應用',difficulty:'中等',text:`一家制药公司想要分析新药物的用户评论，并为每种药物提供简明的概述。哪种解决方案满足这些要求？ (A pharmaceutical company wants to analyze user reviews of new medications and provide a concise overview for each medication. Which solution meets these requirements?)`,options:[`使用 Amazon Personalize 创建时间序列预测模型来分析药物评论 (Create a time-series forecasting model to analyze the medication reviews by using Amazon Personalize)`,`使用 Amazon Bedrock 大语言模型(LLMs)创建药物评论摘要 (Create medication review summaries by using Amazon Bedrock large language models)`,`使用 Amazon SageMaker 创建将药物分类到不同组的分类模型 (Create a classification model that categorizes medications into different groups by using Amazon SageMaker)`,`使用 Amazon Rekognition 创建药物评论摘要 (Create medication review summaries by using Amazon Rekognition)`],answer:1,explanation:`A - Personalize 用于个性化推荐，不适合文本摘要任务 B - 正确，LLMs 非常适合处理文本分析和生成摘要的任务 C - 分类模型不能生成文本摘要 D - Rekognition 是计算机视觉服务，不适合文本分析任务`},
  {id:107,category:'資料處理',difficulty:'中等',text:`一家公司想要为员工建立一个潜在客户优先级排序应用程序，以联系潜在客户。该应用程序必须让员工能够根据领域知识和专业经验查看和调整模型中分配给不同变量的权重。哪种 ML 模型类型满足这些要求？ (A company wants to build a lead prioritization application for its employees to contact potential customers. The application must give employees the ability to view and adjust the weights assigned to different variables in the model based on domain knowl`,options:[`逻辑回归模型 (Logistic regression model)`,`基于主成分的深度学习模型 (Deep learning model built on principal components)`,`K 近邻(k-NN)模型 (K-nearest neighbors model)`,`神经网络 (Neural network)`],answer:0,explanation:`A - 正确，逻辑回归模型具有可解释性，权重可以直接查看和调整 B - 主成分分析后的深度学习模型难以直接解释和调整权重 C - k-NN 是基于距离的方法，没有可调整的特征权重 D - 神经网络是黑盒模型，权重难以解释和手动调整`},
  {id:108,category:'模型評估',difficulty:'中等',text:`哪种策略能够确定基础模型(FM)是否有效地满足业务目标？ (Which strategy will determine if a foundation model (FM) effectively meets business objectives?)`,options:[`评估模型在基准数据集上的表现 (Evaluate the model's performance on benchmark datasets)`,`分析模型的架构和超参数 (Analyze the model's architecture and hyperparameters)`,`评估模型与具体用例的契合度 (Assess the model's alignment with specific use cases)`,`衡量模型部署所需的计算资源 (Measure the computational resources required for model deployment)`],answer:2,explanation:`A - 基准数据集性能不一定反映实际业务场景的效果 B - 技术细节分析不能直接反映业务目标的达成情况 C - 正确，将模型与具体业务用例对齐是评估其业务价值的最佳方式 D - 资源需求是技术考虑因素，不能决定业务目标的达成`},
  {id:109,category:'ML基礎',difficulty:'中等',text:`一家公司需要训练一个 ML 模型来对不同类型的动物图像进行分类。该公司拥有大量已标记的图像数据集，且不会标记更多数据。公司应该使用哪种类型的学习来训练模型？ (A company needs to train an ML model to classify images of different types of animals. The company has a large dataset of labeled images and will not label more data. Which type of learning should the company use to train the model?)`,options:[`监督学习 (Supervised learning)`,`无监督学习 (Unsupervised learning)`,`强化学习 (Reinforcement learning)`,`主动学习 (Active learning)`],answer:0,explanation:`A - 正确，监督学习最适合使用已标记数据进行图像分类任务 B - 无监督学习用于未标记数据，不适合此场景 C - 强化学习用于决策和控制问题，不适合图像分类 D - 主动学习用于需要持续标记新数据的场景，题目明确表示不会标记更多数据`},
  {id:110,category:'資料處理',difficulty:'中等',text:`ML 生命周期的哪个阶段确定合规性和监管要求？ (Which phase of the ML lifecycle determines compliance and regulatory requirements?)`,options:[`特征工程 (Feature engineering)`,`模型训练 (Model training)`,`数据收集 (Data collection)`,`业务目标识别 (Business goal identification)`],answer:3,explanation:`A - 特征工程阶段专注于数据转换和特征创建，不负责确定合规要求 B - 模型训练阶段关注模型的开发和优化，不负责确定合规要求 C - 数据收集阶段专注于获取数据，虽然需要遵守合规要求，但不是确定要求的阶段 D - 正确，在业务目标识别阶段确定项目的合规性和监管要求，这是整个 ML 生命周期的第一个关键阶段`},
  {id:111,category:'模型評估',difficulty:'中等',text:`一家食品服务公司想要开发一个 ML 模型来帮助减少每日食品浪费并增加销售收入。该公司需要持续提高模型的准确性。哪种解决方案满足这些要求？ (A food service company wants to develop an ML model to help decrease daily food waste and increase sales revenue. The company needs to continuously improve the model's accuracy. Which solution meets these requirements?)`,options:[`使用 Amazon SageMaker 并用新数据迭代 (Use Amazon SageMaker and iterate with newer data)`,`使用 Amazon Personalize 并用历史数据迭代 (Use Amazon Personalize and iterate with historical data)`,`使用 Amazon CloudWatch 分析客户订单 (Use Amazon CloudWatch to analyze customer orders)`,`使用 Amazon Rekognition 优化模型 (Use Amazon Rekognition to optimize the model)`],answer:0,explanation:`A - 正确，SageMaker 适合需要持续优化的预测模型，可以通过新数据不断改进 B - Personalize 主要用于个性化推荐，不适合食品浪费预测 C - CloudWatch 是监控服务，不是 ML 模型开发工具 D - Rekognition 是计算机视觉服务，不适合食品浪费预测`},
  {id:112,category:'雲端服務',difficulty:'中等',text:`一家公司开发了一个预测房地产销售价格的 ML 模型。该公司想要部署该模型以进行预测，而无需管理服务器或基础设施。哪种解决方案满足这些要求？ (A company has developed an ML model to predict real estate sale prices. The company wants to deploy the model to make predictions without managing servers or infrastructure. Which solution meets these requirements?)`,options:[`在 Amazon EC2 实例上部署模型 (Deploy the model on an Amazon EC2 instance)`,`在 Amazon EKS 集群上部署模型 (Deploy the model on an Amazon Elastic Kubernetes Service cluster)`,`使用 Amazon CloudFront 与 Amazon S3 集成部署模型 (Deploy the model by using Amazon CloudFront with an Amazon S3 integration)`,`使用 Amazon SageMaker 端点部署模型 (Deploy the model by using an Amazon SageMaker endpoint)`],answer:3,explanation:`A - EC2 需要管理服务器和基础设施，不符合无服务器要求 B - EKS 需要管理 Kubernetes 集群，不符合无服务器要求 C - CloudFront 和 S3 组合不适合进行模型推理 D - 正确，SageMaker 提供完全托管的端点服务，无需管理基础设施`},
  {id:113,category:'模型評估',difficulty:'中等',text:`一家公司想要开发一个 AI 应用程序，帮助员工检查未结客户索赔、识别特定索赔的详细信息并访问索赔文档。哪种解决方案满足这些要求？ (A company wants to develop an AI application to help its employees check open customer claims, identify details for a specific claim, and access documents for a claim. Which solution meets these requirements?)`,options:[`使用 Amazon Bedrock 的 Agents 和 Amazon Fraud Detector 构建应用程序 (Use Agents for Amazon Bedrock with Amazon Fraud Detector to build the application)`,`使用 Amazon Bedrock 的 Agents 和 Amazon Bedrock 知识库构建应用程序 (Use Agents for Amazon Bedrock with Amazon Bedrock knowledge bases to build the application)`,`使用 Amazon Personalize 和 Amazon Bedrock 知识库构建应用程序 (Use Amazon Personalize with Amazon Bedrock knowledge bases to build the application)`,`使用 Amazon SageMaker 通过训练新的 ML 模型来构建应用程序 (Use Amazon SageMaker to build the application by training a new ML model)`],answer:1,explanation:`A - Fraud Detector 专注于欺诈检测，不适合一般索赔管理 B - 正确，Bedrock Agents 配合知识库能够处理自然语言查询和文档检索 C - Personalize 是推荐系统服务，不适合处理索赔管理任务 D - 从头训练新模型成本高且复杂，对此场景不必要`},
  {id:114,category:'AI概念',difficulty:'中等',text:`一家制造公司使用 AI 来检查产品并发现任何损坏或缺陷。该公司使用的是哪种类型的 AI 应用？ (A manufacturing company uses AI to inspect products and find any damages or defects. Which type of AI application is the company using?)`,options:[`推荐系统 (Recommendation system)`,`自然语言处理 (Natural language processing, NLP)`,`计算机视觉 (Computer vision)`,`图像处理 (Image processing)`],answer:2,explanation:`A - 推荐系统用于推荐产品或内容，不适用于缺陷检测 B - NLP 用于处理文本和语言，不适用于产品缺陷检测 C - 正确，计算机视觉是用于自动检测和分析图像中的缺陷和异常的最佳 AI 应用 D - 图像处理是较基础的图像操作，而计算机视觉更适合智能缺陷检测`},
  {id:115,category:'ML基礎',difficulty:'中等',text:`一家公司想要创建一个 ML 模型来预测客户满意度。该公司需要完全自动化的模型调优。哪个 AWS 服务满足这些要求？ (A company wants to create an ML model to predict customer satisfaction. The company needs fully automated model tuning. Which AWS service meets these requirements?)`,options:[`Amazon Personalize (Amazon Personalize)`,`Amazon SageMaker (Amazon SageMaker)`,`Amazon Athena (Amazon Athena)`,`Amazon Comprehend (Amazon Comprehend)`],answer:1,explanation:`A - Personalize 专注于个性化推荐系统，不适合客户满意度预测 B - 正确，SageMaker 提供自动模型调优功能，支持各种 ML 任务包括预测分析 C - Athena 是交互式查询服务，不是机器学习服务 D - Comprehend 是自然语言处理服务，不提供通用的预测模型功能`},
  {id:116,category:'ML基礎',difficulty:'中等',text:`在机器学习生命周期的后处理阶段，公司可以使用哪种技术来降低生成式 AI 应用程序中的偏见和毒性？ (Which technique can a company use to lower bias and toxicity in generative AI applications during the post-processing ML lifecycle?)`,options:[`人在环路中 (Human-in-the-loop)`,`数据增强 (Data augmentation)`,`特征工程 (Feature engineering)`,`对抗训练 (Adversarial training)`],answer:0,explanation:`A - 正确，人在环路中可以在后处理阶段审查和纠正 AI 输出，有效降低偏见和毒性 B - 数据增强是在训练前/训练阶段使用的技术，不是后处理技术 C - 特征工程是在数据预处理阶段进行的，不是后处理技术 D - 对抗训练是在模型训练阶段使用的技术，不是后处理技术`},
  {id:117,category:'模型評估',difficulty:'中等',text:`一家银行已经对大语言模型(LLM)进行了微调，以加快贷款审批流程。在对模型进行外部审计时，公司发现该模型对特定人群的贷款审批速度比其他人群更快。银行应该如何最经济地解决这个问题？ (A bank has fine-tuned a large language model (LLM) to expedite the loan approval process. During an external audit of the model, the company discovered that the model was approving loans at a faster pace for a specific demographic than for other demographics.`,options:[`包含更多样化的训练数据。使用新数据重新微调模型 (Include more diverse training data. Fine- tune the model again by using the new data)`,`对微调后的模型使用检索增强生成(RAG) (Use Retrieval Augmented Generation (RAG) with the fine-tuned model)`,`使用 AWS Trusted Advisor 检查来消除偏见 (Use AWS Trusted Advisor checks to eliminate bias)`,`使用更多样化的训练数据预训练新的 LLM (Pre-train a new LLM with more diverse training data)`],answer:0,explanation:`A - 正确，使用更多样化的数据重新微调是最经济有效的解决方案，可以帮助减少模型偏见 B - RAG 不能解决模型本身的偏见问题，主要用于增强模型的知识 C - Trusted Advisor 不是用来解决模型偏见的工具 D - 预训练新模型成本高昂，且不必要，因为只需要解决偏见问题`},
  {id:118,category:'模型評估',difficulty:'中等',text:`一家公司需要记录其 Amazon Bedrock API 的所有请求。公司必须以最低成本安全地保留日志 5 年。哪种 AWS 服务和存储类的组合满足这些要求？（选择两项） (A company needs to log all requests made to its Amazon Bedrock API. The company must retain the logs securely for 5 years at the lowest possible cost. Which combination of AWS service and storage class meets these requirements?)`,options:[`AWS CloudTrail (AWS CloudTrail)`,`Amazon CloudWatch (Amazon CloudWatch)`,`AWS Audit Manager (AWS Audit Manager)`,`Amazon S3 Intelligent-Tiering (Amazon S3 Intelligent-Tiering)`],answer:0,explanation:`A - 正确，CloudTrail 专门用于记录 AWS API 调用，包括 Bedrock API 的请求 B - CloudWatch 主要用于监控，不是最佳的长期日志存储解决方案 C - Audit Manager 是用于评估合规性的服务，不适合 API 日志记录 D - 正确，S3 Intelligent-Tiering 通过自动移动数据到最具成本效益的访问层来优化存储成本 E - S3 Standard 成本较高，不是长期存储的最佳选择`},
  {id:119,category:'雲端服務',difficulty:'中等',text:`一家音乐公司想要建立一个系统，通过歌词含义来搜索歌曲。哪种解决方案满足这个要求？ (A music company wants to build a system to search for songs by the meaning of the lyrics. Which solution meets this requirement?)`,options:[`从歌词创建提示。使用 Amazon QuickSight 进行搜索 (Create prompts from the lyrics. Use Amazon QuickSight for searching)`,`从歌词创建向量嵌入。使用 Amazon OpenSearch Service 进行搜索 (Create vector embeddings from the lyrics. Use Amazon OpenSearch Service for searching)`,`创建令牌。使用 Amazon Lex 进行搜索 (Create tokens. Use Amazon Lex for searching)`,`创建词干。使用 Amazon Personalize 进行搜索 (Create stems. Use Amazon Personalize for searching)`],answer:1,explanation:`A - QuickSight 是商业智能工具，不适合语义搜索 B - 正确，向量嵌入能捕获文本语义，OpenSearch 支持向量搜索，适合语义搜索 C - Lex 是聊天机器人服务，不适合歌词语义搜索 D - Personalize 是推荐系统服务，不适合语义搜索场景`},
  {id:120,category:'雲端服務',difficulty:'中等',text:`一家电商公司正在开发一个新的移动应用。该应用将允许用户通过输入关键词搜索或上传类似商品的照片来查找视觉上相似的产品。该公司想要使用 Amazon Titan 来实现这两种搜索功能。哪个 Amazon Titan 模型满足这些要求？ (An ecommerce company is developing a new mobile app. The app will give users the ability to search the company's product catalog by entering keyword search terms or by uploading a photo of a similar item to find visually similar prod`,options:[`Amazon Titan Text Express (Amazon Titan Text Express)`,`Amazon Titan Text Lite (Amazon Titan Text Lite)`,`Amazon Titan Embeddings (Amazon Titan Embeddings)`,`Amazon Titan Multimodal Embeddings (Amazon Titan Multimodal Embeddings) 4`],answer:3,explanation:`A - Text Express 仅处理文本，不能处理图像搜索 B - Text Lite 仅处理文本，不支持图像处理 C - Embeddings 仅支持文本嵌入，不支持图像处理 D - 正确，Multimodal Embeddings 支持文本和图像的多模态处理，可以同时处理关键词搜索和图像相似度搜索`},
  {id:121,category:'模型評估',difficulty:'中等',text:`一家公司想要使用 Amazon Bedrock 来总结公司数据库中的客户文档。哪个指标将评估摘要的准确性？ (A company wants to use Amazon Bedrock to summarize the customer documents that are in the company's database. Which metric will evaluate the accuracy of the summaries?)`,options:[`BERTScore (BERTScore)`,`均方根误差 (Root mean squared error, RSE)`,`解毒算法 (Detoxify algorithm)`,`平均绝对百分比误差 (Mean absolute percentage error, MAPE)`],answer:0,explanation:`A - 正确，BERTScore 是专门用于评估文本摘要准确性的指标，它使用 BERT 模型来计算生成摘要与参考摘要的相似度 B - RSE 是用于回归问题的评估指标，不适用于文本摘要评估 C - Detoxify 算法用于评估内容的毒性，不是用来评估摘要准确性 D - MAPE 是用于数值预测的评估指标，不适用于文本摘要评估`},
  {id:122,category:'LLM應用',difficulty:'中等',text:`一家公司想要使用数据库来支持生成式 AI 模型。该模型将创建智能代理，提供对话式搜索体验。哪些 AWS 服务满足这些要求？（选择两项） (A company wants to use a database to support a generative AI model. The model will create intelligent agents that provide conversational search experiences. Which AWS services meet these requirements?)`,options:[`Amazon Neptune (Amazon Neptune)`,`Amazon Elastic Kubernetes Service (Amazon EKS)`,`Amazon S3 (Amazon S3)`,`Amazon OpenSearch Service (Amazon OpenSearch Service)`],answer:0,explanation:`A - 正确，Neptune 是图数据库服务，适合存储和处理复杂的关系数据和知识图谱，支持智能代理的语义理解 B - EKS 是容器编排服务，不是数据库服务，不适合此场景 C - S3 是对象存储服务，不提供高级搜索和查询功能 D - 正确，OpenSearch 提供强大的搜索和分析功能，支持向量搜索，适合构建对话式搜索体验 E - EMR 是大数据处理服务，不适合实时对话搜索场景`},
  {id:123,category:'模型評估',difficulty:'中等',text:`一家食品公司想要使用生成式 AI 根据客户档案和产品目录自动生成产品描述。哪种解决方案满足这些要求？ (A food company wants to use generative AI to automatically generate product descriptions based on customer profiles and the product catalog. Which solution meets these requirements?)`,options:[`使用 Amazon Bedrock 独立的第三方基础模型(FM) (Use an Amazon Bedrock standalone third- party foundation model)`,`在 AWS 上实现针对产品目录定制的数据湖 (Implement a data lake on AWS that is customized to the product catalog)`,`实施人工参与循环监控来注释产品目录 (Implement human-in-the-loop monitoring to annotate the product catalog)`,`使用基于公司数据源的 Amazon Bedrock 知识库 (Use an Amazon Bedrock knowledge base that uses company data sources)`],answer:3,explanation:`A - 单独使用基础模型无法整合公司特定的产品和客户数据 B - 数据湖是存储解决方案，不能直接生成产品描述 C - 人工注释是数据准备方法，不是自动生成解决方案 D - 正确，Bedrock 知识库能结合公司数据源，实现个性化的产品描述生成`},
  {id:124,category:'模型評估',difficulty:'中等',text:`一家公司在 Amazon Bedrock 上使用基础模型(FM)进行文本摘要。该公司想要检查 FM 的准确性、稳健性和无毒性。哪个 Amazon Bedrock 功能或资源提供评估 FM 的能力？ (A company uses a foundation model (FM) on Amazon Bedrock for text summarization. The company wants to check the accuracy, robustness, and non-toxicity of the FM. Which Amazon Bedrock feature or resource provides the ability to assess the FM?)`,options:[`Amazon Bedrock 代理 (Agents for Amazon Bedrock)`,`Amazon Bedrock 模型评估作业报告卡 (Amazon Bedrock model evaluation job report cards)`,`Amazon Bedrock 自定义模型 (Amazon Bedrock custom models)`,`Amazon Bedrock 推理参数 (Amazon Bedrock inference parameters)`],answer:1,explanation:`A - Bedrock 代理主要用于构建应用，不是用于模型评估 B - 正确，Bedrock 模型评估作业报告卡专门用于评估模型的准确性、稳健性和毒性等指标 C - 自定义模型是关于模型定制，不是评估功能 D - 推理参数用于控制模型输出，不是评估工具`},
  {id:125,category:'LLM應用',difficulty:'中等',text:`一家公司想要使用现有的第三方基础模型(FM)构建自己的生成式 AI 应用。该公司想要通过 API 直接将第三方 FM 与公司的工作负载集成。这个用例适用于生成式 AI 安全范围矩阵中的哪个范围？ (A company wants to build its own generative AI application by using an existing third-party foundation model (FM). The company wants to directly integrate the third-party FM with the company's workload by using an API. Which scope in the Generative AI`,options:[`企业应用 (Enterprise App)`,`微调模型 (Fine-tuned Models)`,`预训练模型 (Pre-trained Models)`,`自训练模型 (Self-trained Models)`],answer:2,explanation:`A - 企业应用通常指使用现成的 AI 解决方案，不涉及直接 API 集成 B - 微调模型涉及对现有模型进行特定任务的优化，而题目只提到直接使用 C - 正确，直接通过 API 使用第三方预训练模型属于\"预训练模型\"范围 D - 自训练模型指从头开始训练模型，与题目描述不符`},
  {id:126,category:'模型評估',difficulty:'中等',text:`一家公司正在使用基础模型(FM)构建聊天机器人来回答客户问题。公司想要确认模型是无偏见和公平的。哪种解决方案可以评估模型的公平性？ (A company is building a chatbot to answer customer questions by using a foundation model (FM). The company wants to confirm that the model is unbiased and fair. Which solution will assess the fairness of the model?)`,options:[`在 Amazon Bedrock 上微调自定义模型 (Fine-tuning a custom model on Amazon Bedrock)`,`关于聊天机器人满意度的用户调查 (User surveys about chatbot satisfaction)`,`自动模型评估任务 (Automatic model evaluation tasks)`,`定期测试聊天机器人响应的准确性 (Regular accuracy testing of chatbot responses)`],answer:2,explanation:`A - 微调模型是优化过程，不是评估公平性的方法 B - 用户满意度调查不能系统地评估模型的偏见和公平性 C - 正确，自动模型评估任务可以系统地检测和评估模型的偏见和不公平性 D - 准确性测试主要关注功能正确性，不专门评估公平性`},
  {id:127,category:'LLM應用',difficulty:'中等',text:`一家公司正在构建语言模型应用。该公司想要防范提示注入攻击。哪个选项是提示注入攻击的例子？ (A company is building a language model application. The company wants to protect against prompt injection attacks. Which option is an example of a prompt injection attack?)`,options:[`加密失败 (Cryptographic failures)`,`提取对话历史 (Extracting conversation history)`,`访问控制失效 (Broken access control)`,`服务器端请求伪造 (Server-side request forgery)`],answer:1,explanation:`A - 加密失败是一般的安全漏洞，不是提示注入攻击 B - 正确，提取对话历史是典型的提示注入攻击方式，攻击者试图绕过模型的安全限制获取敏感信息 C - 访问控制失效是一般的安全漏洞，不特指提示注入 D - SSRF 是一种网络安全漏洞，与提示注入攻击无关`},
  {id:128,category:'LLM應用',difficulty:'中等',text:`一位 AI 从业者正在为大型语言模型(LLM)生成提示。该问题需要复杂的多步骤推理。AI 从业者应该使用哪种提示工程技术来满足这些要求？ (An AI practitioner is generating a prompt for a large language model (LLM). The problem requires complex, multi-step reasoning. Which prompt engineering technique should the AI practitioner use to meet these requirements?)`,options:[`思维链提示 (Chain-of-thought prompting)`,`零样本提示 (Zero-shot prompting)`,`提示模板 (Prompt templating)`,`检索增强生成 (Retrieval Augmented Generation)`],answer:0,explanation:`A - 正确，思维链提示专门设计用于引导模型进行多步骤推理和复杂问题解决 B - 零样本提示过于简单，不适合处理需要复杂推理的任务 C - 提示模板主要用于标准化输出格式，不专门用于复杂推理 D - RAG 主要用于增强模型的知识基础，不是专门用于改善推理能力的技术`},
  {id:129,category:'資料處理',difficulty:'中等',text:`一家公司正在开发 ML 模型来预测客户流失。该模型在训练数据集上表现良好，但无法准确预测新数据的流失情况。哪种解决方案可以解决这个问题？ (A company is developing an ML model to predict customer churn. The model performs well on the training dataset but does not accurately predict churn for new data. Which solution will resolve this issue?)`,options:[`降低正则化参数以增加模型复杂度 (Decrease the regularization parameter to increase model complexity)`,`增加正则化参数以降低模型复杂度 (Increase the regularization parameter to decrease model complexity)`,`向输入数据添加更多特征 (Add more features to the input data)`,`增加训练轮数 (Train the model for more epochs)`],answer:1,explanation:`A - 降低正则化会加重过拟合问题，使情况更糟 B - 正确，增加正则化可以减少过拟合，提高模型在新数据上的泛化能力 C - 添加更多特征可能会进一步加重过拟合问题 D - 增加训练轮数可能会加重过拟合问题`},
  {id:130,category:'資料處理',difficulty:'中等',text:`电子商务公司想要构建预测模型来预测产品需求。哪种数据类型满足这些要求？ (An ecommerce company wants to build a forecasting model to predict demand for products. Which data type meets these requirements?)`,options:[`非结构化数据 (Unstructured data)`,`时间序列数据 (Time-series data)`,`标记数据 (Labeled data)`,`未标记数据 (Unlabeled data)`],answer:1,explanation:`A - 非结构化数据如文本、图像等不适合直接用于需求预测 B - 时间序列数据最适合需求预测，可以反映销售趋势、季节性和时间相关模式 C - 标记数据是广义概念，不特指预测建模所需的时间相关数据 D - 未标记数据不适合进行精确的需求预测分析`},
  {id:131,category:'模型評估',difficulty:'中等',text:`生成式 AI 模型在自然语言处理(NLP)任务中的哪个特征是优势？ (Which characteristic of generative AI models is an advantage in natural language processing (NLP) tasks?)`,options:[`固有的透明性 (Inherent transparency)`,`确定性输出 (Deterministic outputs)`,`新颖和多样的输出 (Novel and diverse outputs)`,`计算效率 (Computational efficiency)`],answer:2,explanation:`A - 生成式 AI 模型通常被认为是\"黑盒\"，不具有固有的透明性 B - 生成式 AI 模型的输出通常是非确定性的，而这实际上是其优势之一 C - 正确，生成式 AI 模型能够产生新颖和多样的输出，这是其在 NLP 任务中的主要优势 D - 生成式 AI 模型通常计算成本较高，计算效率不是其主要优势`},
  {id:132,category:'ML基礎',difficulty:'中等',text:`一家公司正在使用特定领域的模型。公司希望避免从头开始创建新模型。相反，公司希望适应预训练模型来创建用于新的相关任务的模型。哪种 ML 策略满足这些要求？ (A company is using domain-specific models. The company wants to avoid creating new models from the beginning. The company instead wants to adapt pre-trained models to create models for new, related tasks. Which ML strategy meets these requirements?)`,options:[`增加训练轮数 (Increase the number of epochs)`,`使用迁移学习 (Use transfer learning)`,`减少训练轮数 (Decrease the number of epochs)`,`使用无监督学习 (Use unsupervised learning)`],answer:1,explanation:`A - 仅增加训练轮数不能帮助适应预训练模型到新任务 B - 正确，迁移学习正是利用预训练模型的知识来解决新的相关任务的方法 C - 减少训练轮数不能帮助模型适应新任务 D - 无监督学习是一种学习方法，但不专门用于适应预训练模型`},
  {id:133,category:'LLM應用',difficulty:'中等',text:`一家公司正在使用提示工程来提供定制的文本生成输出。公司需要模型生成使用行业特定术语和技术词汇的响应。公司有少量未标记的数据，必须使用这些数据来定制模型。解决方案必须使用最少的计算资源。哪种解决方案能满足这些要求？ (A company is using prompt engineering to provide customized outputs for text generation. The company needs the model to generate responses that use industry-specific jargon and technical terms. The company has a small amount of unlabeled data`,options:[`基于未标记数据预训练新的 LLM (Pre-train a new LLM based on the unlabeled data)`,`对现有模型执行领域适应微调 (Perform domain adaptation fine-tuning on the existing model)`,`基于未标记数据执行基于指令的微调 (Perform instruction-based fine-tuning based on the unlabeled data)`,`微调提示模板 (Fine-tune prompt templates)`],answer:3,explanation:`A - 预训练新模型需要大量计算资源，不符合要求 B - 领域适应微调需要较多计算资源，不是最优选择 C - 指令微调需要标记数据和较多计算资源，不适合此场景 D - 正确，微调提示模板计算资源需求最少，可以利用少量数据快速适应特定领域术语`},
  {id:134,category:'模型評估',difficulty:'中等',text:`一家公司正在为其应用程序引入新功能。该功能将改进输出消息的风格。该公司将在 Amazon Bedrock 上微调大语言模型(LLM)来实现该功能。公司需要哪种类型的数据来满足这些要求？ (A company is introducing a new feature for its application. The feature will refine the style of output messages. The company will fine-tune a large language model (LLM) on Amazon Bedrock to implement the feature. Which type of data does the company need t`,options:[`仅输入消息的样本 (Samples of only input messages)`,`仅输出消息的样本 (Samples of only output messages)`,`输入和输出消息对的样本 (Samples of pairs of input and output messages)`,`分开的输入和输出消息样本 (Separate samples of input and output messages)`],answer:2,explanation:`A - 仅有输入样本无法教会模型如何生成期望的输出风格 B - 仅有输出样本无法建立输入和输出之间的关系 C - 正确，微调 LLM 需要成对的输入输出样本，以学习正确的输入到输出的映射关系 D - 分开的样本无法建立正确的输入输出对应关系`},
  {id:135,category:'ML基礎',difficulty:'中等',text:`哪种策略可以评估用于图像分类任务的基础模型(FM)的准确性？ (Which strategy evaluates the accuracy of a foundation model (FM) that is used in image classification tasks?)`,options:[`计算模型使用的资源总成本 (Calculate the total cost of resources used by the model)`,`使用预定义的基准数据集测量模型的准确性 (Measure the model's accuracy against a predefined benchmark dataset)`,`计算神经网络中的层数 (Count the number of layers in the neural network)`,`评估模型处理的图像的颜色准确性 (Assess the color accuracy of images processed by the model)`],answer:1,explanation:`A - 资源成本与模型准确性评估无关 B - 正确，使用基准数据集测试是评估图像分类模型准确性的标准方法 C - 网络层数是模型架构特征，不是准确性评估方法 D - 颜色准确性只是图像的一个方面，不能全面评估分类准确性 补充：评估图像分类模型时，通常会使用测试数据集计算准确率、精确率、召回率等指标，并可以使用交叉验证来确保评估的可靠性。`},
  {id:136,category:'AI治理',difficulty:'中等',text:`以下哪个选项是构建信任和部署以人为本的 AI 技术的 AI 治理框架的特征？ (Which option is a characteristic of AI governance frameworks for building trust and deploying human-centered AI technologies?)`,options:[`跨业务部门扩展计划以创造长期商业价值 (Expanding initiatives across business units to create long-term business value)`,`确保与业务标准、收入目标和利益相关者期望保持一致 (Ensuring alignment with business standards, revenue goals, and stakeholder expectations)`,`克服挑战以推动业务转型和增长 (Overcoming challenges to drive business transformation and growth)`,`制定数据、透明度、负责任 AI 和合规性的政策和指南 (Developing policies and guidelines for data, transparency, responsible AI, and compliance)`],answer:3,explanation:`A - 这是业务扩展策略，不是 AI 治理框架的主要特征 B - 这是业务对齐目标，不是 AI 治理框架的核心特征 C - 这是业务发展目标，不是 AI 治理框架的特征 D - 正确，AI 治理框架的核心特征是建立确保负责任 AI 开发和使用的政策指南`},
  {id:137,category:'雲端服務',difficulty:'中等',text:`使用 Amazon SageMaker Model Cards 记录 AI 模型的好处是什么？ (Which option is a benefit of using Amazon SageMaker Model Cards to document AI models?)`,options:[`提供模型功能的视觉吸引力摘要 (Providing a visually appealing summary of a model's capabilities)`,`标准化模型的目的、性能和局限性信息 (Standardizing information about a model's purpose, performance, and limitations)`,`减少模型的整体计算需求 (Reducing the overall computational requirements of a model)`,`为存档目的物理存储模型 (Physically storing models for archival purposes)`],answer:1,explanation:`A - Model Cards 的主要目的不是视觉展示，而是标准化文档 B - 正确，Model Cards 提供了标准化的方式来记录模型的关键信息，包括其目的、性能和局限性 C - Model Cards 是文档工具，不影响模型的计算需求 D - Model Cards 用于文档记录，不是模型存储工具`},
  {id:138,category:'模型評估',difficulty:'中等',text:`在基础模型(FM)性能的背景下，F1 分数衡量什么？ (What does an F1 score measure in the context of foundation model (FM) performance?)`,options:[`模型精确率和召回率 (Model precision and recall)`,`模型生成响应的速度 (Model speed in generating responses)`,`运行模型的财务成本 (Financial cost of operating the model)`,`模型计算的能源效率 (Energy efficiency of the model's computations)`],answer:0,explanation:`A - 正确，F1 分数是精确率(precision)和召回率(recall)的调和平均值，用于评估模型性能 B - F1 分数与模型响应速度无关，这是性能指标的不同方面 C - F1 分数不衡量运营成本，这是商业指标 D - F1 分数不衡量能源效率，这是环境影响指标 补充：F1 分数计算公式为：F1 = 2 * (precision * recall) / (precision + recall)，分数范围在 0 到 1 之间，1 表示最佳性能，0 表示最差性能。它特别适用于评估分类任务的性能，能够平衡精确率和召回 率。`},
  {id:139,category:'資料處理',difficulty:'中等',text:`一家公司正在构建 ML 模型。该公司收集了新数据，并通过创建相关矩阵、计算统计数据和数据可视化来分析数据。公司目前处于 ML 流程的哪个阶段？ (A company is building an ML model. The company collected new data and analyzed the data by creating a correlation matrix, calculating statistics, and visualizing the data. Which stage of the ML pipeline is the company currently in?)`,options:[`数据预处理 (Data pre-processing)`,`特征工程 (Feature engineering)`,`探索性数据分析 (Exploratory data analysis)`,`超参数调优 (Hyperparameter tuning)`],answer:2,explanation:`A - 数据预处理是对数据进行清洗和转换的阶段，不包括数据分析 B - 特征工程是创建和选择特征的阶段，不是数据分析阶段 C - 正确，创建相关矩阵、计算统计数据和数据可视化都是探索性数据分析的典型任务 D - 超参数调优是模型训练后的优化阶段，与数据分析无关`},
  {id:140,category:'模型訓練',difficulty:'中等',text:`一家公司部署了 AI/ML 解决方案来帮助客服人员回答常见问题。这些问题会随时间变化。公司希望让客服人员能够提问并自动获得常见客户问题的答案。哪种策略能最经济有效地满足这些要求？ (A company deployed an AI/ML solution to help customer service agents respond to frequently asked questions. The questions can change over time. The company wants to give customer service agents the ability to ask questions and receive automatically generated `,options:[`定期微调模型 (Fine-tune the model regularly)`,`使用上下文数据训练模型 (Train the model by using context data)`,`使用上下文数据预训练和基准测试模型 (Pre-train and benchmark the model by using context data)`,`使用检索增强生成(RAG)和提示工程技术 (Use Retrieval Augmented Generation (RAG) with prompt engineering techniques)`],answer:3,explanation:`A - 定期微调需要大量资源和成本，不是最经济的方案 B - 完整训练模型成本高昂且耗时，不是最经济的选择 C - 预训练和基准测试需要大量资源，不是最经济的方案 D - 正确，RAG 允许模型使用最新信息而无需重新训练，成本效益最高`},
  {id:141,category:'模型評估',difficulty:'中等',text:`一家出版公司建立了基于检索增强生成(RAG)的解决方案，让用户能够与已发布的内容进行交互。每天都有新内容发布。该公司希望为用户提供近实时的体验。公司应该在 RAG 流程中通过离线批处理实现哪些步骤来满足这些要求？（选择两项） (A publishing company built a Retrieval Augmented Generation (RAG) based solution to give its users the ability to interact with published content. New content is published daily. The company wants to provide a near real-time experience `,options:[`生成内容嵌入 (Generation of content embeddings)`,`生成用户查询的嵌入 (Generation of embeddings for user queries)`,`创建搜索索引 (Creation of the search index)`,`检索相关内容 (Retrieval of relevant content)`],answer:0,explanation:`A - 正确，内容嵌入可以预先生成，这样可以提高实时查询性能 B - 用户查询嵌入必须实时生成，因为查询是即时的 C - 正确，搜索索引可以预先创建并定期更新，这样可以加快检索速度 D - 内容检索需要实时进行以响应用户查询 E - 响应生成必须实时进行以回应用户的具体查询`},
  {id:142,category:'AI治理',difficulty:'中等',text:`一家公司构建了一个 AI 驱动的简历筛选系统。该公司使用大型数据集来训练模型。该数据集包含的简历未能代表所有人口统计群体。这种情况体现了负责任 AI 的哪个核心维度？ (A company built an AI-powered resume screening system. The company used a large dataset to train the model. The dataset contained resumes that were not representative of all demographics. Which core dimension of responsible AI does this scenario present?)`,options:[`公平性 (Fairness)`,`可解释性 (Explainability)`,`隐私和安全性 (Privacy and security)`,`透明性 (Transparency)`],answer:0,explanation:`A - 正确，数据集中缺乏某些人口统计群体的代表性直接关系到 AI 系统的公平性问题 B - 可解释性关注的是模型决策过程的可理解性，与数据代表性无关 C - 隐私和安全性关注数据保护，与数据代表性无关 D - 透明性关注系统运作的公开性，与数据代表性无关`},
  {id:143,category:'雲端服務',difficulty:'中等',text:`一家电商公司正在开发一个新的移动应用。该应用将让用户能够通过输入关键词搜索词或上传类似商品 的照片来查找视觉上相似的产品。该公司想要使用 Amazon Titan 实现这两种搜索功能。哪种 Amazon Titan 模型满足这些要求？ (An ecommerce company is developing a new mobile app. The app will give users the ability to search the company's product catalog by entering keyword search terms or by uploading a photo of a similar item to find visually similar pr`,options:[`Amazon Titan Text Express`,`Amazon Titan Text Lite`,`Amazon Titan Embeddings`,`Amazon Titan Multimodal Embeddings`],answer:3,explanation:`A - Text Express 只处理文本，不能处理图像搜索 B - Text Lite 只处理文本，不支持图像处理 C - Embeddings 仅支持文本嵌入，不支持图像处理 D - 正确，Multimodal Embeddings 支持文本和图像的双模态处理，能同时满足关键词和图像搜索需求`},
  {id:144,category:'ML基礎',difficulty:'中等',text:`一家航空公司想要建立一个会话式 AI 助手，回答客户关于航班时刻表、预订和支付的问题。该公司想要使用大语言模型(LLMs)和知识库来创建基于文本的聊天机器人界面。哪种解决方案能以最少的开发工作量满足这些要求？ (An airline company wants to build a conversational AI assistant to answer customer questions about flight schedules, booking, and payments. The company wants to use large language models (LLMs) and a knowledge base to create a text-based chatbo`,options:[`在 Amazon SageMaker Autopilot 上训练模型`,`使用 Amazon Bedrock 开发检索增强生成(RAG)代理`,`使用 Amazon Q Developer 创建 Python 应用程序`,`在 Amazon SageMaker Jumpstart 上微调模型`],answer:1,explanation:`A - Autopilot 主要用于自动机器学习，不适合构建对话系统 B - 正确，Amazon Bedrock 提供了预构建的 RAG 功能，可以最快速地实现所需功能 C - Amazon Q Developer 主要用于代码开发辅助，不是构建聊天机器人的最佳选择 D - 模型微调需要大量开发工作，不是最低开发工作量的方案 > Sources`},
  {id:145,category:'資料處理',difficulty:'中等',text:`一家公司希望通过使用最新数据来保持其基础模型(FM)的相关性。该公司希望实施包含 FM 定期更新的模型训练策略。哪种解决方案满足这些要求？ (A company wants to keep its foundation model (FM) relevant by using the most recent data. The company wants to implement a model training strategy that includes regular updates to the FM. Which solution meets these requirements?)`,options:[`批量学习 (Batch learning)`,`持续预训练 (Continuous pre-training)`,`静态训练 (Static training)`,`潜在训练 (Latent training)`],answer:1,explanation:`A - 批量学习只在特定时间点更新，不能持续适应新数据 B - 正确，持续预训练允许模型通过定期更新来适应新数据，保持相关性 C - 静态训练是一次性的，不能保持模型与最新数据的相关性 D - 潜在训练不是标准的训练策略术语，不适用于此场景`},
  {id:146,category:'LLM應用',difficulty:'中等',text:`一家金融公司正在开发用于贷款审批决策的生成式 AI 应用。公司需要应用输出具有责任性和公平性。哪种解决方案满足这些要求？ (A financial company is developing a generative AI application for loan approval decisions. The company needs the application output to be responsible and fair. Which solution meets these requirements?)`,options:[`审查训练数据以检查偏见，在训练数据中包含所有人口统计数据 (Review the training data to check for biases. Include data from all demographics in the training data)`,`使用具有多个隐藏层的深度学习模型 (Use a deep learning model with many hidden layers)`,`对模型的决策过程保密以保护专有算法 (Keep the model's decision-making process a secret to`,`在静态测试数据集上持续监控模型的性能 (Continuously monitor the model's performance on a static test dataset)`],answer:0,explanation:`A - 正确，确保训练数据的多样性和公平性是实现负责任 AI 的关键步骤 B - 模型复杂性不能保证公平性和责任性 C - 缺乏透明度违背了负责任 AI 的原则 D - 静态测试数据集可能无法反映真实世界的变化和新的偏见`},
  {id:147,category:'模型評估',difficulty:'中等',text:`一家公司正在使用 Amazon Bedrock 上的大语言模型(LLM)构建聊天机器人。该聊天机器人处理客户支持请求。为了解决请求，客户和聊天机器人必须多次互动。哪种解决方案能让 LLM 使用之前客户消息的内容？ (A company is using a large language model (LLM) on Amazon Bedrock to build a chatbot. The chatbot processes customer support requests. To resolve a request, the customer and the chatbot must interact a few times. Which solution gives the LLM `,options:[`开启模型调用日志以收集消息 (Turn on model invocation logging to collect messages)`,`将消息添加到模型提示中 (Add messages to the model prompt)`,`使用 Amazon Personalize 保存对话历史 (Use Amazon Personalize to save conversation history)`,`为 LLM 使用预置吞吐量 (Use Provisioned Throughput for the LLM)`],answer:1,explanation:`A - 日志记录只是用于监控和分析，不能直接用于模型的对话上下文 B - 正确，将之前的消息添加到提示中可以让模型了解对话的上下文和历史 C - Amazon Personalize 是推荐系统服务，不适合管理对话历史 D - 预置吞吐量只关注性能，与对话历史管理无关`},
  {id:148,category:'模型評估',difficulty:'中等',text:`一位 AI 从业者正在为 Amazon Titan 模型开发提示。该模型托管在 Amazon Bedrock 上。AI 从业者 使用该模型解决数值推理挑战。AI 从业者在提示的末尾添加了以下短语：\"要求模型通过逐步解释其推理过程来展示其工作过程\"。AI 从业者使用的是哪种提示工程技术？ (An AI practitioner is developing a prompt for an Amazon Titan model. The model is hosted on Amazon Bedrock. The AI practitioner is using the model to solve numerical reasoning challenges. The AI practiti`,options:[`思维链提示 (Chain-of-thought prompting)`,`提示注入 (Prompt injection)`,`少样本提示 (Few-shot prompting)`,`提示模板 (Prompt templating)`],answer:0,explanation:`A - 正确，思维链提示要求模型逐步展示其推理过程，这正是题目中描述的情况 B - 提示注入是一种安全漏洞，与逐步推理展示无关 C - 少样本提示是通过提供几个示例来指导模型，与题目描述不符 D - 提示模板是创建标准化提示结构，不涉及逐步推理过程的展示`},
  {id:149,category:'ML基礎',difficulty:'中等',text:`一家公司正在开发 ML 模型来预测客户流失。哪个评估指标将评估模型在预测流失等二元分类任务上的表现？ (A company is developing an ML model to predict customer churn. Which evaluation metric will assess the model's performance on a binary classification task such as predicting churn?)`,options:[`F1 分数 (F1 score)`,`均方误差 (Mean squared error, MSE)`,`R 方 (R-squared)`,`模型训练所用时间 (Time used to train the model)`],answer:0,explanation:`A - 正确，F1 分数是精确率和召回率的调和平均值，特别适合评估二元分类问题 B - MSE 主要用于回归问题，不适合评估分类任务 C - R 方用于评估回归模型的拟合优度，不适用于分类问题 D - 训练时间是效率指标，不能反映模型的预测准确性`},
  {id:150,category:'ML基礎',difficulty:'中等',text:`一家公司的大语言模型(LLM)出现了幻觉现象。该公司如何减少幻觉？ (A company's large language model (LLM) is experiencing hallucinations. How can the company decrease hallucinations?)`,options:[`设置 Amazon Bedrock 的 Agents 来监督模型训练`,`使用数据预处理并删除任何导致幻觉的数据`,`降低模型的 temperature 推理参数`,`使用经过训练不会产生幻觉的基础模型(FM)`],answer:2,explanation:`C 是正确答案，因为： - 降低 temperature 参数可以使模型输出更加保守和确定性 - 较低的 temperature 会减少模型生成创造性但可能不准确的内容 - 这是一个简单但有效的减少幻觉的方法 - 不需要重新训练模型或修改数据 A 不正确，因为： - Agents 主要用于任务编排，不直接解决幻觉问题 - 监督训练不能保证消除幻觉 B 不正确，因为： - 很难准确识别哪些数据导致幻觉 - 删除数据可能会影响模型的整体性能 D 不正确，因为： - 目前没有完全不会产生幻觉的基础模型 - 所有 LLM 都有产生幻觉的可能性减少 LLM 幻觉的其他建议： - 使用明确和具体的提示 - 实施事实检查机制 - 添加检索增强生成(RAG) - 定期评估和监控模型输出`},
  {id:151,category:'LLM應用',difficulty:'中等',text:`一家医疗公司想要开发一个 AI 应用程序，该应用程序可以访问结构化的患者记录，提取相关信息并生成简明的摘要。哪种解决方案能满足这些要求？ (A medical company wants to develop an AI application that can access structured patient records, extract relevant information, and generate concise summaries. Which solution will meet these requirements?)`,options:[`使用 Amazon Comprehend Medical 提取相关医疗实体和关系，应用基于规则的逻辑来构建和格式化摘要`,`使用 Amazon Personalize 分析患者参与模式，将输出与通用文本摘要工具集成`,`使用 Amazon Textract 将扫描文档转换为数字文本，设计关键词提取系统生成摘要`,`实现 Amazon Kendra 为医疗记录提供可搜索索引，使用基于模板的系统格式化摘要`],answer:0,explanation:`A 是正确答案，因为： - Amazon Comprehend Medical 专门设计用于理解医疗文本 - 可以准确识别医疗术语、诊断、治疗等关键信息 - 能够理解医疗实体之间的关系 - 结合规则基础的逻辑可以生成结构化的摘要 B 不正确，因为： - Amazon Personalize 主要用于个性化推荐 - 不适合医疗文本的信息提取和摘要生成 C 不正确，因为： - Amazon Textract 主要用于文档 OCR - 简单的关键词提取不足以理解复杂的医疗信息 D 不正确，因为： - Amazon Kendra 主要是搜索引擎 - 不专门用于医疗信息的提取和摘要生成`},
  {id:152,category:'AI治理',difficulty:'中等',text:`一家医院正在开发一个 AI 系统，基于患者记录和医疗图像协助医生诊断疾病。为了符合法规要求，敏感的患者数据不得离开数据所在的国家。哪种数据治理策略将确保合规性并保护患者隐私？ (A hospital is developing an AI system to assist doctors in diagnosing diseases based on patient records and medical images. To comply with regulations, the sensitive patient data must not leave the country the data is located in. Which data governance strategy `,options:[`数据驻留 (Data residency)`,`数据质量 (Data quality)`,`数据可发现性 (Data discoverability)`,`数据丰富 (Data enrichment)`],answer:0,explanation:`A 是正确答案，因为数据驻留策略： - 确保数据保持在特定地理位置或司法管辖区内 - 符合数据本地化和隐私法规要求 - 保护敏感的医疗数据不会跨境传输 - 满足医疗行业的合规要求 B 不正确，因为数据质量虽然重要，但不直接解决数据位置和隐私合规问题。 C 不正确，因为数据可发现性关注数据的查找和访问能力，不解决数据位置限制问题。 D 不正确，因为数据丰富是关于增强数据价值的过程，不涉及数据位置合规性。`},
  {id:153,category:'LLM應用',difficulty:'中等',text:`一家公司正在使用生成式 AI 构建聊天机器人。该公司想要确保聊天机器人具有包容性。哪种解决方案能满足这些要求？ (A company is building a chatbot by using generative AI. The company wants to ensure that the chatbot is inclusive. Which solution will meet these requirements?)`,options:[`使用无偏见的训练数据进行微调 (Use unbiased training data for fine-tuning)`,`使用 Amazon Fraud Detector`,`使用提示模板设置提示指南 (Use prompt templates to set up the prompt guidelines)`,`设置代理并使用检索增强生成(RAG) (Set up agents and use Retrieval Augmented Generation)`],answer:0,explanation:`A 是正确答案，因为使用无偏见的训练数据进行微调可以： - 确保模型学习到公平和包容的行为模式 - 减少对特定群体的偏见 - 提高模型对不同用户群体的响应质量 - 帮助创建更具包容性的 AI 系统 B 不正确，因为 Amazon Fraud Detector 是用于检测欺诈行为的服务，与确保包容性无关。 C 不正确，因为虽然提示模板可以帮助规范输出，但不能从根本上解决模型的偏见问题。 D 不正确，因为 RAG 主要用于增强模型的知识检索能力，不直接解决包容性问题。`},
  {id:154,category:'LLM應用',difficulty:'中等',text:`一家公司想要部署一个生成式 AI 应用程序，帮助员工从文本输入创建图像。哪种类型的生成式 AI 模型满足这个要求？ (A company wants to deploy a generative AI application to help employees create images from text inputs. Which type of generative AI model meets this requirement?)`,options:[`基于 Transformer 的模型 (Transformer-based model)`,`多类分类模型 (Multi-class classification model)`,`回归模型 (Regression model)`,`扩散模型 (Diffusion model)`],answer:3,explanation:`D 是正确答案，因为扩散模型是目前最先进的文本到图像生成模型类型，如 Stable Diffusion 等。扩散模型通过逐步去噪的过程生成高质量图像。 A 不正确，因为虽然 Transformer 模型在自然语言处理中表现出色，但它主要用于文本处理，不是专门用于图像生成。 B 不正确，因为多类分类模型用于将输入分类到预定义的类别中，不能生成新的图像。 C 不正确，因为回归模型用于预测连续值，不适合图像生成任务。`},
  {id:155,category:'模型評估',difficulty:'中等',text:`一家研究公司想要开发一个文本摘要应用程序，该程序可以摄入多篇研究论文并对其进行摘要。该公司想要使用 Amazon Bedrock 基础模型（FM）。该公司希望在单个模型调用中总结研究论文。FM 必须能够在单个提示中接受大量输入。在选择用于此任务的 FM 之前，公司应考虑哪个模型因素？ (A research company wants to develop a text summarization application that can ingest multiple research papers and summarize the research papers. The company wants to use an Amazon Bedrock foundation model (`,options:[`词汇量大小 (Vocabulary size)`,`模型复杂度 (Model complexity)`,`模型延迟 (Model latency)`,`上下文窗口 (Context window)`],answer:3,explanation:`D 是正确答案，因为上下文窗口决定了模型在单次处理中可以接受的最大文本长度。对于需要处理多篇研究论文的摘要任务，上下文窗口的大小是关键因素。 A 不正确，因为词汇量大小主要影响模型理解单词的能力，不直接决定能处理的文本长度。 B 不正确，因为模型复杂度主要影响模型的性能和计算需求，不直接决定能处理的输入大小。 C 不正确，因为模型延迟主要关注处理速度，不是决定能否在单次调用中处理大量文本的关键因素。`},
  {id:156,category:'模型評估',difficulty:'中等',text:`一家金融机构正在使用 Amazon Bedrock 开发 AI 应用程序。该应用程序托管在 VPC 中。为了满足监管合规标准，不允许 VPC 访问任何互联网流量。哪种 AWS 服务或功能将满足这些要求？ (A financial institution is using Amazon Bedrock to develop an AI application. The application is hosted in a VPC. To meet regulatory compliance standards, the VPC is not allowed access to any internet traffic. Which AWS service or feature will mee`,options:[`AWS PrivateLink`,`Amazon Macie`,`Amazon CloudFront`,`Internet gateway (互联网网关)`],answer:0,explanation:`A 是正确答案，因为 AWS PrivateLink 允许在不经过公共互联网的情况下，通过私有连接访问 AWS 服务（如 Amazon Bedrock）。这完全符合不允许互联网访问的安全要求。 B 不正确，因为 Amazon Macie 是一个数据安全和隐私服务，用于发现和保护敏感数据，不解决网络连接问题。 C 不正确，因为 Amazon CloudFront 是内容分发网络服务，需要互联网访问才能工作。 D 不正确，因为 Internet gateway 正是用来提供互联网访问的，与要求相反。`},
  {id:157,category:'模型評估',difficulty:'中等',text:`一家公司想要使用 Amazon Bedrock 构建一个用于产品广告的生成式 AI 应用程序。该公司想要使用未 标记的数据来定制基础模型（FM），使模型更专业化。哪种模型定制技术满足这些要求？ (A company wants to use Amazon Bedrock to build a generative AI application for product advertising. The company wants to customize a foundation model (FM) by using unlabeled data to make the model more specialized. Which model customization technique m`,options:[`微调 (Fine-tuning)`,`检索增强生成 (Retrieval Augmented Generation, RAG)`,`持续预训练 (Continued pre-training)`,`提示工程 (Prompt engineering)`],answer:2,explanation:`C 是正确答案，因为持续预训练是使用未标记数据来适应特定领域的技术，可以让模型学习领域特定的模式和知识。 A 不正确，因为微调通常需要标记数据来调整模型以完成特定任务。 B 不正确，因为 RAG 是在推理时结合外部知识，不涉及模型的重新训练。 D 不正确，因为提示工程是优化输入提示的技术，不涉及使用未标记数据来改进模型。 > **163** 一家初创公司正在使用 AWS 服务进行软件开发生命周期管理。该公司想要使用生成式 AI 服务来优化编程生产力并缩短应用程序的上市时间。哪些步骤的组合满足这些要求？（选择两项） (A startup company is using AWS services for its software development lifecycle. The company wants to use generative AI services to optimize programming productivity and to decrease time to market for the company's applications. Which combi`},
  {id:158,category:'模型評估',difficulty:'中等',text:`一家公司正在使用生成式 AI 构建风险预测解决方案。该公司需要在替换之前的手动流程之前理解并信任这个自动化解决方案。哪种解决方案满足这些要求？ (A company is building a solution to predict risk by using generative AI. The company needs to understand and trust the automated solution before replacing previous manual processes. Which solution meets these requirements?)`,options:[`模型监控 (Model monitoring)`,`模型训练 (Model training)`,`模型可解释性 (Model explainability)`,`模型推理评估 (Model inference evaluation)`],answer:2,explanation:`C 是正确答案，因为模型可解释性能够帮助理解模型的决策过程，建立对自动化解决方案的信任。 A 不正确，因为模型监控主要用于追踪已部署模型的性能，不能解释模型的决策过程。 B 不正确，因为模型训练是创建模型的过程，不能直接提供对模型决策的解释。 D 不正确，因为模型推理评估只关注预测结果的准确性，不提供决策过程的透明度。`},
  {id:159,category:'ML基礎',difficulty:'中等',text:`哪种类型的神经网络提供了并行处理文本序列的能力？ (Which type of neural network offers the ability to process text sequences with parallel computation?)`,options:[`Transformer 神经网络 (Transformer neural network)`,`循环神经网络 (Recurrent neural network, RNN)`,`卷积神经网络 (Convolutional neural network, CNN)`,`长短期记忆网络 (Long short-term memory network, LSTM)`],answer:0,explanation:`A 是正确答案，因为 Transformer 通过自注意力机制实现了序列的并行处理，不需要按顺序处理输入。 B 不正确，因为 RNN 是顺序处理的，必须按照序列顺序一个接一个地处理输入。 C 不正确，因为 CNN 主要用于处理网格型数据（如图像），不是专门为序列数据设计的。 D 不正确，因为 LSTM 是 RNN 的一种变体，仍然需要顺序处理输入。`},
  {id:160,category:'模型評估',difficulty:'中等',text:`一家全球公司使用 Amazon Bedrock 基础模型（FMs）构建了一个生成式 AI 应用程序。该公司最高优先级是云安全。根据 AWS 共享责任模型，哪个选项是客户的责任？ (A global company has built a generative AI application by using Amazon Bedrock foundation models (FMs). The company's highest priority is cloud security. According to the AWS shared responsibility model, which option is the customer's responsibility?)`,options:[`访问权限和数据加密 (Access permissions and data encryption)`,`物理网络设置和配置 (Physical networking setup and configuration)`,`主机操作系统和虚拟化 (Host operating system and virtualization)`,`安全和合规认证 (Security and compliance certifications)`],answer:0,explanation:`A 是正确答案，因为根据 AWS 共享责任模型，客户负责\"云中的安全\"，包括数据加密和访问权限管理。 B 不正确，因为物理网络设置和配置是 AWS 的责任，属于\"云的安全\"范畴。 C 不正确，因为主机操作系统和虚拟化层的安全是 AWS 的责任。 D 不正确，因为基础设施的安全和合规认证是 AWS 的责任。`},
  {id:161,category:'LLM應用',difficulty:'中等',text:`一家公司正在使用一个生成式 AI 模型，该模型基于用户提供的多个文本提示和图像示例来创建图像。该公司希望 AI 生成的图像与用户提供的图像示例紧密匹配。哪种提示工程技术满足这些要求？ (A company is using a generative AI model that creates images based on multiple text prompts and image examples that users provide. The company wants the AI-generated images to closely match the image examples that users provide. Which prompt engineering tec`,options:[`零样本提示 (Zero-shot prompting)`,`少样本提示 (Few-shot prompting)`,`单样本提示 (One-shot prompting)`,`思维树提示 (Tree-of-thought prompting)`],answer:1,explanation:`B 是正确答案，因为少样本提示允许模型通过多个示例学习，能更好地理解和匹配用户提供的多个图像示例。 A 不正确，因为零样本提示不使用任何示例，无法基于用户提供的图像示例进行学习。 C 不正确，因为单样本提示只使用一个示例，不足以处理多个图像示例的情况。 D 不正确，因为思维树提示主要用于复杂推理任务，不适合图像生成任务。`},
  {id:162,category:'模型評估',difficulty:'中等',text:`一家零售公司正在为其产品库存添加标签。根据产品描述自动为每个产品分配标签。该公司使用 Amazon Bedrock 上的大语言模型（LLM）在少样本学习模式下创建了一个产品类别。该公司收集了标记数据集并希望将解决方案扩展到所有产品类别。哪种解决方案满足这些要求？ (A retail company is tagging its product inventory. A tag is automatically assigned to each product based on the product description. The company created one product category by using a large language model (LLM) on Am`,options:[`使用零样本学习的提示工程 (Use prompt engineering with zero-shot learning)`,`使用提示模板的提示工程 (Use prompt engineering with prompt templates)`,`通过持续预训练来定制模型 (Customize the model with continued pre-training)`,`通过微调来定制模型 (Customize the model with fine-tuning)`],answer:3,explanation:`D 是正确答案，因为当有大量标记数据集时，微调是最有效的方法，可以让模型更好地适应特定任务和领域。 A 不正确，因为零样本学习在没有任何示例的情况下效果较差，而公司已经有了标记数据集。 B 不正确，因为虽然提示模板有用，但对于大规模分类任务，不如利用已有的标记数据进行微调效果好。 C 不正确，因为持续预训练成本高且耗时，对于有标记数据的特定任务，微调是更好的选择。`},
  {id:163,category:'資料處理',difficulty:'中等',text:`一家媒体公司想要分析观众行为和人口统计数据以推荐个性化内容。该公司想要在其生产环境中部署定制的 ML 模型。该公司还想观察模型质量是否发生漂移。哪种 AWS 服务或功能满足这些要求？ (A media company wants to analyze viewer behavior and demographics to recommend personalized content. The company wants to deploy a customized ML model in its production environment. The company also wants to observe if the model quality drifts. Which AWS se`,options:[`Amazon Rekognition (Amazon Rekognition)`,`Amazon SageMaker Clarify (Amazon SageMaker Clarify)`,`Amazon Comprehend (Amazon Comprehend)`,`Amazon SageMaker Model Monitor (Amazon S1ageMaker Model Monitor)`],answer:3,explanation:`D 是正确答案，因为 SageMaker Model Monitor 专门用于监控已部署模型的性能和质量漂移，可以持续监控模型质量、数据质量、偏差等。 A 不正确，因为 Rekognition 是计算机视觉服务，主要用于图像和视频分析，不提供模型监控功能。 B 不正确，因为 SageMaker Clarify 主要用于检测模型偏差和提供可解释性，不是专门的模型监控工具。 C 不正确，因为 Comprehend 是自然语言处理服务，不提供模型监控功能。`},
  {id:164,category:'模型評估',difficulty:'中等',text:`一位 AI 从业者正在构建 ML 模型。该 AI 从业者想要向利益相关者提供模型透明度和可解释性。哪种解决方案能满足这些要求？ (An AI practitioner is building an ML model. The AI practitioner wants to provide model transparency and explainability to stakeholders. Which solution will meet these requirements?)`,options:[`展示模型的 Shapley 值 (Present the model Shapley values)`,`提供模型准确度度量 (Provide the model accuracy measure)`,`提供模型混淆矩阵 (Provide the model confusion matrix)`,`提供安全的模型推理端点 (Provide a secure model inference endpoint)`],answer:0,explanation:`A 是正确答案，因为 Shapley 值能够解释每个特征对模型预测的贡献度，提供了模型决策的透明度。 B 不正确，因为准确度度量只是一个整体性能指标，不能解释模型如何做出决策。 C 不正确，因为混淆矩阵只显示分类结果的统计信息，不提供模型决策过程的解释。 D 不正确，因为安全推理端点与模型可解释性无关，它只关注模型部署的安全性。`},
  {id:165,category:'ML基礎',difficulty:'中等',text:`一家金融公司正在使用 ML 来帮助完成公司的一些任务。哪个选项是生成式 AI 模型的应用？ (A financial company is using ML to help with some of the company's tasks. Which option is a use of generative AI models?)`,options:[`总结客户投诉 (Summarizing customer complaints)`,`基于产品使用情况对客户进行分类 (Classifying customers based on product usage)`,`基于投资类型对客户进行细分 (Segmenting customers based on type of investments)`,`预测某些产品的收入 (Forecasting revenue for certain products)`],answer:0,explanation:`A 是正确答案，因为总结客户投诉涉及生成新的文本内容，这是生成式 AI 的典型应用。 B 不正确，因为客户分类是传统的机器学习分类任务，不涉及内容生成。 C 不正确，因为客户细分是聚类分析任务，属于非监督学习范畴，不是生成式任务。 D 不正确，因为收入预测是预测性分析任务，属于回归问题，不涉及内容生成。`},
  {id:166,category:'資料處理',difficulty:'中等',text:`一位具有最少 ML 知识的 AI 从业者想要在不编写代码的情况下预测员工流失。哪个 Amazon SageMaker 功能满足这个要求？ (An AI practitioner who has minimal ML knowledge wants to predict employee attrition without writing code. Which Amazon SageMaker feature meets this requirement?)`,options:[`SageMaker Canvas (SageMaker Canvas)`,`SageMaker Clarify (SageMaker Clarify)`,`SageMaker Model Monitor (SageMaker Model Monitor)`,`SageMaker Data Wrangler (SageMaker Data Wrangler)`],answer:0,explanation:`Amazon SageMaker Canvas 是最佳选择，原因如下：无代码解决方案：`},
  {id:167,category:'LLM應用',difficulty:'中等',text:`以下哪个选项是基于 transformer 的语言模型的特征？ (Which option is a characteristic of transformer-based language models?)`,options:[`基于 transformer 的语言模型使用卷积层通过过滤视图来捕获局部信息 (Transformer-based language models use convolutional layers to apply filters across an input to capture local through filtered views)`,`基于 transformer 的语言模型只能处理文本数据 (Transformer-based language models can process only text data)`,`基于 transformer 的语言模型使用自注意力机制来捕获上下文 (Transformer-based language models use self-attention mechanisms to capture contextual)`,`基于 transformer 的语言模型一次处理一个数据序列元素 (Transformer-based language models process data sequences one element at a time)`],answer:2,explanation:`自注意力机制（self-attention mechanism）是 transformer 模型的核心特征，原因如下：主要特点： 1. 自注意力机制的优势： - 能够捕获序列中的长距离依赖关系，并行处理输入序列更好地理解上下文语境 - 提供更好的特征表示为什么其他选项不正确： '''{=html} <!-- --> ''' A. 不正确因为： - Transformer 不使用卷积层，使用的是注意力机制而非过滤器，不限于局部信息处理 B. 不正确因为： - Transformer 可以处理多种类型的数据，包括图像、音频等，不仅限于文本处理 D. 不正确因为： - Transformer 可以并行处理序列，不是按顺序一个一个处理，提供更高的计算效率`},
  {id:168,category:'模型評估',difficulty:'中等',text:`一家贸易公司想要使用大语言模型(LLM)基于每日市场数据、新闻和公司报告进行金融市场预测。哪种解决方案满足这些要求？ (A trading company wants to use a large language model (LLM) for financial market forecasts based on daily market data, news, and company reports. Which solution meets these requirements?)`,options:[`在特定领域数据集上微调 LLM 直到达到 100%准确率 (Fine-tune the LLM on a domain-specific dataset until the LLM achieves 100% accuracy)`,`直接使用未经修改的通用 LLM (Pick a general purpose LLM without modifications)`,`在测试数据集上评估后选择通用 LLM (Pick a general purpose LLM after evaluating the LLM on a test dataset)`,`在特定领域知识上持续预训练 LLM (Continually pre-train an LLM on domain-specific knowledge)`],answer:3,explanation:`在特定领域知识上持续预训练 LLM 是最佳选择，原因如下：主要优势： 1. 领域专业性： 2. 持续学习能力： 3. 预测准确性： 其他选项不适合的原因： A. 不适合因为： - 100%准确率是不现实的目标可能导致过拟合 - 在金融市场中不可能实现完全准确的预测 A. 不适合因为： - 缺乏领域专业知识无法处理金融特定术语和概念，预测准确性较低 A. 不适合因为： - 仅进行一次性评估不够，无法适应市场动态变化，缺乏持续改进机制`},
  {id:169,category:'模型評估',difficulty:'中等',text:`一家公司开发了自定义计算机视觉模型。该公司需要一个用户友好的数据标注界面，以最小化模型在新的真实世界数据上的错误。 (A company has developed custom computer vision models. The company needs a user- friendly interface for data labeling to minimize model mistakes on new real-world data. Which AWS service, feature, or tool meets these requirements?)`,options:[`Amazon SageMaker Ground Truth (Amazon SageMaker Ground Truth)`,`Amazon SageMaker Canvas (Amazon SageMaker Canvas)`,`Amazon Bedrock playground (Amazon Bedrock playground)`,`Amazon Bedrock Agents (Amazon Bedrock Agents)`],answer:0,explanation:`Amazon SageMaker Ground Truth 是最佳选择，原因如下：主要优势： - 提供直观的数据标注界面 - 支持多种计算机视觉标注任务类型 - 内置质量控制机制 - 可扩展的标注工作流程 - 支持自动化和人工标注相结合其他选项不适合的原因： B. SageMaker Canvas - 主要用于无代码 ML 模型开发，不专注于数据标注 C. Bedrock playground - 用于模型实验和测试，不提供数据标注功能 D. Bedrock Agents - 用于构建 AI 应用程序，不适合数据标注任务`},
  {id:170,category:'模型評估',difficulty:'中等',text:`一家公司想要在 AWS 上构建和部署 ML 模型，但不编写任何代码。哪个 AWS 服务或功能满足这些要求？ (A company wants to build and deploy ML models on AWS without writing any code. Which AWS service or feature meets these requirements?)`,options:[`Amazon SageMaker Canvas`,`Amazon Rekognition`,`AWS DeepRacer`,`Amazon Comprehend`],answer:0,explanation:`Amazon SageMaker Canvas 是最佳选择，因为：主要特点： - 提供完全无代码的 ML 解决方案 - 通过可视化界面构建模型 - 支持端到端的 ML 工作流程 - 适合业务分析师和领域专家 - 无需编程经验 - 支持多种 ML 问题类型具体功能： - 数据准备和清理 - 自动化模型训练 - 模型评估和部署 - 实时预测 - 与其他 AWS 服务集成 - 支持协作开发其他选项不适合： B. Amazon Rekognition 是预构建的计算机视觉服务 C. AWS DeepRacer 主要用于强化学习教育 D. Amazon Comprehend 是预构建的自然语言处理服务`},
  {id:171,category:'模型評估',difficulty:'中等',text:`Amazon Bedrock Studio 的哪个组件可以帮助保护 AI 系统生成的内容？ (Which component of Amazon Bedrock Studio can help secure the content that AI systems generate?)`,options:[`访问控制 (Access controls)`,`函数调用 (Function calling)`,`防护栏 (Guardrails)`,`知识库 (Knowledge bases)`],answer:2,explanation:`Guardrails（防护栏）是保护 AI 系统生成内容的最佳组件，因为：主要功能： - 提供可配置的安全保护措施 - 帮助过滤有害内容 - 阻止不当主题 - 检测和编辑敏感信息 - 防止幻觉和事实错误 - 确保内容符合组织政策 具体特点： - 可以跨多个基础模型应用一致的安全控制 - 提供内容过滤功能 - 支持自定义策略实施 - 帮助检测和阻止有害内容 - 提供隐私保护机制其他选项不适合： A. 访问控制主要关注用户权限管理 B. 函数调用是用于模型功能扩展的 D. 知识库主要用于存储和检索信息`},
  {id:172,category:'模型評估',difficulty:'中等',text:`一家公司想要提高生成式 AI 应用程序响应的准确性。该应用程序使用 Amazon Bedrock 上的基础模型 (FM)。哪种解决方案最具成本效益地满足这些要求？ (A company wants to improve the accuracy of the responses from a generative AI application. The application uses a foundation model (FM) on Amazon Bedrock. Which solution meets these requirements MOST cost-effectively?)`,options:[`微调基础模型 (Fine-tune the FM)`,`重新训练基础模型 (Retrain the FM)`,`训练新的基础模型 (Train a new FM)`,`使用提示工程 (Use prompt engineering)`],answer:3,explanation:`使用提示工程是最具成本效益的解决方案，因为：主要优势： - 无需额外的模型训练成本 - 实施速度快 - 可以快速迭代和优化 - 不需要大量计算资源 - 可以灵活调整和改进 - 维护成本低其他选项不适合： A. 微调需要额外的计算资源和成本 B. 重新训练整个模型成本高昂且耗时 C. 训练新模型是最昂贵和耗时的选项`},
  {id:173,category:'AI治理',difficulty:'中等',text:`一家零售公司想要构建一个 ML 模型来为客户推荐产品。该公司希望基于负责任的实践构建模型。在收集数据以减少模型偏差时，公司应该采用哪种实践？ (A retail company wants to build an ML model to recommend products to customers. The company wants to build the model based on responsible practices. Which practice should the company apply when collecting data to decrease model bias?)`,options:[`仅使用与公司整体客户群体人口统计相匹配的客户数据 (Use data from only customers who match the demographics of the company's overall customer base)`,`收集有购买历史的客户数据 (Collect data from customers who have a past purchase history)`,`确保数据是平衡的且来自多样化群体 (Ensure that the data is balanced and collected from a diverse group)`,`确保数据来自公开可用的数据集 (Ensure that the data is from a publicly available dataset)`],answer:2,explanation:`确保数据平衡且来自多样化群体是最佳实践，因为：主要原因： - 减少数据收集偏差 - 提高模型的公平性 - 确保推荐系统对所有用户群体都有效 - 防止模型产生歧视性结果 - 提高模型的普适性其他选项不适合： A. 仅匹配现有客户群可能会延续现有的偏见 B. 仅使用有购买历史的客户会产生选择偏差 D. 公开数据集可能不能准确反映特定业务场景`},
  {id:174,category:'LLM應用',difficulty:'中等',text:`题： 一位 AI 从业者想要部署一个聊天机器人来协助客服代表回答问题。该聊天机器人使用大语言模型 (LLM)。聊天机器人需要根据不断更新的产品文档生成细粒度的响应。哪种解决方案满足这些要求？ (An AI practitioner wants to deploy a chatbot that can assist customer service representatives by answering questions. The chatbot uses a large language model (LLM). The chatbot needs to produce fine-grained responses based on evolving product documentat`,options:[`使用产品文档进行持续预训练以构建自定义模型 (Apply continuous`,`使用检索增强生成(RAG)和产品文档来更新知识库 (Use product`,`使用迁移学习在各种产品领域训练通用模型 (Use transfer learning to`,`与研究机构合作开发新的基础模型(FM) (Collaborate with research`],answer:1,explanation:`使用 RAG 和产品文档是最佳选择，因为：主要优势： - 可以实时更新知识库而无需重新训练模型 - 能够提供基于最新文档的准确回答 - 降低了部署和维护成本 - 减少了模型幻觉的可能性 - 提供了更好的可控性和可追溯性其他选项不适合： A. 持续预训练成本高且耗时，不适合频繁更新 B. 迁移学习不能很好地处理特定领域的细节 C. 开发新的基础模型成本过高且不必要`},
  {id:175,category:'模型評估',difficulty:'中等',text:`一家金融公司正在使用 AI 系统获取客户信用评分作为贷款申请流程的一部分。该公司想要扩展到新的地理区域市场。公司必须确保能在该地理区域运营。公司应该审查哪些合规法律？ (A financial company is using AI systems to obtain customer credit scores as part of the loan application process. The company wants to expand to a new market in a different geographic area. The company must ensure that it can operate in that geographic area. Which `,options:[`当地健康数据保护法律 (Local health data protection laws)`,`当地支付卡数据保护法律 (Local payment card data protection laws)`,`当地教育隐私法律 (Local education privacy laws)`,`当地算法问责法律 (Local algorithm accountability laws)`],answer:3,explanation:`金融公司应该审查当地算法问责法律，因为：主要原因： - AI 系统用于信用评分决策 - 涉及自动化决策过程 - 可能影响个人金融机会 - 需要确保算法公平性和透明度 - 必须符合监管要求其他选项不适合： A. 健康数据保护法与信用评分无直接关系 B. 支付卡数据保护法主要关注支付安全，不是主要关注点 C. 教育隐私法与贷款业务无关`},
  {id:176,category:'資料處理',difficulty:'中等',text:`哪个选项描述了 AI 上下文中的嵌入（embeddings）？ (Which option describes embeddings in the context of AI?)`,options:[`压缩大型数据集的方法 (A method for compressing large datasets)`,`保护敏感数据的加密方法 (An encryption method for securing sensitive data)`,`可视化高维数据的方法 (A method for visualizing high-dimensional data)`,`在降维空间中表示数据的数值方法 (A numerical method for data representation in a reduced dimensionality space)`],answer:3,explanation:`嵌入是在降维空间中表示数据的数值方法，因为：主要特点： - 将高维数据转换为密集的数值向量 - 在低维空间中保留数据的关键特征 - 捕获数据项之间的语义关系 - 使数据更易于计算机处理 - 保持数据之间的相似性关系其他选项不正确： A. 嵌入的主要目的不是数据压缩 B. 嵌入不是加密方法，而是数据表示方法 C. 虽然嵌入可以用于数据可视化，但这不是其主要用途`},
  {id:177,category:'LLM應用',difficulty:'中等',text:`以下哪个选项是基于 transformer 的语言模型的特征？ (Which option is a characteristic of transformer-based language models?)`,options:[`基于 transformer 的语言模型使用卷积层在输入上应用过滤器，通过过滤视图捕获局部模式 (Transformer-based language models use convolutional layers to apply filters across an input to capture local patterns through filtered views)`,`基于 transformer 的语言模型只能处理文本数据 (Transformer-based language models can process only text data)`,`基于 transformer 的语言模型使用自注意力机制来捕获上下文关系 (Transformer-based language models use self-attention mechanisms to capture contextual relationships)`,`基于 transformer 的语言模型在循环迭代中一次处理一个数据序列元素 (Transformer-based language models process data sequences one element at a time in cyclic iterations)`],answer:2,explanation:`自注意力机制（self-attention mechanisms）是 transformer 模型的核心特征，因为：主要特点： - 能够同时处理序列中的所有元素 - 可以捕获序列中任意位置之间的关系 - 允许模型理解上下文和长距离依赖 - 提供更好的并行计算能力 - 不受序列长度限制的影响其他选项不正确： A. Transformer 不使用卷积层，这是 CNN 的特征 B. Transformer 可以处理多种类型的数据，不限于文本 D. Transformer 是并行处理序列元素，而不是一次处理一个`},
  {id:178,category:'模型評估',difficulty:'中等',text:`在生成式 AI 模型生命周期的哪个阶段执行测试来检查模型的准确性？ (In which stage of the generative AI model lifecycle are tests performed to examine the model's accuracy?)`,options:[`部署阶段 (Deployment)`,`数据选择阶段 (Data selection)`,`微调阶段 (Fine-tuning)`,`评估阶段 (Evaluation)`],answer:3,explanation:`评估阶段(Evaluation)是检查模型准确性的专门阶段，因为：主要工作内容包括： - 全面测试模型性能 - 评估模型的准确性和质量 - 验证模型输出的一致性 - 检查模型是否满足预定的性能指标 - 进行定量和定性分析 - 识别潜在的问题和改进空间其他选项不适合： A. 部署阶段主要关注模型的生产环境实施 B. 数据选择阶段专注于准备训练数据 C. 微调阶段专注于优化模型参数和性能评估阶段的关键指标： - 准确性 - 响应质量 - 输出一致性 - 性能指标 - 偏差检测 - 安全性评估`},
  {id:179,category:'LLM應用',difficulty:'中等',text:`在生成式 AI 模型生命周期的部署阶段，AI 从业者做什么？ (What does an AI practitioner do during the deployment phase of a generative AI model lifecycle?)`,options:[`选择最有用和多样化的数据来训练模型 (Chooses the most useful and varied data to train the model)`,`为实时生产环境设置和优化 AWS 基础设施 (Sets up and optimizes AWS Infrastructure for the live production environment)`,`使模型在实时环境中可供最终用户访问 (Makes the model available in a live environment for end users to access)`,`持续用新数据训练模型以提高准确性 (Continuously trains the model on new data to improve accuracy)`],answer:2,explanation:`部署阶段的主要任务是\"使模型在实时环境中可供最终用户访问\"，因为：主要工作内容包括： - 将模型从开发环境迁移到生产环境 - 设置必要的 API 和接口 - 确保模型可以处理实际用户请求 - 实施监控和日志记录 - 建立 CI/CD 流程 - 确保系统的可扩展性和可靠性其他选项不适合： A. 这是数据准备阶段的工作 B. 这只是部署过程的一部分，不是完整的部署阶段工作 D. 这是模型优化或持续学习阶段的工作`},
  {id:180,category:'LLM應用',difficulty:'中等',text:`哪种策略可以防止模型产生幻觉？ (Which strategy will prevent model hallucinations?)`,options:[`对大语言模型（LLM）的输出进行事实核查 (Fact-check the output of the`,`将大语言模型（LLM）的输出与互联网搜索结果进行比较 (Compare the output`,`使用上下文基础 (Use contextual grounding)`,`使用相关性基础 (Use relevance grounding)`],answer:2,explanation:`使用上下文基础（contextual grounding）是最佳选择，因为： - 通过提供具体的上下文信息来约束模型输出 - 帮助模型基于可靠的信息源生成响应 - 减少模型生成虚构或不准确信息的可能性 - 提供明确的参考框架 - 是一种主动预防而不是事后检查的方法其他选项不适合： - 事实核查是事后验证方法，不能预防幻觉的产生 - 与互联网搜索结果比较也是事后验证，且搜索结果可能不可靠 - 相关性基础不是标准术语，不是防止幻觉的主要策略`},
  {id:181,category:'LLM應用',difficulty:'中等',text:`一家公司正在为视障用户构建移动应用程序。该应用程序必须能够听取用户的语音并提供语音回应。哪种解决方案能满足这些要求？ (A company Is building a mobile app for users who have a visual impairment. The app must be able to hear what users say and provide voice responses. Which solution will meet these requirements?)`,options:[`使用深度学习神经网络执行语音识别 (Use a deep learning neural network to perform speech recognition)`,`构建 ML 模型来搜索数字数据中的模式 (Build ML models to search for patterns in numeric data)`,`使用生成式 AI 摘要来生成类人文本 (Use generative AI summarization to generate human-like text)`,`构建用于图像分类和识别的自定义模型 (Build custom models for image classification and recognition)`],answer:0,explanation:`使用深度学习神经网络执行语音识别是最佳选择，因为： - 能够实现语音输入的识别和处理 - 可以与语音合成技术结合，提供语音响应 - 适合视障用户的交互需求 - 提供自然的语音交互体验 - 可以使用 AWS 服务如 Amazon Transcribe 和 Amazon Polly 来实现其他选项不适合： - 构建 ML 模型搜索数字数据与语音交互需求无关 - 生成式 AI 摘要主要用于文本生成，不直接解决语音交互问题 - 图像分类和识别对于视障用户的语音交互应用不是必需的`},
  {id:182,category:'LLM應用',difficulty:'中等',text:`一家公司正在研究大型语言模型（LLM），并注意到 LLM 的输出不如预期的多样化。公司应该调整哪个参数？ (A company Is working on a large language model (LLM) and noticed that the LLM's outputs are not as diverse as expected. Which parameter should the company adjust?)`,options:[`温度值 (Temperature)`,`批量大小 (Batch size)`,`学习率 (Learning rate)`,`优化器类型 (Optimizer type)`],answer:0,explanation:`Temperature（温度值）是最佳选择，因为： - Temperature 控制模型输出的随机性和创造性 - 较高的 temperature 值会产生更多样化和创造性的输出 - 较低的 temperature 值会使输出更加确定和保守 - 是直接影响输出多样性的关键参数 - 通常范围在 0-1 之间，值越高，输出越多样化其他选项不适合： - Batch size（批量大小）是训练参数，影响模型训练效率，不直接影响输出多样性 - Learning rate（学习率）是训练过程中的参数，用于控制模型权重更新速度 - Optimizer type（优化器类型）也是训练相关参数，用于选择优化算法`},
  {id:183,category:'模型評估',difficulty:'中等',text:`一家公司在其生成式 AI 应用中使用 Amazon Bedrock。该公司想要使用 Amazon Bedrock Guardrails 来检测和过滤有害的用户输入和模型生成的输出。护栏可以过滤哪些内容类别？（选择两项） (A company uses Amazon Bedrock for its generative AI application. The company wants to use Amazon Bedrock Guardrails to detect and filter harmful user inputs and model-generated outputs. Which content categories can the guardrails filter?)`,options:[`仇恨 (Hate)`,`政治 (Politics)`,`暴力 (Violence)`,`赌博 (Gambling)`],answer:0,explanation:`Amazon Bedrock Guardrails 提供以下预定义的有害内容过滤类别： 1. 仇恨 (Hate)： - 可以检测和过滤仇恨言论 - 帮助防止歧视性内容 2. 暴力 (Violence)： - 可以检测和过滤暴力相关内容 - 帮助维护安全的用户体验其他预定义类别包括： - 侮辱 (Insults) - 性相关内容 (Sexual) - 不当行为 (Misconduct) - 提示攻击 (Prompt Attacks)其他选项不适合： - 政治、赌博和宗教不是 Amazon Bedrock Guardrails 的预定义过滤类别 - 这些主题可以通过自定义主题策略来处理，但不是默认的内容过滤类别`},
  {id:184,category:'LLM應用',difficulty:'中等',text:`哪个 AWS 服务或功能将嵌入存储在向量数据库中，以供基础模型（FMs）和检索增强生成（RAG）使用？ (Which AWS service or feature stores embeddings in a vector database for use with foundation models (FMs) and Retrieval Augmented Generation (RAG)?)`,options:[`Amazon SageMaker Ground Truth Elag for Review（用于审查的 Ground Truth 标记）`,`Amazon OpenSearch Service（OpenSearch 服务）`,`Amazon Transcribe（语音转文字服务）`,`Amazon Textract（文档提取服务）`],answer:1,explanation:`Amazon OpenSearch Service 是最佳选择，因为： - 提供专门的向量引擎，用于存储和搜索向量嵌入 - 支持存储和索引数十亿个高维向量 - 可以与基础模型和 RAG 应用程序无缝集成 - 提供高性能的向量相似性搜索 - 支持实时更新和高效检索 - 可以结合文本关键词搜索功能 其他选项不适合： - Amazon SageMaker Ground Truth 是数据标注服务，不提供向量存储功能 - Amazon Transcribe 是语音转文字服务，与向量存储无关 - Amazon Textract 是文档提取服务，用于从文档中提取文本和数据，不提供向量数据库功能`},
  {id:185,category:'模型評估',difficulty:'中等',text:`一家公司在 Amazon S3 存储桶中存储了数百万份 PDF 文档。该公司需要从 PDF 中提取文本，生成文本摘要，并为快速搜索建立索引。哪些 AWS 服务组合将满足这些要求？（选择两项） (A company stores millions of PDF documents in an Amazon S3 bucket. The company needs to extract the text from the PDFs, generate summaries of the text, and index the summaries for fast searching. Which combination of AWS services will meet these require`,options:[`Amazon Translate（翻译服务）`,`Amazon Bedrock（基础模型服务）`,`Amazon Transcribe（语音转文字服务）`,`Amazon Polly（文字转语音服务）`],answer:1,explanation:`这个解决方案需要两个关键组件： 1. Amazon Textract： - 专门用于从 PDF 文档中提取文本和结构化数据 - 可以处理扫描文档和表格 - 提供高精度的文本提取能力 2. Amazon Bedrock： - 可以使用基础模型生成文本摘要 - 提供强大的自然语言处理能力 - 支持文本总结和理解其他选项不适合： - Amazon Translate 仅用于语言翻译 - Amazon Transcribe 用于语音转文字，不适用于 PDF 文档 - Amazon Polly 用于文字转语音，与需求不相关`},
  {id:186,category:'資料處理',difficulty:'中等',text:`一家餐饮服务公司想要收集数据集来预测客户的食物偏好。该公司希望确保数据中包含所有人口统计群体的食物偏好。这个场景体现了哪个数据集特征？ (A food service company wants to collect a dataset to predict customer food preferences: The company wants to ensure that the food preferences of all demographics are included in the data. Which dataset characteristic does this scenario present?)`,options:[`准确性 (Accuracy)`,`多样性 (Diversity)`,`近期偏差 (Recency bias)`,`可靠性 (Reliability)`],answer:1,explanation:`多样性是最佳选择，因为： - 强调包含所有人口统计群体的数据 - 确保数据集具有代表性和包容性 - 避免数据集中的人口统计偏差 - 有助于模型更好地服务于不同群体 - 提高预测结果的普适性其他选项不适合： - 准确性关注数据的正确性，而不是包容性 - 近期偏差指的是数据时间上的偏差问题 - 可靠性关注数据的一致性和稳定性，而不是多样性`},
  {id:187,category:'LLM應用',difficulty:'中等',text:`在生成式 AI 模型的背景下，哪种场景描述了提示工程的潜在风险和局限性？ (Which scenario describes a potential risk and limitation of prompt engineering in the context of a generative AI model?)`,options:[`提示工程不能确保模型始终产生一致和确定性的输出，消除了验证的需求 (Prompt engineering does not ensure that the model always produces consistent and deterministic outputs, eliminating the need for validation)`,`提示工程可能使模型暴露于提示注入攻击等漏洞 (Prompt engineering could expose the model to vulnerabilities such as prompt injection attacks)`,`设计良好的提示可以减少但不能消除数据污染或模型劫持的风险 (Properly designed prompts`,`提示工程不能确保模型在处理真实世界数据时始终生成高度可靠的输出 (Prompt engineering does not ensure that the model will consistently generate highly reliable outputs when working with real-world data)`],answer:1,explanation:`提示注入攻击是提示工程中的一个重要安全风险，因为： - 攻击者可能通过精心设计的提示来操纵模型行为 - 可能导致模型生成有害或不当的内容 - 可能绕过安全控制和限制 - 对系统安全性构成直接威胁 - 需要特别的安全措施来防范其他选项不适合： - A 选项的说法有误，验证始终是必要的 - C 选项描述的是一般性问题，不是提示工程特有的风险 - D 选项描述的是模型的固有限制，而不是提示工程的特定风险`},
  {id:188,category:'模型評估',difficulty:'中等',text:`一家公司正在使用 Amazon Bedrock Agents 为其应用程序创建代理。该代理运行良好，但公司想通过提供一些具体示例来提高代理的准确性。哪种解决方案满足这些要求？ (A company is creating an agent for its application by using Amazon Bedrock Agents. The agent is performing well, but the company wants to improve the agent's accuracy by providing some specific examples. Which solution meets these requirements?)`,options:[`修改代理的高级提示以包含这些示例 (Modify the advanced prompts for the agent to include the examples)`,`为代理创建包含示例的护栏 (Create a guardrail for the agent that includes the examples)`,`使用 Amazon SageMaker Ground Truth 来标记示例 (Use Amazon SageMaker Ground Truth to label the examples)`,`在 AWS Lambda 中运行脚本将示例添加到训练数据集 (Run a script in AWS Lambda that adds the examples to the training dataset)`],answer:0,explanation:`修改代理的高级提示以包含示例是最佳选择，因为： - 高级提示模板允许直接添加示例来改善代理的性能 - 可以通过 few-shot 提示方式来提供具体示例 - 这是最直接和有效的方法来提高代理的准确性 - 不需要额外的服务或复杂的设置 - 可以快速实施和调整其他选项不适合： - 护栏主要用于限制代理的行为，而不是提供示例 - SageMaker Ground Truth 用于数据标注，不是直接提高代理准确性的方法 - 使用 Lambda 添加训练数据过于复杂，且不是必要的解决方案`},
  {id:189,category:'模型評估',difficulty:'中等',text:`一家银行正在构建一个聊天机器人，用于回答客户关于开设银行账户的问题。该聊天机器人将使用公开的银行文档来生成回答。该公司将使用 Amazon Bedrock 和提示工程来改善聊天机器人的回 答。哪种提示工程技术满足这些要求？`,options:[`基于复杂度的提示 (Complexity-based prompting)`,`零样本提示 (Zero-shot prompting)`,`少样本提示 (Few-shot prompting)`,`定向刺激提示 (Directional stimulus prompting)`],answer:2,explanation:`少样本提示（Few-shot prompting）是最佳选择，因为： - 可以使用现有的银行文档中的示例来指导模型生成回答 - 通过提供几个相关示例来提高回答的准确性和相关性 - 帮助模型更好地理解银行特定领域的上下文 - 提供了一个明确的回答格式和风格指南 - 特别适合处理结构化的银行业务问题其他选项不适合： - 基于复杂度的提示不是标准的提示工程技术 - 零样本提示在没有示例的情况下可能无法提供足够准确的回答 - 定向刺激提示不是标准的提示工程技术`},
  {id:190,category:'模型評估',difficulty:'中等',text:`什么是持续预训练？ (What is continued pre-training?)`,options:[`The process of fine-tuning a pre-trained language model on labeled data for a specific task (在标记数据上对预训练语言模型进行微调以完成特定任务的过程)`,`The process of providing unlabeled data to a pre-trained language model to improve the model's domain knowledge (向预训练语言模型提供未标记数据以改善模型领域知识的过程)`,`The process of training a language model from the beginning on a specific dataset (从头开始在特定数据集上训练语言模型的过程)`,`The process of evaluating the performance of a pre-trained language model on a test set (在测试集上评估预训练语言模型性能的过程)`],answer:1,explanation:`持续预训练是向预训练语言模型提供未标记数据以改善模型领域知识的过程，这是最佳选择，因为： - 它允许模型在现有预训练的基础上继续学习 - 使用未标记数据来增强模型的领域知识 - 有助于模型更好地理解特定领域的内容 - 在微调之前改善模型的基础理解 - 提高模型在特定领域的性能其他选项不适合： - A 描述的是微调过程，这是一个不同的概念 - C 描述的是从头开始训练，而不是继续预训练 - D 描述的是模型评估过程，与预训练无关`},
  {id:191,category:'LLM應用',difficulty:'中等',text:`在检索增强生成（RAG）中，分块的目的是什么？ (What is the purpose of chunking in Retrieval Augmented Generation (RAG)?)`,options:[`To avoid database storage limitations for large text documents by storing parts or chunks of the text (通过存储文本的部分或块来避免大型文本文档的数据库存储限制)`,`To improve efficiency by avoiding the need to convert large text into vector embeddings (通过避免将大型文本转换为向量嵌入来提高效率)`,`To improve the contextual relevancy of results retrieved from the vector index (提高从向量索引检索的结果的上下文相关性)`,`To decrease the cost of storage by storing parts or chunks of the text (通过存储文本的部分或块来降低存储成本)`],answer:2,explanation:`提高检索结果的上下文相关性是最佳选择，因为： - 分块可以将长文档分解成更小、更有意义的单元 - 使检索系统能够更精确地定位相关信息 - 提供更具体和相关的上下文给语言模型 - 增强生成响应的准确性和相关性 - 改善整体检索质量其他选项不适合： - A 选项关注存储限制，这不是分块的主要目的 - B 选项误解了分块的目的，实际上仍需要向量化处理 - D 选项关注存储成本，这不是分块的主要目的`},
  {id:192,category:'資料處理',difficulty:'中等',text:`一家电子商务公司想要通过为公司电子商务平台的每个用户定制结果来改进搜索引擎推荐。哪种 AWS 服务满足这些要求？ (An ecommerce company wants to improve search engine recommendations by customizing the results for each user of the company's ecommerce platform. Which AWS service meets these requirements?)`,options:[`Amazon Personalize (亚马逊个性化服务)`,`Amazon Kendra (亚马逊 Kendra 搜索服务)`,`Amazon Rekognition (亚马逊图像识别服务)`,`Amazon Transcribe (亚马逊转录服务)`],answer:0,explanation:`Amazon Personalize 是最佳选择，因为： - 专门设计用于提供个性化推荐 - 可以基于用户行为和偏好定制搜索结果 - 能够实时处理用户交互数据 - 适用于电子商务平台的个性化需求 - 可以提高用户参与度和转化率其他选项不适合： - Amazon Kendra 主要用于企业搜索，不专注于个性化推荐 - Amazon Rekognition 是计算机视觉服务，用于图像和视频分析 - Amazon Transcribe 是语音转文本服务，与搜索推荐无关`},
  {id:193,category:'模型評估',difficulty:'中等',text:`一家电子商务公司正在使用聊天机器人来自动化客户订单提交流程。该聊天机器人由 AI 驱动，每周 7 天、每天 24 小时都可以在公司网站上直接为客户服务。在聊天机器人投入使用之前，公司需要解决哪个 AI 系统输入漏洞？ (An ecommerce company is using a chatbot to automate the customer order submission process. The chatbot Is powered by AI and is available to customers directly from the company's website 24 hours a day, 7 days a week. Which option Is an AI s`,options:[`Data leakage (数据泄露)`,`Prompt Injection (提示注入)`,`Large language model (LLM) hallucinations (大语言模型幻觉)`,`Concept drift (概念漂移)`],answer:1,explanation:`Prompt Injection（提示注入）是最佳选择，因为： - 这是一种直接针对 AI 聊天机器人输入的安全漏洞 - 攻击者可能通过精心设计的提示来操纵聊天机器人的行为 - 可能导致聊天机器人泄露敏感信息或执行未授权操作 - 对于直接面向客户的系统来说是一个重要的安全威胁 - 需要在系统部署前解决以保护用户和公司其他选项不适合： - Data leakage（数据泄露）是输出端的问题，而不是输入漏洞 - LLM hallucinations（大语言模型幻觉）是模型输出的问题，不是输入漏洞 - Concept drift（概念漂移）是模型随时间变化的问题，不是输入漏洞`},
  {id:194,category:'模型評估',difficulty:'中等',text:`一位 AI 从业者正在使用大量金融市场数据训练 ML 模型来预测股票价格。该模型出现过拟合并产生错误预测。AI 从业者应该调整哪个参数来提高预测准确性？ (An AI practitioner is training an ML model on a large dataset of financial market data to predict stock prices. The model is overfitting and generating incorrect predictions. Which parameter should the AI practitioner adjust to improve prediction accuracy?)`,options:[`Weights and biases (权重和偏置)`,`Learning rate (学习率)`,`Activation function (激活函数)`,`Pooling size (池化大小)`],answer:1,explanation:`Learning rate（学习率）是最佳选择，因为： - 学习率直接影响模型的训练过程和收敛性 - 适当的学习率可以帮助模型避免过拟合 - 可以通过调整学习率来平衡模型的学习速度和稳定性 - 对于金融数据这样的复杂数据集尤其重要 - 是解决过拟合最有效的参数之一其他选项不适合： - Weights and biases（权重和偏置）通常由模型自动学习，不是直接调整的参数 - Activation function（激活函数）的改变可能影响模型的非线性表达能力，但不是解决过拟合的`},
  {id:195,category:'模型評估',difficulty:'中等',text:`一家大型零售商每天收到数千条关于产品的客户支持查询。这些客户支持查询需要快速处理。该公司想要实施 Amazon Bedrock 代理。使用 Amazon Bedrock 代理可以为这家零售商带来哪些关键优势？ (A large retailer receives thousands of customer support inquires about products every day. The customer support inquires need to be processed quickly. The company wants to implement Agents for Amazon Bedrock. What are the key benefits of using `,options:[`Generation of custom foundation models (FMs) to predict customer needs (生成自定义基础模型来预测客户需求)`,`Automation of repetitive tasks and orchestration of complex workflows (自动化重复任务和编排复杂工作流程)`,`Automatically calling multiple foundation models (FMs) and consolidating the results (自动调用多个基础模型并整合结果)`,`Selecting the foundation model (FM) based on predefined criteria and metrics (基于预定义的标准和指标选择基础模型)`],answer:1,explanation:`Automation of repetitive tasks and orchestration of complex workflows（自动化重复任务和编排复杂工作流程）是最佳选择，因为： - 能够自动处理大量重复的客户查询 - 可以编排和管理复杂的客户服务流程 - 提高响应速度和效率 - 减少人工处理的工作量 - 确保一致的服务质量其他选项不适合： - 生成自定义基础模型不是 Amazon Bedrock 代理的主要功能 - 自动调用多个模型并整合结果不是主要优势 - 基于标准选择模型不是解决当前问题的关键 - 客户服务流程优化`},
  {id:196,category:'AI治理',difficulty:'中等',text:`一家医院开发了一个 AI 系统来为患者提供个性化治疗建议。该 AI 系统必须提供建议背后的理由，并使医生和患者能够理解这些见解。这种场景体现了哪种以人为本的设计原则？ (A hospital developed an AI system to provide personalized treatment recommendations for patients. The AI system must provide the rationale behind the recommendations and make the insights accessible to doctors and patients. Which human-centered design principle doe`,options:[`Explainability (可解释性)`,`Privacy and security (隐私和安全)`,`Fairness (公平性)`,`Data governance (数据治理)`],answer:0,explanation:`Explainability（可解释性）是最佳选择，因为： - 要求系统提供决策背后的理由 - 使 AI 系统的输出对医生和患者都可理解 - 增加系统的透明度 - 帮助建立对 AI 系统的信任 - 支持知情决策其他选项不适合： - Privacy and security（隐私和安全）关注数据保护，而不是决策解释 - Fairness（公平性）关注系统的公平对待，不是决策透明度 - Data governance（数据治理）关注数据管理和控制`},
  {id:197,category:'模型評估',difficulty:'中等',text:`一家餐饮服务公司想要收集数据集来预测客户的食物偏好。该公司希望确保数据中包含所有人口统计群体的食物偏好。这种场景体现了哪种数据集特征？ (A food service company wants to collect a dataset to predict customer food preferences. The company wants to ensure that the food preferences of all demographics are Included In the data. Which dataset characteristic does this scenario present?)`,options:[`Accuracy (准确性)`,`Diversity (多样性)`,`Recency bias (近期偏差)`,`Reliability (可靠性)`],answer:1,explanation:`Diversity（多样性）是最佳选择，因为： - 强调包含所有人口统计群体的数据 - 确保数据集具有代表性 - 避免数据偏见和歧视 - 能够更好地服务于不同群体的需求 - 提高模型的泛化能力其他选项不适合： - Accuracy（准确性）关注数据的正确性，而不是包容性 - Recency bias（近期偏差）指的是对最近数据的过度依赖 - Reliability（可靠性）关注数据的一致性和可信度`},
  {id:198,category:'模型評估',difficulty:'中等',text:`> 一家公司想要提高大型语言模型(LLM)在复杂问题解决任务中的响应质量。这些任务需要详细的推理和逐步的解释过程。哪种提示工程技术满足这些要求？(A > company wants to enhance response quality for a large language model > （LLM）for complex problem-solving tasks. The tasks require detailed > reasoning and a step-by-step explanation process. Which prompt > engineering technique meets these requirements?)`,options:[`Few-shot prompting（少样本提示）`,`Zero-shot prompting（零样本提示）`,`Directional stimulus prompting（定向刺激提示）`,`Chain-of-thought prompting（链式思维提示）`],answer:3,explanation:`链式思维提示(Chain-of-thought prompting)是最佳选择，因为： - 它专门设计用于引导 LLM 进行逐步推理 - 能够将复杂问题分解成更小的、连续的步骤 - 提高模型在复杂推理任务中的可靠性 - 使模型的思维过程更加透明和可理解 - 特别适合需要详细解释的问题解决任务其他选项不适合： - Few-shot prompting（少样本提示）主要用于提供示例来指导模型，但不专注于推理过程 - Zero-shot prompting（零样本提示）在没有示例的情况下直接要求模型完成任务，不适合复杂`},
  {id:199,category:'LLM應用',difficulty:'中等',text:`一家公司制作电子记录软件。用户有时在记录中输入不完整的句子。该公司想要使用 ML 来自动完成这些句子。哪种解决方案满足这些要求？(A company makes electronic record software. Users sometimes enter incomplete sentences in the records. The company wants to use ML to automatically complete the sentences. Which solution meets these requirements?)`,options:[`使用在记录数据上训练的大型语言模型(LLM) (Use a large language model (LLM) trained on data from the records)`,`使用在图像和相关元数据上训练的计算机视觉模型 (Use a computer vision model trained on images and related metadata)`,`使用 k-最近邻(k-NN)算法来分类输入术语 (Use a k-nearest neighbors (k-NN) algorithm to classify input terms)`,`使用输入数据的强化学习来生成完整句子 (Use reinforcement learning with input data to produce full sentences)`],answer:0,explanation:`使用大型语言模型(LLM)是最佳选择，因为： - LLM 专门设计用于理解和生成自然语言 - 能够根据上下文自动完成句子 - 可以在领域特定数据上进行微调 - 具有强大的文本生成和补全能力 - 可以理解句子的语义和语法结构 其他选项不适合： - 计算机视觉模型用于处理图像，不适合文本补全 - k-NN 算法主要用于分类任务，不适合生成文本 - 强化学习更适合决策问题，不是文本生成的最佳选择`},
  {id:200,category:'ML基礎',difficulty:'中等',text:`哪种类型的 AI 模型进行数值预测？(Which type of AI model makes numeric predictions?)`,options:[`扩散模型 (Diffusion)`,`回归模型 (Regression)`,`Transformer 模型 (Transformer)`,`多模态模型 (Multi-modal)`],answer:1,explanation:`回归模型(Regression)是最佳选择，因为： - 回归模型专门设计用于进行数值预测 - 可以预测连续的数值输出 - 基于输入变量与输出变量之间的关系进行预测 - 广泛应用于预测价格、温度、销售量等数值型数据 - 是最基本和最常用的数值预测方法其他选项不适合： - 扩散模型主要用于图像生成 - Transformer 模型主要用于自然语言处理任务 - 多模态模型处理多种类型的输入数据，不专门用于数值预测`},
  {id:201,category:'ML基礎',difficulty:'中等',text:`一家公司需要自动发现 Amazon S3 存储桶中的敏感数据。哪种解决方案能满足这个要求？(A company needs to automate the discovery of sensitive data in an Amazon S3 bucket. Which solution will meet this requirement?)`,options:[`为 S3 存储桶配置 S3 Object Lambda (Configure S3 Object Lambda for the S3 bucket)`,`为 S3 存储桶配置使用 AWS KMS 密钥的服务器端加密(SSE-KMS) (Configure server-side encryption with AWS KMS keys(SSE-KMS) for the S3 bucket)`,`为 S3 存储桶配置 Amazon CloudWatch 警报 (Configure Amazon CloudWatch alarms for the S3 bucket)`,`为 S3 存储桶配置 Amazon Macie (Configure Amazon Macie for the S3 bucket)`],answer:3,explanation:`Amazon Macie 是最佳选择，因为： - 它是专门设计用于自动发现和保护 S3 中敏感数据的服务 - 使用机器学习和模式匹配来识别敏感数据 - 可以持续监控和扫描 S3 存储桶 - 提供详细的发现结果和报告 - 可以自动检测多种类型的敏感数据，如个人身份信息(PII)其他选项不适合： - S3 Object Lambda 用于在检索对象时转换数据，不是用于发现敏感数据 - SSE-KMS 提供数据加密功能，但不能发现敏感数据 - CloudWatch 警报用于监控指标和触发警报，不能识别敏感数据`},
